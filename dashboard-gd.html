      {showForm&&<ScheduleMeetingModal onClose={()=>{setShowForm(false);setEditMeeting(null);}} onSave={m=>{
        if(editMeeting){setMeetings(p=>p.map(x=>x.id===editMeeting.id?{...editMeeting,...m}:x));}
        else{setMeetings(p=>[...p,{...m,id:'mtg-'+Date.now(),status:'scheduled'}]);}
        setShowForm(false);setEditMeeting(null);
      }} staff={staff} existing={editMeeting}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════
   SCHEDULE MEETING MODAL — with Google Calendar API call
══════════════════════════════════════════════ */
function ScheduleMeetingModal({onClose, onSave, staff, existing}){
  const now = new Date();
  const defDate = new Date(now.getTime()+24*60*60*1000);
  const defDateStr = defDate.toISOString().slice(0,16);

  const[f,setF]=useState({
    title: existing?.title||'',
    type: existing?.type||'weekly-edu',
    dateTime: existing?.dateTime? new Date(existing.dateTime).toISOString().slice(0,16) : defDateStr,
    duration: existing?.duration||60,
    location: existing?.location||'Google Meet',
    description: existing?.description||'',
    organizer: existing?.organizer||'',
    organizerEmail: existing?.organizerEmail||'',
    attendeeIds: existing?.attendeeIds||[],
    allStaff: existing?.allStaff||false,
    recurrence: existing?.recurrence||'',
    recurrenceCount: existing?.recurrenceCount||12,
    sendInvites: existing?.sendInvites!==false,
    createMeet: existing?.createMeet!==false,
  });
  const[loading,setLoading]=useState(false);
  const[status,setStatus]=useState(null);

  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const mt = MEETING_TYPES.find(t=>t.id===f.type)||MEETING_TYPES[5];

  const toggleAttendee = (id) => setF(p=>({...p,
    attendeeIds: p.attendeeIds.includes(id)? p.attendeeIds.filter(x=>x!==id):[...p.attendeeIds,id]
  }));

  // Build attendee email list from staff
  const getAttendeeEmails = () => {
    const ids = f.allStaff ? staff.map(s=>s.id) : f.attendeeIds;
    return ids.map(id=>{
      const s = staff.find(x=>x.id===id);
      if(!s) return null;
      if(s.email) return {name:s.name, email:s.email};
      // Fallback: use firstname@revibeto.com
      const first = s.name.split(' ')[0].toLowerCase();
      return {name:s.name, email:`${first}@revibeto.com`};
    }).filter(Boolean);
  };

  const handleSave = async () => {
    if(!f.title.trim()) return setStatus({type:'error',msg:'Please enter a meeting title.'});
    if(!f.dateTime) return setStatus({type:'error',msg:'Please set a date and time.'});

    setLoading(true);
    setStatus({type:'info',msg:'Creating Google Calendar event…'});

    const startDt = new Date(f.dateTime);
    const endDt = new Date(startDt.getTime()+f.duration*60*1000);
    const attendeeEmails = getAttendeeEmails();

    // Build the event payload for Google Calendar MCP
    const eventBody = {
      summary: f.title,
      description: f.description + (f.description?'\n\n':'') + `Meeting Type: ${mt.label}\nOrganized by: ${f.organizer||'Revibe Health Management'}`,
      start: {dateTime: startDt.toISOString(), timeZone: 'America/Toronto'},
      end:   {dateTime: endDt.toISOString(),   timeZone: 'America/Toronto'},
      location: f.location,
      attendees: [
        ...(f.organizerEmail?[{email:f.organizerEmail,organizer:true}]:[]),
        ...attendeeEmails.map(a=>({email:a.email,displayName:a.name})),
      ],
      conferenceData: f.createMeet ? {
        createRequest: {requestId: 'revibe-'+Date.now(), conferenceSolutionKey:{type:'hangoutsMeet'}}
      } : undefined,
      reminders: {useDefault:false, overrides:[{method:'email',minutes:1440},{method:'popup',minutes:30}]},
    };

    // Add recurrence rule if set
    if(f.recurrence){
      const freq = f.recurrence==='WEEKLY'?'WEEKLY':'MONTHLY';
      eventBody.recurrence = [`RRULE:FREQ=${freq};COUNT=${f.recurrenceCount}`];
    }

    // Build a prompt for Claude to execute via its Google Calendar connection
    const rruleStr = f.recurrence==='WEEKLY'   ? 'RRULE:FREQ=WEEKLY;COUNT='+f.recurrenceCount
                   : f.recurrence==='BIWEEKLY' ? 'RRULE:FREQ=WEEKLY;INTERVAL=2;COUNT='+f.recurrenceCount
                   : f.recurrence==='MONTHLY'  ? 'RRULE:FREQ=MONTHLY;COUNT='+f.recurrenceCount
                   : null;
    const emailLines = attendeeEmails.map(a=>'  - '+a.name+' <'+a.email+'>').join('\n');
    const loc = f.location==='custom'?(f.customLocation||'TBD'):f.location;
    const claudePrompt = [
      'Please create a Google Calendar event using your Google Calendar connection:',
      '',
      'Title: '+f.title,
      'Start: '+startDt.toISOString()+' (America/Toronto)',
      'End:   '+endDt.toISOString()+' (America/Toronto)',
      'Duration: '+f.duration+' minutes',
      'Location: '+loc,
      f.description?'Description: '+f.description:'',
      f.organizer?'Organizer: '+f.organizer+(f.organizerEmail?' <'+f.organizerEmail+'>':''):'',
      rruleStr?'Recurrence: '+rruleStr:'One-time event',
      f.createMeet?'Video: Please add a Google Meet link (hangoutsMeet)':'',
      'Reminders: email 1440 min before, popup 30 min before',
      '',
      'Send calendar invites to all '+attendeeEmails.length+' attendees:',
      emailLines,
      '',
      'After creating, share the Google Meet link and calendar link.'
    ].filter(l=>l).join('\n');
    let copied=false;
    try{await navigator.clipboard.writeText(claudePrompt);copied=true;}catch(e){}
    onSave({...f,attendeeEmails:attendeeEmails.map(a=>a.email),gcalPending:true,gcalPrompt:claudePrompt});
    setStatus({type:'ready',prompt:claudePrompt,copied,count:attendeeEmails.length});
    setLoading(false);
  };

  const selectedCount = f.allStaff ? staff.length : f.attendeeIds.length;

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:580}} onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe" style={{background:`linear-gradient(90deg, ${mt.color}, #1a1a1a)`}}/><button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-body">
          <div className="flex aic g10" style={{marginBottom:16}}>
            <span style={{fontSize:20}}>{mt.icon}</span>
            <div className="bc fw6" style={{fontSize:20,letterSpacing:2}}>{existing?'EDIT MEETING':'SCHEDULE MEETING'}</div>
          </div>

          <div className="fgrid">
            {/* Meeting type */}
            <div className="fg full">
              <label>Meeting Type</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,paddingTop:4}}>
                {MEETING_TYPES.map(t=>(
                  <button key={t.id} onClick={()=>{set('type',t.id);if(!f.title)set('title',t.label);if(t.recurrence)set('recurrence',t.recurrence);}}
                    style={{fontSize:14,padding:'5px 10px',borderRadius:4,border:'1px solid',cursor:'pointer',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                      background:f.type===t.id?t.color+'22':'var(--surface3)',
                      borderColor:f.type===t.id?t.color:'var(--border2)',
                      color:f.type===t.id?t.color:'#888'}}>
                    {t.icon} {t.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Title */}
            <div className="fg full"><label>Meeting Title</label><input value={f.title} onChange={e=>set('title',e.target.value)} placeholder="e.g. Weekly Clinical Education — Markham"/></div>

            {/* Date/time + duration */}
            <div className="fg"><label>Date & Time</label><input type="datetime-local" value={f.dateTime} onChange={e=>set('dateTime',e.target.value)}/></div>
            <div className="fg"><label>Duration (minutes)</label>
              <select value={f.duration} onChange={e=>set('duration',parseInt(e.target.value))}>
                {[30,45,60,75,90,120].map(d=><option key={d} value={d}>{d} min</option>)}
              </select>
            </div>

            {/* Recurrence */}
            <div className="fg"><label>Recurrence</label>
              <select value={f.recurrence} onChange={e=>set('recurrence',e.target.value)}>
                <option value="">One-time only</option>
                <option value="WEEKLY">Weekly</option>
                <option value="BIWEEKLY">Every 2 weeks</option>
                <option value="MONTHLY">Monthly</option>
              </select>
            </div>
            {f.recurrence&&(
              <div className="fg"><label>Number of occurrences</label>
                <input type="number" min="2" max="52" value={f.recurrenceCount} onChange={e=>set('recurrenceCount',parseInt(e.target.value)||12)}/>
              </div>
            )}

            {/* Location */}
            <div className="fg"><label>Location</label>
              <select value={f.location} onChange={e=>set('location',e.target.value)}>
                <option value="Google Meet">Google Meet (Virtual)</option>
                <option value="Markham Clinic">Markham Clinic</option>
                <option value="Mississauga Clinic">Mississauga Clinic</option>
                <option value="Both Locations">Both Locations</option>
                <option value="custom">Custom…</option>
              </select>
            </div>
            {f.location==='custom'&&<div className="fg"><label>Custom Location</label><input value={f.customLocation||''} onChange={e=>set('customLocation',e.target.value)}/></div>}

            {/* Organizer */}
            <div className="fg"><label>Organizer Name</label><input value={f.organizer} onChange={e=>set('organizer',e.target.value)} placeholder="e.g. Mike Ross"/></div>
            <div className="fg"><label>Organizer Gmail</label><input value={f.organizerEmail} onChange={e=>set('organizerEmail',e.target.value)} placeholder="mike@revibehealth.ca"/></div>

            {/* Description */}
            <div className="fg full"><label>Agenda / Description</label><textarea value={f.description} onChange={e=>set('description',e.target.value)} placeholder="Agenda, topics, preparation needed…" style={{minHeight:60}}/></div>

            {/* Attendees */}
            <div className="fg full">
              <label>Attendees ({selectedCount} selected)</label>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <button className={`btn btn-sm ${f.allStaff?'btn-go':'btn-ghost'}`} onClick={()=>set('allStaff',!f.allStaff)}>
                  {f.allStaff?'✓ All Staff Selected':'Select All Staff'}
                </button>
                {!f.allStaff&&<span style={{fontSize:14,color:'#999'}}>or choose individuals below</span>}
              </div>
              {!f.allStaff&&(
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,maxHeight:180,overflowY:'auto',padding:'2px 0'}}>
                  {staff.map(s=>{
                    const sel = f.attendeeIds.includes(s.id);
                    return(
                      <div key={s.id} onClick={()=>toggleAttendee(s.id)} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',borderRadius:4,border:'1px solid',cursor:'pointer',borderColor:sel?'rgba(68,204,170,.4)':'var(--border)',background:sel?'rgba(68,204,170,.06)':'var(--surface2)'}}>
                        <div style={{width:16,height:16,borderRadius:3,border:'1px solid',borderColor:sel?'#44CCAA':'var(--border2)',background:sel?'rgba(68,204,170,.2)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          {sel&&<span style={{color:'#44CCAA',fontSize:14}}>✓</span>}
                        </div>
                        <div>
                          <div style={{fontSize:14,color:'var(--text)',fontWeight:500}}>{s.name}</div>
                          <div style={{fontSize:14,color:'#999'}}>{DISC.find(d=>d.id===s.discipline)?.label} · {s.site}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Options */}
            <div className="fg full">
              <div style={{display:'flex',gap:16}}>
                <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',fontSize:14,color:'#aaa'}}>
                  <input type="checkbox" checked={f.createMeet} onChange={e=>set('createMeet',e.target.checked)} style={{accentColor:'var(--go)'}}/>
                  Create Google Meet link
                </label>
                <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',fontSize:14,color:'#aaa'}}>
                  <input type="checkbox" checked={f.sendInvites} onChange={e=>set('sendInvites',e.target.checked)} style={{accentColor:'var(--go)'}}/>
                  Send email invites (Calendar)
                </label>
              </div>
            </div>
          </div>

          {/* Email preview */}
          {selectedCount>0&&(
            <div style={{background:'rgba(0,88,77,.08)',border:'1px solid rgba(0,88,77,.2)',borderRadius:5,padding:'10px 14px',marginTop:4,fontSize:14,color:'#888'}}>
              <div style={{color:'var(--lime)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',marginBottom:5}}>Calendar invites will go to:</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {getAttendeeEmails().slice(0,8).map((a,i)=>(
                  <span key={i} style={{fontSize:14,background:'var(--surface2)',padding:'2px 7px',borderRadius:3,border:'1px solid var(--border)'}}>{a.email}</span>
                ))}
                {getAttendeeEmails().length>8&&<span style={{fontSize:14,color:'#888'}}>+{getAttendeeEmails().length-8} more</span>}
              </div>
            </div>
          )}

          {/* Status */}
          {status&&status.type==='ready'&&(
            <div style={{marginTop:10,border:'1px solid rgba(68,204,170,.25)',borderRadius:6,overflow:'hidden'}}>
              <div style={{padding:'10px 14px',background:'rgba(68,204,170,.06)',borderBottom:'1px solid rgba(68,204,170,.15)',display:'flex',alignItems:'flex-start',gap:12}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#44CCAA',marginBottom:3}}>
                    &#10003; Saved &#8212; Paste into Claude chat to send Calendar invites
                  </div>
                  <div style={{fontSize:14,color:'#888',lineHeight:1.5}}>
                    {status.copied?'Copied to clipboard! ':''}
                    Claude will create the event and send personal invites to all {status.count} @revibeto.com addresses.
                  </div>
                </div>
                <button className="btn btn-lime btn-xs" style={{flexShrink:0}}
                  onClick={async()=>{try{await navigator.clipboard.writeText(status.prompt);}catch(e){}}}>
                  {status.copied?'Copy Again':'Copy Prompt'}
                </button>
              </div>
              <pre style={{margin:0,padding:'10px 14px',fontSize:14,color:'#999',lineHeight:1.6,whiteSpace:'pre-wrap',maxHeight:150,overflowY:'auto',fontFamily:'monospace'}}>{status.prompt}</pre>
            </div>
          )}
          {status&&status.type==='error'&&(
            <div style={{marginTop:10,padding:'10px 14px',borderRadius:5,fontSize:14,background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.2)',color:'#E05252'}}>
              {status.msg}
            </div>
          )}

          <div className="flex aic g8" style={{marginTop:16,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-lime" onClick={handleSave} disabled={loading} style={{opacity:loading?.6:1}}>
              {loading?'Creating…':existing?'Update Meeting':'📅 Schedule + Send Invites'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ClinResourcesPage({staff, addNotif, currentUser}){
  const[resources,setResources]=React.useState(()=>{
    try{const s=localStorage.getItem('rvgd3_clinres');if(s)return JSON.parse(s);}catch(e){}
    return SEED_CLIN_RESOURCES;
  });
  React.useEffect(()=>{
    const sb=window.__SB;if(!sb)return;
    sb.from('resources').select('*').then(({data,error})=>{
      if(!error&&data&&data.length>0){
        const d=data.map(r=>r.data||r);
        setResources(d);localStorage.setItem('rvgd3_clinres',JSON.stringify(d));
      }
    });
  },[]);
  const saveResources=(data)=>{
    setResources(data);
    try{localStorage.setItem('rvgd3_clinres',JSON.stringify(data));}catch(e){}
    const sb=window.__SB;if(!sb)return;
    data.forEach(r=>{if(r.id)sb.from('resources').upsert({id:r.id,data:r}).then();});
  };
  React.useEffect(()=>{try{localStorage.setItem('rvgd3_clinres',JSON.stringify(resources));}catch(e){}},[resources]);

  const[search,setSearch]=React.useState('');
  const[filterCat,setFilterCat]=React.useState('all');
  const[filterRole,setFilterRole]=React.useState('all');
  const[filterType,setFilterType]=React.useState('all');
  const[showAdd,setShowAdd]=React.useState(false);
  const[editRes,setEditRes]=React.useState(null);
  const[viewRes,setViewRes]=React.useState(null);
  const[confirmDel,setConfirmDel]=React.useState(null);
  const[threadRes,setThreadRes]=React.useState(null);

  const filtered = resources.filter(r=>{
    const q = search.toLowerCase();
    const matchSearch = !q || r.title.toLowerCase().includes(q) || r.description.toLowerCase().includes(q) || (r.tags||[]).some(t=>t.toLowerCase().includes(q));
    const matchCat  = filterCat==='all'  || r.categories.includes(filterCat);
    const matchRole = filterRole==='all' || r.roles.includes('all') || r.roles.includes(filterRole);
    const matchType = filterType==='all' || r.type===filterType;
    return matchSearch && matchCat && matchRole && matchType;
  });

  const pinned = filtered.filter(r=>r.pinned);
  const rest   = filtered.filter(r=>!r.pinned);

  const deleteRes = (id)=>{const updated=resources.filter(r=>r.id!==id);saveResources(updated);setConfirmDel(null);};
  const togglePin = (id)=>{const updated=resources.map(r=>r.id===id?{...r,pinned:!r.pinned}:r);saveResources(updated);};

  const typeInfo = (t)=>RESOURCE_TYPES.find(x=>x.id===t)||RESOURCE_TYPES[1];

  return(
    <div>
      {/* Header */}
      <div className="flex aic jsb" style={{marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:3}}>Clinician Resources</div>
          <div style={{fontSize:14,color:'#777'}}>Shared tools, articles, templates, and links to address skill gaps across all roles and tracks</div>
        </div>
        <button className="btn btn-lime" onClick={()=>{setEditRes(null);setShowAdd(true);}}>+ Add Resource</button>
      </div>

      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:14}}>
        {[
          {label:'Total Resources', val:resources.length,         color:'#CAE8C1'},
          {label:'Pinned',          val:resources.filter(r=>r.pinned).length, color:'#F4DB71'},
          {label:'Articles',        val:resources.filter(r=>r.type==='article').length, color:'#6B9FD4'},
          {label:'Videos',          val:resources.filter(r=>r.type==='video').length,   color:'#E05252'},
          {label:'Tools & Templates',val:resources.filter(r=>['tool','template','course'].includes(r.type)).length, color:'#BB99FF'},
        ].map(s=>(
          <div key={s.label} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,padding:'10px 12px'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:s.color}}>{s.val}</div>
            <div style={{fontSize:14,color:'#777',marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Search + filters */}
      <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,padding:'12px 14px',marginBottom:14}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search resources by title, keyword, or tag..."
          style={{width:'100%',background:'var(--surface3)',border:'1px solid var(--border2)',borderRadius:4,color:'var(--text)',fontSize:15,padding:'8px 12px',outline:'none',marginBottom:10}}/>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-start'}}>
          {/* Type filter */}
          <div>
            <div style={{fontSize:15,color:'#777',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:5}}>Type</div>
            <div className="flex aic g5" style={{flexWrap:'wrap'}}>
              {RESOURCE_TYPES.map(t=>(
                <button key={t.id} className={`btn btn-xs ${filterType===t.id?'btn-go':'btn-ghost'}`}
                  onClick={()=>setFilterType(t.id)} style={{fontSize:15}}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>
          </div>
          {/* Role filter */}
          <div>
            <div style={{fontSize:15,color:'#777',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:5}}>Role</div>
            <div className="flex aic g5" style={{flexWrap:'wrap'}}>
              {RESOURCE_ROLES.map(r=>(
                <button key={r.id} className={`btn btn-xs ${filterRole===r.id?'btn-lime':'btn-ghost'}`}
                  onClick={()=>setFilterRole(r.id)} style={{fontSize:15}}>{r.label}</button>
              ))}
            </div>
          </div>
          {/* Category filter */}
          <div>
            <div style={{fontSize:15,color:'#777',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:5}}>Skill Category</div>
            <div className="flex aic g5" style={{flexWrap:'wrap'}}>
              <button className={`btn btn-xs ${filterCat==='all'?'btn-go':'btn-ghost'}`}
                onClick={()=>setFilterCat('all')} style={{fontSize:15}}>All Categories</button>
              {RESOURCE_CATS.map(c=>(
                <button key={c.id} className={`btn btn-xs ${filterCat===c.id?'btn-go':'btn-ghost'}`}
                  onClick={()=>setFilterCat(c.id)} style={{fontSize:15}}>{c.label}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Results count */}
      {search||filterCat!=='all'||filterRole!=='all'||filterType!=='all'?(
        <div style={{fontSize:14,color:'#777',marginBottom:10}}>
          Showing {filtered.length} of {resources.length} resources
          {search&&<span> matching "<strong style={{color:'#aaa'}}>{search}</strong>"</span>}
        </div>
      ):null}

      {/* Pinned section */}
      {pinned.length>0&&(
        <div style={{marginBottom:18}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#F4DB71',marginBottom:8}}>⭐ Pinned Resources</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:10}}>
            {pinned.map(r=><ResourceCard key={r.id} r={r} onView={()=>setViewRes(r)} onEdit={()=>{setEditRes(r);setShowAdd(true);}} onDelete={()=>setConfirmDel(r.id)} onPin={()=>togglePin(r.id)} typeInfo={typeInfo} onThread={()=>setThreadRes(r)}/>)}
          </div>
        </div>
      )}

      {/* All resources */}
      {rest.length>0?(
        <div>
          {pinned.length>0&&<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#999',marginBottom:8}}>All Resources</div>}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:10}}>
            {rest.map(r=><ResourceCard key={r.id} r={r} onView={()=>setViewRes(r)} onEdit={()=>{setEditRes(r);setShowAdd(true);}} onDelete={()=>setConfirmDel(r.id)} onPin={()=>togglePin(r.id)} typeInfo={typeInfo} onThread={()=>setThreadRes(r)}/>)}
          </div>
        </div>
      ):filtered.length===0?(

/* ═══════════════════════════════════════════════════════════════
   RESOURCE THREAD / COMMENTS SYSTEM
   - Per-resource comment threads with @mentions
   - File attachments + URL embeds in comments
   - AI summary of each post via Anthropic API
   - In-dashboard notifications for @mentions
═══════════════════════════════════════════════════════════════ */

// ── Notification store ───────────────────────────────────────────────────────
function useNotifications(){
  const[notifs,setNotifs]=useState(()=>{
    try{const s=localStorage.getItem('rvgd3_notifs');return s?JSON.parse(s):[];}catch{return[];}
  });
  useEffect(()=>{try{localStorage.setItem('rvgd3_notifs',JSON.stringify(notifs));}catch(e){}},[notifs]);
  const addNotif=(n)=>setNotifs(p=>[{...n,id:'n'+Date.now()+Math.random(),ts:new Date().toISOString(),read:false},...p].slice(0,100));
  const markRead=(id)=>setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n));
  const markAllRead=()=>setNotifs(p=>p.map(n=>({...n,read:true})));
  return{notifs,addNotif,markRead,markAllRead};
}

// ── Resource Thread Modal ─────────────────────────────────────────────────────
function ResourceThreadModal({resource, onClose, staff, currentUser, addNotif}){
  const storageKey = 'rvgd3_thread_'+resource.id;
  const[comments,setComments]=React.useState(()=>{
    try{const s=localStorage.getItem(storageKey);return s?JSON.parse(s):[];}catch{return[];}
  });
  React.useEffect(()=>{
    const sb=window.__SB;if(!sb)return;
    sb.from('staff_comments').select('*').eq('staff_id',resource.id).order('created_at',{ascending:true}).then(({data,error})=>{
      if(!error&&data&&data.length>0){const d=data.map(r=>r.data);setComments(d);localStorage.setItem(storageKey,JSON.stringify(d));}
    });
  },[]);
  const saveComments=(data)=>{
    setComments(data);
    try{localStorage.setItem(storageKey,JSON.stringify(data));}catch(e){}
    const sb=window.__SB;if(!sb)return;
    data.forEach(c=>{if(c.id)sb.from('staff_comments').upsert({id:c.id,staff_id:resource.id,data:c}).then();});
  };
  React.useEffect(()=>{try{localStorage.setItem(storageKey,JSON.stringify(comments));}catch(e){}},[comments]);

  const[text,setText]=React.useState('');
  const[replyTo,setReplyTo]=React.useState(null);
  const[attachFile,setAttachFile]=React.useState(null);
  const[attachFileName,setAttachFileName]=React.useState('');
  const[linkUrl,setLinkUrl]=React.useState('');
  const[linkTitle,setLinkTitle]=React.useState('');
  const[showLinkForm,setShowLinkForm]=React.useState(false);
  const[posting,setPosting]=React.useState(false);
  const[mentionQuery,setMentionQuery]=React.useState('');
  const[mentionPos,setMentionPos]=React.useState(-1);
  const[showMentions,setShowMentions]=React.useState(false);
  const textRef=React.useRef();
  const bottomRef=React.useRef();

  // Extract @mentions from text
  const extractMentions=(t)=>{
    const matches=t.match(/@([\w\s]+?)(?=\s|$|[,.])/g)||[];
    return matches.map(m=>m.slice(1).trim()).filter(m=>staff.find(s=>s.name.toLowerCase()===m.toLowerCase()));
  };

  // Handle typing — detect @ for mention dropdown
  const handleTextChange=(e)=>{
    const val=e.target.value;
    setText(val);
    const cursor=e.target.selectionStart;
    const textBefore=val.slice(0,cursor);
    const atIdx=textBefore.lastIndexOf('@');
    if(atIdx>=0&&(atIdx===0||textBefore[atIdx-1]===' ')){
      const query=textBefore.slice(atIdx+1);
      if(!query.includes(' ')){
        setMentionQuery(query);
        setMentionPos(atIdx);
        setShowMentions(true);
        return;
      }
    }
    setShowMentions(false);
  };

  const insertMention=(name)=>{
    const before=text.slice(0,mentionPos);
    const after=text.slice(textRef.current.selectionStart);
    const newText=before+'@'+name+' '+after;
    setText(newText);
    setShowMentions(false);
    textRef.current.focus();
  };

  const filteredMentions=staff.filter(s=>s.name.toLowerCase().includes(mentionQuery.toLowerCase())).slice(0,6);

  // Handle file attach
  const handleFileAttach=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{setAttachFile(ev.target.result);setAttachFileName(file.name);};
    reader.readAsDataURL(file);
  };

  // AI summary via Anthropic API
  const getAISummary=async(postText,url,fileName)=>{
    const contentDesc=[
      postText&&`Comment: "${postText}"`,
      url&&`Linked URL: ${url}`,
      fileName&&`Attached file: ${fileName}`,
    ].filter(Boolean).join('\n');

    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:120,
          system:'You are a concise clinical education assistant. Given a resource post in a healthcare team dashboard, write a 1-2 sentence summary (max 30 words) of what it contains and why it is useful. Be direct and specific. No preamble.',
          messages:[{role:'user',content:`Summarize this post for the team:\n${contentDesc}`}]
        })
      });
      const data=await res.json();
      return data?.content?.[0]?.text?.trim()||null;
    }catch{return null;}
  };

  // Post comment
  const handlePost=async()=>{
    if(!text.trim()&&!attachFile&&!linkUrl) return;
    setPosting(true);

    const mentions=extractMentions(text);
    const newComment={
      id:'c'+Date.now(),
      author:currentUser||'Dave',
      text:text.trim(),
      replyTo:replyTo||null,
      fileData:attachFile||null,
      fileName:attachFileName||null,
      linkUrl:linkUrl||null,
      linkTitle:linkTitle||null,
      ts:new Date().toISOString(),
      mentions,
      aiSummary:null,
      loadingSummary:true,
    };

    saveComments([...comments,newComment]);
    setText('');setReplyTo(null);setAttachFile(null);setAttachFileName('');setLinkUrl('');setLinkTitle('');setShowLinkForm(false);
    setPosting(false);
    setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),100);

    // Fire notifications for @mentions
    mentions.forEach(name=>{
      const s=staff.find(x=>x.name.toLowerCase()===name.toLowerCase());
      if(s&&s.email){
        addNotif({
          type:'mention',
          from:currentUser||'Dave',
          to:s.name,
          email:s.email,
          resourceTitle:resource.title,
          resourceId:resource.id,
          preview:text.slice(0,80),
          gcalPrompt:`Please send an email via Gmail to ${s.email} with subject "You were mentioned in a Revibe resource discussion" and body: "${currentUser||'Dave'} mentioned you in a comment on the resource "${resource.title}":\n\n${text.slice(0,200)}\n\nLog into the Revibe G&D Dashboard to reply."`
        });
      }
    });

    // Get AI summary async
    const summary=await getAISummary(text.trim(),linkUrl,attachFileName);
    setComments(p=>{const updated=p.map(c=>c.id===newComment.id?{...c,aiSummary:summary,loadingSummary:false}:c);saveComments(updated);return updated;});
  };

  // Render single comment
  const renderComment=(c,depth=0)=>{
    const replyComment=c.replyTo?comments.find(x=>x.id===c.replyTo):null;
    const timeAgo=(ts)=>{
      const d=Math.floor((Date.now()-new Date(ts))/1000);
      if(d<60)return d+'s ago';if(d<3600)return Math.floor(d/60)+'m ago';
      if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';
    };
    // Render text with @mention highlighting
    const renderText=(t)=>{
      if(!t)return null;
      const parts=t.split(/(@[\w\s]+?)(?=\s|$|[,.])/g);
      return parts.map((p,i)=>p.startsWith('@')&&staff.find(s=>s.name.toLowerCase()===p.slice(1).toLowerCase().trim())
        ?<span key={i} style={{color:'#CAE8C1',fontWeight:600,background:'rgba(202,232,193,.1)',borderRadius:3,padding:'0 3px'}}>{p}</span>
        :<span key={i}>{p}</span>
      );
    };

    return(
      <div key={c.id} style={{marginLeft:depth*24,marginBottom:10}}>
        <div style={{background:depth>0?'rgba(255,255,255,.03)':'var(--surface3)',border:'1px solid var(--border)',borderRadius:6,padding:'10px 12px',borderLeft:depth>0?'2px solid rgba(68,204,170,.2)':'none'}}>
          {/* Reply context */}
          {replyComment&&(
            <div style={{fontSize:15,color:'#777',borderLeft:'2px solid #333',paddingLeft:8,marginBottom:7,fontStyle:'italic'}}>
              ↩ replying to <span style={{color:'#888'}}>{replyComment.author}</span>: "{replyComment.text.slice(0,60)}{replyComment.text.length>60?'…':''}"
            </div>
          )}
          {/* Author row */}
          <div className="flex aic jsb" style={{marginBottom:6}}>
            <div className="flex aic g8">
              <div style={{width:26,height:26,borderRadius:'50%',background:'var(--go)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:'#CAE8C1',flexShrink:0}}>
                {(c.author||'?').slice(0,1).toUpperCase()}
              </div>
              <div>
                <span style={{fontSize:14,fontWeight:600,color:'#ddd'}}>{c.author}</span>
                <span style={{fontSize:15,color:'#777',marginLeft:8}}>{timeAgo(c.ts)}</span>
                {c.mentions?.length>0&&<span style={{fontSize:13,color:'#CAE8C1',marginLeft:8}}>mentioned {c.mentions.join(', ')}</span>}
              </div>
            </div>
            <button className="btn btn-xs btn-ghost" style={{fontSize:15,color:'#777'}} onClick={()=>setReplyTo(c.id)}>↩ Reply</button>
          </div>
          {/* Text */}
          {c.text&&<div style={{fontSize:14,color:'#ccc',lineHeight:1.6,marginBottom:6}}>{renderText(c.text)}</div>}
          {/* Attached file */}
          {c.fileData&&(
            <a href={c.fileData} download={c.fileName||'file'} onClick={e=>e.stopPropagation()}
              style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(187,153,255,.08)',border:'1px solid rgba(187,153,255,.2)',color:'#BB99FF',borderRadius:4,padding:'5px 10px',fontSize:14,textDecoration:'none',marginBottom:6}}>
              📎 {c.fileName||'Download file'}
            </a>
          )}
          {/* Linked URL */}
          {c.linkUrl&&(
            <a href={c.linkUrl} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
              style={{display:'flex',alignItems:'center',gap:8,background:'rgba(107,159,212,.06)',border:'1px solid rgba(107,159,212,.18)',borderRadius:5,padding:'8px 12px',textDecoration:'none',marginBottom:6}}>
              <span style={{fontSize:18}}>🔗</span>
              <div>
                <div style={{fontSize:14,color:'#6B9FD4',fontWeight:600}}>{c.linkTitle||c.linkUrl}</div>
                <div style={{fontSize:15,color:'#777',marginTop:1}}>{c.linkUrl.slice(0,60)}{c.linkUrl.length>60?'…':''}</div>
              </div>
            </a>
          )}
          {/* AI Summary */}
          {c.loadingSummary&&(
            <div style={{marginTop:6,padding:'5px 10px',background:'rgba(202,232,193,.04)',border:'1px solid rgba(202,232,193,.1)',borderRadius:4,fontSize:15,color:'#777',display:'flex',alignItems:'center',gap:6}}>
              <span style={{animation:'spin 1s linear infinite',display:'inline-block'}}>⟳</span> Generating AI summary…
            </div>
          )}
          {c.aiSummary&&!c.loadingSummary&&(
            <div style={{marginTop:6,padding:'6px 10px',background:'rgba(202,232,193,.06)',border:'1px solid rgba(202,232,193,.15)',borderRadius:4}}>
              <div style={{fontSize:13,color:'#CAE8C1',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:3,fontFamily:"'Barlow Condensed',sans-serif"}}>✦ AI Summary</div>
              <div style={{fontSize:14,color:'#aaa',lineHeight:1.5}}>{c.aiSummary}</div>
            </div>
          )}
        </div>
        {/* Nested replies */}
        {comments.filter(r=>r.replyTo===c.id).map(r=>renderComment(r,depth+1))}
      </div>
    );
  };

  const topLevel=comments.filter(c=>!c.replyTo||!comments.find(x=>x.id===c.replyTo));

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:640,display:'flex',flexDirection:'column',maxHeight:'88vh'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe" style={{background:'linear-gradient(90deg,var(--go),#111)'}}/>

        </div>

        <div style={{flex:1,overflowY:'auto',padding:'14px 16px'}}>
          {comments.length===0&&(
            <div style={{textAlign:'center',padding:'30px 0',color:'#999'}}>

        </div>

        {replyTo&&(()=>{

            </div>

          {attachFile&&(

              <button onClick={()=>{setAttachFile(null);setAttachFileName('');}} style={{background:'none',border:'none',color:'#777',cursor:'pointer',fontSize:15}}>✕</button>
            </div>

          {/* Mention dropdown */}
          {showMentions&&filteredMentions.length>0&&(

                    <div style={{fontSize:14,color:'#ddd',fontWeight:600}}>{s.name}</div>
                    <div style={{fontSize:15,color:'#777'}}>{s.email||''}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Text area */}
          <div style={{position:'relative'}}>
            <textarea ref={textRef} value={text} onChange={handleTextChange}
              placeholder="Add a comment, question, or insight... Type @ to mention a teammate"
              style={{width:'100%',background:'var(--surface3)',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text)',fontSize:14,padding:'10px 12px',outline:'none',resize:'none',minHeight:70,lineHeight:1.6,boxSizing:'border-box'}}
              onKeyDown={e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))handlePost();if(e.key==='Escape')setShowMentions(false);}}

          </div>

          <div className="flex aic jsb" style={{marginTop:8}}>
            <div className="flex aic g6">

              <label style={{display:'inline-flex',alignItems:'center',gap:5,background:'var(--surface3)',border:'1px solid var(--border)',borderRadius:4,padding:'5px 9px',cursor:'pointer',fontSize:14,color:'#777'}}>

        </div>

    </div>
  );
}

// ── Notification Bell ─────────────────────────────────────────────────────────
function NotificationBell({notifs, markRead, markAllRead, setPage}){
  const[open,setOpen]=React.useState(false);
  const unread=notifs.filter(n=>!n.read).length;
  const ref=React.useRef();
  React.useEffect(()=>{
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);
  const timeAgo=(ts)=>{
    const d=Math.floor((Date.now()-new Date(ts))/1000);
    if(d<60)return d+'s';if(d<3600)return Math.floor(d/60)+'m';if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d';
  };
  return(
    <div ref={ref} style={{position:'relative',display:'inline-block'}}>
      <button onClick={()=>setOpen(v=>!v)}
        style={{background:'none',border:'1px solid var(--border)',borderRadius:5,padding:'5px 9px',cursor:'pointer',color:'#aaa',fontSize:15,display:'flex',alignItems:'center',gap:5,position:'relative'}}>
        🔔
        {unread>0&&<span style={{background:'#E05252',color:'#fff',borderRadius:'50%',fontSize:13,fontWeight:700,padding:'1px 5px',minWidth:16,textAlign:'center'}}>{unread}</span>}
      </button>
      {open&&(
        <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',width:320,background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:7,boxShadow:'0 8px 32px rgba(0,0,0,.5)',zIndex:300,overflow:'hidden'}}>
          <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa'}}>Notifications</div>
            {unread>0&&<button className="btn btn-xs btn-ghost" style={{fontSize:13}} onClick={markAllRead}>Mark all read</button>}
          </div>
          {notifs.length===0&&<div style={{padding:'20px 14px',fontSize:14,color:'#777',textAlign:'center'}}>No notifications yet</div>}
          <div style={{maxHeight:340,overflowY:'auto'}}>
            {notifs.map(n=>(
              <div key={n.id} onClick={()=>{markRead(n.id);setPage('clinresources');setOpen(false);}}
                style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',cursor:'pointer',background:n.read?'transparent':'rgba(68,204,170,.04)',display:'flex',gap:10,alignItems:'flex-start'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(68,204,170,.06)'}
                onMouseLeave={e=>e.currentTarget.style.background=n.read?'transparent':'rgba(68,204,170,.04)'}>
                <div style={{fontSize:18,flexShrink:0}}>💬</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,color:'#ddd',lineHeight:1.4}}>
                    <strong style={{color:'#CAE8C1'}}>{n.from}</strong> mentioned <strong style={{color:'#CAE8C1'}}>{n.to}</strong> in <em>"{n.resourceTitle}"</em>
                  </div>
                  {n.preview&&<div style={{fontSize:15,color:'#999',marginTop:3,lineHeight:1.4}}>"{n.preview.slice(0,80)}{n.preview.length>80?'…':''}"</div>}
                  {!n.read&&n.gcalPrompt&&(
                    <div style={{marginTop:5}}>
                      <button className="btn btn-xs btn-ghost" style={{fontSize:13,color:'#44CCAA'}}
                        onClick={async(e)=>{e.stopPropagation();try{await navigator.clipboard.writeText(n.gcalPrompt);}catch(e){}alert('Copied! Paste into Claude chat to send the email notification.');}}>
                        📋 Copy email prompt for Claude
                      </button>
                    </div>
                  )}
                  <div style={{fontSize:13,color:'#777',marginTop:3}}>{timeAgo(n.ts)} ago</div>
                </div>
                {!n.read&&<div style={{width:7,height:7,borderRadius:'50%',background:'#44CCAA',flexShrink:0,marginTop:4}}/>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function gdDaysUntil(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr);
  const today = new Date();
  today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function gdStatus(dateStr, completed){
  if(completed) return {label:'Completed', color:'#44CCAA', bg:'rgba(68,204,170,.1)', border:'rgba(68,204,170,.25)'};
  if(!dateStr)  return {label:'Not Set',   color:'#777',    bg:'rgba(80,80,80,.08)',  border:'rgba(80,80,80,.2)'};
  const days = gdDaysUntil(dateStr);
  if(days < 0)  return {label:'Overdue',   color:'#E05252', bg:'rgba(224,82,82,.1)', border:'rgba(224,82,82,.3)'};
  if(days <= 7) return {label:'Due in '+days+'d', color:'#E05252', bg:'rgba(224,82,82,.08)', border:'rgba(224,82,82,.25)'};
  if(days <= 14)return {label:'Due in '+days+'d', color:'#F4DB71', bg:'rgba(244,219,113,.08)', border:'rgba(244,219,113,.25)'};
  if(days <= 30)return {label:days+'d away', color:'#F4DB71', bg:'rgba(244,219,113,.06)', border:'rgba(244,219,113,.2)'};
  return {label:days+'d away', color:'#999', bg:'transparent', border:'var(--border)'};
}

function gdFmt(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('en-CA',{month:'short', day:'numeric', year:'numeric'});
}

    return GD_SEED;

    const sb=window.__SB;if(!sb)return;
    sb.from('gd_tracker').select('*').eq('id','singleton').single().then(({data,error})=>{

    });
  },[]);
  const saveRecords=(data)=>{
    setRecords(data);
    try{localStorage.setItem('rvgd3_gdtracker',JSON.stringify(data));}catch(e){}
    const sb=window.__SB;if(!sb)return;
    sb.from('gd_tracker').upsert({id:'singleton',data,updated_at:new Date().toISOString()}).then();
  };
  useEffect(()=>{try{localStorage.setItem('rvgd3_gdtracker',JSON.stringify(records));}catch(e){}},[records]);

  const[editId,setEditId]=useState(null);
  const[filterSite,setFilterSite]=useState('all');
  const[filterStatus,setFilterStatus]=useState('all');
  const[search,setSearch]=useState('');
  const[selectedId,setSelectedId]=useState(null);

  const KEYS=['q1','q2','q3','q4','annual'];
  const KEY_LABELS={q1:'Q1',q2:'Q2',q3:'Q3',q4:'Q4',annual:'Annual'};

  // Compute alerts
  const allAlerts=records.flatMap(r=>
    KEYS.map(k=>{
      if(!r[k]||r['done_'+k])return null;
      const days=gdDaysUntil(r[k]);
      if(days===null)return null;
      return{name:r.name,id:r.id,key:k,days,overdue:days<0};
    }).filter(Boolean)
  ).sort((a,b)=>a.days-b.days);

  const overdueCount=allAlerts.filter(a=>a.overdue).length;
  const dueSoonCount=allAlerts.filter(a=>!a.overdue&&a.days<=7).length;

  // Filter
  const filtered=records.filter(r=>{
    if(filterSite!=='all'&&r.site!==filterSite)return false;
    if(search&&!r.name.toLowerCase().includes(search.toLowerCase()))return false;
    if(filterStatus==='overdue')return KEYS.some(k=>r[k]&&!r['done_'+k]&&gdDaysUntil(r[k])<0);
    if(filterStatus==='soon')return KEYS.some(k=>r[k]&&!r['done_'+k]&&gdDaysUntil(r[k])>=0&&gdDaysUntil(r[k])<=14);
    if(filterStatus==='unset')return KEYS.some(k=>!r[k]);
    return true;
  });

  const updateRecord=(id,changes)=>{const updated=records.map(r=>r.id===id?{...r,...changes}:r);saveRecords(updated);};
  const selectedRecord=records.find(r=>r.id===selectedId)||null;

  return(
    <div style={{display:'grid',gridTemplateColumns:selectedId?'1fr 380px':'1fr',gap:14,alignItems:'start'}}>

      {/* LEFT — main list */}
      <div>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:2}}>G&amp;D Schedule Tracker</div>
            <div style={{fontSize:14,color:'#777'}}>Quarterly and annual meeting schedule — click any therapist to view or edit</div>
          </div>
          <div style={{display:'flex',gap:7}}>
            <button className="btn btn-ghost btn-sm" style={{fontSize:14,color:'#999'}}
              onClick={()=>{if(confirm('Reset all dates to blank? This clears the saved schedule and reloads the seed data. Your edits will be lost.')){localStorage.removeItem('rvgd3_gdtracker');setRecords(GD_SEED);setSelectedId(null);}}}>
              ↺ Reset
            </button>
            <button className="btn btn-lime btn-sm" onClick={()=>{
              const r={id:'gd_'+Date.now(),name:'New Therapist',site:'Mississauga',split:'',stipend:false,q1:'',q2:'',q3:'',q4:'',annual:'',notes:''};
              saveRecords([...records,r]);setSelectedId(r.id);
            }}>+ Add</button>
          </div>
        </div>

        {/* Alert strip — only if there are alerts */}
        {(overdueCount>0||dueSoonCount>0)&&(
          <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
            {overdueCount>0&&(
              <div style={{flex:1,minWidth:180,background:'rgba(224,82,82,.07)',border:'1px solid rgba(224,82,82,.2)',borderRadius:6,padding:'9px 13px',display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:18}}>⚠</span>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:'#E05252'}}>{overdueCount} Overdue</div>
                  <div style={{fontSize:15,color:'#777',marginTop:1}}>{allAlerts.filter(a=>a.overdue).slice(0,3).map(a=>a.name.split(' ')[0]).join(', ')}{overdueCount>3?` +${overdueCount-3} more`:''}</div>
                </div>
              </div>
            )}
            {dueSoonCount>0&&(
              <div style={{flex:1,minWidth:180,background:'rgba(244,219,113,.05)',border:'1px solid rgba(244,219,113,.18)',borderRadius:6,padding:'9px 13px',display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:18}}>🔔</span>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:'#F4DB71'}}>{dueSoonCount} Due This Week</div>
                  <div style={{fontSize:15,color:'#777',marginTop:1}}>{allAlerts.filter(a=>!a.overdue&&a.days<=7).slice(0,3).map(a=>a.name.split(' ')[0]).join(', ')}{dueSoonCount>3?` +${dueSoonCount-3} more`:''}</div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* Search + filters — compact single row */}
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
            style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text)',fontSize:14,padding:'6px 11px',outline:'none',width:160}}/>
          <div style={{display:'flex',gap:4}}>
            {['all','Mississauga','Markham'].map(s=>(
              <button key={s} onClick={()=>setFilterSite(s)}
                className={`btn btn-xs ${filterSite===s?'btn-go':'btn-ghost'}`} style={{fontSize:15}}>
                {s==='all'?'All':s}
              </button>
            ))}
          </div>
          <div style={{display:'flex',gap:4}}>
            {[['all','All'],['overdue','Overdue'],['soon','Due Soon'],['unset','Missing']].map(([v,l])=>(
              <button key={v} onClick={()=>setFilterStatus(v)}
                className={`btn btn-xs ${filterStatus===v?'btn-lime':'btn-ghost'}`} style={{fontSize:15}}>{l}</button>
            ))}
          </div>
          <span style={{fontSize:15,color:'#777',marginLeft:'auto'}}>{filtered.length} therapist{filtered.length!==1?'s':''}</span>
        </div>

        {/* List — grouped by site */}
        {['Mississauga','Markham'].map(site=>{
          const rows=filtered.filter(r=>r.site===site);
          if(!rows.length)return null;
          return(
            <div key={site} style={{marginBottom:20}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#44CCAA',marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                ◉ {site} <span style={{color:'#999',fontSize:13}}>{rows.length}</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {rows.map(r=><GDRow key={r.id} r={r} selected={selectedId===r.id}
                  onClick={()=>setSelectedId(selectedId===r.id?null:r.id)}
                  onToggleDone={(k)=>updateRecord(r.id,{['done_'+k]:!r['done_'+k]})}/>)}
              </div>
            </div>
          );
        })}

        {filtered.length===0&&(
          <div className="card"><div className="empty"><div className="empty-ico">◷</div><p>No therapists match your filters.</p></div></div>
        )}
      </div>

      {/* RIGHT — detail/edit panel */}
      {selectedRecord&&(
        editId===selectedId
          ? <GDEditPanel r={selectedRecord}
              onSave={changes=>{updateRecord(selectedId,changes);setEditId(null);}}
              onCancel={()=>setEditId(null)}
              onDelete={()=>{saveRecords(records.filter(x=>x.id!==selectedId));setSelectedId(null);setEditId(null);}}/>
          : <GDDetailPanel r={selectedRecord}
              onEdit={()=>setEditId(selectedId)}
              onClose={()=>setSelectedId(null)}
              onToggleDone={(k)=>updateRecord(selectedId,{['done_'+k]:!selectedRecord['done_'+k]})}/>
      )}
    </div>
  );
}

// ── Compact row in the list ───────────────────────────────────────────────────
function GDRow({r, selected, onClick, onToggleDone}){
  const KEYS=['q1','q2','q3','q4','annual'];
  const KEY_LABELS={q1:'Q1',q2:'Q2',q3:'Q3',q4:'Q4',annual:'Annual'};
  const hasOverdue=KEYS.some(k=>r[k]&&!r['done_'+k]&&gdDaysUntil(r[k])<0);
  const hasSoon=KEYS.some(k=>r[k]&&!r['done_'+k]&&gdDaysUntil(r[k])>=0&&gdDaysUntil(r[k])<=7);
  const allDone=KEYS.filter(k=>r[k]).every(k=>r['done_'+k]);

  const leftBorder=hasOverdue?'rgba(224,82,82,.5)':hasSoon?'rgba(244,219,113,.4)':allDone?'rgba(68,204,170,.3)':'var(--border)';

  return(
    <div onClick={onClick} style={{background:selected?'var(--surface3)':'var(--surface2)',border:`1px solid ${selected?'var(--border2)':'var(--border)'}`,borderLeft:`3px solid ${leftBorder}`,borderRadius:6,padding:'10px 13px',cursor:'pointer',transition:'all .12s',display:'flex',alignItems:'center',gap:12}}
      onMouseEnter={e=>{if(!selected)e.currentTarget.style.borderColor='var(--border2)'}}
      onMouseLeave={e=>{if(!selected)e.currentTarget.style.borderColor='var(--border)'}}>

      {/* Name */}
      <div style={{minWidth:160,flex:'0 0 160px'}}>
        <div style={{fontSize:15,fontWeight:600,color:'#ddd'}}>{r.name}</div>
        <div style={{fontSize:15,color:'#777',marginTop:1,display:'flex',alignItems:'center',gap:5}}>
          {r.site}
          {r.split&&<span style={{marginLeft:5,fontSize:13,background:'rgba(68,204,170,.08)',color:'#44CCAA',border:'1px solid rgba(68,204,170,.15)',borderRadius:3,padding:'1px 5px'}}>{r.split}%</span>}
            {r.stipend&&<span style={{marginLeft:4,fontSize:13,background:'rgba(244,219,113,.08)',color:'#F4DB71',border:'1px solid rgba(244,219,113,.15)',borderRadius:3,padding:'1px 5px'}}>+Stipend</span>}
        </div>
      </div>

      {/* Meeting dots */}
      <div style={{flex:1,display:'flex',gap:6,alignItems:'center'}}>
        {KEYS.map(k=>{
          const done=r['done_'+k];
          const days=r[k]?gdDaysUntil(r[k]):null;
          const overdue=r[k]&&!done&&days<0;
          const soon=r[k]&&!done&&days>=0&&days<=7;
          const color=done?'#44CCAA':overdue?'#E05252':soon?'#F4DB71':r[k]?'#555':'#2a2a2a';
          const title=`${KEY_LABELS[k]}: ${r[k]?gdFmt(r[k]):'not set'}${done?' ✓':''}`;
          return(
            <div key={k} title={title} onClick={e=>{e.stopPropagation();if(r[k])onToggleDone(k);}}
              style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:r[k]?'pointer':'default'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:color,transition:'background .15s'}}/>
              <div style={{fontSize:12,color:'#999',letterSpacing:'0.5px'}}>{KEY_LABELS[k]}</div>
            </div>
          );
        })}
      </div>

      {/* Status summary */}
      <div style={{textAlign:'right',minWidth:80,flex:'0 0 80px'}}>
        {allDone&&KEYS.filter(k=>r[k]).length>0?(
          <span style={{fontSize:15,color:'#44CCAA'}}>All done ✓</span>
        ):hasOverdue?(
          <span style={{fontSize:15,color:'#E05252'}}>Overdue</span>
        ):hasSoon?(
          <span style={{fontSize:15,color:'#F4DB71'}}>Due soon</span>
        ):(
          <span style={{fontSize:15,color:'#999'}}>On track</span>
        )}
      </div>

      {/* Chevron */}
      <div style={{fontSize:15,color:'#888',transform:selected?'rotate(90deg)':'none',transition:'transform .15s'}}>▶</div>
    </div>
  );
}

    <div style={{background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:7,overflow:'hidden',position:'sticky',top:20}}>
      {/* Header */}
      <div style={{padding:'16px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:'var(--text)',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'.5px',marginBottom:3}}>{r.name}</div>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:14,color:'#999'}}>
            {r.site}
            {r.split&&<span style={{fontSize:15,background:'rgba(68,204,170,.08)',color:'#44CCAA',border:'1px solid rgba(68,204,170,.15)',borderRadius:3,padding:'2px 8px'}}>Split: {r.split}%</span>}

        </div>

      {/* Meetings */}
      <div style={{padding:'14px 18px'}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#777',marginBottom:10}}>Meeting Schedule</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {KEYS.map(([k,label])=>{
            const done=r['done_'+k];
            const st=gdStatus(r[k],done);
            return(
              <div key={k} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 11px',background:done?'rgba(68,204,170,.05)':'var(--surface3)',border:`1px solid ${done?'rgba(68,204,170,.15)':'var(--border)'}`,borderRadius:5}}>
                <div style={{width:32,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'1px',color:'#999',textTransform:'uppercase'}}>{label}</div>
                <div style={{flex:1}}>
                  {r[k]
                    ?<span style={{fontSize:14,color:done?'#44CCAA':'#ccc'}}>{gdFmt(r[k])}</span>
                    :<span style={{fontSize:14,color:'#999',fontStyle:'italic'}}>Not set</span>}
                </div>
                <span style={{fontSize:15,background:st.bg,color:st.color,border:'1px solid '+st.border,borderRadius:3,padding:'2px 7px'}}>{st.label}</span>

                  <button onClick={()=>onToggleDone(k)} title={done?'Mark pending':'Mark complete'}

                    {done?'✓':'○'}

            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#777',marginBottom:5}}>Notes</div>
            <div style={{fontSize:14,color:'#888',lineHeight:1.6}}>{r.notes}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Edit panel (right side, edit mode) ───────────────────────────────────────
function GDEditPanel({r, onSave, onCancel, onDelete}){
  const[f,setF]=useState({...r});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const KEYS=[['q1','Q1'],['q2','Q2'],['q3','Q3'],['q4','Q4'],['annual','Annual']];
  const inp={background:'var(--surface)',border:'1px solid var(--border2)',color:'var(--text)',borderRadius:5,padding:'7px 10px',fontSize:14,outline:'none',width:'100%',boxSizing:'border-box'};
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const YEARS=['2024','2025','2026','2027','2028','2029','2030'];
  const parseParts=(val)=>{
    if(!val||!/^\d{4}-\d{2}-\d{2}$/.test(val)) return {y:'',m:'',d:''};
    const[y,m,d]=val.split('-'); return{y,m,d};
  };
  const buildDate=(y,m,d)=>(!y||!m||!d)?'': `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  const setDatePart=(k,part,val)=>{
    const parts=parseParts(f[k]); parts[part]=val; set(k,buildDate(parts.y,parts.m,parts.d));
  };
  const sel={...inp,padding:'5px 6px',fontSize:14,flex:1,cursor:'pointer'};

  return(
    <div style={{background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:7,overflow:'hidden',position:'sticky',top:20}}>
      <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#44CCAA'}}>Edit Record</div>
        <button className="btn btn-ghost btn-sm" style={{fontSize:14,color:'#999'}} onClick={onCancel}>✕</button>
      </div>
      <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:12}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#777',marginBottom:5}}>Name</div>
            <input value={f.name} onChange={e=>set('name',e.target.value)} style={inp}/>
          </div>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#777',marginBottom:5}}>Site(s)</div>
            <SiteMultiSelect value={f.site} onChange={v=>set('site',v)}/>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#777',marginBottom:5}}>Split %</div>
            <input value={f.split||''} onChange={e=>set('split',e.target.value)} placeholder="e.g. 45" style={inp}/>
            <div style={{fontSize:15,color:'#777',marginTop:3}}>Set at yearly G&D meeting</div>
          </div>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#777',marginBottom:5}}>Monthly Stipend</div>
            <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'8px 10px',background:'var(--surface)',border:'1px solid var(--border2)',borderRadius:5}}>
              <input type="checkbox" checked={!!f.stipend} onChange={e=>set('stipend',e.target.checked)} style={{accentColor:'var(--go)',width:13,height:13}}/>
              <span style={{fontSize:14,color:'#aaa'}}>Receives stipend</span>
            </label>
            <div style={{fontSize:15,color:'#777',marginTop:3}}>Clinic leads only</div>
          </div>
        </div>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#777',marginBottom:8}}>Meeting Dates</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {KEYS.map(([k,label])=>{
              const{y,m,d}=parseParts(f[k]);
              const done=!!f['done_'+k];
              return(
                <div key={k} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 10px',
                  background:done?'rgba(68,204,170,.05)':'var(--surface3)',
                  border:`1px solid ${done?'rgba(68,204,170,.15)':'var(--border)'}`,borderRadius:5}}>
                  <div style={{width:40,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'1px',color:done?'#44CCAA':'#666',textTransform:'uppercase',flexShrink:0}}>{label}</div>
                  <select value={m||''} onChange={e=>setDatePart(k,'m',e.target.value)} style={sel}>
                    <option value=''>Month</option>
                    {MONTHS.map((mn,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{mn}</option>)}
                  </select>
                  <select value={d||''} onChange={e=>setDatePart(k,'d',e.target.value)} style={{...sel,maxWidth:68}}>
                    <option value=''>Day</option>
                    {Array.from({length:31},(_,i)=><option key={i+1} value={String(i+1).padStart(2,'0')}>{i+1}</option>)}
                  </select>
                  <select value={y||''} onChange={e=>setDatePart(k,'y',e.target.value)} style={{...sel,maxWidth:80}}>
                    <option value=''>Year</option>
                    {YEARS.map(yr=><option key={yr}>{yr}</option>)}
                  </select>
                  <label style={{display:'flex',alignItems:'center',gap:4,fontSize:14,color:done?'#44CCAA':'#555',cursor:'pointer',flexShrink:0}}>
                    <input type="checkbox" checked={done} onChange={e=>set('done_'+k,e.target.checked)} style={{accentColor:'var(--go)',width:12,height:12}}/>
                    Done
                  </label>
                </div>
              );
            })}
          </div>
        </div>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#777',marginBottom:5}}>Notes</div>
          <textarea value={f.notes||''} onChange={e=>set('notes',e.target.value)}
            style={{...inp,minHeight:55,resize:'vertical',lineHeight:1.6}}
            placeholder="Unconfirmed dates, split changes, special notes..."/>
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:8,borderTop:'1px solid var(--border)'}}>
          <button onClick={()=>{if(confirm('Delete this record?'))onDelete();}}
            style={{background:'rgba(224,82,82,.08)',color:'#E05252',border:'1px solid rgba(224,82,82,.18)',borderRadius:5,padding:'6px 12px',fontSize:14,cursor:'pointer'}}>
            Delete
          </button>
          <div style={{display:'flex',gap:7}}>
            <button className="btn btn-ghost btn-sm" style={{fontSize:15}} onClick={onCancel}>Cancel</button>
            <button className="btn btn-lime btn-sm" style={{fontSize:14}} onClick={()=>onSave(f)}>Save</button>
          </div>
        </div>
      </div>
    </div>
  );
}


/* ══ SYSTEMATIC THINKING ══ */
function SystematicPage({staff=[]}){
  const SK='rvgd3_systematic';
  const[sessions,setSessions]=useState(()=>{try{const s=localStorage.getItem(SK);return s?JSON.parse(s):[];}catch{return[];}});
  const[concepts,setConcepts]=useState(()=>{try{const s=localStorage.getItem(SK+'_concepts');return s?JSON.parse(s):[];}catch{return[];}});
  const[view,setView]=useState('playbook');

            return{s,mp,score,reasons,role,rapport};
          }).filter(Boolean).sort((a,b)=>b.score-a.score||a.s.name.localeCompare(b.s.name));
          const leads=rows.filter(r=>r.role==='lead').slice(0,3);

                </div>
                {s.facilitator&&<div style={{fontSize:14,color:'#777',marginTop:3}}>Led by {s.facilitator}</div>}
                {(s.tags||[]).length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:6}}>{s.tags.map(t=><span key={t} style={{fontSize:13,background:'var(--go-dim)',color:'var(--lime)',border:'1px solid var(--go-b)',borderRadius:2,padding:'1px 5px',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{t}</span>)}</div>}
                {s.keyTakeaways&&<div style={{fontSize:14,color:'#999',marginTop:6,lineHeight:1.5,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{s.keyTakeaways}</div>}
              </div>
            ))}
          </div>
          {/* Concepts */}
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#F4DB71',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              Knowledge Base <span style={{color:'#888',fontSize:13}}>{concepts.length}</span>
            </div>
            {concepts.length===0?(
              <div className="card empty"><div className="empty-ico">⬡</div><p>No concepts yet.<br/><span style={{fontSize:14,color:'#777'}}>Distill sessions into reusable frameworks.</span></p></div>
            ):concepts.map(c=>(
              <div key={c.id} className="card" style={{cursor:'pointer',marginBottom:8}} onClick={()=>{setActive(c);setView('concept');}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,marginBottom:4}}>
                  <div style={{fontSize:15,fontWeight:600,color:'#ddd'}}>{c.title}</div>
                  <span style={{fontSize:13,background:'var(--go-dim)',color:'var(--lime)',border:'1px solid var(--go-b)',borderRadius:2,padding:'1px 6px',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,flexShrink:0}}>{c.category}</span>
                </div>
                {c.summary&&<div style={{fontSize:14,color:'#999',fontStyle:'italic'}}>{c.summary}</div>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));

</script>

<!-- ── Supabase Auth Script ──────────────────────────── -->
<script>
(function(){
  const sb=window.__SB;

  window.handleSignOut=async function(){
    await sb.auth.signOut();
    window.__RV_USER=null;
    window.location.reload();
  };

  async function loadUserFromSession(session){
    const email=session.user.email;
    const{data:row,error}=await sb.from('staff').select('id,name,discipline,role').eq('email',email).single();
    if(error||!row){await sb.auth.signOut();return;}
    const isAdmin=row.discipline==='mgmt'||['management','clinic_lead','lead','admin'].includes((row.role||'').toLowerCase());
    window.__RV_USER={id:row.id,name:row.name,email,discipline:row.discipline,role:row.role||'therapist',isAdmin};
    window.dispatchEvent(new Event('rv-auth-ready'));
  }

  async function init(){
    const{data:{session}}=await sb.auth.getSession();
    if(session){await loadUserFromSession(session);}
  }

  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_IN'&&session&&!window.__RV_USER){loadUserFromSession(session);}
  });

  init();
})();
</script>
