  :root{
    /* Revibe brand palette (from brand kit) */
    --pine:#01594D;        /* Go Green   — deep */
    --teal:#04A987;        /* Wellness Green — primary */
    --teal-2:#03937A;      /* hover/darker */
    --teal-bg:#E4F4EF;     /* pale wellness tint */
    --teal-ink:#044C40;    /* deep green for text on light */
    --lime:#C9E7C1; --yellow:#F3DC72;
    --ink:#363636;         /* Active Charcoal */
    --ink-2:#5C5C5C; --ink-3:#969696;  /* Play Gray */
    --line:#E3E6EA; --line-2:#D2D7DD;   /* Chill Grey family */
    --bg:#F3F6F5; --surface:#FFFFFF; --surface-2:#F1F5F3;
    --green:#07876B; --green-bg:#E4F4EF;   /* payable = brand green */
    --amber:#946112; --amber-bg:#F8EDD4;
    --coral:#A23D21; --coral-bg:#F7E5DE;
    --purple:#473D93; --purple-bg:#EAE8FA;
    --red:#A12C2C; --red-bg:#FAE8E8;
    --shadow:0 1px 2px rgba(1,89,77,.05), 0 6px 22px rgba(1,89,77,.07);
    --shadow-sm:0 1px 2px rgba(1,89,77,.06);
    --mono:ui-monospace,'SF Mono','SFMono-Regular',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --round:ui-rounded,'SF Pro Rounded',var(--sans);
    --display:'Bebas Neue',var(--round);
    --r:14px; --r-sm:9px; --r-xs:7px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
  .num,.tnum{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}
  button{font-family:inherit;cursor:pointer}
  .wrap{max-width:1080px;margin:0 auto;padding:30px 24px 90px;animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.wrap{animation:none}*{transition:none!important}}

  /* header */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-bottom:18px;margin-bottom:8px;position:relative}
  .topbar::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--pine),var(--teal) 60%,transparent)}
  .brand{display:flex;align-items:center;gap:13px}
  .brand-mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(145deg,var(--pine),var(--teal));display:flex;align-items:center;justify-content:center;padding:7px;box-shadow:0 4px 12px rgba(1,89,77,.3)}
  .brand-mark img{width:100%;height:100%;object-fit:contain;display:block}
  .brand h1{font-family:var(--display);font-size:25px;font-weight:700;margin:0;letter-spacing:.04em;line-height:1;text-transform:uppercase}
  .brand .sub{font-size:12px;color:var(--ink-3);margin-top:1px;letter-spacing:.1px}
  .eyebrow{font-family:var(--display);font-size:12.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--teal-2)}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm)}
  .muted{color:var(--ink-2)} .dim{color:var(--ink-3)}

  /* dropzone */
  .drop{border:1.5px dashed var(--line-2);border-radius:18px;background:var(--surface);padding:52px 28px;text-align:center;transition:.18s;box-shadow:var(--shadow-sm)}
  .drop.hot{border-color:var(--teal);background:var(--teal-bg);transform:scale(1.006)}
  .drop h2{font-family:var(--display);font-size:23px;font-weight:700;margin:16px 0 6px;letter-spacing:.04em;text-transform:uppercase}
  .drop p{margin:0 auto;color:var(--ink-2);font-size:13px;max-width:430px;line-height:1.6}
  .drop .ic{width:54px;height:54px;border-radius:50%;background:linear-gradient(145deg,var(--pine),var(--teal));color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 6px 16px rgba(13,134,120,.3)}
  .filebtn{margin-top:20px;display:inline-block;background:var(--ink);color:#fff;border:none;padding:11px 22px;border-radius:9px;font-weight:600;font-size:13px;transition:.15s;box-shadow:var(--shadow-sm)}
  .filebtn:hover{background:var(--pine)}

  /* metric cards */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin:20px 0}
  .metric{background:var(--surface);border:1px solid var(--line);border-top:3px solid var(--teal);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm);transition:.15s}
  .metric:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
  .metric:has(.v-green){border-top-color:var(--green)}
  .metric:has(.v-amber){border-top-color:var(--amber)}
  .metric .lab{font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}
  .metric .val{font-size:27px;font-weight:720;letter-spacing:-.7px;margin-top:7px;font-family:var(--round)}
  .metric .hint{font-size:11.5px;color:var(--ink-3);margin-top:4px}
  .v-green{color:var(--green)} .v-amber{color:var(--amber)} .v-teal{color:var(--teal-2)}

  /* sections */
  .sec{margin-top:24px}
  .sec-h{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:12px}
  .sec-h h3{font-family:var(--display);font-size:19px;font-weight:700;margin:0;letter-spacing:.04em;text-transform:uppercase}

  /* rows */
  .row{display:flex;align-items:center;gap:13px;padding:12px 15px;border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:8px;background:var(--surface);transition:.13s}
  .row:hover{border-color:var(--line-2);box-shadow:var(--shadow-sm)}
  .row .rmain{flex:1;min-width:0}
  .row .rt{font-size:13.5px;font-weight:560}
  .row .rs{font-size:12px;color:var(--ink-3);margin-top:2px;line-height:1.5}
  .row .ramt{font-size:14.5px;font-weight:680;font-family:var(--round)}
  .pill{flex-shrink:0;font-size:11px;font-weight:700;min-width:26px;text-align:center;padding:4px 9px;border-radius:20px;font-family:var(--mono)}
  .badge{font-size:11px;font-weight:650;padding:3px 9px;border-radius:6px;display:inline-block}
  .b-teal{background:var(--teal-bg);color:var(--teal-ink)}
  .b-amber{background:var(--amber-bg);color:var(--amber)}
  .b-coral{background:var(--coral-bg);color:var(--coral)}
  .b-purple{background:var(--purple-bg);color:var(--purple)}
  .b-green{background:var(--green-bg);color:var(--green)}
  .b-red{background:var(--red-bg);color:var(--red)}
  .b-gray{background:var(--surface-2);color:var(--ink-2)}

  /* staff cards */
  .staff{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow-sm);transition:.16s}
  .staff:hover{box-shadow:var(--shadow)}
  .staff-top{display:flex;align-items:center;gap:14px;padding:17px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--surface-2),var(--surface))}
  .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(145deg,var(--pine),var(--teal));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--round);font-weight:750;font-size:14px;flex-shrink:0;box-shadow:0 3px 9px rgba(13,134,120,.28)}
  .staff-name{font-family:var(--round);font-size:15.5px;font-weight:700;letter-spacing:-.2px}
  .staff-meta{font-size:12px;color:var(--ink-3);margin-top:1px}
  .staff-pay{margin-left:auto;text-align:right}
  .staff-pay .amt{font-family:var(--round);font-size:23px;font-weight:760;letter-spacing:-.6px;color:var(--green)}
  .staff-pay .lab{font-size:11px;color:var(--ink-3);margin-top:1px}
  .staff-body{padding:17px 20px}

  .splitedit{display:inline-flex;align-items:center;gap:8px}
  .splitedit input{width:62px;font-family:var(--mono);font-size:13px;padding:6px 9px;border:1px solid var(--line-2);border-radius:7px;text-align:right}
  .splitedit input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-bg)}
  .ghost{background:var(--surface);border:1px solid var(--line-2);border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:560;color:var(--ink);transition:.13s}
  .ghost:hover{background:var(--surface-2);border-color:var(--ink-3)}
  .ghost.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .ghost.primary:hover{background:var(--pine);border-color:var(--pine)}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;font-weight:650;color:var(--ink-3);padding:9px 10px;border-bottom:1px solid var(--line);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
  td{padding:9px 10px;border-bottom:1px solid var(--line)}
  td.r,th.r{text-align:right}
  tr:last-child td{border-bottom:none}

  .reconcile{display:flex;gap:26px;flex-wrap:wrap;padding:15px 19px;background:linear-gradient(180deg,var(--teal-bg),var(--surface-2));border:1px solid var(--line);border-radius:var(--r-sm)}
  .reconcile .k{font-family:var(--display);color:var(--teal-2);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .reconcile .v{font-family:var(--mono);font-weight:600;font-size:14px;margin-top:3px;display:block}

  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:15px}
  .chip{font-size:12px;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:6px 13px;display:inline-flex;align-items:center;gap:7px}
  .warnbox{background:var(--amber-bg);border:1px solid #EAD8AE;border-radius:var(--r-sm);padding:12px 15px;font-size:12.5px;color:var(--amber);display:flex;gap:9px;align-items:flex-start;line-height:1.55}
  .footer{margin-top:38px;text-align:center;font-size:11.5px;color:var(--ink-3)}
  .link{color:var(--teal-2);font-weight:600;cursor:pointer;background:none;border:none;font-size:inherit;padding:0}
  .link:hover{color:var(--pine);text-decoration:underline}

  details{margin-top:0}
  details summary{cursor:pointer;list-style:none;display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:650;color:var(--teal-ink);background:var(--teal-bg);border:1px solid #BCE3DD;padding:9px 16px;border-radius:9px;transition:background .12s,border-color .12s;user-select:none}
  details summary:hover{background:#D6ECE8;border-color:var(--teal)}
  details summary::-webkit-details-marker{display:none}
  details summary::before{content:'';width:0;height:0;border-left:5px solid var(--teal);border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform .15s}
  details[open] summary::before{transform:rotate(90deg)}

  /* invoice / statement */
  .inv-stage{background:var(--bg);min-height:100vh;padding:26px 16px 70px;animation:rise .4s ease both}
  .inv-bar{max-width:780px;margin:0 auto 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .inv-page{max-width:780px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:50px 54px;color:var(--ink);box-shadow:var(--shadow)}
  .inv-head{display:flex;justify-content:space-between;gap:30px;align-items:flex-start;margin-bottom:34px}
  .inv-title{font-family:var(--display);font-size:40px;font-weight:700;letter-spacing:.03em;line-height:.95;margin:0 0 8px;color:var(--pine);text-transform:uppercase}
  .inv-from b{font-size:15px;font-weight:700}
  .inv-meta{text-align:right;font-size:12.5px;color:var(--ink-2);min-width:230px}
  .inv-meta .mrow{display:flex;justify-content:flex-end;gap:10px;align-items:baseline;margin-bottom:4px}
  .inv-meta .mk{color:var(--ink-3);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .inv-billto{margin-bottom:26px}
  .inv-billto .eyebrow{margin-bottom:5px}
  .field{font-family:inherit;font-size:13px;color:var(--ink);border:none;background:transparent;padding:2px 4px;border-radius:5px;width:100%}
  .field:hover{background:var(--surface-2)}
  .field:focus{outline:none;background:var(--teal-bg);box-shadow:0 0 0 1px var(--teal)}
  .field.r{text-align:right}
  textarea.field{resize:none;line-height:1.5}
  .field.big{font-size:15px;font-weight:700;font-family:var(--round)}
  table.inv{width:100%;border-collapse:collapse;margin:8px 0 0}
  table.inv th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);padding:8px;border-bottom:2px solid var(--pine);font-weight:700}
  table.inv td{padding:10px 8px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
  table.inv td.r,table.inv th.r{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  .inv-totals{margin-top:14px;margin-left:auto;width:310px}
  .inv-totals .tr{display:flex;justify-content:space-between;padding:7px 8px;font-size:13px}
  .inv-totals .tr.grand{border-top:2px solid var(--pine);margin-top:4px;padding-top:12px;font-size:16px;font-weight:760;font-family:var(--round)}
  .inv-totals .num{font-family:var(--mono)}
  .inv-note{margin-top:26px;padding-top:16px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-3);line-height:1.65}
  .inv-held{margin-top:14px;font-size:11.5px;color:var(--amber);background:var(--amber-bg);border-radius:8px;padding:10px 13px;line-height:1.55}
  .hsttoggle{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);cursor:pointer}
  /* expandable held rows */
  .row.clickrow{cursor:pointer;transition:background .12s}
  .row.clickrow:hover{background:var(--surface-2)}
  .held-caret{display:inline-block;width:0;height:0;border-left:5px solid var(--ink-3);border-top:4px solid transparent;border-bottom:4px solid transparent;margin-right:7px;transition:transform .15s;vertical-align:middle}
  .held-caret.open{transform:rotate(90deg)}
  .held-detail{margin:-3px 0 13px;max-height:300px;overflow:auto;border:1px solid var(--line-2);border-radius:9px;background:var(--surface-2)}
  .hd-line{display:grid;grid-template-columns:96px 1.1fr 1.6fr auto;gap:12px;align-items:center;padding:8px 13px;font-size:12.5px;border-bottom:1px solid var(--line)}
  .hd-line:last-child{border-bottom:none}
  .hd-line .d{font-family:var(--mono);font-size:11px;color:var(--ink-3);white-space:nowrap}
  .hd-line .p{font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hd-line .i{color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hd-line .a{text-align:right;font-family:var(--mono);color:var(--ink-2)}
  @media print{
    body{background:#fff}
    .inv-stage{background:#fff;padding:0;min-height:0;animation:none}
    .no-print{display:none !important}
    .inv-bar{display:none}
    .inv-page{border:none;border-radius:0;max-width:none;margin:0;padding:0;box-shadow:none}
    .field:hover,.field:focus{background:transparent;box-shadow:none}
    .print-only{display:inline !important}
    @page{margin:16mm}
  }
</style>
</head>

<script>
(function(){
  function showError(msg){
    var r=document.getElementById('root');
    if(r) r.innerHTML='<div style="font-family:ui-monospace,monospace;max-width:680px;margin:40px auto;padding:20px 24px;border:1px solid #E4E8EC;border-radius:10px;color:#0F1B2D"><b style="color:#A32D2D">The dashboard failed to load.</b><div style="margin-top:10px;font-size:13px;white-space:pre-wrap">'+msg+'</div></div>';
  }
  try{
    if(typeof React==='undefined'||typeof ReactDOM==='undefined') return showError('React failed to initialize.');
    if(typeof Papa==='undefined') return showError('PapaParse failed to initialize.');
const {
  useState,
  useMemo,
  useRef,
  useEffect,
  useCallback
} = React;

/* ---------- formatting ---------- */
const CAD = new Intl.NumberFormat('en-CA', {
  style: 'currency',
  currency: 'CAD'
});
const money = n => CAD.format(n || 0);
const round2 = n => Math.round((n + Number.EPSILON) * 100) / 100;
// Full-precision money: NO rounding to the cent. Cleans floating-point noise
// only (to 4 dp = hundredths of a cent) and shows the exact computed figure so
// nothing is lost for accounting.
const prec = n => Math.round((n + Number.EPSILON) * 1e6) / 1e6;
const CADX = new Intl.NumberFormat('en-CA', {
  style: 'currency',
  currency: 'CAD',
  minimumFractionDigits: 2,
  maximumFractionDigits: 4
});
const moneyExact = n => CADX.format(round2(n || 0));
/* human label for a pay period, e.g. "Jun 1 – Jun 14, 2026" — used as the
   default name of a saved ledger run (renameable afterwards). */
function fmtPeriod(from, to) {
  const M = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const part = s => {
    const b = (s || '').split('-');
    return {
      y: b[0] || '',
      m: parseInt(b[1], 10) || 0,
      d: parseInt(b[2], 10) || 0
    };
  };
  if (!from || !to) return (from || '') + ' \u2192 ' + (to || '');
  const a = part(from),
    b = part(to);
  if (!a.m || !b.m) return from + ' \u2192 ' + to;
  const left = M[a.m - 1] + ' ' + a.d + (a.y === b.y ? '' : ', ' + a.y);
  return left + ' \u2013 ' + M[b.m - 1] + ' ' + b.d + ', ' + b.y;
}
const runTitle = e => e && e.title ? e.title : fmtPeriod(e && e.from, e && e.to);
/* two-step payout sign-off, keyed by pay period + person:
   { "from|to|Name": { confirmed, confirmedBy, confirmedAt, paid, paidBy, paidAt } }
   1) the contractor confirmed by email that they received their invoice and it
      was correct;  2) payroll sent the money. Payroll can only tick (2) once
      (1) is ticked. Stamped with who and when, and synced so payroll sees it. */
const SIGNOFF_KEY = 'revibe_signoffs_v1';
function loadSignoffs() {
  try {
    return JSON.parse(localStorage.getItem(SIGNOFF_KEY) || '{}');
  } catch (e) {
    return {};
  }
}
function saveSignoffs(m) {
  try {
    localStorage.setItem(SIGNOFF_KEY, JSON.stringify(m));
  } catch (e) {}
}
const signKey = (from, to, name) => (from || '') + '|' + (to || '') + '|' + (name || '');
/* total of expense / reimbursement lines (paid in full, no split, no HST) */
const expenseTotal = list => Math.round(((list || []).reduce((s, m) => s + (parseFloat(m.amount) || 0), 0) + Number.EPSILON) * 100) / 100;
const initials = name => (name || '').split(/\s+/).filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
const dayName = iso => {
  try {
    return new Date(iso + 'T12:00:00').toLocaleDateString('en-CA', {
      weekday: 'short'
    });
  } catch (e) {
    return '';
  }
};
/* The Jane export filename encodes the requested date range, e.g.
   Sales_20250601_20250609.csv -> June 1–9. That second date is the TRUE
   pay-period end even when no one was seen on the last day(s), so it is a
   better source for the invoice period than the latest service date in the
   data. Returns ISO {from,to} or null if the name doesn't carry two dates. */
/* Pay periods run Monday -> Sunday over two weeks (14 days). This checks an
   uploaded report's range against that cycle and flags anything off, so a
   mis-exported range is caught before anyone is paid on it. It warns, never
   blocks — an intentionally short catch-up period is still legitimate. */
const DOW = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
const dowOf = iso => {
  const d = new Date((iso || '') + 'T12:00:00');
  return isNaN(d.getTime()) ? -1 : d.getDay();
};
const daysBetween = (a, b) => Math.round((Date.parse(b + 'T12:00:00') - Date.parse(a + 'T12:00:00')) / 86400000);
function periodIssues(from, to, exact) {
  const out = [];
  if (!from || !to) return out;
  const s = dowOf(from),
    e = dowOf(to);
  if (s < 0 || e < 0) return out;
  const len = daysBetween(from, to) + 1;
  if (s !== 1) out.push('Starts on a ' + DOW[s] + ' (' + from + ') \u2014 pay periods start on a Monday.');
  if (e !== 0) out.push('Ends on a ' + DOW[e] + ' (' + to + ') \u2014 pay periods end on a Sunday.');
  if (len !== 14) out.push('Covers ' + len + ' day' + (len === 1 ? '' : 's') + ' \u2014 a pay period is two weeks.');
  return out;
}
/* The pay period comes ONLY from a file name that carries two dates — the Jane
   Sales export range (Sales_20260608_20260621.csv). A Compensation export is
   named with a single date, which is the day the report was PULLED, not a
   period end; mixing the two produced an order-dependent, wrong range
   (e.g. 2026-06-08 -> 2026-07-13), so single-date names are read as pull dates
   and never as part of the range. */
const RANGE_RX = /(\d{4})(\d{2})(\d{2})\D+(\d{4})(\d{2})(\d{2})/;
const fileParts = name => String(name || '').split(/\s*\+\s*/).map(x => x.trim()).filter(Boolean);
const periodFromFileName = name => {
  for (const part of fileParts(name)) {
    const m = part.match(RANGE_RX);
    if (!m) continue;
    const a = `${m[1]}-${m[2]}-${m[3]}`,
      b = `${m[4]}-${m[5]}-${m[6]}`;
    return b >= a ? {
      from: a,
      to: b
    } : {
      from: b,
      to: a
    };
  }
  return null;
};
/* the day a report was exported out of Jane — from a single-date file name */
const pulledFromFileName = name => {
  let best = '';
  for (const part of fileParts(name)) {
    if (RANGE_RX.test(part)) continue; // that's a range file, not a pull date
    const m = part.match(/(\d{4})(\d{2})(\d{2})/);
    if (!m) continue;
    const d = `${m[1]}-${m[2]}-${m[3]}`;
    if (d > best) best = d;
  }
  return best;
};

/* A prepaid MULTI-SESSION package or membership (e.g. "[12 Sessions]",
   "24 Sessions", or a generic "... Package"), as opposed to a single billed
   session. Single sessions pay the staff member on the line their split (like a
   clinical visit); packages are held until a practitioner is assigned. */
function isTrainingPackage(item) {
  const s = (item || '').toLowerCase();
  return /\bpackage\b/.test(s) || /\[\s*\d+\s*sessions?\s*\]/.test(s) || /\b\d+\s*sessions?\b/.test(s);
}
/* which service family a line belongs to — drives routing */
function serviceFamily(row) {
  const s = (row.item || '').toLowerCase();
  const inc = row.income || '';
  if (/ge shift|hour ge shift|\bge\b.*shift/.test(s)) return 'ge_shift';
  if (/wsib/.test(s)) return 'wsib';
  if (/\bmva\b|\bocf\b|motor vehicle/.test(s)) return 'mva';
  if (inc === 'Product Income') return 'product';
  // Training/performance: a prepaid MULTI-SESSION package is held for
  // practitioner assignment; a SINGLE session / private group / no-show falls
  // through to the clinical path and pays the staff member on the line. NOTE:
  // a performance package keeps the SAME title whether it was paid in full or
  // on a monthly payment plan, so the title does NOT decide assignability.
  const isTrain = /personal training|performance training|strength & conditioning|strength and conditioning/.test(s);
  if (isTrain && isTrainingPackage(s)) return 'training';
  if (!isTrain && /\bpackage\b/.test(s)) return 'training';
  if (/membership|cancellation fee/.test(s)) return 'membership';
  if (/sauna|cold plunge|recovery boot|infrared|contrast therapy|duo plunge/.test(s)) return 'spa';
  return 'clinical';
}
function classifyLine(row, splitPct) {
  // Assigned training/performance — manually attributed to this practitioner,
  // paid at their split per session (current rule). Takes precedence over family.
  if (row.assignedTraining) {
    if (splitPct == null) return {
      cat: 'no_split',
      payable: false,
      take: 0,
      reason: 'Assigned training, but no split set for this practitioner.'
    };
    // Packages pay on what's COLLECTED — the full amount when collected in full,
    // and on each partial payment (e.g. a monthly payment-plan installment) as
    // it comes in. Nothing is paid until money is collected. Pre-tax collected
    // is recovered from the line's own tax ratio so payTake's HST gross-up
    // reconstructs the correct figure; net pay works out to split × collected.
    const tot = row.total || row.subtotal || 0;
    // pay only on what's newly collected: current collected minus whatever was
    // already paid out on this package in a prior (saved) period.
    const priorPaidOn = row.pkgPrior || 0;
    const newlyCollected = Math.max(0, (row.collected || 0) - priorPaidOn);
    const preTaxCollected = tot > 0 ? round2(newlyCollected * (row.subtotal / tot)) : round2(newlyCollected);
    if (preTaxCollected <= 0.01) return {
      cat: 'pkg_uncollected',
      payable: false,
      take: 0,
      reason: priorPaidOn > 0 ? 'Assigned package \u2014 no new payment since last period (already paid out on ' + money(priorPaidOn) + ').' : 'Assigned package \u2014 not yet collected. Pays at this split when the payment comes in.'
    };
    return {
      cat: 'payable',
      payable: true,
      take: round2(preTaxCollected * splitPct), takeRaw: (preTaxCollected * splitPct),
      training: true
    };
  }
  const fam = serviceFamily(row);
  const status = (row.status || '').toLowerCase();
  const sub = row.subtotal;

  // EXCLUDED tier — these are never a practitioner split
  if (fam === 'ge_shift') return {
    cat: 'ge_shift',
    payable: false,
    excluded: true,
    take: 0,
    reason: 'Guest Experience hourly shift — paid through the timesheet engine, not split here.'
  };
  if (fam === 'spa') return {
    cat: 'spa',
    payable: false,
    excluded: true,
    take: 0,
    reason: 'Spa / recovery — not under any practitioner.'
  };
  if (fam === 'membership') return {
    cat: 'membership',
    payable: false,
    excluded: true,
    take: 0,
    reason: 'Membership — facility revenue, no practitioner split.'
  };

  // STATUS flags take precedence so they never auto-pay
  if (status === 'refunded') return {
    cat: 'refund',
    payable: false,
    take: 0,
    reason: 'Refunded — confirm whether to claw back the practitioner\u2019s pay.'
  };
  if (status.indexOf('written_off') > -1) return {
    cat: 'write_off',
    payable: false,
    take: 0,
    reason: 'Written off — confirm whether the practitioner is still paid.'
  };

  // HELD families — recognised, but pay rule still to be defined (kept as flags)
  if (fam === 'wsib') {
    // RULE (pay on invoiced subtotal — WSIB remits later, that is fine):
    //  - Forms are billed in Jane as Product Income → therapist gets 100%.
    //  - The lump-sum block line carries the value → therapist gets their split %.
    //  - $0 follow-up / assessment sessions are covered by the block line → no separate pay.
    const isForm = row.income === 'Product Income';
    if (isForm) {
      if (sub > 0) return {
        cat: 'payable',
        payable: true,
        take: round2(sub), takeRaw: (sub),
        wsibForm: true // paid at 100%, not at the practitioner's split
      };
      return {
        cat: 'wsib',
        payable: false,
        take: 0,
        reason: 'WSIB form billed at $0 — value sits on the block; no separate pay.'
      };
    }
    // WSIB block / billable visit (Treatment Income)
    if (sub > 0) {
      if (splitPct == null) return {
        cat: 'no_split',
        payable: false,
        take: 0,
        reason: 'WSIB block, but no split % set for this practitioner.'
      };
      return {
        cat: 'payable',
        payable: true,
        take: round2(sub * splitPct), takeRaw: (sub * splitPct)
      };
    }
    return {
      cat: 'wsib',
      payable: false,
      take: 0,
      reason: 'WSIB $0 session — value sits on the block line; no separate split.'
    };
  }
  if (fam === 'mva') {
    // RULE: MVA pays the practitioner their split % on each individual session,
    // off the line's invoiced subtotal — same basis as a clinical visit.
    if (splitPct == null) return {
      cat: 'no_split',
      payable: false,
      take: 0,
      reason: 'MVA session, but no split % set for this practitioner.'
    };
    if (sub > 0) return {
      cat: 'payable',
      payable: true,
      take: round2(sub * splitPct), takeRaw: (sub * splitPct)
    };
    return {
      cat: 'review_zero',
      payable: false,
      take: 0,
      reason: 'MVA $0 line (no-show or unbilled) — confirm before paying.'
    };
  }
  if (fam === 'product') return {
    cat: 'product',
    payable: false,
    take: 0,
    reason: 'Product sale — commission rate to be defined (naturopath products variable).'
  };
  if (fam === 'training') return {
    cat: 'training',
    payable: false,
    take: 0,
    reason: 'Training / package — currently split per session; per-session value to be confirmed.'
  };

  // CLINICAL
  // No-show fees: the item title says "No Show". We charge 0 / 25 / 50 / 75 /
  // 100% of the visit and the practitioner earns their split on whatever was
  // charged. So a charged no-show is simply payable, and a $0 no-show is
  // nothing to pay — neither needs a rule or a comp/sponsor decision.
  if (/no.?show/i.test(row.item)) {
    // $0 charged → split of $0 = $0, but it's still a split no-show line (not
    // facility revenue). A charged no-show pays the split on the charge.
    if (sub <= 0) return {
      cat: 'payable',
      payable: true,
      take: 0,
      noshow: true
    };
    if (splitPct == null) return {
      cat: 'no_split',
      payable: false,
      take: 0,
      reason: 'No-show fee, but no split % set for this practitioner.'
    };
    return {
      cat: 'payable',
      payable: true,
      take: round2(sub * splitPct), takeRaw: (sub * splitPct),
      noshow: true
    };
  }
  // Split billing: a $0 line whose value is already captured on a paired billed
  // line for the same visit (same patient + date + service). The practitioner is
  // already paid their split on the billed sibling, so this companion pays nothing.
  if (sub <= 0 && row.paidSibling) {
    const isInsurer = row.payer && row.payer !== 'Patient';
    return {
      cat: 'paired_zero',
      payable: false,
      take: 0,
      reason: isInsurer
        ? `${row.payer} paid $0 on this line — the patient paid this visit in full on the paired line, and the split is taken from that paid line.`
        : 'Patient owed $0 on this line — the insurer covered this visit on the paired line, and the split is taken from that paid line.'
    };
  }
  // Zero-dollar visit resolved by the operator. The file only says "no charge",
  // so it can't tell a Revibe-SPONSORED visit (comp for the client, but the
  // therapist IS paid at split on the normal price) from a plain COMP (covered,
  // therapist NOT paid). This is an explicit per-visit decision.
  if (sub <= 0 && row.zeroRes) {
    if (row.zeroRes.type === 'comp') return {
      cat: 'comp',
      payable: false,
      take: 0,
      reason: 'Comp visit — covered, not paid to the practitioner.'
    };
    if (row.zeroRes.type === 'redemption') return {
      cat: 'redemption',
      payable: false,
      take: 0,
      reason: 'Package redemption — the practitioner was paid on the package when it was purchased; nothing further this visit.'
    };
    if (row.zeroRes.type === 'noshow') return {
      cat: 'noshow_res',
      payable: false,
      take: 0,
      reason: 'No-show at $0 charged — nothing to pay. (The comp report does not label no-shows, so this is set here.)'
    };
    if (row.zeroRes.type === 'sponsored') {
      if (splitPct == null) return {
        cat: 'no_split',
        payable: false,
        take: 0,
        reason: 'Sponsored visit, but no split % set for this practitioner.'
      };
      const basis = parseFloat(row.zeroRes.amount) || 0;
      return {
        cat: 'payable',
        payable: true,
        take: round2(basis * splitPct), takeRaw: (basis * splitPct),
        sponsored: true,
        sponsoredBasis: basis
      };
    }
  }
  if (splitPct == null) return {
    cat: 'no_split',
    payable: false,
    take: 0,
    reason: 'No split % configured for this staff member.'
  };
  if (sub > 0) return {
    cat: 'payable',
    payable: true,
    take: round2(sub * splitPct), takeRaw: (sub * splitPct)
  };
  if (row.payer && row.payer !== 'Patient') return {
    cat: 'insurer_zero',
    payable: false,
    take: 0,
    reason: `${row.payer} billed $0 on this line — direct-bill or sponsored visit?`
  };
  return {
    cat: 'review_zero',
    payable: false,
    take: 0,
    reason: 'Zero-dollar visit — package redemption, sponsored, or comp?'
  };
}

/* ---------- tax gross-up on the practitioner's payout ----------
   For a TAXABLE service line the practitioner is paid their split of the
   pre-tax subtotal, then grossed up by HST (×1.13) — that grossed-up figure
   IS their payout (e.g. 79.65 × 0.57 × 1.13 = 51.30). EXEMPT work (physio,
   chiropractic, naturopathy) is untouched. Taxability comes from the staff's
   profession + any per-line override, via lineTreatment. payTake is used by
   the dashboard card, the global total, AND the invoice so all three agree. */
const HST_MULT = 1.13;
function isTaxableLine(item, profile) {
  return lineTreatment(item, profile || {}) === 'taxable';
}
function payTake(row, splitPct, profile) {
  const c = classifyLine(row, splitPct);
  // The HST gross-up is governed by the profession / per-line HST control
  // (lineTreatment) for BOTH the Sales export and the comp report. The comp
  // file's collected-tax is used only to recover the pre-tax subtotal at parse
  // time — it must NOT force the gross-up, or an exempt practitioner (e.g.
  // physiotherapy) would be over-paid and the profession control would do
  // nothing. Exempt → paid pre-tax subtotal × rate; taxable → × 1.13.
  const taxable = isTaxableLine(row.item, profile);
  const rawPre = c.takeRaw != null ? c.takeRaw : c.take; // pre-tax pay, unrounded
  if (c.payable && taxable) {
    // Pay is computed on the totals and rounded ONCE: pre-tax = gross x split,
    // net = gross x split x 1.13. No per-line rounding, so it equals a manual
    // calculation to the cent.
    const rawTaxIncl = rawPre * HST_MULT;
    return {
      ...c,
      take: round2(rawTaxIncl),
      takeRaw: rawTaxIncl,
      pretax: c.take,
      pretaxRaw: rawPre,
      taxed: true
    };
  }
  return {
    ...c,
    pretaxRaw: rawPre
  };
}
// Effective rate for a line: a comp-report row brings its own per-invoice rate
// (70% personal / 60% regular); a Sales row uses the configured staff split.
function rowSplit(row, baseSplit, overrides) {
  if (row && row.rate != null) return row.rate;
  return effSplit(row.item, baseSplit, overrides);
}
// Infer a practitioner's profession from the modality named in their own
// session items — an RMT does "Massage Therapy", an osteo does "Osteopathic
// Manual Therapy", etc. The dominant clear modality wins; ambiguous items
// ("Initial Assessment + Treatment", "Performance Training") don't vote, but
// they then inherit the inferred profession's tax treatment.
function inferProfession(items) {
  const c = {
    massage: 0,
    osteopathy: 0,
    physiotherapy: 0,
    chiropractic: 0
  };
  (items || []).forEach(it => {
    const s = (it || '').toLowerCase();
    if (/massage/.test(s)) c.massage++;else if (/osteopath|\bosteo\b/.test(s)) c.osteopathy++;else if (/physiotherap|\bphysio\b/.test(s)) c.physiotherapy++;else if (/chiropract|\bchiro\b/.test(s)) c.chiropractic++;
  });
  let best = '',
    n = 0;
  for (const k in c) {
    if (c[k] > n) {
      n = c[k];
      best = k;
    }
  }
  return best;
}

/* Contractor business info for invoices (business/legal name, address,
   HST/GST number). Seeded from the Revibe roster and used as editable
   defaults — anything the user types on an invoice overrides these and is
   saved on the profile. SINs are intentionally NOT stored here. Keyed by
   last name so report-name variants (Dr., GE, middle names) still match. */
let BIZ_INFO = {}; // loaded from Supabase contractor_profiles after sign-in
function bizLastKey(name) {
  var s = (name || '').trim().toLowerCase().replace(/^(dr\.?|ge)\s+/, '').replace(/\./g, '').trim();
  var t = s.split(/\s+/);
  if (!t.length) return '';
  var particles = { de:1, van:1, von:1, di:1, del:1, la:1, le:1, da:1 };
  if (t.length >= 2 && particles[t[t.length - 2]]) return t[t.length - 2] + ' ' + t[t.length - 1];
  return t[t.length - 1];
}
function businessFor(name) {
  return BIZ_INFO[bizLastKey(name)] || { business: '', address: '', hstNumber: '' };
}

function staffProfile(name, profiles, inferred) {
  const p = (profiles && profiles[name]) || {};
  const biz = businessFor(name);
  return {
    ...p,
    business: p.business || biz.business || '',
    address: p.address || biz.address || '',
    hstNumber: p.hstNumber || biz.hstNumber || '',
    profession: p.profession || inferred && inferred[name] || KNOWN_PROFESSIONS[name] || ''
  };
}

/* ---------- payer bucket label for the payable breakdown ---------- */
function payerBucket(row) {
  if (row.assignedTraining) return 'Performance / training';
  if (/no show/i.test(row.item)) return 'No-show fee';
  if (row.payer === 'Patient' || !row.payer) return 'Patient-paid';
  return 'Insurer';
}

/* how much of each assigned package has already been PAID OUT (keyed by invoice

  const practitioners = useMemo(() => {
    const set = new Set();

  // group rows by staff (sales: core + injected assigned-training; hourly: all rows)
  const byStaff = useMemo(() => {
    if (!rows) return [];
    const m = {};
    if (kind !== 'sales') {
      rows.forEach(r => {
        const k = r.staff || '(Unassigned)';
        (m[k] = m[k] || []).push(r);
      });
    } else {
      fams.core.forEach(r => {
        const k = r.staff || '(Unassigned)';
        (m[k] = m[k] || []).push(r);

        const who = trainAssign[pkg.key] || pkg.staff;

          m[who] = m[who] || [];

            ...l,
            assignedTraining: true

      // same pay period, when the practitioner's own report doesn't carry them.

      const currentKeys = new Set(trainingPkgs.map(p => p.key));
      Object.entries(pkgStore).forEach(([key, sp]) => {
        if (currentKeys.has(key)) return;
        if (!m[sp.who]) return;
        if (sp.from && sp.to && period.from && period.to && !(sp.from <= period.to && sp.to >= period.from)) return;
        (sp.lines || []).forEach(l => m[sp.who].push({
          ...l,
          assignedTraining: true,
          fromStore: true

  }, [rows, kind, fams, trainingPkgs, trainAssign, pkgStore, period]);

  const geByStaff = useMemo(() => {
    if (!rows || kind !== 'sales') return [];

    rows.forEach(r => {

          date: s.date || '',

          shiftIdx: i

  }, [rows, kind, geShifts]);

  // global reconciliation + period
  const recon = useMemo(() => {
    if (!rows) return null;

      to = period.to;

    const coll = round2(rows.reduce((s, r) => s + r.collected, 0));

    byStaff.forEach(([name, rs]) => {

        });

    };
  }, [rows, kind, byStaff, geByStaff, splits, itemSplits, manualItems, deductions, stipends, profiles, wages, fileName, period, inferredProf, cohortFilter, cohorts, bizVersion]);

      out.push({
        name,
        cohort: cohorts[name] || null,
        profession: prof.profession || '',

      out.push({
        name,
        cohort: cohorts[name] || null,
        profession: 'Guest Experience (hourly)',
        gross: g,
        hst: 0,
        stipend: 0,
        deduction: 0,
        net: g
      });
    });

  }, [rows, kind, byStaff, geByStaff, splits, itemSplits, manualItems, deductions, stipends, profiles, wages, inferredProf, cohorts, bizVersion]);

  // payout total per cohort (net), for the summary breakdown
  const cohortTotals = useMemo(() => {
    const m = {};
    payoutByStaff.forEach(p => {

    return Object.entries(m).sort((a, b) => a[0].localeCompare(b[0]));
  }, [payoutByStaff]);

  const [ledger, setLedger] = useState(loadLedger);

    // means someone could be paid twice for the same days, a gap means days
    // nobody was paid for.
    const cohortRuns = ledger.filter(e => e.from && e.to && (cohortFilter === 'all' ? true : String(e.cohort) === String(cohortFilter)) && !(e.from === period.from && e.to === period.to));
    const overlapping = cohortRuns.filter(e => e.from <= period.to && e.to >= period.from);
    overlapping.forEach(e => issues.push('Overlaps a saved run \u2014 "' + runTitle(e) + '" (' + e.from + ' \u2192 ' + e.to + ')' + (e.cohortLabel && e.cohortLabel !== 'All' ? ' \u00B7 ' + e.cohortLabel : '') + '. Those days may be paid twice.'));
    if (!overlapping.length) {
      const before = cohortRuns.filter(e => e.to < period.from).sort((a, b) => a.to.localeCompare(b.to)).pop();
      if (before) {

        if (gap > 0) issues.push('Leaves a ' + gap + '-day gap after "' + runTitle(before) + '" (ended ' + before.to + '). Those days are not on any saved run.');
      }

      issues,
      exact
    };
  }, [rows, period.from, period.to, fileName, ledger, cohortFilter]);
  const [showLedger, setShowLedger] = useState(false);
  const [viewingRun, setViewingRun] = useState(null);
  const [supaCfg, setSupaCfg] = useState(loadSupaCfg);
  const lsGet = k => {
    try {
      return localStorage.getItem(k) || '';
    } catch (e) {

    }
  };

  const [supaRefreshTok, setSupaRefreshTok] = useState(() => lsGet('revibe_supa_refresh'));
  const [supaUser, setSupaUser] = useState(() => lsGet('revibe_supa_user'));
  const [supaMsg, setSupaMsg] = useState('');
  const [supaBusy, setSupaBusy] = useState(false);
  const migrateLocalToRoster = (tok, cloudMap) => {
    try {
      if (localStorage.getItem('revibe_roster_migrated_v1')) return;
    } catch (e) {
      return;
    }
    const push = (nm, fields) => {
      const key = bizLastKey(nm);
      if (!key) return;
      const nm2 = BIZ_INFO[key] && BIZ_INFO[key].name || nm;
      BIZ_INFO = {
        ...BIZ_INFO,
        [key]: {
          ...(BIZ_INFO[key] || {}),
          name: nm2,
          ...fields
        }
      };
      if (tok) supaUpsertProfile(supaCfg, tok, key, {
        name: nm2,
        ...fields
      }, supaUser).catch(() => {});
    };
    let did = false;
    Object.keys(splits || {}).forEach(nm => {
      const key = bizLastKey(nm);
      if (splits[nm] != null && !(cloudMap[key] && cloudMap[key].split != null)) {
        push(nm, {
          split: splits[nm]
        });
        did = true;
      }
    });
    Object.keys(wages || {}).forEach(nm => {
      const key = bizLastKey(nm);
      if (wages[nm] != null && !(cloudMap[key] && cloudMap[key].wage != null)) {
        push(nm, {
          wage: wages[nm]
        });
        did = true;
      }
    });
    Object.keys(cohorts || {}).forEach(nm => {
      const key = bizLastKey(nm);
      if (cohorts[nm] && !(cloudMap[key] && cloudMap[key].cohort)) {
        push(nm, {
          cohort: String(cohorts[nm])
        });
        did = true;
      }
    });
    if (did) setBizVersion(v => v + 1);
    try {
      localStorage.setItem('revibe_roster_migrated_v1', '1');
    } catch (e) {}
  };
  const loadProfilesFromCloud = async (tok) => {
    tok = tok || supaToken;
    if (!tok) return;
    try {
      const map = await supaFetchProfiles(supaCfg, tok);
      BIZ_INFO = map;
      setBizVersion(v => v + 1);
      migrateLocalToRoster(tok, map);
      try {
        const so = await supaFetchSignoffs(supaCfg, tok);
        setSignoffs(prev => {
          const merged = {
            ...prev,
            ...so
          };
          saveSignoffs(merged);
          return merged;
        });
      } catch (e) {
        if (String(e.message).indexOf('401') !== 0) setSupaMsg('Sign-offs: ' + e.message);

    } catch (err) {
      if (String(err.message).indexOf('401') !== 0) setSupaMsg('Profiles: ' + err.message);
    }

  const persistTok = (tok, email, refresh) => {
    try {

        localStorage.setItem('revibe_supa_user', email || '');
        if (refresh != null) localStorage.setItem('revibe_supa_refresh', refresh || '');
      } else {
        localStorage.removeItem('revibe_supa_tok');
        localStorage.removeItem('revibe_supa_user');
        localStorage.removeItem('revibe_supa_refresh');
      }

  };

      const {
        token,
        refresh,

      } = await supaRefresh(supaCfg, rt);

      setSupaRefreshTok(refresh);

    setSupaCfg(c);

  }, [bizVersion]);

  const [showStaff, setShowStaff] = useState(false);

  const saveRun = () => {

    }), {
