    const byMonth={};
    rows.forEach(row=>{const r=norm(row);const name=r['staff member']||r['staff_member']||'';const isClinic=!name||name.toLowerCase()==='guest experience'||name.toLowerCase()==='relax spa';const total=parseFloat((r['total']||'0').toString().replace(/[$,\s]/g,''))||0;if(!total)return;const month=getMonth(r['purchase date']||r['invoice date']);if(!month)return;if(!byMonth[month])byMonth[month]={};const key=isClinic?'_clinic':name;if(!byMonth[month][key])byMonth[month][key]={name:key,revenue:0,revByLoc:{}};byMonth[month][key].revenue+=total;const loc=normLoc(r['location']||'');if(loc)byMonth[month][key].revByLoc[loc]=(byMonth[month][key].revByLoc[loc]||0)+total;});
    const result={};Object.entries(byMonth).forEach(([month,staffMap])=>{result[month]=Object.values(staffMap).map(r=>{const rl={};Object.entries(r.revByLoc||{}).forEach(([k,v])=>rl[k]=Math.round(v*100)/100);if(r.name==='_clinic')return{name:'_clinic',revenue:Math.round(r.revenue*100)/100,revByLoc:rl,staffId:null};const matched=matchStaff(r.name);return{name:r.name,revenue:Math.round(r.revenue*100)/100,revByLoc:rl,staffId:matched?.id||null,matchedName:matched?.name||null};}).filter(r=>r.revenue>0);});
    return result;
  };

  /* ── Member Retention report (key-value summary, NOT a row table) ── */
  // The Jane "Member Retention" export is a summary: clinic-wide metrics first,
  // then a location name line followed by that location's metrics. parseCSV would
  // mangle it (treats line 1 as headers), so we detect + parse from raw text.
  const RET_METRICS={
    'new patients':'newPatients',
    'returning patients':'returningPatients',
    'total patients':'totalPatients',
    'total visits':'totalVisits',
    '% returning':'pctReturning',
    '% repeat visits within date range':'pctRepeatVisits',
    '% repeat visits':'pctRepeatVisits',
  };
  const looksLikeRetention=(text)=>{
    const head=text.slice(0,4000).toLowerCase();
    const firstLine=(text.split(/\r?\n/).find(l=>l.trim())||'').toLowerCase();
    return /^\s*"?new patients"?\s*,/.test(firstLine) && head.includes('% returning');
  };
  const parseRetentionSummary=(text)=>{
    const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length);
    const clinic={};
    const locations=[];
    const practitioners=[];
    let current=clinic; // first block (before any header) = clinic-wide totals
    lines.forEach(line=>{
      // split on FIRST comma only (names/locations won't contain commas in Jane exports)
      const ci=line.indexOf(',');
      const label=(ci>=0?line.slice(0,ci):line).replace(/^"|"$/g,'').trim();
      const rawVal=ci>=0?line.slice(ci+1).replace(/^"|"$/g,'').trim():'';
      const key=RET_METRICS[label.toLowerCase()];
      if(key&&rawVal!==''){
        const num=parseFloat(rawVal.replace(/[%,\s]/g,''));
        current[key]=isNaN(num)?null:num;
      }else if(!key&&label){
        // Section header. Jane location names start with "Revibe"; everything else is a practitioner.
        if(/^revibe/i.test(label)){const loc={name:label};locations.push(loc);current=loc;}
        else{const pr={name:label};practitioners.push(pr);current=pr;}
      }
    });
    // Match practitioner sections to staff so we can auto-fill per-therapist retention
    practitioners.forEach(p=>{const m=matchStaff(p.name);p.staffId=m?.id||null;p.matchedName=m?.name||null;});
    return{clinic,locations,practitioners,importedAt:new Date().toISOString()};
  };

  /* ── Handle file upload ─────────────────────── */
  // Import a Member Retention report for a chosen month (called from the confirm popup)
  const doRetentionImport=async(text,month)=>{
    const summary=parseRetentionSummary(text);
    const periodLabel=new Date(month+'-01T12:00').toLocaleDateString('en-CA',{month:'long',year:'numeric'});
    const monthEnd=new Date(parseInt(month.slice(0,4)),parseInt(month.slice(5,7)),0).toISOString().slice(0,10);
    summary.period=month;summary.periodLabel=periodLabel;
    setRetentionSummaries(prev=>{const next={...prev,[month]:summary};try{localStorage.setItem('rvgd3_retention_summaries',JSON.stringify(next));}catch(e){}try{const SB=window.__SB;if(SB)SB.from('retention_summaries').upsert({id:'singleton',data:next});}catch(e){}return next;});
    setRetViewMonth(month);
    const nr={...(data.retention||{})};let filled=0;
    for(const p of summary.practitioners){if(p.staffId&&p.pctReturning!=null){nr[p.staffId]=p.pctReturning;filled++;}}
    save({...data,retention:nr});
    if(window.__SB){for(const p of summary.practitioners){if(p.staffId&&p.pctReturning!=null)await saveRetentionToSB(p.staffId,p.pctReturning,'jane-import',monthEnd);}}
    const cw=summary.clinic.pctReturning!=null?` Clinic-wide returning ${summary.clinic.pctReturning}%.`:'';
    setImportMsg({type:'success',msg:`✓ Member Retention imported for ${periodLabel}.${cw} ${filled} practitioner${filled!==1?'s':''}, ${summary.locations.length} location${summary.locations.length!==1?'s':''} matched.`});
  };

  // Import an undated shift report for a chosen month (called from the confirm popup)
  const doShiftImport=async(rows,month)=>{
    setImporting(true);setImportMsg(null);
    try{
      const {byMonth}=parseShiftByMonth(rows);
      const parsed=byMonth['_nodate']||Object.values(byMonth).flat();
      if(!parsed.length){setImportMsg({type:'error',msg:'No staff rows found in shift report.'});setImporting(false);return;}
      let newSnapshots=[...data.snapshots];
      const snapDateM=month+'-01';
      const existingIdx=newSnapshots.findIndex(s=>s.date===snapDateM&&s.type==='shift');
      if(existingIdx>=0){
        const existing=newSnapshots[existingIdx];const mergedRows=[...existing.rows];
        parsed.forEach(nr=>{const idx=mergedRows.findIndex(r=>r.staffId===nr.staffId||(r.name===nr.name));if(idx>=0)mergedRows[idx]={...mergedRows[idx],...nr};else mergedRows.push(nr);});
        newSnapshots[existingIdx]={...existing,rows:mergedRows};
      }else{
        newSnapshots.push({id:'snap_shift_'+month,date:snapDateM,rows:parsed,type:'shift'});
      }
      newSnapshots=newSnapshots.sort((a,b)=>a.date.localeCompare(b.date)).slice(-36);
      save({...data,snapshots:newSnapshots,lastImport:new Date().toISOString()});
      if(window.__SB){for(const snap of newSnapshots)await saveSnapshot(snap);}
      const matched=parsed.filter(r=>r.staffId).length;
      const periodLabel=new Date(snapDateM+'T12:00').toLocaleDateString('en-CA',{month:'long',year:'numeric'});
      setImportMsg({type:'success',msg:`✓ Shift report imported for ${periodLabel}. ${parsed.length} practitioners, ${matched} matched (utilization = Appt ÷ Shift hrs).`});
    }catch(e){setImportMsg({type:'error',msg:'Shift import failed: '+e.message});}
    setImporting(false);
  };

  const storeSourceFile=(name,text,month)=>{
    if(!name||!text)return;
    const rec={id:name,name,content:text,month:month||'',at:new Date().toISOString()};
    setSourceFiles(prev=>[...prev.filter(f=>f.id!==name),rec]);
    try{const SB=window.__SB;if(SB)SB.from('source_files').upsert(rec).then(({error})=>{if(error)console.warn('source_files save:',error.message);});}catch(e){}
  };
  const deleteSourceFile=(id)=>{
    setSourceFiles(prev=>prev.filter(f=>f.id!==id));
    try{const SB=window.__SB;if(SB)SB.from('source_files').delete().eq('id',id).then(()=>{});}catch(e){}
  };

  const handleFile=async(file,opts={})=>{
    if(!file||!file.name.endsWith('.csv')){setImportMsg({type:'error',msg:'Please upload a .csv file from Jane.'});return;}
    setImporting(true);setImportMsg(null);
    try{
      setImportMsg({type:'info',msg:'Reading file…'});
      const text=await file.text();
      if(!opts.reprocess)storeSourceFile(file.name,text,retentionMonth||snapDate.slice(0,7));

      // ── Member Retention summary report — confirm the month via popup before importing ──
      if(looksLikeRetention(text)){
        if(opts.reprocess){await doRetentionImport(text,opts.month||retentionMonth);setImporting(false);return;}
        setPendingRetention(text);
        setPendingRetMonth(retentionMonth);
        setImporting(false);
        return;
      }

      // Large files: chunked async parser keeps the tab responsive + shows progress
      const big=text.length>2_000_000;
      const rows=await parseCSVChunked(text,big?(pct=>setImportMsg({type:'info',msg:`Parsing ${(text.length/1048576).toFixed(1)} MB file… ${pct}%`})):null);
      if(!rows.length){setImportMsg({type:'error',msg:'File is empty or unreadable.'});setImporting(false);return;}
      const type=detectFileType(rows);
      // Undated shift report → confirm which month it covers (Jane's summary has no Date column)
      if(type==='shift'){
        const {anyDated}=parseShiftByMonth(rows);
        if(!anyDated){
          if(opts.reprocess){await doShiftImport(rows,opts.month||snapDate.slice(0,7));setImporting(false);return;}
          setPendingShift(rows);setPendingShiftMonth(snapDate.slice(0,7));setImporting(false);return;
        }
      }
      if(big)setImportMsg({type:'info',msg:`Processing ${rows.length.toLocaleString()} rows…`});

      let newSnapshots=[...snapshotsRef.current];
      let totalPractitioners=0,totalMatched=0,monthsCreated=[];

      if(type==='appointments'){
        // Daily appointments are the source of truth: parse + MERGE by staff+date (re-importing
        // the same days overwrites just those days; new weeks add). Per-staff month counts are
        // DERIVED from the merged store, so weekly uploads accumulate instead of the latest file
        // replacing the month.
        const newDailyAppts=parseDailyAppointments(rows);
        const existing=new Map(dailyApptsRef.current.map(r=>[r.id,r]));
        newDailyAppts.forEach(r=>existing.set(r.id,r));
        const merged=[...existing.values()];
        setDailyAppts(merged);dailyApptsRef.current=merged;
        try{localStorage.setItem('rvgd3_daily_appts',JSON.stringify(merged));}catch(e){}
        const SB=window.__SB;
        if(SB&&newDailyAppts.length>0){

          }
        }
        const months=Array.from(new Set(newDailyAppts.map(r=>(r.date||'').slice(0,7)).filter(m=>m.length===7)));
        months.forEach(month=>{
          const dayRows=merged.filter(r=>(r.date||'').slice(0,7)===month);
          const byStaff={};
          dayRows.forEach(r=>{const k=r.staff_id;if(!k)return;if(!byStaff[k])byStaff[k]={completed:0,initialAssessments:0,noShows:0,cancellations:0,rescheduled:0};byStaff[k].completed+=(r.completed||0);byStaff[k].initialAssessments+=(r.initial_assessments||0);byStaff[k].noShows+=(r.no_shows||0);byStaff[k].cancellations+=(r.cancellations||0);byStaff[k].rescheduled+=(r.rescheduled||0);});
          totalPractitioners=Math.max(totalPractitioners,Object.keys(byStaff).length);
          totalMatched=Math.max(totalMatched,Object.keys(byStaff).length);
          monthsCreated.push(month);
          const mapRow=(sid)=>{const nm=(staff.find(x=>x.id===sid)||{}).name||sid;return{name:nm,staffId:sid,matchedName:nm,...byStaff[sid]};};
          const idx=newSnapshots.findIndex(s=>s.date&&s.date.startsWith(month));
          if(idx>=0){
            const rows2=[...newSnapshots[idx].rows];
            Object.keys(byStaff).forEach(sid=>{const v=byStaff[sid];const rIdx=rows2.findIndex(r=>r.staffId===sid);const resched=v.rescheduled||(rIdx>=0?rows2[rIdx].rescheduled:0)||0;if(rIdx>=0)rows2[rIdx]={...rows2[rIdx],completed:v.completed,initialAssessments:v.initialAssessments,noShows:v.noShows,cancellations:v.cancellations,rescheduled:resched};else rows2.push({...mapRow(sid),rescheduled:resched});});
            newSnapshots[idx]={...newSnapshots[idx],rows:rows2,files:[...(newSnapshots[idx].files||[]),file.name].filter((v,i,a)=>a.indexOf(v)===i)};
          }else{
            newSnapshots.push({id:'snap_'+month+'_appt',date:month+'-01',rows:Object.keys(byStaff).map(mapRow),type:'appointments',files:[file.name]});
          }
        });
      }else if(type==='sales'){
        // Daily revenue is the source of truth: parse this file's day-rows and MERGE into the
        // running store keyed by staff+date. Re-importing the same dates overwrites just those
        // days (no double-count); a new week adds new days. The month total + per-staff snapshot
        // revenue are then DERIVED from the merged daily data, so weekly uploads accumulate
        // instead of the latest file replacing the month.
        const newDailyRev=parseDailyRevenue(rows);
        const existing=new Map(dailyRevRef.current.map(r=>[r.id,r]));
        newDailyRev.forEach(r=>existing.set(r.id,r));
        const merged=[...existing.values()];
        setDailyRevenue(merged);dailyRevRef.current=merged;
        try{localStorage.setItem('rvgd3_daily_rev',JSON.stringify(merged));}catch(e){}
        window.__dailyRevCount=newDailyRev.length;window.__dailyRevErr=null;window.__revLocUnsynced=false;
        if(newDailyRev.length>0){
          const SB=window.__SB;
          if(SB){
            const chunks=[];
            for(let i=0;i<newDailyRev.length;i+=500)chunks.push(newDailyRev.slice(i,i+500));
            let stripped=false,revErr=null;
            for(const chunk of chunks){
              const{error}=await SB.from('daily_revenue').upsert(chunk);
              if(error){
                // daily_revenue may lack the revByLoc / collected columns — retry with core columns
                const bare=chunk.map(({revByLoc,collected,...r})=>r);
                const r2=await SB.from('daily_revenue').upsert(bare);
                if(r2.error){revErr=r2.error.message;break;}
                stripped=true;
              }
            }
            window.__revLocUnsynced=stripped&&!revErr;window.__dailyRevErr=revErr;
            if(revErr)console.warn('daily_revenue sync error:',revErr);
          }
        }
        // Months that have daily data, derived from the MERGED store (accumulates all weeks)
        const rbDerived={};
        merged.forEach(r=>{const m=(r.date||'').slice(0,7);if(!m||m.length!==7)return;if(!rbDerived[m])rbDerived[m]={billed:0,collected:0};rbDerived[m].billed+=(parseFloat(r.revenue)||0);rbDerived[m].collected+=(parseFloat(r.collected)||0);});
        const _basis={...revBasisRef.current};
        Object.keys(rbDerived).forEach(m=>{const b=Math.round(rbDerived[m].billed*100)/100;const c=Math.round(rbDerived[m].collected*100)/100;const prev=revBasisRef.current[m]||{};_basis[m]={billed:b,collected:c>0?c:(prev.collected||0)};});
        setRevBasis(_basis);revBasisRef.current=_basis;try{localStorage.setItem('rvgd3_rev_basis',JSON.stringify(_basis));}catch(e){}
        try{const SB=window.__SB;if(SB)await SB.from('revenue_basis').upsert({id:'singleton',data:_basis});}catch(e){console.warn('revenue_basis sync',e);}
        // Derive per-staff snapshot revenue for each affected month from the merged daily data,
        // preserving any appointment fields (completed / IA) already on those rows.
        Object.keys(rbDerived).forEach(month=>{
          const dayRows=merged.filter(r=>(r.date||'').slice(0,7)===month);
          const byStaff={};
          dayRows.forEach(r=>{const k=r.staff_id||'_clinic';if(!byStaff[k])byStaff[k]={revenue:0,revByLoc:{}};byStaff[k].revenue+=(parseFloat(r.revenue)||0);Object.entries(r.revByLoc||{}).forEach(([l,v])=>byStaff[k].revByLoc[l]=(byStaff[k].revByLoc[l]||0)+v);});
          Object.keys(byStaff).forEach(k=>{byStaff[k].revenue=Math.round(byStaff[k].revenue*100)/100;Object.keys(byStaff[k].revByLoc).forEach(l=>byStaff[k].revByLoc[l]=Math.round(byStaff[k].revByLoc[l]*100)/100);});
          totalPractitioners=Math.max(totalPractitioners,Object.keys(byStaff).filter(k=>k!=='_clinic').length);
          totalMatched=Math.max(totalMatched,Object.keys(byStaff).filter(k=>k!=='_clinic').length);
          monthsCreated.push(month);
          const mapRow=(sid)=>{const isClin=sid==='_clinic';const nm=isClin?'_clinic':((staff.find(x=>x.id===sid)||{}).name||sid);return{name:nm,staffId:isClin?null:sid,matchedName:isClin?null:nm,revenue:byStaff[sid].revenue,revByLoc:byStaff[sid].revByLoc};};
          const idx=newSnapshots.findIndex(s=>s.date&&s.date.startsWith(month));
          if(idx>=0){
            const rows2=[...newSnapshots[idx].rows];
            Object.keys(byStaff).forEach(sid=>{const rIdx=sid==='_clinic'?rows2.findIndex(r=>r.name==='_clinic'):rows2.findIndex(r=>r.staffId===sid);if(rIdx>=0)rows2[rIdx]={...rows2[rIdx],revenue:byStaff[sid].revenue,revByLoc:byStaff[sid].revByLoc};else rows2.push(mapRow(sid));});
            newSnapshots[idx]={...newSnapshots[idx],rows:rows2,files:[...(newSnapshots[idx].files||[]),file.name].filter((v,i,a)=>a.indexOf(v)===i)};
          }else{
            newSnapshots.push({id:'snap_'+month+'_sales',date:month+'-01',rows:Object.keys(byStaff).map(mapRow),files:[file.name],type:'sales'});
          }
        });
      }else if(type==='shift'){
        const newDailyShift=parseDailyShift(rows);
        if(newDailyShift.length>0){
          // Dated per-day rows → per-day store keyed by staff+date. Weekly uploads stack;
          // re-importing the same days overwrites just those days (no double-count). The month
          // utilization is DERIVED by summing hours across all stored days and recomputing %.
          const existing=new Map(dailyShiftRef.current.map(r=>[r.id,r]));
          newDailyShift.forEach(r=>existing.set(r.id,r));
          const merged=[...existing.values()];
          setDailyShift(merged);dailyShiftRef.current=merged;
          try{localStorage.setItem('rvgd3_daily_shift',JSON.stringify(merged));}catch(e){}
          try{const SB=window.__SB;if(SB)await SB.from('shift_daily').upsert({id:'singleton',data:merged});}catch(e){}
          const months=Array.from(new Set(newDailyShift.map(r=>(r.date||'').slice(0,7)).filter(m=>m.length===7)));
          months.forEach(month=>{
            const dayRows=merged.filter(r=>(r.date||'').slice(0,7)===month);
            const byStaff={};
            dayRows.forEach(r=>{const k=r.staff_id;if(!byStaff[k])byStaff[k]={apptHrs:0,shiftHrs:0,apptCount:0};byStaff[k].apptHrs+=(r.apptHrs||0);byStaff[k].shiftHrs+=(r.shiftHrs||0);byStaff[k].apptCount+=(r.apptCount||0);});
            const parsed=Object.keys(byStaff).map(sid=>{const v=byStaff[sid];const nm=(staff.find(x=>x.id===sid)||{}).name||sid;return{name:nm,staffId:sid,matchedName:nm,appointmentHours:Math.round(v.apptHrs*100)/100,shiftHours:Math.round(v.shiftHrs*100)/100,appointments:v.apptCount,utilization:v.shiftHrs>0?Math.round(v.apptHrs/v.shiftHrs*100):null};});
            totalPractitioners=Math.max(totalPractitioners,parsed.length);totalMatched=Math.max(totalMatched,parsed.length);monthsCreated.push(month);
            const existingIdx=newSnapshots.findIndex(s=>s.date&&s.date.startsWith(month)&&s.type==='shift');
            if(existingIdx>=0)newSnapshots[existingIdx]={...newSnapshots[existingIdx],rows:parsed,files:[...(newSnapshots[existingIdx].files||[]),file.name].filter((v,i,a)=>a.indexOf(v)===i)};
            else newSnapshots.push({id:'snap_shift_'+month,date:month+'-01',rows:parsed,files:[file.name],type:'shift'});
          });
        }else{
          // Undated summary (no per-row date) → can't dedupe weeks, so replace the picked month.
          const {byMonth:shiftByMonth}=parseShiftByMonth(rows);

          if(existingIdx>=0)newSnapshots[existingIdx]={...newSnapshots[existingIdx],rows:parsed,files:[...(newSnapshots[existingIdx].files||[]),file.name]};

          await saveSnapshot(snap);
        }
      }else{sbOk=false;}

      const uniqMonths=[...new Set(monthsCreated)].sort();
      const monthNames=uniqMonths.map(m=>new Date(m+'-15').toLocaleDateString('en-CA',{month:'short',year:'numeric'}));
      const totalIA=newSnapshots.flatMap(s=>s.rows||[]).reduce((a,r)=>a+(parseFloat(r.initialAssessments)||0),0);
      let msg=`✓ ${type} report auto-split into ${uniqMonths.length} monthly snapshot${uniqMonths.length!==1?'s':''}: ${monthNames.join(', ')}. ${totalPractitioners} practitioners, ${totalMatched} matched.${totalIA>0?` ${totalIA} initial assessments detected.`:''}`;
      if(!sbOk)msg+=` (Saved locally — Supabase unavailable)`;
      else msg+=` Saved to Supabase ✓`;
      if(type==='sales'){
        if(window.__dailyRevErr)msg+=` ⚠ Daily revenue did NOT sync (${window.__dailyRevErr}) — weekly & custom-range revenue won't update until this is resolved.`;
        else if(window.__dailyRevCount)msg+=` Daily revenue synced (${window.__dailyRevCount} day-rows) — weekly & custom-range revenue will now populate${window.__revLocUnsynced?'. Note: per-location split not stored — add the "revByLoc" column to daily_revenue to enable it':''}.`;

    }catch(e){setImportMsg({type:'error',msg:'Error: '+e.message});}
    setImporting(false);
  };

  const reprocessAll=async()=>{
    if(!sourceFiles.length){setImportMsg({type:'error',msg:'No stored files yet. Upload each report once and they’re saved here for re-processing.'});return;}
    setImporting(true);
    const ordered=[...sourceFiles].sort((a,b)=>(a.at||'').localeCompare(b.at||''));
    let i=0;
    for(const f of ordered){
      setImportMsg({type:'info',msg:`Re-processing ${f.name} (${++i}/${ordered.length})…`});
      try{await handleFile({name:f.name,text:async()=>f.content},{reprocess:true,month:f.month});}
      catch(e){console.warn('reprocess failed:',f.name,e);}
    }
    setImporting(false);
    setImportMsg({type:'success',msg:`✓ Re-processed ${ordered.length} stored file${ordered.length!==1?'s':''} with the current version — no re-upload needed.`});
  };

  /* ── Period helpers ─────────────────────────── */
  const allSnapDates=useMemo(()=>[...new Set(data.snapshots.map(s=>s.date))].sort(),[data.snapshots]);

  // Get available months/quarters/years from snapshot dates
  const availMonths=useMemo(()=>[...new Set(allSnapDates.map(d=>d.slice(0,7)))].sort(),[allSnapDates]);
  const availQuarters=useMemo(()=>[...new Set(allSnapDates.map(d=>{const [y,m]=d.split('-');const q=Math.ceil(parseInt(m)/3);return`${y}-Q${q}`;}))].sort(),[allSnapDates]);
  const availYears=useMemo(()=>[...new Set(allSnapDates.map(d=>d.slice(0,4)))].sort(),[allSnapDates]);

  // Filter snapshots by period
  const fmtPeriodLabel=(p)=>{
    if(!p||p==='all')return'All Time';
    if(p.includes('-Q')){const[y,q]=p.split('-Q');return 'Q'+q+' '+y;}
    if(p.length===7)return new Date(p+'-15').toLocaleDateString('en-CA',{month:'long',year:'numeric'});
    if(p.length===4)return p+' (Full Year)';
    return p;
  };
  const filterSnaps=(filter)=>{
    if(!filter||filter==='all')return data.snapshots;
    if(filter.includes('-Q')){
      const[y,q]=filter.split('-Q');
      return data.snapshots.filter(s=>{
        const[sy,sm]=s.date.split('-');
        return sy===y&&Math.ceil(parseInt(sm)/3)===parseInt(q);
      });
    }
    if(filter.length===7)return data.snapshots.filter(s=>s.date.startsWith(filter)); // YYYY-MM
    if(filter.length===4)return data.snapshots.filter(s=>s.date.startsWith(filter)); // YYYY
    return data.snapshots;
  };

  // Aggregate rows across multiple snapshots for a period
  // For appointments: sum across snapshots. For utilization/revenue: use latest in period.
  const aggregateRows=(snaps)=>{
    if(!snaps.length)return[];
    const byStaff={};
    snaps.forEach(snap=>{
      const isShift=snap.type==='shift';
      (snap.rows||[]).forEach(r=>{
        if(!r.staffId)return;
        if(!byStaff[r.staffId])byStaff[r.staffId]={staffId:r.staffId,name:r.name,completed:0,noShows:0,cancellations:0,rescheduled:0,revenue:0,revByLoc:{},utilization:null,utilizationCount:0,appointments:0,initialAssessments:0};
        const b=byStaff[r.staffId];
        if(!isShift){
          if(r.completed)b.completed+=(parseFloat(r.completed)||0);
          if(r.noShows)b.noShows+=(parseFloat(r.noShows)||0);
          if(r.cancellations)b.cancellations+=(parseFloat(r.cancellations)||0);
          if(r.rescheduled)b.rescheduled+=(parseFloat(r.rescheduled)||0);
          if(r.revenue)b.revenue+=(parseFloat(r.revenue)||0);
          if(r.revByLoc)Object.entries(r.revByLoc).forEach(([loc,v])=>{b.revByLoc[loc]=(b.revByLoc[loc]||0)+(parseFloat(v)||0);});
          if(r.appointments)b.appointments+=(parseFloat(r.appointments)||0);
          if(r.initialAssessments)b.initialAssessments+=(parseFloat(r.initialAssessments)||0);
        }
        // Average utilization across months rather than summing
        if(r.utilization!=null){
          b.utilization=(b.utilization||0)+(parseFloat(r.utilization)||0);
          b.utilizationCount++;
        }
      });
    });
    return Object.values(byStaff).map(r=>({
      ...r,
      revenue:Math.round(r.revenue*100)/100,
      revByLoc:Object.fromEntries(Object.entries(r.revByLoc||{}).map(([k,v])=>[k,Math.round(v*100)/100])),
      // Average the utilization across however many shift snapshots exist
      utilization:r.utilizationCount>0?Math.round(r.utilization/r.utilizationCount):null,
    }));
  };

  // Active filtered rows
  const filteredSnaps=useMemo(()=>data.snapshots.filter(s=>{
    const m=s.date.slice(0,7);
    return(!dateFrom||m>=dateFrom)&&(!dateTo||m<=dateTo);
  }),[data.snapshots,dateFrom,dateTo]);
  const filteredRows=useMemo(()=>{
    if(usingCustomRange&&hasDailyData)return aggregateDaily(customFrom,customTo);
    return aggregateRows(filteredSnaps);
  },[filteredSnaps,usingCustomRange,hasDailyData,customFrom,customTo,dailyAppts,dailyRevenue]);

  // Compare mode rows
  const compareARows=useMemo(()=>aggregateRows(filterSnaps(compareA)),[data.snapshots,compareA]);
  const compareBRows=useMemo(()=>aggregateRows(filterSnaps(compareB)),[data.snapshots,compareB]);

  /* ── Merged staff with period-filtered data ── */
  const mergedStaff=useMemo(()=>
    staff.filter(s=>s.discipline!=='mgmt'&&s.discipline!=='ops'&&s.discipline!=='edu'
      &&(filterDisc==='all'||s.discipline===filterDisc)
      &&siteMatch(s,filterSite)
    ).map(s=>{
      const jr=filteredRows.find(r=>r.staffId===s.id);
      const gvaVal=parseFloat(gvaEdits[s.id]!==undefined?gvaEdits[s.id]:data.gva[s.id])||null;
      const retVal=data.retention?.[s.id]||null;
      return{...s,
        completed:jr?.completed||null,utilization:jr?.utilization||null,
        appointments:jr?.appointments||null,noShows:jr?.noShows||null,
        cancellations:jr?.cancellations||null,rescheduled:jr?.rescheduled||null,
        revenue:jr?(filterSite&&filterSite!=='all'?revForSite(jr,filterSite):(jr.revenue||null)):null,initialAssessments:jr?.initialAssessments||null,
        gva:gvaVal,retention:retVal};
    })
  ,[staff,filteredRows,data.gva,data.retention,gvaEdits,filterDisc,filterSite]);

  const withUtil  =mergedStaff.filter(s=>s.utilization!=null).sort((a,b)=>b.utilization-a.utilization);
  const withAppts =mergedStaff.filter(s=>s.completed!=null).sort((a,b)=>b.completed-a.completed);
  const withGva   =mergedStaff.filter(s=>s.gva!=null).sort((a,b)=>b.gva-a.gva);
  const withRet   =mergedStaff.filter(s=>s.retention!=null).sort((a,b)=>b.retention-a.retention);
  const withRev   =mergedStaff.filter(s=>s.revenue!=null).sort((a,b)=>b.revenue-a.revenue);
  const maxUtil=100,maxAppts=withAppts[0]?.completed||1,maxGva=Math.max(...withGva.map(s=>s.gva),1),maxRev=withRev[0]?.revenue||1;

  const avgUtil=withUtil.length?Math.round(withUtil.reduce((a,s)=>a+s.utilization,0)/withUtil.length):null;
  // Per-site rollup for the headline cards (Mississauga vs Markham). Activity by home site.
  const locSites=useMemo(()=>{const m={};mergedStaff.forEach(s=>{const site=siteList(s)[0];if(!site)return;m[site]=m[site]||{visits:0,ias:0,util:0,utilN:0};m[site].visits+=(s.completed||0);m[site].ias+=(s.initialAssessments||0);if(s.utilization!=null){m[site].util+=s.utilization;m[site].utilN++;}});return m;},[mergedStaff]);
  const LOC_C={Mississauga:'#CAE8C1',Markham:'#7FC8E8',Toronto:'#F4DB71',Ajax:'#E0A052',Oakville:'#BB99FF'};
  const locSplitEl=(getter,fmt)=>{const ks=Object.keys(locSites).sort((a,b)=>(locSites[b].visits||0)-(locSites[a].visits||0));if(ks.length<2)return null;return(<div style={{fontSize:11,color:'#999',marginTop:5,display:'flex',gap:10,flexWrap:'wrap'}}>{ks.map(k=>(<span key={k} style={{whiteSpace:'nowrap'}}><span style={{color:LOC_C[k]||'#bbb'}}>●</span> {k} <b style={{color:'#ddd'}}>{fmt(getter(locSites[k]))}</b></span>))}</div>);};
  const avgGva=withGva.length?Math.round(withGva.reduce((a,s)=>a+(s.gva||0),0)/withGva.length*10)/10:null;
  // True only once a Sales file has been (re)imported with the per-location split.
  const hasLocRevenue=useMemo(()=>data.snapshots.some(s=>(s.rows||[]).some(r=>r.revByLoc&&Object.keys(r.revByLoc).length))||dailyRevenue.some(r=>r.revByLoc&&Object.keys(r.revByLoc).length),[data.snapshots,dailyRevenue]);
  const locRevNote=(<div style={{background:'rgba(244,219,113,.08)',border:'1px solid rgba(244,219,113,.3)',borderRadius:7,padding:'10px 14px',marginBottom:12,fontSize:13.5,color:'#e8d48a',lineHeight:1.5}}>⚠ Revenue can't be split by location until you re-import the Sales CSV — the per-location detail is read at import time and your saved data predates it. <b>Go to Jane Import and drop the Sales file once</b>; per-site revenue then fills in here. Visits, IAs, no-shows and cancels are unaffected.</div>);
  const totalCompleted=withAppts.reduce((a,s)=>a+(s.completed||0),0);
  const totalInitialAssessments=withAppts.reduce((a,s)=>a+(s.initialAssessments||0),0);
  const totalRev=withRev.reduce((a,s)=>a+(s.revenue||0),0);

  const fmtRev=(v)=>v>=1000?'$'+(v/1000).toFixed(1)+'k':'$'+Math.round(v);
  const pctDiff=(a,b)=>b&&a?Math.round(((a-b)/b)*100):null;

  const getTrend=(sId,metric)=>data.snapshots.map(snap=>{
    const r=snap.rows?.find(r=>r.staffId===sId);
    return{date:snap.date,val:r?parseFloat(r[metric])||null:null};
  }).filter(d=>d.val!=null);

  const saveGVA=async()=>{
    const ng={...data.gva};
    const entries=Object.entries(gvaEdits);
    entries.forEach(([k,v])=>{if(v!=='')ng[k]=parseFloat(v)||0;});
    save({...data,gva:ng});
    // Save to Supabase
    for(const[staffId,val] of entries){
      if(val!=='')await saveGVAToSB(staffId,parseFloat(val)||0,'management');
    }
    setGvaEdits({});setGvaSaved(true);
    setTimeout(()=>setGvaSaved(false),2000);
  };

  const BarRow=({s,val,max,color,sub,metric})=>{
    // Show change vs previous period instead of sparkline
    const trend=getTrend(s.id,metric);
    let delta=null;
    if(trend.length>=2){
      const prev=trend[trend.length-2].val;
      const curr=trend[trend.length-1].val;
      if(prev&&curr)delta=Math.round(((curr-prev)/prev)*100);
    }
    // Don't show delta if current period is May (partial month) vs full month
    const latestDate=trend[trend.length-1]?.date||'';
    const prevDate=trend[trend.length-2]?.date||'';
    const latestIsPartial=latestDate.startsWith('2026-05'); // May is partial
    const showDelta=delta!==null&&!latestIsPartial;
    return(
      <div className="perf-bar-row" style={{cursor:'pointer'}} onClick={()=>{setTrendStaff(s);setTab('trends');}}>
        <div className="perf-bar-name">{s.name.split(' ')[0]} {s.name.split(' ').slice(-1)[0]}</div>
        <div className="perf-bar-track"><div className="perf-bar-fill" style={{width:Math.min(100,(val/max)*100)+'%',background:color}}/></div>
        <div className="flex aic g8">
          <div className="perf-bar-val" style={{color}}>{sub||val}</div>
          {showDelta&&<span style={{fontSize:15,fontWeight:700,color:delta>=0?'#44CCAA':'#E05252',opacity:0.8}}>{delta>=0?'▲':'▼'}{Math.abs(delta)}%</span>}
        </div>
      </div>
    );
  };

  if(loading)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:60,gap:12,color:'#777'}}>
      <div style={{width:16,height:16,border:'2px solid var(--border2)',borderTopColor:'var(--go)',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
      Loading performance data…
    </div>
  );

  // ══════════════ WEEKLY / MONTHLY REPORT ══════════════
  const _wkStart=(ds)=>{const d=new Date(ds+'T12:00');const day=d.getDay();const diff=d.getDate()-(day===0?6:day-1);return new Date(d.getFullYear(),d.getMonth(),diff).toISOString().slice(0,10);};
  const _addDays=(ds,n)=>{const d=new Date(ds+'T12:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
  const _fmtD=(ds)=>new Date(ds+'T12:00').toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});
  const _fmtMonth=(ds)=>new Date(ds+'T12:00').toLocaleDateString('en-CA',{month:'long',year:'numeric'});
  const fmtMoney=(n)=>'$'+Math.round(n||0).toLocaleString();
  const DISC_CLIN=DISC.filter(d=>!['mgmt','ops','edu'].includes(d.id));

  const reportPeriod=(()=>{
    const maxD=dailyDateRange.max||new Date().toISOString().slice(0,10);
    const anchor=reportAnchor||maxD;
    if(reportType==='month'){
      const d=new Date(anchor+'T12:00');
      const from=new Date(d.getFullYear(),d.getMonth(),1).toISOString().slice(0,10);
      const to=new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().slice(0,10);
      const pfrom=new Date(d.getFullYear(),d.getMonth()-1,1).toISOString().slice(0,10);
      const pto=new Date(d.getFullYear(),d.getMonth(),0).toISOString().slice(0,10);
      return{from,to,label:_fmtMonth(from),prevFrom:pfrom,prevTo:pto,prevLabel:_fmtMonth(pfrom)};
    }
    if(reportType==='quarter'){
      const d=new Date(anchor+'T12:00');
      const qs=Math.floor(d.getMonth()/3)*3; // quarter start month (0,3,6,9)
      const from=new Date(d.getFullYear(),qs,1).toISOString().slice(0,10);
      const to=new Date(d.getFullYear(),qs+3,0).toISOString().slice(0,10);
      const pfrom=new Date(d.getFullYear(),qs-3,1).toISOString().slice(0,10);
      const pto=new Date(d.getFullYear(),qs,0).toISOString().slice(0,10);
      const qLbl=(ds)=>{const x=new Date(ds+'T12:00');return `Q${Math.floor(x.getMonth()/3)+1} ${x.getFullYear()}`;};
      const qRange=(ds)=>{const x=new Date(ds+'T12:00');const a=x.toLocaleDateString('en-CA',{month:'short'});const b=new Date(x.getFullYear(),x.getMonth()+2,1).toLocaleDateString('en-CA',{month:'short'});return `${a}–${b}`;};
      return{from,to,label:`${qLbl(from)} (${qRange(from)})`,prevFrom:pfrom,prevTo:pto,prevLabel:qLbl(pfrom)};
    }
    const from=_wkStart(anchor),to=_addDays(from,6);
    const pfrom=_addDays(from,-7),pto=_addDays(from,-1);
    return{from,to,label:`${_fmtD(from)} – ${_fmtD(to)}`,prevFrom:pfrom,prevTo:pto,prevLabel:`${_fmtD(pfrom)} – ${_fmtD(pto)}`};
  })();

  const reportAgg=(from,to)=>{
    const byStaff={};
    const touch=(id)=>{const s=staff.find(x=>x.id===id);if(!s||['mgmt','ops','edu'].includes(s.discipline))return null;if(!byStaff[id])byStaff[id]={id,name:s.name,disc:s.discipline,site:s.site||'—',visits:0,ias:0,noShows:0,cancels:0,revenue:0,revByLoc:{}};return byStaff[id];};
    dailyAppts.forEach(r=>{if(r.date<from||r.date>to)return;const b=touch(r.staff_id);if(!b)return;b.visits+=(r.completed||0);b.ias+=(r.initial_assessments||0);b.noShows+=(r.no_shows||0);b.cancels+=(r.cancellations||0);});
    let otherRev=0,revRows=0;
    dailyRevenue.forEach(r=>{if(r.date<from||r.date>to)return;revRows++;const b=touch(r.staff_id);if(!b){otherRev+=(r.revenue||0);return;}b.revenue+=(r.revenue||0);if(r.revByLoc)Object.entries(r.revByLoc).forEach(([loc,v])=>{b.revByLoc[loc]=(b.revByLoc[loc]||0)+(v||0);});});
    const list=Object.values(byStaff);
    const totals=list.reduce((a,b)=>({revenue:a.revenue+b.revenue,visits:a.visits+b.visits,ias:a.ias+b.ias,noShows:a.noShows+b.noShows,cancels:a.cancels+b.cancels}),{revenue:0,visits:0,ias:0,noShows:0,cancels:0});
    totals.revenue=Math.round((totals.revenue+otherRev)*100)/100; // include front-desk / retail / unmatched so the total matches the books
    const byDisc={};DISC_CLIN.forEach(d=>{const rows=list.filter(x=>x.disc===d.id);if(rows.length)byDisc[d.id]={label:d.label,abbr:d.abbr,revenue:rows.reduce((a,b)=>a+b.revenue,0),visits:rows.reduce((a,b)=>a+b.visits,0),ias:rows.reduce((a,b)=>a+b.ias,0)};});
    // Location split: revenue follows the actual transaction location (revByLoc); visits/IAs
    // follow the practitioner's home site (appointment data carries no location).
    const byLoc={};const bump=(k,f,v)=>{const key=k||'—';if(!byLoc[key])byLoc[key]={revenue:0,visits:0,ias:0};byLoc[key][f]+=v;};
    list.forEach(x=>{
      const rbl=x.revByLoc||{};
      if(Object.keys(rbl).length)Object.entries(rbl).forEach(([loc,v])=>bump(loc,'revenue',v));
      else bump(siteList(x)[0]||x.site,'revenue',x.revenue);
      const hs=siteList(x)[0]||x.site;bump(hs,'visits',x.visits);bump(hs,'ias',x.ias);
    });
    Object.values(byLoc).forEach(o=>{o.revenue=Math.round(o.revenue*100)/100;});
    return{totals,byDisc,byLoc,perStaff:list,otherRev:Math.round(otherRev*100)/100,hasRev:revRows>0};
  };

  const computeMovers=(cur,prev)=>{
    const pm={};prev.perStaff.forEach(p=>pm[p.id]=p);
    const out=[];
    cur.perStaff.forEach(c=>{
      const p=pm[c.id]||{visits:0,revenue:0,ias:0};
      const dv=c.visits-p.visits,dr=c.revenue-p.revenue,di=c.ias-p.ias;
      const vpct=p.visits>0?dv/p.visits*100:(c.visits>0?100:0);
      const rpct=p.revenue>0?dr/p.revenue*100:(c.revenue>0?100:0);
      const ipct=p.ias>0?di/p.ias*100:(c.ias>0?100:0);
      const sigV=Math.abs(dv)>=3&&Math.abs(vpct)>=25;
      const sigR=Math.abs(dr)>=300&&Math.abs(rpct)>=20;
      const sigI=Math.abs(di)>=2&&Math.abs(ipct)>=30;
      if(sigV||sigR||sigI)out.push({name:c.name,disc:c.disc,dv,dr,di,vpct,rpct,ipct,sigV,sigR,sigI,score:Math.abs(dr)+Math.abs(dv)*60+Math.abs(di)*120});
    });
    return out.sort((a,b)=>b.score-a.score).slice(0,10);
  };

  const buildReport=()=>{const cur=reportAgg(reportPeriod.from,reportPeriod.to);const prev=reportAgg(reportPeriod.prevFrom,reportPeriod.prevTo);return{cur,prev,movers:computeMovers(cur,prev)};};

  // Auto-generated red flags, gaps, and wins to drive 1:1 / action-planning dialogue
  const buildInsights=(cur,prev,pWord)=>{
    const per='vs prior '+pWord;
    const lastP='last '+pWord;
    const longPeriod=(pWord==='month'||pWord==='quarter');
    const SPEC_LABEL=Object.fromEntries(SPECIALIZATIONS.map(s=>[s.id,s.label]));
    const ret=(id)=>{const v=(data.retention||{})[id];if(v==null)return null;const n=typeof v==='number'?v:parseFloat(v);return isNaN(n)?null:n;};
    const specLabel=(id)=>{const s=staff.find(x=>x.id===id);const sp=(s&&s.specializations)||[];const hi=sp.map(x=>SPEC_LABEL[x]).filter(Boolean);return hi.length?hi[0]:null;};
    const med=(arr)=>{if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;};
    const pm={};prev.perStaff.forEach(p=>pm[p.id]=p);
    const flags=[],gaps=[],wins=[];
    const sched=(x)=>x.visits+x.noShows+x.cancels;
    const cT=cur.totals,pT=prev.totals;
    const cSched=cT.visits+cT.noShows+cT.cancels;
    const clinicNoShow=cSched>0?cT.noShows/cSched*100:0;
    const pSched=pT.visits+pT.noShows+pT.cancels;
    const prevNoShow=pSched>0?pT.noShows/pSched*100:0;
    const clinAvgRpv=cT.visits>0?cT.revenue/cT.visits:0;
    const active=cur.perStaff.filter(x=>x.visits>0||x.revenue>0);
    const medRev=med(active.map(x=>x.revenue));
    const medIA=med(active.map(x=>x.ias));
    // ── Clinic-level flags ──
    if(pT.revenue>0&&cur.hasRev){const dr=(cT.revenue-pT.revenue)/pT.revenue*100;
      if(dr<=-15)flags.push({sev:'high',title:`Clinic revenue down ${Math.abs(dr).toFixed(0)}% ${per}`,detail:`${fmtMoney(cT.revenue)} this period vs ${fmtMoney(pT.revenue)} prior.`,action:'Pinpoint which disciplines/practitioners drove it (see movers) and rule out a holiday or missing-import artifact.',score:8000});
      else if(dr<=-10)flags.push({sev:'med',title:`Clinic revenue down ${Math.abs(dr).toFixed(0)}% ${per}`,detail:`${fmtMoney(cT.revenue)} vs ${fmtMoney(pT.revenue)}.`,action:'Watch into next period; check schedule fill across the team.',score:4000});}
    if(clinicNoShow>=12){const lost=Math.round(cT.noShows*clinAvgRpv);flags.push({sev:clinicNoShow>=18?'high':'med',title:`Clinic no-show rate ${clinicNoShow.toFixed(0)}%`,detail:`${cT.noShows} no-shows of ~${cSched} booked${pSched?` (was ${prevNoShow.toFixed(0)}%)`:''}${lost>0?` · ~${fmtMoney(lost)} of lost capacity`:''}.`,action:'Tighten confirmations (48h + day-of) and revisit deposit / late-cancel policy.',score:5000});}
    if(pT.ias>0){const di=(cT.ias-pT.ias)/pT.ias*100;if(di<=-30)flags.push({sev:'med',title:`New-patient (IA) volume down ${Math.abs(di).toFixed(0)}% ${per}`,detail:`${cT.ias} initial assessments vs ${pT.ias} prior.`,action:'Pipeline gap — review lead follow-up, online-booking availability, and marketing spend.',score:4500});}
    if(active.length>=4&&cT.revenue>0){const top=[...active].sort((a,b)=>b.revenue-a.revenue)[0];const share=top.revenue/cT.revenue*100;if(share>=40)flags.push({sev:'med',title:`Revenue concentration: ${top.name} = ${share.toFixed(0)}% of revenue`,detail:`${fmtMoney(top.revenue)} of ${fmtMoney(cT.revenue)} came from one practitioner.`,action:'Key-person risk — build depth in this service line and protect their schedule.',score:3000});}
    // ── Per-practitioner ──
    active.forEach(c=>{
      const p=pm[c.id]||{visits:0,revenue:0,noShows:0,cancels:0,ias:0};
      const cs=sched(c);const nsr=cs>0?c.noShows/cs*100:0;const csr=cs>0?c.cancels/cs*100:0;
      const rpv=c.visits>0?c.revenue/c.visits:0;const first=c.name.split(' ')[0];
      const r=ret(c.id);const sp=specLabel(c.id);const spTxt=sp?` (${sp})`:'';
      if(p.visits>=5&&c.visits===0)flags.push({sev:'high',title:`${c.name}: no completed visits`,detail:`Had ${p.visits} ${lastP}; zero this period.`,action:`Confirm ${first}'s availability — leave, data gap, or a real stop?`,score:9000});
      else if(c.noShows>=3&&nsr>=15){const lost=Math.round(c.noShows*(rpv||clinAvgRpv));flags.push({sev:nsr>=25?'high':'med',title:`${c.name}: ${c.noShows} no-shows (${nsr.toFixed(0)}% of booked)`,detail:`${c.visits} completed · ${c.noShows} no-shows${lost>0?` · ~${fmtMoney(lost)} lost`:''}.`,action:`Review ${first}'s reminder/confirmation flow and no-show rebooking.`,score:2000+c.noShows*50});}
      if(medRev>0&&c.revenue<medRev*0.5&&c.visits>=3)flags.push({sev:'med',title:`${c.name}: low revenue (${fmtMoney(c.revenue)})`,detail:`Below half the team median (${fmtMoney(medRev)}) on ${c.visits} visits.`,action:`Capacity available — review ${first}'s schedule fill, service mix, and new-patient flow.`,score:1500+(medRev-c.revenue)});
      if(c.cancels>=4&&csr>=15)gaps.push({title:`${c.name}: ${c.cancels} cancellations (${csr.toFixed(0)}%)`,detail:'High cancel rate is eroding bookable capacity.',action:'Check booking lead-time and whether cancelled slots get backfilled.',score:c.cancels*80});
      if(c.visits>=5&&clinAvgRpv>0&&rpv<clinAvgRpv*0.6)gaps.push({title:`${c.name}: ${fmtMoney(rpv)}/visit (clinic ${fmtMoney(clinAvgRpv)})`,detail:'Revenue per visit well below the clinic average.',action:`Treatment-plan, rebooking, and service-mix conversation with ${first}.`,score:(clinAvgRpv-rpv)*c.visits});
      if(r!=null&&r>=80&&c.ias<=Math.max(1,medIA)&&c.visits>=5)gaps.push({title:`${c.name}${spTxt}: ${r.toFixed(0)}% retention but only ${c.ias} new initials`,detail:'Strong retainer who isn’t getting enough new patients.',action:`Route more new-patient bookings to ${first} — they keep who they get.`,score:r*10+(medIA-c.ias)*30});
      else if(rpv>=clinAvgRpv*1.15&&clinAvgRpv>0&&c.ias<=Math.max(1,medIA)&&c.visits>=4)gaps.push({title:`${c.name}${spTxt}: ${fmtMoney(rpv)}/visit but only ${c.ias} initials`,detail:'High revenue-per-visit — strong return on every new patient sent here.',action:`Prioritise new-patient acquisition into ${first}'s service${sp?' ('+sp+')':''}.`,score:(rpv-clinAvgRpv)*8+(medIA-c.ias)*20});
      if(longPeriod&&c.visits>=8&&c.ias===0)gaps.push({title:`${c.name}: no new patients this ${pWord}`,detail:`${c.visits} visits but 0 initial assessments — all repeat work.`,action:`Is ${first} open to new-patient bookings? Adjust online availability if so.`,score:c.visits*5});
      const dr=c.revenue-p.revenue,dv=c.visits-p.visits;
      if(dr>=500&&(p.revenue===0||dr/p.revenue>=0.2))wins.push({title:`${c.name}: revenue up ${fmtMoney(dr)}`,detail:`${fmtMoney(p.revenue)} → ${fmtMoney(c.revenue)}.`,score:dr});
      else if(dv>=4)wins.push({title:`${c.name}: +${dv} visits`,detail:`${p.visits} → ${c.visits} completed.`,score:dv*100});
    });
    if(cT.visits>=20){const ratio=cT.ias/cT.visits*100;if(ratio<8)gaps.push({title:`New-patient mix only ${ratio.toFixed(0)}%`,detail:`${cT.ias} initials across ${cT.visits} visits — growth is leaning on the existing base.`,action:'Acquisition push — referrals, online booking, marketing; protect new-patient slots.',score:6000});}
    if(pSched>0&&prevNoShow-clinicNoShow>=3)wins.push({title:'No-show rate improving',detail:`${prevNoShow.toFixed(0)}% → ${clinicNoShow.toFixed(0)}% clinic-wide.`,score:8000});
    const retainers=active.filter(c=>{const r=ret(c.id);return r!=null&&r>=90&&c.visits>=5;}).sort((a,b)=>ret(b.id)-ret(a.id));
    if(retainers.length)wins.push({title:`${retainers[0].name}: ${ret(retainers[0].id).toFixed(0)}% retention`,detail:'Top retention on the team — model the rebooking habit.',score:7000});
    flags.sort((a,b)=>((b.sev==='high')-(a.sev==='high'))||((b.score||0)-(a.score||0)));
    gaps.sort((a,b)=>b.score-a.score);
    wins.sort((a,b)=>b.score-a.score);
    return{flags:flags.slice(0,8),gaps:gaps.slice(0,7),wins:wins.slice(0,5),clinicNoShow};

  const navPeriod=(dir)=>{
    const a=reportAnchor||dailyDateRange.max||new Date().toISOString().slice(0,10);
    if(reportType==='month'){const d=new Date(a+'T12:00');d.setMonth(d.getMonth()+dir);setReportAnchor(d.toISOString().slice(0,10));}

    else setReportAnchor(_addDays(_wkStart(a),dir*7));
    setViewingSaved(null);
  };
  const saveCurrentReport=()=>{
    const{cur,prev,movers}=buildReport();
    const rec={id:'rep_'+Date.now(),type:reportType,from:reportPeriod.from,to:reportPeriod.to,label:reportPeriod.label,prevLabel:reportPeriod.prevLabel,generatedAt:new Date().toISOString(),notes:reportNotes,cur,prev,movers};
    const next=[rec,...savedReports];setSavedReports(next);try{localStorage.setItem('rvgd3_reports',JSON.stringify(next));}catch(e){}
    setReportNotes('');setViewingSaved(rec.id);

  const deleteSavedReport=(id)=>{const next=savedReports.filter(r=>r.id!==id);setSavedReports(next);try{localStorage.setItem('rvgd3_reports',JSON.stringify(next));}catch(e){}if(viewingSaved===id)setViewingSaved(null);};

  if(page==='reports'){
    const saved=viewingSaved?savedReports.find(r=>r.id===viewingSaved):null;
    const built=saved?{cur:saved.cur,prev:saved.prev,movers:saved.movers}:buildReport();
    const scopeLoc=(agg,loc)=>{
      if(!agg||loc==='all')return agg;
      const ps=agg.perStaff.map(x=>{const home=(siteList(x)[0]||x.site);const hasRBL=x.revByLoc&&Object.keys(x.revByLoc).length;const locRev=hasRBL?(x.revByLoc[loc]||0):(home===loc?x.revenue:0);const atHome=home===loc;return {...x,revenue:Math.round(locRev*100)/100,visits:atHome?x.visits:0,ias:atHome?x.ias:0,noShows:atHome?x.noShows:0,cancels:atHome?x.cancels:0,_in:atHome||locRev>0};}).filter(x=>x._in);
      const totals=ps.reduce((a,b)=>({revenue:a.revenue+b.revenue,visits:a.visits+b.visits,ias:a.ias+b.ias,noShows:a.noShows+b.noShows,cancels:a.cancels+b.cancels}),{revenue:0,visits:0,ias:0,noShows:0,cancels:0});
      totals.revenue=Math.round(totals.revenue*100)/100;
      const byDisc={};DISC_CLIN.forEach(d=>{const rows=ps.filter(x=>x.disc===d.id);if(rows.length)byDisc[d.id]={label:d.label,abbr:d.abbr,revenue:rows.reduce((a,b)=>a+b.revenue,0),visits:rows.reduce((a,b)=>a+b.visits,0),ias:rows.reduce((a,b)=>a+b.ias,0)};});
      const byLoc={[loc]:{revenue:totals.revenue,visits:totals.visits,ias:totals.ias}};
      return {...agg,perStaff:ps,totals,byDisc,byLoc,otherRev:0,scopedLoc:loc};
    };
    const cur=scopeLoc(built.cur,repLoc),prev=scopeLoc(built.prev,repLoc),movers=computeMovers(cur,prev);
    const selfRows=(()=>{
      const pm={};prev.perStaff.forEach(p=>pm[p.id]=p);const cm={};cur.perStaff.forEach(c=>cm[c.id]=c);
      const ids=Array.from(new Set([...cur.perStaff.map(s=>s.id),...prev.perStaff.map(s=>s.id)]));
      const rows=ids.map(id=>{
        const c=cm[id]||{visits:0,revenue:0,ias:0};const p=pm[id]||{visits:0,revenue:0,ias:0};
        const ref=cm[id]||pm[id]||{};const name=ref.name||'—';const disc=ref.disc;
        const dr=c.revenue-p.revenue,di=c.ias-p.ias,dv=c.visits-p.visits;
        const rpct=p.revenue>0?dr/p.revenue*100:(c.revenue>0?100:null);
        const ipct=p.ias>0?di/p.ias*100:(c.ias>0?100:null);
        const stopped=p.visits>=5&&c.visits===0;
        const revDrop=p.revenue>=400&&dr<=-0.2*p.revenue;
        const iaDrop=p.ias>=2&&di<=-1;
        const attn=stopped||revDrop||iaDrop;
        const sev=stopped||(p.revenue>=400&&dr<=-0.4*p.revenue)||(p.ias>=3&&di<=-Math.ceil(p.ias*0.5))?'high':(attn?'med':null);
        return{id,name,disc,cRev:c.revenue,pRev:p.revenue,dr,rpct,cIa:c.ias,pIa:p.ias,di,ipct,cVis:c.visits,pVis:p.visits,dv,attn,sev,
          score:(attn?100000:0)+(sev==='high'?50000:0)+Math.abs(dr)+Math.abs(di)*250+Math.abs(dv)*40};
      });
      return rows.sort((a,b)=>b.score-a.score);
    })();
    const pLabel=saved?saved.label:reportPeriod.label;
    const pPrev=saved?saved.prevLabel:reportPeriod.prevLabel;
    const genAt=saved?saved.generatedAt:new Date().toISOString();
    const notes=saved?saved.notes:'';

    const delta=(c,p)=>{if(!p)return{pct:c>0?'100.0':'0.0',up:c>=0};const v=(c-p)/p*100;return{pct:Math.abs(v).toFixed(1),up:v>=0};};

            <button className={`btn btn-sm ${ptype==='month'?'btn-go':'btn-ghost'}`} onClick={()=>{setReportType('month');setReportAnchor(null);setViewingSaved(null);}}>Monthly</button>

            <span style={{width:1,height:22,background:'var(--border2)',margin:'0 6px'}}/>
            <button className="btn btn-ghost btn-sm" onClick={()=>navPeriod(-1)} disabled={!!saved}>← Prev</button>
            <span style={{minWidth:200,textAlign:'center',fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,color:'#ddd'}}>{pLabel}</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>navPeriod(1)} disabled={!!saved||reportPeriod.to>=(dailyDateRange.max||'9999')}>Next →</button>
            {saved&&<button className="btn btn-ghost btn-sm" onClick={()=>setViewingSaved(null)} style={{marginLeft:8}}>↩ Back to live</button>}
          </div>

          {(()=>{const locs=Array.from(new Set((staff||[]).flatMap(s=>siteList(s)).filter(x=>x&&x!=='—')));if(locs.length<2)return null;return(
          <div className="flex aic g5 no-print" style={{marginBottom:16,flexWrap:'wrap'}}>

            <button className={`btn btn-sm ${repLoc==='all'?'btn-go':'btn-ghost'}`} onClick={()=>setRepLoc('all')}>All Revibe</button>
            {locs.map(l=><button key={l} className={`btn btn-sm ${repLoc===l?'btn-go':'btn-ghost'}`} onClick={()=>setRepLoc(l)}>{l}</button>)}
            {repLoc!=='all'&&<span style={{fontSize:12,color:'#666',marginLeft:6}}>visits/assessments follow each practitioner's home site; revenue follows transaction location · unmatched/retail shown only in All Revibe</span>}
          </div>);})()}

          {!saved&&(

              style={{width:'100%',minHeight:60,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'#ddd',padding:'10px 12px',fontSize:13,marginBottom:16,fontFamily:'inherit',resize:'vertical'}}/>
          )}
        </div>

        {/* ── The report (print area) ── */}

            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:800,color:'#fff',letterSpacing:'.5px',marginTop:2}}>{pTitleWord} Performance Report <span style={{color:repLoc==='all'?'#7FC8E8':'#E0A052',fontSize:22}}>· {repLoc==='all'?'All Revibe':repLoc}</span></div>

          {!noData&&(()=>{

              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:14,marginBottom:24}}>
                <div style={{background:'rgba(224,82,82,.05)',border:'1px solid rgba(224,82,82,.25)',borderRadius:10,padding:'16px 18px'}}>
                  <div style={{...secTitle,color:'#E05252'}}>⚑ Red Flags &amp; Watch List</div>
                  {ins.flags.length?ins.flags.map((f,i)=>(
                    <div key={i} style={{marginBottom:i<ins.flags.length-1?12:0,paddingBottom:i<ins.flags.length-1?12:0,borderBottom:i<ins.flags.length-1?'1px solid rgba(255,255,255,.05)':'none'}}>
                      <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                        <span style={{fontSize:9,fontWeight:800,letterSpacing:'.5px',padding:'2px 6px',borderRadius:3,background:f.sev==='high'?'rgba(224,82,82,.18)':'rgba(224,160,82,.18)',color:f.sev==='high'?'#E05252':'#E0A052'}}>{f.sev==='high'?'HIGH':'WATCH'}</span>
                        <span style={{fontSize:14,fontWeight:700,color:'#eee'}}>{f.title}</span>
                      </div>
                      <div style={{fontSize:13,color:'#aaa',marginTop:4}}>{f.detail}</div>
                      <div style={{fontSize:13,color:'#CAE8C1',marginTop:3}}>→ {f.action}</div>

                  )):<div style={{fontSize:13,color:'#777',fontStyle:'italic'}}>No red flags this period — nothing breached the thresholds.</div>}

                <div style={{display:'flex',flexDirection:'column',gap:14}}>
                  <div style={{background:'rgba(244,219,113,.05)',border:'1px solid rgba(244,219,113,.22)',borderRadius:10,padding:'16px 18px',flex:1}}>
                    <div style={{...secTitle,color:'#F4DB71'}}>◎ Gaps &amp; Opportunities</div>
                    {ins.gaps.length?ins.gaps.map((g,i)=>(
                      <div key={i} style={{marginBottom:i<ins.gaps.length-1?11:0}}>
                        <div style={{fontSize:14,fontWeight:700,color:'#eee'}}>{g.title}</div>
                        <div style={{fontSize:13,color:'#aaa'}}>{g.detail}</div>
                        <div style={{fontSize:13,color:'#CAE8C1',marginTop:2}}>→ {g.action}</div>

                  </div>

            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800,color:'#ddd',letterSpacing:'1px',marginBottom:8}}>BY DISCIPLINE</div>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr style={{borderBottom:'1px solid var(--border)'}}><th style={thL}>Discipline</th><th style={thR}>Revenue</th><th style={thR}>Visits</th><th style={thR}>IAs</th></tr></thead>
                <tbody>
                  {Object.values(cur.byDisc).length===0?<tr><td style={tdL} colSpan="4"><span style={{color:'#666'}}>No data</span></td></tr>:
                   Object.values(cur.byDisc).sort((a,b)=>b.revenue-a.revenue).map(d=>(<tr key={d.label} style={{borderBottom:'1px solid #1e1e1e'}}><td style={tdL}>{d.label}</td><td style={tdR}>{fmtMoney(d.revenue)}</td><td style={tdR}>{d.visits}</td><td style={tdR}>{d.ias}</td></tr>))}
                </tbody>

              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800,color:'#ddd',letterSpacing:'1px',marginBottom:8}}>BY LOCATION</div>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr style={{borderBottom:'1px solid var(--border)'}}><th style={thL}>Location</th><th style={thR}>Revenue</th><th style={thR}>Visits</th><th style={thR}>IAs</th></tr></thead>
                <tbody>
                  {Object.keys(cur.byLoc).length===0?<tr><td style={tdL} colSpan="4"><span style={{color:'#666'}}>No data</span></td></tr>:
                   Object.entries(cur.byLoc).sort((a,b)=>b[1].revenue-a[1].revenue).map(([loc,v])=>(<tr key={loc} style={{borderBottom:'1px solid #1e1e1e'}}><td style={tdL}>{loc}</td><td style={tdR}>{fmtMoney(v.revenue)}</td><td style={tdR}>{v.visits}</td><td style={tdR}>{v.ias}</td></tr>))}
                </tbody>
              </table>
            </div>
          </div>

          {(()=>{const rf=(saved?saved.from:reportPeriod.from||'').slice(0,7);const rt=(saved?saved.to:reportPeriod.to||'').slice(0,7);return<SessSummary log={sessionLog} fromM={rf} toM={rt} note={rf&&rt?(rf===rt?rf:rf+'→'+rt):''}/>;})()}
          {/* Practitioner movers */}
          <div style={{marginBottom:notes?24:4}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800,color:'#ddd',letterSpacing:'1px',marginBottom:8}}>PRACTITIONER CHANGES <span style={{fontSize:12,color:'#666',fontWeight:400,letterSpacing:0}}>(moderate to significant vs prior {pWord})</span></div>
            {movers.length===0?<div style={{color:'#777',fontSize:14,padding:'6px 0'}}>No moderate-to-significant practitioner changes this period.</div>:
             movers.map((m,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #1e1e1e',gap:12,flexWrap:'wrap'}}>
                <div><span style={{color:'#eee',fontWeight:600,fontSize:14}}>{m.name}</span> <span style={{color:'#666',fontSize:12,marginLeft:4}}>{(DISC.find(x=>x.id===m.disc)||{}).abbr||''}</span></div>
                <div style={{display:'flex',gap:16,fontSize:13,flexWrap:'wrap'}}>
                  {m.sigV&&<span style={{color:m.dv>=0?'#44CCAA':'#E05252',fontWeight:600}}>{m.dv>=0?'▲':'▼'} {Math.abs(m.dv)} visits ({Math.abs(Math.round(m.vpct))}%)</span>}
                  {m.sigI&&<span style={{color:m.di>=0?'#44CCAA':'#E05252',fontWeight:600}}>{m.di>=0?'▲':'▼'} {Math.abs(m.di)} initials ({Math.abs(Math.round(m.ipct))}%)</span>}
                  {m.sigR&&<span style={{color:m.dr>=0?'#44CCAA':'#E05252',fontWeight:600}}>{m.dr>=0?'▲':'▼'} {fmtMoney(Math.abs(m.dr))} ({Math.abs(Math.round(m.rpct))}%)</span>}
                </div>
              </div>
            ))}
          </div>

          {/* Each clinician vs their OWN prior period — self-relative, accounts for different schedules */}
          {selfRows.length>0&&(()=>{
            const dAbbr=(id)=>(DISC.find(x=>x.id===id)||{}).abbr||'';
            const delta=(v,money,suffix)=>{if(v===0)return<span style={{color:'#666'}}>—</span>;const up=v>0;return<span style={{color:up?'#44CCAA':'#E05252',fontWeight:600}}>{up?'▲':'▼'}{money?fmtMoney(Math.abs(v)):Math.abs(v)}{suffix||''}</span>;};
            const pctTxt=(p)=>p==null?'':` (${p>=0?'+':''}${Math.round(p)}%)`;
            const attnRows=selfRows.filter(r=>r.attn);
            const med=(arr)=>{if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;};
            const rpvOf=p=>p.visits>0?p.revenue/p.visits:0;
            const discStats={};
            DISC_CLIN.forEach(d=>{const peers=cur.perStaff.filter(p=>p.disc===d.id&&(p.visits>0||p.revenue>0));if(peers.length>=2)discStats[d.id]={medVis:med(peers.map(p=>p.visits)),medIa:med(peers.map(p=>p.ias)),medRpv:med(peers.map(rpvOf)),n:peers.length};});
            const statusDot=(r)=>r.attn?(r.sev==='high'?'🔴':'🟠'):((r.dr>0||r.di>0||r.dv>0)?'🟢':'⚪');
            const ctxOf=(r)=>{const ds=discStats[r.disc];if(!ds||!(r.cVis>0||r.cRev>0))return null;const lowVol=r.cVis>0&&r.cVis<ds.medVis*0.6;if(!lowVol)return null;const myRpv=r.cVis>0?r.cRev/r.cVis:0;const well=ds.medRpv>0&&myRpv>=ds.medRpv*0.95;return (well?'Treats well per visit but low volume':'Low volume')+' for '+dAbbr(r.disc)+' ('+r.cVis+' visits vs ~'+Math.round(ds.medVis)+' peer median) — capacity to fill via new patients / internal referrals.';};
            const discsPresent=DISC_CLIN.filter(d=>selfRows.some(r=>r.disc===d.id));
            const repRows=repDisc==='all'?selfRows:selfRows.filter(r=>r.disc===repDisc);
            return(
            <div style={{marginBottom:notes?24:4,marginTop:24}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800,color:'#ddd',letterSpacing:'1px',marginBottom:3}}>EACH CLINICIAN vs THEIR OWN PRIOR {pWord.toUpperCase()}</div>
              <div style={{fontSize:12,color:'#777',marginBottom:10}}>Self-relative — each person measured against their own {lastP}, not the clinic average. {attnRows.length>0?<span style={{color:'#E0A052'}}>⚠ {attnRows.length} need{attnRows.length===1?'s':''} a look (own revenue or initials slipping).</span>:<span style={{color:'#44CCAA'}}>No one is slipping against their own prior {pWord}.</span>}</div>
              <div className="no-print" style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10,alignItems:'center'}}>
                <span style={{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:'1px',marginRight:2}}>Discipline</span>
                <button className={`btn btn-xs ${repDisc==='all'?'btn-go':'btn-ghost'}`} onClick={()=>setRepDisc('all')}>All</button>
                {discsPresent.map(d=><button key={d.id} className={`btn btn-xs ${repDisc===d.id?'btn-go':'btn-ghost'}`} onClick={()=>setRepDisc(d.id)}>{d.label}</button>)}
              </div>
              <div style={{fontSize:11,color:'#666',marginBottom:10}}>🟢 up vs their own prior · 🟠/🔴 needs a look · ⚪ flat &nbsp;·&nbsp; <span style={{color:'#E0A052'}}>↳</span> up but still low volume for their discipline (where the growth is)</div>
              <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,minWidth:560}}>
                <thead><tr style={{textAlign:'right',color:'#888',fontSize:11,textTransform:'uppercase',letterSpacing:'.5px'}}>
                  <th style={{textAlign:'left',padding:'6px 8px'}}>Clinician</th>
                  <th style={{padding:'6px 8px'}}>Revenue ({lastP} → now)</th>
                  <th style={{padding:'6px 8px'}}>Initials</th>
                  <th style={{padding:'6px 8px'}}>Visits</th>
                </tr></thead>
                <tbody>
                {repRows.map(r=>(
                  <tr key={r.id} style={{borderTop:'1px solid #1c1c1c',background:r.sev==='high'?'rgba(224,82,82,.07)':(r.attn?'rgba(224,160,82,.06)':'transparent')}}>
                    <td style={{textAlign:'left',padding:'8px',color:'#eee',verticalAlign:'top'}}><span style={{marginRight:5}}>{statusDot(r)}</span>{r.name} <span style={{color:'#666',fontSize:11,marginLeft:3}}>{dAbbr(r.disc)}</span>{ctxOf(r)&&<div style={{fontSize:11,color:'#E0A052',marginTop:3,maxWidth:360,lineHeight:1.4}}>↳ {ctxOf(r)}</div>}</td>
                    <td style={{textAlign:'right',padding:'8px'}}><span style={{color:'#bbb'}}>{fmtMoney(r.pRev)} → {fmtMoney(r.cRev)}</span><br/><span style={{fontSize:12}}>{delta(r.dr,true)}{r.dr!==0&&<span style={{color:'#666'}}>{pctTxt(r.rpct)}</span>}</span></td>
                    <td style={{textAlign:'right',padding:'8px'}}><span style={{color:'#bbb'}}>{r.pIa} → {r.cIa}</span><br/><span style={{fontSize:12}}>{delta(r.di)}{r.di!==0&&<span style={{color:'#666'}}>{pctTxt(r.ipct)}</span>}</span></td>
                    <td style={{textAlign:'right',padding:'8px'}}><span style={{color:'#bbb'}}>{r.pVis} → {r.cVis}</span><br/><span style={{fontSize:12}}>{delta(r.dv)}</span></td>
                  </tr>
                ))}
                </tbody>
              </table>
              </div>
            </div>);
          })()}

          {notes&&(
            <div style={{marginTop:18,borderTop:'1px solid var(--border)',paddingTop:14}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:800,color:'#aaa',letterSpacing:'1px',marginBottom:6}}>NOTES</div>
              <div style={{fontSize:13,color:'#ccc',whiteSpace:'pre-wrap',lineHeight:1.5}}>{notes}</div>
            </div>
          )}
        </div>

        {/* ── Saved report history ── */}
        {savedReports.length>0&&(
          <div className="no-print" style={{marginTop:22}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'1.5px',textTransform:'uppercase',color:'#888',marginBottom:10}}>Saved Reports</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {savedReports.map(r=>(
                <div key={r.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:viewingSaved===r.id?'rgba(202,232,193,.06)':'var(--surface2)',border:'1px solid '+(viewingSaved===r.id?'#2f5a2a':'var(--border)'),borderRadius:8,padding:'10px 14px',cursor:'pointer'}} onClick={()=>setViewingSaved(r.id)}>
                  <div><span style={{color:'#ddd',fontWeight:600,fontSize:14}}>{r.type==='month'?'📅':'🗓'} {r.label}</span> <span style={{color:'#666',fontSize:12,marginLeft:8}}>saved {new Date(r.generatedAt).toLocaleDateString('en-CA',{dateStyle:'medium'})}</span>{r.notes?<span style={{color:'#888',fontSize:12,marginLeft:8}}>📝</span>:null}</div>
                  <button className="btn btn-ghost btn-xs" onClick={e=>{e.stopPropagation();if(confirm('Delete this saved report?'))deleteSavedReport(r.id);}}>✕</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div>
      {/* Header */}
      <div className="flex aic jsb" style={{marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:3}}>Performance & Revenue</div>
          <div style={{fontSize:14,color:'#777'}}>Jane data (Appointments + Shift reports) · GVA · Retention · {data.snapshots.length} snapshot{data.snapshots.length!==1?'s':''} stored</div>
        </div>
        <div className="flex aic g5" style={{flexWrap:'wrap'}}>
          {[['overview','▣ Overview'],['revenue','💰 Revenue'],['utilization','⏱ Utilization'],['appointments','📋 Appointments'],['gva','📈 GVA'],['retention','🔄 Retention'],['trends','↗ Trends'],['import','📂 Jane Import']].map(([k,l])=>(
            <button key={k} className={`btn btn-sm ${tab===k?'btn-go':'btn-ghost'}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
      </div>

      {/* Stats */}
      <div className="sg4" style={{marginBottom:14}}>
        <div className="sc go"><div className="sc-lbl">Avg Utilization</div><div className="sc-val">{avgUtil!=null?avgUtil+'%':'—'}</div><div className="sc-sub">{withUtil.length} tracked</div>{locSplitEl(l=>l.utilN?Math.round(l.util/l.utilN):0,v=>v+'%')}</div>
        <div className="sc lime"><div className="sc-lbl">Completed Visits</div><div className="sc-val">{totalCompleted||'—'}</div><div className="sc-sub">{withAppts.length} practitioners</div>{locSplitEl(l=>l.visits,v=>v.toLocaleString())}</div>
        <div className="sc" style={{borderColor:'rgba(187,153,255,.3)'}}><div className="sc-lbl" style={{color:'#BB99FF'}}>Initial Assessments</div><div className="sc-val" style={{color:'#BB99FF'}}>{totalInitialAssessments||'—'}</div><div className="sc-sub">{withAppts.length?`${(totalInitialAssessments/totalCompleted*100).toFixed(1)}% of visits`:'—'}</div>{locSplitEl(l=>l.ias,v=>v.toLocaleString())}</div>
        <div className="sc yellow"><div className="sc-lbl">Avg GVA</div><div className="sc-val">{avgGva||'—'}</div><div className="sc-sub">365-day rolling</div></div>
        <div className="sc gray"><div className="sc-lbl">Snapshots</div><div className="sc-val">{data.snapshots.length}</div><div className="sc-sub">{data.lastImport?new Date(data.lastImport).toLocaleDateString('en-CA',{month:'short',year:'numeric'}):'No imports yet'}</div></div>
      </div>

      {/* Filter bar */}
      {!['import','gva','retention','trends'].includes(tab)&&data.snapshots.length>0&&(
        <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:7,padding:'10px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>

          {/* Quick period pills */}
          <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
            {[
              {l:'Latest Mo',f:dataMaxMonth,t:dataMaxMonth},
              {l:'Last 3 Mo',f:(()=>{const d=new Date(dataMaxMonth+'-01T12:00');d.setMonth(d.getMonth()-2);return d.toISOString().slice(0,7)})(),t:dataMaxMonth},
              {l:'Last 6 Mo',f:(()=>{const d=new Date(dataMaxMonth+'-01T12:00');d.setMonth(d.getMonth()-5);return d.toISOString().slice(0,7)})(),t:dataMaxMonth},
              {l:'YTD',f:dataMaxMonth.slice(0,4)+'-01',t:dataMaxMonth},
              {l:'2025',f:'2025-01',t:'2025-12'},
              {l:'All Time',f:'',t:''},
            ].map(({l,f,t})=>(
              <button key={l}
                className={'btn btn-sm '+(!usingCustomRange&&dateFrom===f&&dateTo===t?'btn-go':'btn-ghost')}
                onClick={()=>{setDateFrom(f);setDateTo(t);setCustomFrom('');setCustomTo('');}}>
                {l}
              </button>
            ))}
          </div>

          {/* Divider */}
          <div style={{width:1,height:22,background:'var(--border2)',margin:'0 4px',flexShrink:0}}/>

          {/* Custom date inputs */}
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:12,color:'#777',flexShrink:0,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px',textTransform:'uppercase'}}>From</span>
            <input type="date" value={customFrom}
              onChange={e=>{setCustomFrom(e.target.value);if(e.target.value){setDateFrom('');setDateTo('');}}}
              style={{background:'var(--surface3)',border:'2px solid '+(usingCustomRange?'var(--go)':'var(--border2)'),borderRadius:5,color:customFrom?'var(--text)':'#888',fontSize:14,padding:'5px 10px',outline:'none',cursor:'pointer',minWidth:140}}/>
            <span style={{fontSize:13,color:'#555',flexShrink:0}}>→</span>
            <span style={{fontSize:12,color:'#777',flexShrink:0,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px',textTransform:'uppercase'}}>To</span>
            <input type="date" value={customTo}
              onChange={e=>{setCustomTo(e.target.value);if(e.target.value){setDateFrom('');setDateTo('');}}}
              style={{background:'var(--surface3)',border:'2px solid '+(usingCustomRange?'var(--go)':'var(--border2)'),borderRadius:5,color:customTo?'var(--text)':'#888',fontSize:14,padding:'5px 10px',outline:'none',cursor:'pointer',minWidth:140}}/>
            {usingCustomRange&&<button className="btn btn-xs btn-ghost" onClick={()=>{setCustomFrom('');setCustomTo('');}} style={{flexShrink:0}}>✕</button>}
            {usingCustomRange&&customFrom&&customTo&&<span style={{fontSize:13,color:hasDailyData?'var(--lime)':'#F4DB71',flexShrink:0}}>{Math.round((new Date(customTo)-new Date(customFrom))/(86400000))+1}d{!hasDailyData?' ·re-import':''}</span>}
          </div>

          {/* Divider */}
          <div style={{width:1,height:22,background:'var(--border2)',margin:'0 4px',flexShrink:0}}/>

          {/* Discipline filter */}
          <select value={filterDisc} onChange={e=>setFilterDisc(e.target.value)}
            style={{background:'var(--surface3)',border:'1px solid '+(filterDisc!=='all'?'var(--go)':'var(--border2)'),borderRadius:5,color:filterDisc!=='all'?'var(--lime)':'#888',fontSize:13,padding:'5px 8px',outline:'none',cursor:'pointer'}}>
            <option value="all">All Disciplines</option>
            {[...new Set(staff.filter(s=>s.discipline&&!['mgmt','ops','edu'].includes(s.discipline)).map(s=>s.discipline))].sort().map(d=>(
              <option key={d} value={d}>{DISC.find(x=>x.id===d)?.label||d}</option>
            ))}
          </select>

          {/* Site filter */}
          <select value={filterSite} onChange={e=>setFilterSite(e.target.value)}
            style={{background:'var(--surface3)',border:'1px solid '+(filterSite!=='all'?'var(--go)':'var(--border2)'),borderRadius:5,color:filterSite!=='all'?'var(--lime)':'#888',fontSize:13,padding:'5px 8px',outline:'none',cursor:'pointer'}}>
            <option value="all">All Locations</option>
            {[...new Set(staff.flatMap(s=>siteList(s)))].sort().map(s=>(
              <option key={s} value={s}>{s}</option>
            ))}
          </select>

          {/* Active filter summary */}
          <span style={{fontSize:13,color:'#555',marginLeft:'auto'}}>
            {usingCustomRange?'Custom range':(filteredSnaps.length+' mo')}
            {filterDisc!=='all'?' · '+DISC.find(x=>x.id===filterDisc)?.label:''}
            {filterSite!=='all'?' · '+filterSite:''}
            {(filterDisc!=='all'||filterSite!=='all')&&<button className="btn btn-xs btn-ghost" style={{marginLeft:6}} onClick={()=>{setFilterDisc('all');setFilterSite('all');}}>Clear filters</button>}
          </span>
        </div>
      )}

      {pendingShift&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(2px)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setPendingShift(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'var(--surface2)',border:'1px solid #7FC8E855',borderRadius:12,padding:'24px 26px',width:380,maxWidth:'90vw',boxShadow:'0 20px 60px rgba(0,0,0,.5)'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:'#7FC8E8',marginBottom:6}}>Which month is this shift report for?</div>
            <div style={{fontSize:14,color:'#999',lineHeight:1.6,marginBottom:16}}>Jane's shift export has no date column, so pick the month it covers. Utilization (Appt ÷ Shift hrs) will be saved under that month. Import one file per month to build history.</div>
            <input type="month" value={pendingShiftMonth} onChange={e=>setPendingShiftMonth(e.target.value)} autoFocus
              style={{width:'100%',background:'var(--surface3)',border:'1px solid #7FC8E855',borderRadius:6,color:'var(--text)',fontSize:18,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,padding:'9px 12px',outline:'none',marginBottom:18}}/>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setPendingShift(null)}>Cancel</button>
              <button className="btn btn-go btn-sm" disabled={!pendingShiftMonth} onClick={async()=>{const rws=pendingShift,mo=pendingShiftMonth;setPendingShift(null);await doShiftImport(rws,mo);}}>Import for {pendingShiftMonth?new Date(pendingShiftMonth+'-01T12:00').toLocaleDateString('en-CA',{month:'long',year:'numeric'}):'…'}</button>
            </div>
          </div>
        </div>
      )}

      {pendingRetention&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(2px)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setPendingRetention(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'var(--surface2)',border:'1px solid #BB99FF55',borderRadius:12,padding:'24px 26px',width:380,maxWidth:'90vw',boxShadow:'0 20px 60px rgba(0,0,0,.5)'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:'#BB99FF',marginBottom:6}}>Which month is this retention report for?</div>
            <div style={{fontSize:14,color:'#999',lineHeight:1.6,marginBottom:16}}>Member Retention exports don't contain the period, so pick the month this report covers. It'll be saved under that month and you can switch between months on the Retention tab.</div>
            <input type="month" value={pendingRetMonth} onChange={e=>setPendingRetMonth(e.target.value)} autoFocus
              style={{width:'100%',background:'var(--surface3)',border:'1px solid #BB99FF55',borderRadius:6,color:'var(--text)',fontSize:18,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,padding:'9px 12px',outline:'none',marginBottom:18}}/>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setPendingRetention(null)}>Cancel</button>
              <button className="btn btn-go btn-sm" disabled={!pendingRetMonth} onClick={async()=>{const t=pendingRetention,mo=pendingRetMonth;setPendingRetention(null);await doRetentionImport(t,mo);}}>Import for {pendingRetMonth?new Date(pendingRetMonth+'-01T12:00').toLocaleDateString('en-CA',{month:'long',year:'numeric'}):'…'}</button>
            </div>
          </div>
        </div>
      )}
      {tab==='overview'&&(
        <>
          {(()=>{const f=(usingCustomRange?customFrom:dateFrom||'').slice(0,7);const t=(usingCustomRange?customTo:dateTo||'').slice(0,7);return<SessSummary log={sessionLog} fromM={f} toM={t}/>;})()}
          {(()=>{
            const locRev={};
            filteredSnaps.forEach(s=>(s.rows||[]).forEach(r=>{if(r.revByLoc)Object.entries(r.revByLoc).forEach(([loc,v])=>{locRev[loc]=(locRev[loc]||0)+(parseFloat(v)||0);});}));
            const locAct={};
            filteredRows.forEach(r=>{const st=staff.find(x=>x.id===r.staffId);const hs=st?siteList(st)[0]:null;if(!hs)return;if(!locAct[hs])locAct[hs]={visits:0,ias:0,heads:0,util:0,utilN:0};locAct[hs].visits+=(r.completed||0);locAct[hs].ias+=(r.initialAssessments||0);if(r.completed||r.revenue)locAct[hs].heads++;if(r.utilization!=null){locAct[hs].util+=r.utilization;locAct[hs].utilN++;}});
            const sites=[...new Set([...Object.keys(locRev),...Object.keys(locAct)])].filter(x=>x&&x!=='—').sort((a,b)=>(locRev[b]||0)-(locRev[a]||0));
            const totalRev=Object.values(locRev).reduce((a,b)=>a+b,0);
            if(!sites.length||(!totalRev&&!Object.values(locAct).some(a=>a.visits||a.ias)))return null;
            const COLORS={Mississauga:'#CAE8C1',Markham:'#7FC8E8',Toronto:'#F4DB71',Ajax:'#E0A052',Oakville:'#BB99FF'};

              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>

          )}
        </div>
      )}
    </div>
  );
}


/* ══ OVERVIEW ══ */
function Overview({staff,evals,sessions,setPage,openProfile}){
  const scored=staff.filter(s=>getBestScore(s)!==null);
  const avg=scored.length?Math.round(scored.reduce((a,b)=>a+(getBestScore(b)||0),0)/scored.length*10)/10:0;
  const multiTrack=staff.filter(s=>s.tracks&&s.tracks.length>1);
  const lvC=useMemo(()=>{const c={1:0,2:0,3:0,4:0,u:0};staff.forEach(s=>{const sc=getBestScore(s);if(sc===null){c.u++;return;}const n=parseInt(getLevel(sc)?.label[6]||'0');if(n>=1&&n<=4)c[n]++;else c.u++;});return c;},[staff]);
  const top5=useMemo(()=>[...staff].filter(s=>getBestScore(s)!==null).sort((a,b)=>(getBestScore(b)||0)-(getBestScore(a)||0)).slice(0,5),[staff]);
  const attention=useMemo(()=>[...staff].filter(s=>{const sc=getBestScore(s);return sc!==null&&sc<6;}).sort((a,b)=>(getBestScore(a)||0)-(getBestScore(b)||0)).slice(0,5),[staff]);

    <div>
      <div className="sg4 mb18">

            <div key={l.n} className="flex aic g12 mb12">
              <div style={{width:6,height:6,borderRadius:2,background:l.c,flexShrink:0}}/>
              <div className="sm" style={{flex:1}}>{l.label}</div>
              <div style={{fontSize:24,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,color:l.c,lineHeight:1}}>{lvC[l.n]}</div>
            </div>

        </div>
        <div className="card">
          <div className="card-head"><span className="card-lbl">Rubric Tracks Active</span></div>
          {['clinical','spa','sc'].map(t=>{

            return(

            const mp=mpFor(s);const niche=mp.expertise||mp.conditions||'';const tx=mp.treatments||'';const exc=mp.excludes||'';
            const site=(typeof siteList==='function'?siteList(s)[0]:s.site)||s.site||'';
