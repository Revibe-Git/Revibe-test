   PROFILE MODAL
══════════════════════════════════════════════ */
function ProfileModal({staff,onClose,evals,setEvals,sessions,setStaff,allStaff}){
  const[tab,setTab]=useState('profile');
  const[activeTrack,setActiveTrack]=useState(()=>staff.tracks&&staff.tracks.length>0?staff.tracks[0]:'clinical');
  const fileRef=useRef();

  if(!staff)return null;

  const tracks=staff.tracks||[];
  const sSess=sessions.filter(s=>s.attendees?.includes(staff.id));
  const rs=RUBRIC_SYSTEMS[activeTrack];

  const handleFileDrop=async(files)=>{
    const newFiles=await Promise.all(Array.from(files).map(f=>new Promise(res=>{
      const r=new FileReader();
      r.onload=e=>res({id:'f'+Date.now()+Math.random(),name:f.name,size:f.size,type:f.type,date:new Date().toISOString().slice(0,10),data:e.target.result});
      r.readAsDataURL(f);
    })));
    setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,files:[...(s.files||[]),...newFiles]}:s));
  };
  const removeFile=fid=>setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,files:(s.files||[]).filter(f=>f.id!==fid)}:s));
  const downloadFile=f=>{const a=document.createElement('a');a.href=f.data;a.download=f.name;a.click();};

  const trackScore=staff.scores?.[activeTrack];
  const trackTotal=trackScore?.total??null;
  const lv=getLevel(trackTotal);

  const getTabs=()=>{
    const base=['profile','evaluations','education','bird','files'];
    if(tracks.length>0)base.splice(1,0,'scores','catdefs','roadmap');
    return base;
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe"/>
        <button className="modal-close" onClick={onClose}>✕ Close</button>
        <div className="modal-body">

          {/* HEADER */}
          <div className="prof-head">
            <Av name={staff.name} sz="lg"/>
            <div style={{flex:1}}>
              <div className="prof-name">{staff.name}</div>
              <div className="prof-meta">
                <DBadge d={staff.discipline}/>
                <span className="muted">{staff.role}</span>
                <span className="muted">·</span>
                <span className="muted">{staff.site}</span>
                {staff.roadmap&&<span className="badge b-quarterly">{staff.roadmap}</span>}
                {staff.archetype&&<span className="badge b-weekly">{staff.archetype}</span>}
              </div>
              {tracks.length>1&&(
                <div className="flex aic g6" style={{marginTop:10}}>
                  <span style={{fontSize:12,color:'var(--text3)',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1.5px',textTransform:'uppercase'}}>Tracks:</span>
                  {tracks.map(t=><button key={t} className={`track-pill tp-${t}${activeTrack===t?' active':''}`} onClick={()=>setActiveTrack(t)}>{TRACK_META[t]?.label} {staff.scores?.[t]?.total!==null&&staff.scores?.[t]?.total!==undefined?`(${staff.scores[t].total})`:''}</button>)}
                </div>
              )}
              {tracks.length===1&&(
                <div className="flex aic g6" style={{marginTop:8}}>
                  {tracks.map(t=><span key={t} className={`track-pill tp-${t} active`}>{TRACK_META[t]?.label} Track</span>)}
                </div>
              )}
            </div>
            {trackTotal!==null&&(
              <div className="prof-score-block">
                {rs&&<div style={{fontSize:12,color:TRACK_META[activeTrack]?.color,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'2px',textTransform:'uppercase',marginBottom:4}}>{rs.label}</div>}
                <LvBadge score={trackTotal}/>
                <div className="prof-score-num" style={{color:lv?.color||'var(--text)'}}>{trackTotal}</div>
                <div className="prof-score-sub">Weighted Score</div>
              </div>
            )}
            {trackTotal===null&&tracks.length>0&&(
              <div className="prof-score-block">
                <div style={{fontSize:12,color:'var(--text3)',textAlign:'center'}}>Pending<br/>Evaluation</div>
              </div>
            )}
          </div>

          {/* TABS */}
          <div className="tabs">
            {getTabs().map(t=>(
              <button key={t} className={`tab${tab===t?' active':''}`} onClick={()=>setTab(t)}>
                {t==='catdefs'?'Category Definitions':t==='roadmap'?'Growth Roadmap':t==='bird'?'🦅 Bird Test':t.charAt(0).toUpperCase()+t.slice(1)}
                {t==='files'&&(staff.files||[]).length>0&&<span style={{marginLeft:4,fontSize:12,background:'var(--go)',color:'var(--lime)',borderRadius:8,padding:'1px 5px',fontFamily:"'Barlow Condensed',sans-serif"}}>{(staff.files||[]).length}</span>}
              </button>
            ))}
          </div>

          {/* PROFILE TAB */}
          {tab==='profile'&&(<ProfileEditTab staff={staff} setStaff={setStaff}/>)}

          {/* SCORES TAB */}
          {tab==='scores'&&rs&&(<ScoresEditTab staff={staff} setStaff={setStaff} activeTrack={activeTrack} setActiveTrack={setActiveTrack} tracks={tracks} rs={rs} trackScore={trackScore} trackTotal={trackTotal}/>)}

                    {/* CATEGORY DEFINITIONS TAB */}
          {tab==='catdefs'&&rs&&(
            <div>
              {tracks.length>1&&<div className="flex aic g6 mb14"><span style={{fontSize:12,color:'#aaa'}}>Viewing:</span>{tracks.map(t=><button key={t} className={`track-pill tp-${t}${activeTrack===t?' active':''}`} onClick={()=>setActiveTrack(t)}>{TRACK_META[t]?.label}</button>)}</div>}

              {/* Header banner */}
              <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'13px 16px',marginBottom:16,borderLeft:`3px solid ${TRACK_META[activeTrack]?.color||'var(--go)'}`}}>
                <div style={{fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:TRACK_META[activeTrack]?.color,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:4}}>{rs.label} Rubric — Category Score Anchors</div>
                <div style={{fontSize:12,color:'#aaa',lineHeight:1.5}}>{rs.tagline}</div>
                <div style={{fontSize:12,color:'#999',marginTop:6,fontStyle:'italic'}}>{rs.headerNote}</div>
              </div>

              {/* Score band legend */}
              <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
                {[
                  {range:'0–4',label:rs.col04Label||'Surface/Local',color:'#E05252',bg:'rgba(224,82,82,.08)'},
                  {range:'5–6',label:rs.col56Label||'Transactional/Acute',color:'#F4DB71',bg:'rgba(244,219,113,.08)'},
                  {range:'7',label:rs.col7Label||'Competent: Integrative',color:'#44ccaa',bg:'rgba(68,204,170,.08)'},
                  {range:'8–10',label:rs.col810Label||'Predictive/Leader',color:'#CAE8C1',bg:'rgba(202,232,193,.08)'},
                ].map(b=>(
                  <div key={b.range} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',background:b.bg,borderRadius:4,border:`1px solid ${b.color}22`}}>
                    <div style={{width:8,height:8,borderRadius:2,background:b.color,flexShrink:0}}/>
                    <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,color:b.color}}>{b.range}</span>
                    <span style={{fontSize:12,color:'#aaa'}}>{b.label}</span>
                  </div>
                ))}
              </div>

              {/* Per-category cards */}
              {rs.catDefs.map((cd,idx)=>{
                const currentScore = trackScore?.[cd.id];
                const hasScore = currentScore!==null && currentScore!==undefined;
                const scoreRange = hasScore ? (currentScore<=4?'04':currentScore<=6?'56':currentScore<7.5?'7':'810') : null;
                const bandColors = {'04':'#E05252','56':'#F4DB71','7':'#44ccaa','810':'#CAE8C1'};
                const highlight = hasScore ? bandColors[scoreRange] : null;
                const catWeight = rs.cats.find(c=>c.id===cd.id)?.weight;
                return(
                  <div key={cd.id} style={{background:'var(--surface2)',border:`1px solid ${hasScore?highlight+'33':'var(--border)'}`,borderRadius:6,marginBottom:10,overflow:'hidden'}}>
                    {/* Category header row */}
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',borderBottom:'1px solid var(--border)',background:hasScore?highlight+'0d':'transparent'}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,color:'#888',minWidth:20}}>{idx+1}</div>
                        <div>
                          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,color:hasScore?highlight:'var(--text)',letterSpacing:'.5px'}}>{cd.label}</div>
                          {catWeight&&<div style={{fontSize:12,color:'#999',marginTop:1}}>Weight: {catWeight}% of total score</div>}
                        </div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
                        {hasScore&&<ScoreBar score={currentScore}/>}
                        {hasScore&&<div style={{fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1.5px',textTransform:'uppercase',color:highlight,background:highlight+'18',padding:'2px 8px',borderRadius:3,border:`1px solid ${highlight}33`}}>
                          {scoreRange==='04'?'Surface':scoreRange==='56'?'Transactional':scoreRange==='7'?'Competent':'Predictive'}
                        </div>}
                      </div>
                    </div>
                    {/* Four band descriptors */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr'}}>
                      {[
                        {key:'col04',range:'0–4',color:'#E05252',label:rs.col04Label||'Surface',text:cd.col04},
                        {key:'col56',range:'5–6',color:'#F4DB71',label:rs.col56Label||'Transactional',text:cd.col56},
                        {key:'col7', range:'7',  color:'#44ccaa',label:rs.col7Label||'Competent',text:cd.col7},
                        {key:'col810',range:'8–10',color:'#CAE8C1',label:rs.col810Label||'Predictive',text:cd.col810},
                      ].map((band,bi)=>{
                        const isCurrent = scoreRange==='04'&&bi===0 || scoreRange==='56'&&bi===1 || scoreRange==='7'&&bi===2 || scoreRange==='810'&&bi===3;
                        return(
                          <div key={band.key} style={{
                            padding:'10px 12px',
                            borderRight:bi<3?'1px solid var(--border)':'none',
                            background:isCurrent?band.color+'0f':'transparent',
                            borderTop:isCurrent?`2px solid ${band.color}`:'2px solid transparent',
                          }}>
                            <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:6}}>
                              <div style={{width:6,height:6,borderRadius:1,background:band.color,flexShrink:0}}/>
                              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,color:band.color,letterSpacing:'1px',textTransform:'uppercase'}}>{band.range}</span>
                              {isCurrent&&<span style={{fontSize:8,color:band.color,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px'}}>← HERE</span>}
                            </div>
                            <div style={{fontSize:12,color:isCurrent?'#ccc':'#888',lineHeight:1.55}}>{band.text}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* GROWTH ROADMAP TAB */}
          {tab==='roadmap'&&rs&&(
            <div>
              {tracks.length>1&&<div className="flex aic g6 mb14"><span style={{fontSize:12,color:'#aaa'}}>Viewing:</span>{tracks.map(t=><button key={t} className={`track-pill tp-${t}${activeTrack===t?' active':''}`} onClick={()=>setActiveTrack(t)}>{TRACK_META[t]?.label}</button>)}</div>}

              {/* Roadmap header */}
              <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'13px 16px',marginBottom:16,borderLeft:`3px solid ${TRACK_META[activeTrack]?.color||'var(--go)'}`}}>
                <div style={{fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:TRACK_META[activeTrack]?.color,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:4}}>{rs.label} — Growth Roadmap</div>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:3}}>Strengths-led development. Connection first. Diagnosis + Integration = Competency.</div>
                {trackTotal!==null&&(
                  <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
                    <span style={{fontSize:12,color:'#aaa'}}>Current position:</span>
                    <LvBadge score={trackTotal}/>
                    <span style={{fontSize:12,color:'#888'}}>{trackTotal}/10</span>
                  </div>
                )}
              </div>

              {/* Level legend */}
              <div style={{display:'flex',gap:6,marginBottom:18,flexWrap:'wrap'}}>
                {[
                  {label:'Level 1',cls:'b-l1',color:'#6B9FD4'},
                  {label:'Level 2',cls:'b-l2',color:'#F4DB71'},
                  {label:'Level 3',cls:'b-l3',color:'#44ccaa'},
                  {label:'Level 4',cls:'b-l4',color:'#CAE8C1'},
                ].map(lv=>{
                  const isActive = trackTotal!==null && getLevel(trackTotal)?.label?.startsWith(lv.label);
                  return(
                    <div key={lv.label} style={{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',background:isActive?lv.color+'18':'var(--surface2)',borderRadius:4,border:isActive?`1px solid ${lv.color}44`:'1px solid var(--border)'}}>
                      <div style={{width:6,height:6,borderRadius:1,background:lv.color}}/>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,color:lv.color,fontWeight:700}}>{lv.label}</span>
                      {isActive&&<span style={{fontSize:12,color:lv.color,fontFamily:"'Barlow Condensed',sans-serif"}}>← YOU</span>}
                    </div>
                  );
                })}
              </div>

              {/* Four roadmap sections */}
              {[
                {key:'brandSocial',     title:'Brand & Social',          icon:'◎', desc:'Content creation and visibility expectations by level'},
                {key:'community',       title:'Community & Partnerships', icon:'◐', desc:'Events and external partnership targets by level'},
                {key:'clinicalExcellence',title:'Clinical Excellence',   icon:'◈', desc:'SOAP compliance and GVA targets by level'},
                {key:'education',       title:'Education & Utilization',  icon:'◉', desc:'Booking cadence, treatment planning, and utilization targets by level'},
              ].map(section=>{
                const rows = rs.roadmap?.[section.key];
                if(!rows) return null;
                const currentLevelLabel = trackTotal!==null ? getLevel(trackTotal)?.label : null;
                return(
                  <div key={section.key} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,marginBottom:12,overflow:'hidden'}}>
                    {/* Section header */}
                    <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:13,opacity:.6}}>{section.icon}</span>
                      <div>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:'#ccc'}}>{section.title}</div>
                        <div style={{fontSize:12,color:'#999',marginTop:1}}>{section.desc}</div>
                      </div>
                    </div>
                    {/* Rows: one per level */}
                    {rows.map((row,ri)=>{
                      const isCurrentLevel = currentLevelLabel && currentLevelLabel.startsWith(row.level);
                      const lvColors = {'Level 1':'#6B9FD4','Level 2':'#F4DB71','Level 3':'#44ccaa','Level 4':'#CAE8C1'};
                      const lvColor = lvColors[row.level]||'#888';
                      return(
                        <div key={row.level} style={{
                          display:'grid',gridTemplateColumns:'100px 1fr 1fr',
                          borderBottom:ri<rows.length-1?'1px solid var(--border)':'none',
                          background:isCurrentLevel?lvColor+'0c':'transparent',
                          borderLeft:isCurrentLevel?`3px solid ${lvColor}`:'3px solid transparent',
                        }}>
                          <div style={{padding:'11px 12px',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',justifyContent:'center',gap:4}}>
                            <span className={`badge ${row.level==='Level 1'?'b-l1':row.level==='Level 2'?'b-l2':row.level==='Level 3'?'b-l3':'b-l4'}`}>{row.level}</span>
                            {isCurrentLevel&&<span style={{fontSize:8,color:lvColor,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px',textTransform:'uppercase'}}>← Current</span>}
                          </div>
                          <div style={{padding:'11px 12px',borderRight:'1px solid var(--border)'}}>
                            <div style={{fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1.5px',textTransform:'uppercase',color:'#888',marginBottom:5}}>Mandatory</div>
                            <div style={{fontSize:12,color:isCurrentLevel?'#ccc':'#999',lineHeight:1.55}}>{row.mandatory}</div>
                          </div>
                          <div style={{padding:'11px 12px'}}>
                            <div style={{fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1.5px',textTransform:'uppercase',color:'#888',marginBottom:5}}>Recommended</div>
                            <div style={{fontSize:12,color:isCurrentLevel?'#aaa':'#666',lineHeight:1.55}}>{row.recommended}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          )}

          {/* EVALUATIONS TAB */}
          {tab==='evaluations'&&(
            <EvalDetailList evals={evals} staffId={staff.id} setEvals={setEvals}/>
          )}

          {/* EDUCATION TAB */}
          {tab==='education'&&(
            <div>
              {sSess.length>0?sSess.map(s=>(
                <div key={s.id} style={{background:'var(--surface2)',borderRadius:4,padding:12,marginBottom:7}}>
                  <div className="flex aic jsb mb8"><span className="sm fw5">{s.module}</span><div className="flex aic g5"><span className={`badge b-${s.period?.toLowerCase()}`}>{s.period}</span><span className={`badge ${s.type==='1-on-1'?'b-monthly':'b-quarterly'}`}>{s.type}</span></div></div>
                  <div className="muted xs">{fmt(s.date)} · {s.mentorName||'—'}</div>
                  {s.development&&<div style={{marginTop:7,fontSize:12,color:'var(--yellow)'}}>→ {s.development}</div>}
                  {s.actions&&<div style={{marginTop:3,fontSize:12,color:'#CAE8C1'}}>✓ {s.actions}</div>}
                </div>
              )):<div className="empty"><div className="empty-ico">📚</div><p>No education sessions logged yet.</p></div>}
            </div>
          )}

          {/* BIRD TEST TAB */}
          {tab==='bird'&&(
            <BirdTestTab staff={staff} setStaff={setStaff}/>
          )}

          {/* FILES TAB */}
          {tab==='files'&&(
            <div>
              <div className={`file-zone mb14`}
                onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drag');}}
                onDragLeave={e=>e.currentTarget.classList.remove('drag')}
                onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('drag');handleFileDrop(e.dataTransfer.files);}}
                onClick={()=>fileRef.current?.click()}
              >
                <input ref={fileRef} type="file" multiple onChange={e=>handleFileDrop(e.target.files)}/>
                <div style={{fontSize:26,marginBottom:7}}>📁</div>
                <div className="sm fw5" style={{color:'var(--lime)',marginBottom:3}}>Drop files here or click to upload</div>
                <div className="muted xs">PDFs, Word docs, images, spreadsheets — any file type</div>
              </div>
              {(staff.files||[]).length===0?<div className="empty" style={{padding:22}}><div className="empty-ico">📂</div><p>No files uploaded yet.</p></div>:
              (staff.files||[]).map(f=>{
                const ext=f.name.split('.').pop()?.toLowerCase();
                const ico=ext==='pdf'?'📄':ext==='docx'||ext==='doc'?'📝':ext==='xlsx'||ext==='csv'?'📊':['png','jpg','jpeg','heic'].includes(ext)?'🖼️':'📎';
                return(
                  <div key={f.id} className="file-item">
                    <span className="file-ico">{ico}</span>
                    <span className="file-name">{f.name}</span>
                    <span className="file-size">{fmtSz(f.size)}</span>
                    <span className="file-date">{f.date}</span>
                    <div className="flex aic g5" style={{marginLeft:8}}>
                      <button className="btn btn-ghost btn-xs" onClick={()=>downloadFile(f)}>↓</button>
                      <button className="btn btn-red btn-xs" onClick={()=>removeFile(f.id)}>✕</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══ ADD STAFF ══ */
function AddStaffModal({onClose,onSave}){
  const[f,setF]=useState({name:'',email:'',discipline:'pt',role:'',site:'Markham',roadmap:'',archetype:'',tracks:['clinical'],notes:''});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleTrack=t=>setF(p=>({...p,tracks:p.tracks.includes(t)?p.tracks.filter(x=>x!==t):[...p.tracks,t]}));
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe"/><button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-body">
          <div className="bc fw6" style={{fontSize:22,letterSpacing:2,marginBottom:16}}>ADD STAFF MEMBER</div>
          <div className="fgrid">
            <div className="fg full"><label>Full Name</label><input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="First Last"/></div>
            <div className="fg full"><label>Email (revibeto.com)</label><input value={f.email||''} onChange={e=>set('email',e.target.value)} placeholder="firstname@revibeto.com"/></div>
            <div className="fg"><label>Discipline</label><select value={f.discipline} onChange={e=>set('discipline',e.target.value)}>{DISC.map(d=><option key={d.id} value={d.id}>{d.label}</option>)}</select></div>
            <div className="fg"><label>Role / Title</label><input value={f.role} onChange={e=>set('role',e.target.value)}/></div>
            <div className="fg"><label>Site</label><select value={f.site} onChange={e=>set('site',e.target.value)}>{SITES.map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="fg"><label>Roadmap Phase</label><select value={f.roadmap} onChange={e=>set('roadmap',e.target.value)}><option value="">—</option><option>L1→L2</option><option>L2→L3</option><option>L3→L4</option></select></div>
            <div className="fg full"><label>Rubric Tracks</label>
              <div className="flex aic g6" style={{paddingTop:4}}>
                {['clinical','spa','sc'].map(t=><button key={t} className={`track-pill tp-${t}${f.tracks.includes(t)?' active':''}`} onClick={()=>toggleTrack(t)}>{TRACK_META[t].label}</button>)}
              </div>
            </div>
            <div className="fg full"><label>Archetype</label><input value={f.archetype} onChange={e=>set('archetype',e.target.value)} placeholder="Anchor / Builder / Mentor / Strategist…"/></div>
            <div className="fg full"><label>Notes</label><textarea value={f.notes} onChange={e=>set('notes',e.target.value)}/></div>
          </div>
          <div className="flex aic g8 mt12" style={{marginTop:16,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-lime" onClick={()=>{if(!f.name.trim())return;onSave({...f,scores:{}});onClose();}}>Create Profile</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ ADD EVAL ══ */
function AddEvalModal({onClose,onSave,staff,mentors}){
  const trackOptions=staff.length>0?(staff[0].tracks&&staff[0].tracks.length>0?staff[0].tracks:['clinical']):['clinical'];
  const[selectedStaff,setSelectedStaff]=useState(staff[0]?.id||'');
  const[track,setTrack]=useState('clinical');
  const[f,setF]=useState({type:'Quarterly',date:new Date().toISOString().slice(0,10),evaluator:'',scores:{},roadmapGrades:{},strengths:'',growthAreas:'',mentorId:'',mentorName:'',notes:''});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const setSc=(k,v)=>setF(p=>({...p,scores:{...p.scores,[k]:v}}));
  const setRmGrade=(section,level,field,val)=>setF(p=>({...p,roadmapGrades:{...p.roadmapGrades,[section]:{...(p.roadmapGrades[section]||{}),[level]:{...((p.roadmapGrades[section]||{})[level]||{}),[field]:val}}}}));

  const currentStaff=staff.find(s=>s.id===selectedStaff);
  const availTracks=currentStaff?.tracks||['clinical'];
  const rs=RUBRIC_SYSTEMS[track];
  const isAnnual=f.type==='Annual';
  const roadmapData=rs?.roadmap;
  const ROADMAP_SECTIONS=[
    {key:'brandSocial',title:'Brand & Social'},
    {key:'community',title:'Community & Partnerships'},
    {key:'clinicalExcellence',title:'Clinical Excellence'},
    {key:'education',title:'Education & Utilization'},
  ];
  const preview=rs?rs.cats.reduce((t,c)=>t+parseFloat(f.scores[c.id]||0)*(c.weight/100),0):0;
  const previewRounded=Math.round(preview*100)/100;

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe"/><button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-body">
          <div className="bc fw6" style={{fontSize:22,letterSpacing:2,marginBottom:16}}>LOG EVALUATION</div>
          <div className="fgrid">
            <div className="fg"><label>Staff Member</label>
              <select value={selectedStaff} onChange={e=>{setSelectedStaff(e.target.value);const s=staff.find(x=>x.id===e.target.value);if(s?.tracks?.length>0)setTrack(s.tracks[0]);}}>
                {staff.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div className="fg"><label>Rubric Track</label>
              <div className="flex aic g5" style={{paddingTop:4}}>
                {availTracks.map(t=><button key={t} className={`track-pill tp-${t}${track===t?' active':''}`} onClick={()=>setTrack(t)}>{TRACK_META[t]?.label}</button>)}
              </div>
            </div>
            <div className="fg"><label>Type</label><select value={f.type} onChange={e=>set('type',e.target.value)}>{PERIODS.map(p=><option key={p}>{p}</option>)}</select></div>
            <div className="fg"><label>Date</label><input type="date" value={f.date} onChange={e=>set('date',e.target.value)}/></div>
            <div className="fg full"><label>Evaluator</label><input value={f.evaluator} onChange={e=>set('evaluator',e.target.value)}/></div>
            {rs&&<><div className="fsec">{rs.label} Track — Scores (0–10)</div>
            {rs.cats.map(c=>(
              <div key={c.id} className="fg">
                <label>{c.label.split(' ').slice(0,3).join(' ')} ({c.weight}%)</label>
                <div className="flex aic g7">
                  <input type="number" min="0" max="10" step="0.5" className="score-in" value={f.scores[c.id]||''} onChange={e=>setSc(c.id,e.target.value)} placeholder="0–10"/>
                  <div style={{flex:1,height:3,background:'var(--surface3)',borderRadius:2}}><div style={{height:'100%',borderRadius:2,background:TRACK_META[track]?.color||'var(--go)',width:Math.min(100,(parseFloat(f.scores[c.id]||0)/10)*100)+'%'}}/></div>
                </div>
              </div>
            ))}
            <div className="score-preview">
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:700,color:TRACK_META[track]?.color||'#CAE8C1'}}>{previewRounded}</div>
              <div><div className="muted xs" style={{marginBottom:3}}>Preview</div><LvBadge score={previewRounded}/></div>
            </div></>}
            {isAnnual&&roadmapData&&(
              <div className="fg full" style={{marginTop:8}}>
                <div className="fsec" style={{color:'#BB99FF'}}>Annual Growth Roadmap Review</div>
                <div style={{fontSize:12,color:'#999',marginBottom:10,fontStyle:'italic'}}>Grade each section: ✓ Met / ~ Partial / ✗ Not Met — with optional notes per level</div>
                {ROADMAP_SECTIONS.map(sec=>{
                  const rows=roadmapData[sec.key];
                  if(!rows)return null;
                  return(
                    <div key={sec.key} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,marginBottom:10,overflow:'hidden'}}>
                      <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'rgba(187,153,255,.06)'}}>
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'#BB99FF'}}>{sec.title}</span>
                      </div>
                      {rows.map((row,ri)=>{
                        const grade=f.roadmapGrades?.[sec.key]?.[row.level]||{};
                        const lvColors={'Level 1':'#6B9FD4','Level 2':'#F4DB71','Level 3':'#44ccaa','Level 4':'#CAE8C1'};
                        const lvc=lvColors[row.level]||'#888';
                        return(
                          <div key={row.level} style={{padding:'8px 12px',borderBottom:ri<rows.length-1?'1px solid var(--border)':'none',display:'grid',gridTemplateColumns:'80px 1fr auto',gap:10,alignItems:'start'}}>
                            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,color:lvc,paddingTop:4}}>{row.level}</span>
                            <div style={{fontSize:12,color:'#aaa',lineHeight:1.5}}>{row.mandatory}</div>
                            <div style={{display:'flex',flexDirection:'column',gap:5,alignItems:'flex-end',flexShrink:0}}>
                              <div className="flex aic g4">
                                {['Met','Partial','Not Met'].map(opt=>(
                                  <button key={opt} onClick={()=>setRmGrade(sec.key,row.level,'status',opt)}
                                    style={{fontSize:12,padding:'3px 7px',borderRadius:3,border:'1px solid',cursor:'pointer',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                                      background:grade.status===opt?(opt==='Met'?'rgba(68,204,170,.2)':opt==='Partial'?'rgba(244,219,113,.2)':'rgba(224,82,82,.2)'):'var(--surface3)',
                                      borderColor:grade.status===opt?(opt==='Met'?'#44CCAA':opt==='Partial'?'#F4DB71':'#E05252'):'var(--border2)',
                                      color:grade.status===opt?(opt==='Met'?'#44CCAA':opt==='Partial'?'#F4DB71':'#E05252'):'#666'}}>
                                    {opt==='Met'?'✓ Met':opt==='Partial'?'~ Partial':'✗ Not Met'}
                                  </button>
                                ))}
                              </div>
                              <input placeholder="Note…" value={grade.note||''} onChange={e=>setRmGrade(sec.key,row.level,'note',e.target.value)}
                                style={{width:160,background:'var(--surface3)',border:'1px solid var(--border2)',borderRadius:3,color:'var(--text)',fontSize:12,padding:'3px 7px',outline:'none'}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            )}
            <div className="fdiv"/>
            <div className="fg full"><label>Strengths</label><textarea value={f.strengths} onChange={e=>set('strengths',e.target.value)}/></div>
            <div className="fg full"><label>Growth Areas</label><textarea value={f.growthAreas} onChange={e=>set('growthAreas',e.target.value)}/></div>
            <div className="fg"><label>Mentor</label>
              <select value={f.mentorId} onChange={e=>{const m=mentors.find(x=>x.id===e.target.value);set('mentorId',e.target.value);set('mentorName',m?.name||'');}}>
                <option value="">— Unassigned —</option>{mentors.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
            </div>
            <div className="fg"><label>Notes</label><textarea value={f.notes} onChange={e=>set('notes',e.target.value)} style={{minHeight:48}}/></div>
          </div>
          <div className="flex aic g8 mt12" style={{marginTop:16,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-lime" onClick={()=>{if(!selectedStaff)return;onSave({...f,staffId:selectedStaff,track});onClose();}}>Save Evaluation</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ ADD SESSION ══ */
function AddSessModal({onClose,onSave,staff,mentors}){
  const MODULES=['Communication & Connection Lab','Diagnostic Reasoning Intensive','Global Assessment & Gait','Palpation Layering & Tension Mapping','Hands-On Adaptation & Safety','Exercise Progression & Coaching','Integrated Care & Co-Treatment'];
  const[f,setF]=useState({mentorId:mentors[0]?.id||'',mentorName:mentors[0]?.name||'',date:new Date().toISOString().slice(0,10),period:'Weekly',type:'1-on-1',attendees:[],module:MODULES[0],objectives:'',strengths:'',development:'',actions:'',rating:4,notes:''});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggle=id=>setF(p=>({...p,attendees:p.attendees.includes(id)?p.attendees.filter(x=>x!==id):[...p.attendees,id]}));
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe"/><button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-body">
          <div className="bc fw6" style={{fontSize:22,letterSpacing:2,marginBottom:16}}>LOG EDUCATION SESSION</div>
          <div className="fgrid">
            <div className="fg"><label>Mentor / Lead</label>
              <select value={f.mentorId} onChange={e=>{const m=mentors.find(x=>x.id===e.target.value);set('mentorId',e.target.value);set('mentorName',m?.name||'');}}>
                {mentors.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
            </div>
            <div className="fg"><label>Date</label><input type="date" value={f.date} onChange={e=>set('date',e.target.value)}/></div>
            <div className="fg"><label>Period</label><select value={f.period} onChange={e=>set('period',e.target.value)}>{PERIODS.slice(0,3).map(p=><option key={p}>{p}</option>)}</select></div>
            <div className="fg"><label>Type</label><select value={f.type} onChange={e=>set('type',e.target.value)}><option>1-on-1</option><option>Group</option></select></div>
            <div className="fg full"><label>Module</label><select value={f.module} onChange={e=>set('module',e.target.value)}>{MODULES.map(m=><option key={m}>{m}</option>)}</select></div>
            <div className="fg full"><label>Attendees</label>
              <div className="pill-wrap">{staff.filter(s=>s.tracks&&s.tracks.length>0).map(s=><div key={s.id} className={`pill${f.attendees.includes(s.id)?' on':''}`} onClick={()=>toggle(s.id)}>{s.name.split(' ')[0]} <span style={{opacity:.5,fontSize:12}}>({DISC.find(d=>d.id===s.discipline)?.abbr})</span></div>)}</div>
            </div>
            <div className="fg full"><label>Objectives</label><textarea value={f.objectives} onChange={e=>set('objectives',e.target.value)}/></div>
            <div className="fg"><label>Observed Strengths</label><textarea value={f.strengths} onChange={e=>set('strengths',e.target.value)}/></div>
            <div className="fg"><label>Development Areas</label><textarea value={f.development} onChange={e=>set('development',e.target.value)}/></div>
            <div className="fg full"><label>Follow-Up Actions</label><textarea value={f.actions} onChange={e=>set('actions',e.target.value)}/></div>
            <div className="fg"><label>Rating (1–5)</label><select value={f.rating} onChange={e=>set('rating',parseInt(e.target.value))}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n} — {['','Below Exp.','Fair','Good','Strong','Excellent'][n]}</option>)}</select></div>
            <div className="fg"><label>Notes</label><textarea value={f.notes} onChange={e=>set('notes',e.target.value)} style={{minHeight:48}}/></div>
          </div>
          <div className="flex aic g8 mt12" style={{marginTop:16,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-lime" onClick={()=>{if(f.attendees.length===0)return alert('Select attendees');onSave(f);onClose();}}>Save Session</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function FormsPage({staff, evals}){
  const[view, setView] = useState('list'); // 'list' | 'fill' | 'submissions'
  const[formType, setFormType] = useState('monthly');
  const[submissions, setSubmissions] = useState(()=>{
    try{return JSON.parse(localStorage.getItem('rvgd3_formSubs')||'[]');}catch{return[];}
  });
  const[filterType, setFilterType] = useState('all');
  const[expandedSub, setExpandedSub] = useState(null);

  const saveSubmissions = subs => {
    setSubmissions(subs);
    try{localStorage.setItem('rvgd3_formSubs', JSON.stringify(subs));}catch{}
  };

  const handleSubmit = data => {
    const sub = {...data, id:'sub'+Date.now(), submittedAt: new Date().toISOString()};
    saveSubmissions([sub, ...submissions]);
    setView('submissions');
  };

  const filteredSubs = filterType==='all' ? submissions : submissions.filter(s=>s.formType===filterType);

  if(view==='fill'){
    return <FormFiller formDef={FORM_DEFS[formType]} staff={staff} onSubmit={handleSubmit} onBack={()=>setView('list')}/>;
  }

  return(
    <div>
      {/* Header row */}
      <div className="flex aic jsb mb18">
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:4}}>G&D Check-In System</div>
          <div style={{fontSize:13,color:'#aaa'}}>Three-part review cycle: Monthly momentum · Quarterly scoring · Annual alignment</div>
        </div>
        <div className="flex aic g8">
          <button className={`btn btn-sm ${view==='submissions'?'btn-go':'btn-ghost'}`} onClick={()=>setView('submissions')}>
            Submissions {submissions.length>0&&<span style={{marginLeft:4,background:'var(--lime)',color:'var(--wellness)',borderRadius:8,padding:'1px 6px',fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{submissions.length}</span>}
          </button>
          <button className={`btn btn-sm ${view==='list'?'btn-go':'btn-ghost'}`} onClick={()=>setView('list')}>New Form</button>
        </div>
      </div>

      {view==='list' && (

/* ── FORM FILLER ── */
function FormFiller({formDef, staff, onSubmit, onBack}){
  const[data, setData] = useState(()=>{
    const init={};
    formDef.sections.forEach(s=>{
      init[s.id]={};
      s.fields.forEach(f=>{
        init[s.id][f.id] = f.type==='checkboxes'?[]:''
      });
    });
    return init;
  });
  const[currentSection, setCurrentSection] = useState(0);
  const[submitted, setSubmitted] = useState(false);

  const setField=(sectionId,fieldId,val)=>{
    setData(prev=>({...prev,[sectionId]:{...prev[sectionId],[fieldId]:val}}));
  };

  const toggleCheck=(sectionId,fieldId,option)=>{
    setData(prev=>{
      const current=prev[sectionId][fieldId]||[];
      const next=current.includes(option)?current.filter(x=>x!==option):[...current,option];
      return{...prev,[sectionId]:{...prev[sectionId],[fieldId]:next}};
    });
  };

  const totalSections = formDef.sections.length;
  const progress = Math.round(((currentSection+1)/totalSections)*100);
  const section = formDef.sections[currentSection];
  const isLast = currentSection===totalSections-1;
  const colors = {monthly:'#6B9FD4',quarterly:'#F4DB71',annual:'#CAE8C1'};
  const c = colors[formDef.id];

  const handleFinalSubmit = () => {
    onSubmit({formType:formDef.id, data});
    setSubmitted(true);
  };

  if(submitted){
    return(
      <div style={{maxWidth:580,margin:'60px auto',textAlign:'center'}}>
        <div style={{fontSize:52,marginBottom:16}}>✓</div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:800,letterSpacing:'2px',color:c,marginBottom:8}}>{formDef.short.toUpperCase()} SUBMITTED</div>
        <div style={{fontSize:14,color:'#aaa',marginBottom:28}}>This check-in has been recorded and is visible to your clinical lead.</div>
        <div className="flex aic g8" style={{justifyContent:'center'}}>
          <button className="btn btn-ghost" onClick={onBack}>← Back to Forms</button>
          <button className="btn btn-lime" onClick={()=>{onBack();}}>View Submissions</button>
        </div>
      </div>
    );
  }

  return(
    <div className="form-shell">
      {/* Back */}
      <button className="btn btn-ghost btn-sm mb18" style={{marginBottom:16}} onClick={onBack}>← Back</button>

      {/* Form header */}
      <div className="form-card" style={{marginBottom:16}}>
        <div className={`form-stripe ${formDef.id}`}/>
        <div style={{padding:'18px 22px'}}>
          <div className="flex aic jsb">
            <div>
              <span className={`form-header-tag tag-${formDef.id}`} style={{marginBottom:8,display:'inline-flex'}}>{formDef.short}</span>
              <div className="form-title" style={{color:c}}>{formDef.label.toUpperCase()}</div>
              <div className="form-subtitle">{formDef.purpose}</div>
              {formDef.note&&<div style={{marginTop:6,fontSize:12,color:'#999',fontStyle:'italic'}}>{formDef.note}</div>}
            </div>
            <div style={{textAlign:'right',flexShrink:0,marginLeft:20}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:800,color:c,lineHeight:1}}>{currentSection+1}<span style={{fontSize:16,color:'#888'}}>/{totalSections}</span></div>
              <div style={{fontSize:12,color:'#999'}}>sections</div>
            </div>
          </div>
          {/* Section nav dots */}
          <div style={{display:'flex',gap:4,marginTop:14}}>
            {formDef.sections.map((s,i)=>(
              <div key={s.id} onClick={()=>setCurrentSection(i)} style={{height:3,flex:1,borderRadius:2,background:i<=currentSection?c:'var(--border)',cursor:'pointer',transition:'background .2s'}}/>
            ))}
          </div>
        </div>
      </div>

      {/* Current section */}
      <div className="form-card">
        <div className="form-card-body">
          <div className="form-section-title">
            <span className="form-section-icon">{section.icon}</span>
            {section.title}
          </div>
          {section.subtitle&&<div style={{fontSize:12,color:'#999',marginBottom:16,fontStyle:'italic',lineHeight:1.5}}>{section.subtitle}</div>}

          {/* Fields */}
          {section.fields.map(field=>(
            <div key={field.id} className="form-question">
              <label>{field.label}</label>
              {field.hint&&<div className="hint">{field.hint}</div>}
              {field.type==='text'&&(
                <input className="form-input" value={data[section.id][field.id]||''} onChange={e=>setField(section.id,field.id,e.target.value)} placeholder={field.placeholder||''}/>
              )}
              {field.type==='date'&&(
                <input type="date" className="form-input" value={data[section.id][field.id]||''} onChange={e=>setField(section.id,field.id,e.target.value)}/>
              )}
              {field.type==='textarea'&&(
                <textarea className={`form-textarea${field.tall?' tall':''}`} value={data[section.id][field.id]||''} onChange={e=>setField(section.id,field.id,e.target.value)} placeholder={field.placeholder||''}/>
              )}
              {field.type==='checkboxes'&&(
                <div className="form-check-group">
                  {field.options.map(opt=>(
                    <label key={opt} className="form-check">
                      <input type="checkbox" checked={(data[section.id][field.id]||[]).includes(opt)} onChange={()=>toggleCheck(section.id,field.id,opt)}/>
                      <span className="form-check-label">{opt}</span>
                    </label>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Footer nav */}
        <div className="form-submit-row">
          <div className="form-progress">
            <div className="progress-bar"><div className="progress-fill" style={{width:progress+'%',background:c}}/></div>
            <span>{progress}% complete</span>
          </div>
          <div className="flex aic g8">
            {currentSection>0&&<button className="btn btn-ghost btn-sm" onClick={()=>setCurrentSection(s=>s-1)}>← Previous</button>}
            {!isLast&&<button className="btn btn-sm" style={{background:c,color:'var(--black)',fontWeight:700}} onClick={()=>setCurrentSection(s=>s+1)}>Next →</button>}
            {isLast&&<button className="btn btn-lime" onClick={handleFinalSubmit}>Submit Check-In ✓</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

function BirdTestTab({staff, setStaff}){
  const existing = staff.birdResult;
  const[mode, setMode] = useState(existing ? 'result' : 'intro'); // intro | quiz | result
  const[answers, setAnswers] = useState({});
  const[qIdx, setQIdx] = useState(0);

  const handleAnswer = (t) => {
    const next = {...answers, [qIdx]: t};
    setAnswers(next);
    if(qIdx < BIRD_QUESTIONS.length - 1){
      setQIdx(q=>q+1);
    } else {
      // tally
      const counts = {D:0,I:0,S:0,C:0};
      Object.values(next).forEach(v=>counts[v]++);
      const winner = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
      const result = {...BIRD_RESULTS[winner], counts, answeredAt: new Date().toISOString()};
      setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,birdResult:result}:s));
      setMode('result');
    }
  };

  const retake = () => {setAnswers({});setQIdx(0);setMode('quiz');setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,birdResult:null}:s));};

  const result = staff.birdResult || BIRD_RESULTS[Object.entries(answers).length>0?Object.entries({D:0,I:0,S:0,C:0,...Object.fromEntries(Object.entries({D:0,I:0,S:0,C:0}).map(([k])=>[k,(Object.values(answers).filter(v=>v===k).length)]))}).sort((a,b)=>b[1]-a[1])[0][0]:'D'];

  if(mode==='intro'){
    return(
      <div className="bird-shell">
        <div className="bird-intro">
          <div style={{fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:'var(--lime)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:6}}>DISC / Bird Personality Test</div>
          <div style={{fontSize:13,color:'#aaa',lineHeight:1.7}}>The Bird Test maps clinical personality across four types — Eagle, Parrot, Dove, and Owl — based on the DISC framework adapted for a clinical setting. Understanding your type helps you lean into your natural strengths, identify growth edges, and understand who you work best alongside.</div>
        </div>
        <div className="bird-types">
          {Object.values(BIRD_RESULTS).map(b=>(
            <div key={b.name} className={`bird-type-card bird-${b.cls}`}>
              <div style={{fontSize:24,marginBottom:5}}>{b.emoji}</div>
              <div className="bird-name" style={{color:b.color}}>{b.name}</div>
              <div className="bird-tagline">{b.tagline}</div>
              <div className="bird-traits">
                {b.strengths.slice(0,2).map(s=><span key={s} className="bird-trait">{s.split(' ').slice(0,3).join(' ')}</span>)}
              </div>
            </div>
          ))}
        </div>
        <div className="flex aic g8">
          <button className="btn btn-lime" onClick={()=>setMode('quiz')}>Take the Test ({BIRD_QUESTIONS.length} questions) →</button>
          <span style={{fontSize:12,color:'#888'}}>Takes about 3 minutes</span>
        </div>
      </div>
    );
  }

  if(mode==='quiz'){
    const q = BIRD_QUESTIONS[qIdx];
    const progress = Math.round((qIdx/BIRD_QUESTIONS.length)*100);
    const shuffled = q.opts; // keep order consistent
    return(
      <div className="bird-shell">
        <div style={{marginBottom:16}}>
          <div style={{display:'flex',gap:4,marginBottom:10}}>
            {BIRD_QUESTIONS.map((_,i)=><div key={i} style={{flex:1,height:2,borderRadius:1,background:i<qIdx?'var(--go)':i===qIdx?'var(--lime)':'var(--border)',transition:'background .2s'}}/>)}
          </div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:'2px',color:'#888',textTransform:'uppercase'}}>Question {qIdx+1} of {BIRD_QUESTIONS.length}</div>
        </div>
        <div className="bird-quiz-q">
          <div className="bird-quiz-q-text">{q.q}</div>
          {shuffled.map((opt,i)=>{
            const letters = ['A','B','C','D'];
            const isSelected = answers[qIdx]===opt.t;
            return(
              <div key={i} className={`bird-option${isSelected?' selected':''}`} onClick={()=>handleAnswer(opt.t)}>
                <span className="bird-option-letter">{letters[i]}</span>
                <span className="bird-option-text">{opt.text}</span>
              </div>
            );
          })}
        </div>
        {qIdx>0&&<button className="btn btn-ghost btn-sm" onClick={()=>setQIdx(q=>q-1)}>← Back</button>}
      </div>
    );
  }

  if(mode==='result'&&staff.birdResult){
    const r = staff.birdResult;
    return(
      <div className="bird-shell">
        <div className={`bird-result bird-result-${r.cls}`}>
          <div className="flex aic jsb mb12" style={{marginBottom:12}}>
            <div>
              <div style={{fontSize:36,marginBottom:4}}>{r.emoji}</div>
              <div className="bird-name" style={{color:r.color,fontSize:26}}>{r.name}</div>
              <div style={{fontSize:13,color:'#888',marginTop:2}}>{r.tagline}</div>
            </div>
            <div style={{textAlign:'right'}}>
              {r.counts&&Object.entries(r.counts).map(([k,v])=>(
                <div key={k} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,justifyContent:'flex-end'}}>
                  <span style={{fontSize:12,color:'#888',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px'}}>{['D','I','S','C'].find(x=>x===k)?{D:'Eagle 🦅',I:'Parrot 🦜',S:'Dove 🕊️',C:'Owl 🦉'}[k]:k}</span>
                  <div style={{width:60,height:4,background:'var(--surface3)',borderRadius:2}}><div style={{height:'100%',borderRadius:2,background:r.color,width:(v/10*100)+'%'}}/></div>
                  <span style={{fontSize:12,color:r.color,fontWeight:700,minWidth:14}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{fontSize:13,color:'#aaa',lineHeight:1.7}}>{r.description}</div>
        </div>

        <div className="grid2 mb14" style={{marginBottom:14}}>
          <div style={{background:'var(--surface2)',borderRadius:5,padding:'13px 15px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:'var(--lime)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:10}}>Core Strengths</div>
            {r.strengths.map(s=><div key={s} style={{display:'flex',gap:8,marginBottom:7}}><span style={{color:'var(--lime)',flexShrink:0}}>↑</span><span style={{fontSize:12,color:'#aaa',lineHeight:1.5}}>{s}</span></div>)}
          </div>
          <div style={{background:'var(--surface2)',borderRadius:5,padding:'13px 15px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:'var(--yellow)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:10}}>Growth Edges</div>
            {r.growthEdges.map(s=><div key={s} style={{display:'flex',gap:8,marginBottom:7}}><span style={{color:'var(--yellow)',flexShrink:0}}>→</span><span style={{fontSize:12,color:'#aaa',lineHeight:1.5}}>{s}</span></div>)}
          </div>
        </div>

        <div style={{background:'var(--surface2)',borderRadius:5,padding:'13px 15px',border:'1px solid var(--border)',marginBottom:14}}>
          <div style={{fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:7}}>Clinical Style</div>
          <div style={{fontSize:13,color:'#aaa',lineHeight:1.6}}>{r.clinicalStyle}</div>
        </div>

        <div className="grid2 mb14" style={{marginBottom:14}}>
          <div style={{background:'var(--surface2)',borderRadius:5,padding:'13px 15px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:'#44ccaa',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:8}}>Works Best With</div>
            {r.bestWith.map(s=><div key={s} style={{fontSize:12,color:'#aaa',marginBottom:5,paddingLeft:12,borderLeft:'2px solid #44ccaa'}}>{s}</div>)}
          </div>
          <div style={{background:'var(--surface2)',borderRadius:5,padding:'13px 15px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:'var(--red)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:8}}>Watch Out For</div>
            {r.challengeWith.map(s=><div key={s} style={{fontSize:12,color:'#aaa',marginBottom:5,paddingLeft:12,borderLeft:'2px solid var(--red)'}}>{s}</div>)}
          </div>
        </div>

        <button className="btn btn-ghost btn-sm" onClick={retake}>↺ Retake Test</button>
      </div>
    );
  }

  return null;
}

/* ══════════════════════════════════════════════

function getBandLabel(v){
  if(v===null||v===undefined||v==='')return null;
  const n=parseFloat(v);
  if(n>=8)return{label:'Predictive',cls:'band-predict'};
  if(n>=7)return{label:'Competent',cls:'band-competent'};
  if(n>=5)return{label:'Transactional',cls:'band-transact'};
  return{label:'Surface',cls:'band-surface'};
}

function ProfileEditTab({staff,setStaff}){
  const[editing,setEditing]=useState(false);
  const[f,setF]=useState({name:staff.name||'',email:staff.email||'',discipline:staff.discipline||'pt',role:staff.role||'',site:staff.site||'Markham',roadmap:staff.roadmap||'',archetype:staff.archetype||'',notes:staff.notes||'',reflection:staff.reflection||'',tracks:staff.tracks||[]});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleTrack=t=>setF(p=>({...p,tracks:p.tracks.includes(t)?p.tracks.filter(x=>x!==t):[...p.tracks,t]}));
  const save=()=>{setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,...f}:s));setEditing(false);};

  if(!editing)return(
    <div>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:10}}>
        <button className="btn btn-go btn-sm" onClick={()=>setEditing(true)}>✎ Edit Profile</button>
      </div>
      {staff.notes&&<div className="hb hb-gray mb14"><div style={{fontSize:8,letterSpacing:'2px',textTransform:'uppercase',color:'var(--lime)',marginBottom:5}}>Profile Summary</div><div className="sm" style={{lineHeight:1.65}}>{staff.notes}</div></div>}
      {staff.reflection&&staff.reflection.length>20&&<div className="note-item mb14"><div className="note-date">Latest G&D Reflection</div><div className="sm" style={{lineHeight:1.6}}>{staff.reflection}</div></div>}
      <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,padding:'12px 16px'}}>
        {[['Name',staff.name],['Email',staff.email||'—'],['Discipline',DISC.find(d=>d.id===staff.discipline)?.label||staff.discipline],['Role',staff.role||'—'],['Site',staff.site||'—'],['Roadmap',staff.roadmap||'—'],['Archetype',staff.archetype||'—']].map(([k,v])=>(
          <div key={k} style={{display:'flex',alignItems:'center',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontSize:12,color:'#999',minWidth:100}}>{k}</span>
            <span style={{fontSize:12,color:'var(--text)'}}>{v}</span>
          </div>
        ))}
        <div style={{display:'flex',alignItems:'center',padding:'6px 0'}}>
          <span style={{fontSize:12,color:'#999',minWidth:100}}>Tracks</span>
          <div className="flex aic g5">{(staff.tracks||[]).map(t=><span key={t} className={`track-pill tp-${t} active`}>{TRACK_META[t]?.label}</span>)}</div>
        </div>
      </div>
    </div>
  );

  return(
    <div>
      <div style={{background:'rgba(0,88,77,.12)',border:'1px solid rgba(0,88,77,.3)',borderRadius:5,padding:'8px 14px',marginBottom:12,fontSize:12,color:'var(--lime)'}}>✎ Edit Mode — click Save Profile when done</div>
      <div className="fgrid">
        <div className="fg full"><label>Full Name</label><input value={f.name} onChange={e=>set('name',e.target.value)}/></div>
        <div className="fg full"><label>Email (revibeto.com)</label><input value={f.email||''} onChange={e=>set('email',e.target.value)} placeholder="firstname@revibeto.com"/></div>
        <div className="fg"><label>Discipline</label><select value={f.discipline} onChange={e=>set('discipline',e.target.value)}>{DISC.map(d=><option key={d.id} value={d.id}>{d.label}</option>)}</select></div>
        <div className="fg"><label>Role / Title</label><input value={f.role} onChange={e=>set('role',e.target.value)}/></div>
        <div className="fg"><label>Site</label><select value={f.site} onChange={e=>set('site',e.target.value)}>{SITES.map(s=><option key={s}>{s}</option>)}</select></div>
        <div className="fg"><label>Roadmap Phase</label><select value={f.roadmap} onChange={e=>set('roadmap',e.target.value)}><option value="">—</option><option>L1→L2</option><option>L2→L3</option><option>L3→L4</option></select></div>
        <div className="fg"><label>Archetype</label><input value={f.archetype} onChange={e=>set('archetype',e.target.value)} placeholder="Anchor / Builder / Mentor…"/></div>
        <div className="fg full"><label>Rubric Tracks</label>
          <div className="flex aic g6" style={{paddingTop:4}}>{['clinical','spa','sc'].map(t=><button key={t} className={`track-pill tp-${t}${f.tracks.includes(t)?' active':''}`} onClick={()=>toggleTrack(t)}>{TRACK_META[t]?.label}</button>)}</div>
        </div>
        <div className="fg full"><label>Coaching Notes</label><textarea value={f.notes} onChange={e=>set('notes',e.target.value)} style={{minHeight:70}}/></div>
        <div className="fg full"><label>G&D Reflection</label><textarea value={f.reflection} onChange={e=>set('reflection',e.target.value)} style={{minHeight:70}}/></div>
      </div>
      <div className="flex aic g8" style={{marginTop:14,justifyContent:'flex-end'}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(false)}>Cancel</button>
        <button className="btn btn-lime btn-sm" onClick={save}>✓ Save Profile</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   SCORES EDIT TAB — editable sliders
══════════════════════════════════════════════ */
function ScoresEditTab({staff,setStaff,activeTrack,setActiveTrack,tracks,rs,trackScore,trackTotal}){
  const initScores=()=>{const ex=staff.scores?.[activeTrack]||{};const out={};if(rs)rs.cats.forEach(c=>{out[c.id]=ex[c.id]!==undefined?ex[c.id]:'';});return out;};
  const[localScores,setLocalScores]=useState(initScores);
  const[saved,setSaved]=useState(false);
  const prevTrack=React.useRef(activeTrack);
  useEffect(()=>{if(prevTrack.current!==activeTrack){prevTrack.current=activeTrack;setLocalScores(initScores());}},[activeTrack]);
  const setScore=(id,val)=>{const n=val===''?'':Math.min(10,Math.max(0,parseFloat(val)||0));setLocalScores(p=>({...p,[id]:n}));};
  const liveTotal=rs?Math.round(rs.cats.reduce((t,c)=>{const v=parseFloat(localScores[c.id]);return isNaN(v)?t:t+v*(c.weight/100);},0)*100)/100:null;
  const saveScores=()=>{setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,scores:{...s.scores,[activeTrack]:{...localScores,total:liveTotal}}}:s));setSaved(true);setTimeout(()=>setSaved(false),1800);};
  if(!rs)return<div className="empty"><div className="empty-ico">📊</div><p>No track selected.</p></div>;
  const tc=TRACK_META[activeTrack]?.color||'var(--go)';
  return(
    <div>
      {tracks.length>1&&<div className="flex aic g6" style={{marginBottom:12}}><span style={{fontSize:12,color:'var(--text3)'}}>Track:</span>{tracks.map(t=><button key={t} className={`track-pill tp-${t}${activeTrack===t?' active':''}`} onClick={()=>setActiveTrack(t)}>{TRACK_META[t]?.label}</button>)}</div>}
      <div style={{background:'rgba(0,88,77,.12)',border:'1px solid rgba(0,88,77,.3)',borderRadius:5,padding:'8px 14px',marginBottom:12,fontSize:12,color:'var(--lime)'}}>Adjust sliders or type scores (0–10). Click Save Scores when done.</div>
      {rs.cats.map(c=>{
        const v=localScores[c.id];const num=parseFloat(v);
        const band=!isNaN(num)?getBandLabel(num):null;
        const bc=!isNaN(num)?(num>=8?'#CAE8C1':num>=7?'#44CCAA':num>=5?'#F4DB71':'#E05252'):'#555';
        return(
          <div key={c.id} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,padding:'11px 14px',marginBottom:7}}>
            <div className="flex aic jsb" style={{marginBottom:8}}>
              <div><div className="sm fw5">{c.label}</div><div style={{fontSize:12,color:'#888'}}>Weight: {c.weight}%</div></div>
              <div className="flex aic g8">
                {band&&<span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,padding:'2px 7px',borderRadius:3,background:bc+'22',color:bc}}>{band.label}</span>}
                <input type="number" min="0" max="10" step="0.5" style={{width:44,textAlign:'center',background:'var(--surface3)',border:'1px solid',borderColor:v!==''&&!isNaN(num)?bc:'var(--border2)',borderRadius:4,color:bc,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,padding:'3px 0',outline:'none'}} value={v} onChange={e=>setScore(c.id,e.target.value)}/>
              </div>
            </div>
            <input type="range" min="0" max="10" step="0.5" style={{WebkitAppearance:'none',appearance:'none',width:'100%',height:4,borderRadius:2,background:'var(--surface3)',outline:'none',cursor:'pointer'}} value={v===''?0:v} onChange={e=>setScore(c.id,e.target.value)}/>
            <div style={{height:3,background:'var(--surface3)',borderRadius:2,marginTop:5}}><div style={{height:'100%',borderRadius:2,background:tc,width:(!isNaN(num)?num/10*100:0)+'%',transition:'width .15s'}}/></div>
          </div>
        );
      })}
      {liveTotal!==null&&(
        <div style={{background:'var(--surface2)',border:`1px solid ${tc}44`,borderRadius:5,padding:'14px 18px',marginTop:4,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:12,color:'#aaa',marginBottom:3}}>Live Weighted Score</div>
            <div className="flex aic g10"><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:36,fontWeight:800,color:tc,lineHeight:1}}>{liveTotal}</span><LvBadge score={liveTotal}/></div>
          </div>
          <button className="btn btn-lime" onClick={saveScores}>{saved?'✓ Saved!':'Save Scores'}</button>
        </div>
      )}
    </div>
  );
}

                    <div className="flex aic jsb">
                      <span className={`badge ${lvc?.cls||''}`} style={{fontSize:12}}>{v}/10</span>

                );

            ):(
              <button className="btn btn-ghost btn-sm" style={{fontSize:12,color:'#888'}} onClick={()=>setConfirmDel(true)}>🗑 Delete</button>
            )}
            <button className="btn btn-lime btn-sm" onClick={onClose}>Done</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function calcReadiness(p){
  const s2vals=Object.values(p.s2);
  const s2avg=s2vals.reduce((a,b)=>a+(parseFloat(b)||0),0)/s2vals.length;
  const{util,gva,retention,rebook,doc}=p.s3;
  const s3=Math.min(10,(util>=85?2:util>=75?1.5:util>=65?1:0.5)+(gva>=8?2:gva>=6?1.5:gva>=4?1:0.5)+(retention>=85?2:retention>=75?1.5:retention>=65?1:0.5)+(rebook>=80?2:rebook>=70?1.5:rebook>=60?1:0.5)+(doc>=95?2:doc>=85?1.5:doc>=75?1:0.5));
  const gvals=Object.values(p.gates);
  const gateScore=Math.round(gvals.reduce((a,v)=>a+(v==='Yes'?1:v==='Partial'?.5:0),0)*10)/10;
  const noCount=gvals.filter(v=>v==='No').length;
  const gateBlocked=noCount>=2;
  const flagCount=Object.values(p.redFlags).filter(Boolean).length;
  const flagBlocked=flagCount>=2;
  const promoBlocked=p.timeAvail==='No'||p.risk==='Low'||gateBlocked||flagBlocked;
  const s2w=(s2avg/10)*50,s3w=(s3/10)*25,s4w=(gateScore/7)*15,s5w=(p.s5.primaryScore/10)*10;
  const total=Math.round(s2w+s3w+s4w+s5w);
  const{primaryScore:ps,secondaryScore:ss}=p.s5;
  const locCat=ps>=9?(ss>=7?'🌐 Multi-Loc Operator':'🚀 Expansion Leader'):ps>=7?(ss>=5?'🔄 Regional Support':'⭐ Location Lead Ready'):ps>=5?'📍 Location Contributor':'🌱 Building';
  let status;
  if(promoBlocked||flagBlocked||gateBlocked)status='blocked';
  else if(total>=85)status='expansion';
  else if(total>=75)status='ready-now';
  else if(total>=65)status='ready-36';
  else if(total>=50)status='emerging';
  else status='not-ready';
  return{s2avg:Math.round(s2avg*10)/10,s3:Math.round(s3*10)/10,gateScore,gateBlocked,flagCount,flagBlocked,promoBlocked,total,locCat,status};
}

function LeadershipPage(){
  const[ltData,setLtData]=useState(SEED_LEADERSHIP);
  const[ltLoading,setLtLoading]=useState(true);
  useEffect(()=>{(async()=>{const d=await dbGet('leadership',SEED_LEADERSHIP);setLtData(d.length?d:SEED_LEADERSHIP);setLtLoading(false);})();},[]);
  const[activeTab,setActiveTab]=useState('roster');
  const[selectedPerson,setSelectedPerson]=useState(null);
  const[filterLoc,setFilterLoc]=useState('all');
  const[filterStatus,setFilterStatus]=useState('all');
  const save=async(data)=>{setLtData(data);await dbUpsert('leadership',data);};
  const[showAdd,setShowAdd]=useState(false);
  const updatePerson=(id,updates)=>{const updated=ltData.map(p=>p.id===id?{...p,...updates}:p);save(updated);if(selectedPerson?.id===id)setSelectedPerson(updated.find(p=>p.id===id));};
  const addPerson=p=>save([...ltData,p]);
  const removePerson=id=>{save(ltData.filter(p=>p.id!==id));setSelectedPerson(null);};
  const computed=ltData.map(p=>({...p,r:calcReadiness(p)}));
  const counts={};computed.forEach(p=>{counts[p.r.status]=(counts[p.r.status]||0)+1;});
  const locations=[...new Set(ltData.map(p=>p.primaryLoc))].sort();
  const disciplines=[...new Set(ltData.map(p=>p.disc))].sort();
  const filtered=computed.filter(p=>{
    if(filterLoc!=='all'&&p.primaryLoc!==filterLoc)return false;
    if(filterStatus!=='all'&&p.r.status!==filterStatus)return false;
    if(filterDisc!=='all'&&p.disc!==filterDisc)return false;
    return true;
  });
  const benchByLoc=locations.reduce((acc,loc)=>{
    const people=computed.filter(p=>p.primaryLoc===loc);
    const ready=people.filter(p=>p.r.status==='ready-now'||p.r.status==='expansion').length;
    const dev=people.filter(p=>p.r.status==='ready-36'||p.r.status==='emerging').length;
    const blocked=people.filter(p=>p.r.status==='blocked'||p.r.status==='not-ready').length;
    acc[loc]={people:people.length,ready,dev,blocked,score:people.length?Math.round((ready*3+dev)/(people.length*3)*100):0};
    return acc;
  },{});

  return(
    <div>
      <div className="flex aic jsb" style={{marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:3}}>Management · Confidential</div>
          <div style={{fontSize:12,color:'#999'}}>Click any row to view and edit all scores · Leadership = Stability Under Weight</div>
        </div>
        <div className="flex aic g6">
          {['roster','heat-map','doctrine'].map(t=>(
            <button key={t} className={`btn btn-sm ${activeTab===t?'btn-go':'btn-ghost'}`} onClick={()=>setActiveTab(t)}>
              {t==='roster'?'◎ Roster':t==='heat-map'?'▣ Heat Map':'◐ Doctrine'}
            </button>
          ))}
          <button className="btn btn-lime btn-sm" onClick={()=>setShowAdd(true)}>+ Add</button>
          <button className="btn btn-ghost btn-xs" style={{fontSize:12,color:'#444'}} title="Reset sample data" onClick={()=>{if(window.confirm('Reset to sample data?'))save(SEED_LEADERSHIP);}}>↺</button>
        </div>
      </div>

      <div className="lt-grid" style={{gridTemplateColumns:'repeat(6,1fr)'}}>
        {[{label:'Total Tracked',val:ltData.length,color:'#aaa'},{label:'Expansion Ready',val:counts['expansion']||0,color:'#CAE8C1'},{label:'Ready Now',val:counts['ready-now']||0,color:'#44CCAA'},{label:'Ready 3–6 Mo',val:counts['ready-36']||0,color:'#F4DB71'},{label:'Emerging',val:counts['emerging']||0,color:'#6B9FD4'},{label:'Blocked/Not Ready',val:(counts['blocked']||0)+(counts['not-ready']||0),color:'#E05252'}].map(s=>(
          <div key={s.label} className="lt-stat"><div className="lt-stat-num" style={{color:s.color}}>{s.val}</div><div className="lt-stat-lbl">{s.label}</div></div>
        ))}
      </div>

      {activeTab==='roster'&&(
        <div>
          <div className="filter-row">
            <div className="filter-grp flex aic g6">
              <select className="form-input" style={{width:'auto',padding:'5px 10px',fontSize:12}} value={filterLoc} onChange={e=>setFilterLoc(e.target.value)}><option value="all">All Locations</option>{locations.map(l=><option key={l}>{l}</option>)}</select>
              <select className="form-input" style={{width:'auto',padding:'5px 10px',fontSize:12}} value={filterDisc} onChange={e=>setFilterDisc(e.target.value)}><option value="all">All Disciplines</option>{disciplines.map(d=><option key={d}>{d}</option>)}</select>
              <select className="form-input" style={{width:'auto',padding:'5px 10px',fontSize:12}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option value="all">All Statuses</option>{['expansion','ready-now','ready-36','emerging','not-ready','blocked'].map(s=><option key={s} value={s}>{STATUS_META[s].label}</option>)}</select>

            {title:'Promotion Logic',items:[{sub:'Cannot Promote',text:'Time Availability = No · Risk = Low for Expansion · 2+ Red Flags · 2+ Gates = No',color:'#E05252'},{sub:'Micro-Lead Only',text:'Part-Time + Limited → Education / culture / peer mentorship only. NOT operational leadership.',color:'#F4DB71'},{sub:'Expansion Candidate',text:'High Risk · 6+ hrs/wk available · Score ≥ 85 · Zero blocks · Zero flags',color:'#CAE8C1'}]},
            {title:'How To Grade',items:[{sub:'Principles',text:'Compare within discipline · Compare within location context · Evaluate trends not snapshots · Separate personality from production',color:'#6B9FD4'},{sub:'Categories',text:'📍 Contributor → ⭐ Location Lead → 🔄 Regional Support → 🌐 Multi-Loc Operator → 🚀 Expansion Leader',color:'#BB99FF'},{sub:'Core Standard',text:'"Leadership = Stability Under Weight" — Can they hold the team when things get hard?',color:'#CAE8C1'}]},
          ].map(section=>(
            <div key={section.title} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,padding:'16px 18px'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:'var(--lime)',fontWeight:700,marginBottom:14}}>{section.title}</div>
              {section.items.map(item=>(
                <div key={item.sub} style={{marginBottom:12,paddingLeft:10,borderLeft:`2px solid ${item.color}44`}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,color:item.color,marginBottom:4}}>{item.sub}</div>
                  <div style={{fontSize:12,color:'#888',lineHeight:1.65}}>{item.text}</div>
                </div>
              ))}
            </div>
          ))}

      )}

      {selectedPerson&&<LtProfileModal person={selectedPerson} onClose={()=>setSelectedPerson(null)} onUpdate={updatePerson}/>}
      {showAdd&&<AddLtProfileModal onClose={()=>setShowAdd(false)} onAdd={addPerson}/>}
    </div>
  );
}
