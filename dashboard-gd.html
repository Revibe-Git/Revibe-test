              <div key={s.id} onClick={()=>openProfile(s.id)} style={{cursor:'pointer',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px'}}>
                <div className="flex aic g8" style={{marginBottom:6}}>
                  <Av name={s.name} sz="sm"/>
                  <div style={{flex:1,minWidth:0}}><div className="sm fw5">{s.name}</div><div className="flex aic g4" style={{marginTop:2}}><DBadge d={s.discipline}/>{site&&<span style={{fontSize:10,color:'#777'}}>{site}</span>}</div></div>
                </div>

                {tx&&<div style={{fontSize:11,color:'#8a8a8a',lineHeight:1.45,marginTop:3}}><span style={{color:'#666'}}>Treats with:</span> {tx.length>95?tx.slice(0,95)+'…':tx}</div>}
                {exc&&<div style={{fontSize:10.5,color:'#c08a8a',lineHeight:1.4,marginTop:3}}><span style={{color:'#8a6a6a'}}>Does not do:</span> {exc.length>70?exc.slice(0,70)+'…':exc}</div>}

            );

function StaffPage({staff,openProfile,setModal}){

/* ══ GAPS ══ */
function GapsPage({staff,evals,openProfile}){
  const trackAvgs=useMemo(()=>{
    const result={};
    ['clinical','spa','sc'].forEach(track=>{
      const rs=RUBRIC_SYSTEMS[track];
      const avgs=rs.cats.map(c=>{
        const vals=staff.filter(s=>s.scores?.[track]&&s.scores[track][c.id]!==null&&s.scores[track][c.id]!==undefined).map(s=>parseFloat(s.scores[track][c.id]||0));
        return{...c,avg:vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10:null};
      });
      result[track]=avgs.sort((a,b)=>(a.avg||10)-(b.avg||10));
    });
    return result;
  },[staff,evals]);

  return(
    <div>
      <div className="sg3 mb18">
        <div className="sc yellow"><div className="sc-lbl">Staff Below L2</div><div className="sc-val">{staff.filter(s=>{const sc=getBestScore(s);return sc!==null&&sc<6;}).length}</div><div className="sc-sub">Score under 6.0</div></div>
        <div className="sc purple"><div className="sc-lbl">Multi-Track</div><div className="sc-val">{staff.filter(s=>s.tracks&&s.tracks.length>1).length}</div><div className="sc-sub">Assessed on 2+ rubrics</div></div>
        <div className="sc go"><div className="sc-lbl">Pending Scores</div><div className="sc-val">{staff.filter(s=>s.tracks&&s.tracks.length>0&&getBestScore(s)===null).length}</div><div className="sc-sub">No audit data yet</div></div>
      </div>

      {['clinical','spa','sc'].map(track=>{
        const rs=RUBRIC_SYSTEMS[track];
        const m=TRACK_META[track];
        const avgs=trackAvgs[track];
        const count=staff.filter(s=>s.tracks&&s.tracks.includes(track)).length;
        if(count===0)return null;
        return(
          <div key={track} className="card mb18" style={{marginBottom:14}}>
            <div className="card-head">
              <div className="flex aic g8"><div style={{width:3,height:20,borderRadius:2,background:m.color}}/><span className="card-lbl">{rs.label} Track — Category Averages</span><TrackBadge t={track}/></div>
              <span className="muted xs">{count} staff on this track</span>
            </div>
            {avgs.map(c=>(
              <div key={c.id} className="score-row">
                <div className="score-row-lbl" style={{color:c.avg!==null&&c.avg<6.5?'var(--yellow)':'var(--text)'}}>{c.label}{c.avg!==null&&c.avg<6.5&&<span style={{marginLeft:6,fontSize:14,color:'var(--yellow)'}}>⚑ Gap</span>}</div>
                <div className="score-row-wt">({c.weight}%)</div>
                <div className="score-row-bar">{c.avg!==null?<ScoreBar score={c.avg}/>:<span className="muted xs">No data</span>}</div>
              </div>
            ))}
          </div>
        );
      })}

      <div className="card">
        <div className="card-head"><span className="card-lbl">Full Staff Score Matrix</span></div>
        <div className="tbl-wrap"><table>
          <thead><tr><th>Staff</th><th>Tracks</th><th>Clinical</th><th>Spa</th><th>Perf</th><th>Best</th><th>Level</th></tr></thead>
          <tbody>
            {staff.filter(s=>s.tracks&&s.tracks.length>0).sort((a,b)=>(getBestScore(b)||0)-(getBestScore(a)||0)).map(s=>{
              const cSc=s.scores?.clinical?.total??null;
              const spSc=s.scores?.spa?.total??null;
              const scSc=s.scores?.sc?.total??null;
              return(<tr key={s.id} onClick={()=>openProfile(s.id)}>
                <td><div className="flex aic g8"><Av name={s.name} sz="sm"/><div><div className="sm fw5">{s.name}</div><DBadge d={s.discipline}/></div></div></td>
                <td><div className="flex aic g4">{s.tracks.map(t=><TrackBadge key={t} t={t}/>)}</div></td>
                <td>{cSc!==null?<ScoreBar score={cSc}/>:<span className="muted xs">—</span>}</td>
                <td>{spSc!==null?<ScoreBar score={spSc}/>:<span className="muted xs">—</span>}</td>
                <td>{scSc!==null?<ScoreBar score={scSc}/>:<span className="muted xs">—</span>}</td>
                <td><ScoreBar score={getBestScore(s)}/></td>
                <td><LvBadge score={getBestScore(s)}/></td>
              </tr>);
            })}
          </tbody>
        </table></div>
      </div>
    </div>
  );
}

function ProfileModal({staff,onClose,evals,setEvals,sessions,setStaff,allStaff,perfData}){
  const[tab,setTab]=useState('profile');
  const[activeTrack,setActiveTrack]=useState(()=>staff.tracks&&staff.tracks.length>0?staff.tracks[0]:'clinical');
  const fileRef=useRef();

  if(!staff)return null;

  const tracks=staff.tracks||[];
  const sSess=sessions.filter(s=>s.attendees?.includes(staff.id));
  const rs=RUBRIC_SYSTEMS[activeTrack];

  const handleFileDrop=async(files)=>{
    const newFiles=await Promise.all(Array.from(files).map(async f=>{
      const fileId='f'+Date.now()+Math.random().toString(36).slice(2,7);
      const meta={id:fileId,name:f.name,size:f.size,type:f.type,date:new Date().toISOString().slice(0,10)};
      // Try Supabase Storage first
      const sb=window.__SB;
      if(sb){
        try{
          const path=`${staff.id}/${fileId}_${f.name}`;
          const{error}=await sb.storage.from('staff-files').upload(path,f,{upsert:true});
          if(!error){
            const{data:urlData}=sb.storage.from('staff-files').getPublicUrl(path);
            return{...meta,storageUrl:urlData?.publicUrl,path};
          }
        }catch(e){console.warn('Storage upload failed, falling back to base64:',e);}
      }
      // Fallback to base64
      return new Promise(res=>{
        const r=new FileReader();
        r.onload=e=>res({...meta,data:e.target.result});
        r.readAsDataURL(f);
      });
    }));
    setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,files:[...(s.files||[]),...newFiles]}:s));
  };
  const removeFile=async(fid)=>{
    const f=(staff.files||[]).find(x=>x.id===fid);
    if(f?.path){const sb=window.__SB;if(sb)sb.storage.from('staff-files').remove([f.path]).then();}
    setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,files:(s.files||[]).filter(f=>f.id!==fid)}:s));
  };
  const downloadFile=f=>{
    if(f.storageUrl){window.open(f.storageUrl,'_blank');return;}
    const a=document.createElement('a');a.href=f.data;a.download=f.name;a.click();
  };

  const trackScore=staff.scores?.[activeTrack];
  const trackTotal=trackScore?.total??null;
  const lv=getLevel(trackTotal);

  const getTabs=()=>{
    const base=['profile','numbers','evaluations','education','bird','files'];
    if(tracks.length>0)base.splice(2,0,'scores','catdefs','roadmap');
    return base;
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe"/>
        <button className="modal-close" onClick={onClose}>✕ Close</button>
        <div className="modal-body">

          {/* HEADER */}
          <div className="prof-head">
            <Av name={staff.name} sz="lg"/>
            <div style={{flex:1}}>
              <div className="prof-name">{staff.name}</div>
              <div className="prof-meta">
                <DBadge d={staff.discipline}/>
                <span className="muted">{staff.role}</span>
                {staff.split&&<span style={{marginLeft:6,fontSize:14,background:'rgba(68,204,170,.1)',color:'#44CCAA',border:'1px solid rgba(68,204,170,.2)',borderRadius:3,padding:'1px 7px'}}>{staff.split}% split</span>}
                {staff.stipend&&<span style={{marginLeft:4,fontSize:14,background:'rgba(244,219,113,.08)',color:'#F4DB71',border:'1px solid rgba(244,219,113,.2)',borderRadius:3,padding:'1px 7px'}}>+Stipend</span>}
                {(staff.specializations||[]).map(sid=>{const sp=SPECIALIZATIONS.find(s=>s.id===sid);return sp?<span key={sid} style={{marginLeft:4,fontSize:14,background:'rgba(187,153,255,.08)',color:'#BB99FF',border:'1px solid rgba(187,153,255,.2)',borderRadius:3,padding:'1px 7px'}}>{sp.label}</span>:null;})}
                <span className="muted">·</span>
                <span className="muted">{staff.site}</span>
                {staff.roadmap&&<span className="badge b-quarterly">{staff.roadmap}</span>}
                {staff.archetype&&<span className="badge b-weekly">{staff.archetype}</span>}
              </div>
              {tracks.length>1&&(
                <div className="flex aic g6" style={{marginTop:10}}>
                  <span style={{fontSize:14,color:'var(--text3)',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1.5px',textTransform:'uppercase'}}>Tracks:</span>
                  {tracks.map(t=><button key={t} className={`track-pill tp-${t}${activeTrack===t?' active':''}`} onClick={()=>setActiveTrack(t)}>{TRACK_META[t]?.label} {staff.scores?.[t]?.total!==null&&staff.scores?.[t]?.total!==undefined?`(${staff.scores[t].total})`:''}</button>)}
                </div>
              )}
              {tracks.length===1&&(
                <div className="flex aic g6" style={{marginTop:8}}>
                  {tracks.map(t=><span key={t} className={`track-pill tp-${t} active`}>{TRACK_META[t]?.label} Track</span>)}

              )}
            </div>
            {trackTotal!==null&&(
              <div className="prof-score-block">
                {rs&&<div style={{fontSize:14,color:TRACK_META[activeTrack]?.color,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'2px',textTransform:'uppercase',marginBottom:4}}>{rs.label}</div>}
                <LvBadge score={trackTotal}/>

            {trackTotal===null&&tracks.length>0&&(
              <div className="prof-score-block">
                <div style={{fontSize:14,color:'var(--text3)',textAlign:'center'}}>Pending<br/>Evaluation</div>
              </div>

          </div>

          {/* TABS */}
          <div className="tabs">
            {getTabs().map(t=>(
              <button key={t} className={`tab${tab===t?' active':''}`} onClick={()=>setTab(t)}>

                {t==='files'&&(staff.files||[]).length>0&&<span style={{marginLeft:4,fontSize:14,background:'var(--go)',color:'var(--lime)',borderRadius:8,padding:'1px 5px',fontFamily:"'Barlow Condensed',sans-serif"}}>{(staff.files||[]).length}</span>}
              </button>
            ))}
          </div>

          {/* PROFILE TAB */}
          {tab==='profile'&&(<ProfileEditTab staff={staff} setStaff={setStaff} perfData={perfData} onClose={onClose}/>)}

          {/* SCORES TAB */}
          {tab==='scores'&&rs&&(<ScoresEditTab staff={staff} setStaff={setStaff} activeTrack={activeTrack} setActiveTrack={setActiveTrack} tracks={tracks} rs={rs} trackScore={trackScore} trackTotal={trackTotal}/>)}

                    {/* CATEGORY DEFINITIONS TAB */}
          {tab==='catdefs'&&rs&&(
            <div>
              {tracks.length>1&&<div className="flex aic g6 mb14"><span style={{fontSize:14,color:'#aaa'}}>Viewing:</span>{tracks.map(t=><button key={t} className={`track-pill tp-${t}${activeTrack===t?' active':''}`} onClick={()=>setActiveTrack(t)}>{TRACK_META[t]?.label}</button>)}</div>}

              <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>

            </div>

                onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drag');}}

              </div>

}

/* ══ STAFF NUMBERS TAB ══ */
function StaffNumbersTab({staff,perfData}){
  perfData=perfData||{snapshots:[],gva:{},retention:{}};

  // Get latest snapshot row for this staff member
  const latestSnap=perfData.snapshots.length?perfData.snapshots[perfData.snapshots.length-1]:null;
  const latestRow=latestSnap?.rows?.find(r=>r.staffId===staff.id);

  // Get all historical values for trend
  const getTrend=(metric)=>perfData.snapshots
    .map(s=>({date:s.date,val:s.rows?.find(r=>r.staffId===staff.id)?.[metric]||null}))
    .filter(d=>d.val!=null);

  const gva=parseFloat(perfData.gva?.[staff.id])||null;
  const retention=parseFloat(perfData.retention?.[staff.id])||null;

  const fmtRev=(v)=>v>=1000?'$'+(v/1000).toFixed(1)+'k':'$'+Math.round(v);

  // Roadmap target for GVA
  const roadmapN=parseInt((staff.roadmap||'').match(/L(\d)/)?.[1]||'1');
  const gvaTargets=staff.tracks?.includes('spa')&&!staff.tracks?.includes('clinical')?[6,9,12,18]:[4,6,8,12];
  const gvaTarget=gvaTargets[Math.min(roadmapN-1,3)];

  const StatCard=({label,value,sub,color,target,fmt,metric})=>{
    const trend=metric?getTrend(metric):[];
    const num=parseFloat(value)||null;
    const c=color||(num&&target?(num>=target?'#CAE8C1':num>=target*.75?'#F4DB71':'#E05252'):'#CAE8C1');
    return(
      <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'14px 16px'}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#999',marginBottom:8}}>{label}</div>
        {num!=null?(
          <>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:800,color:c,lineHeight:1,marginBottom:4}}>
              {fmt?fmt(num):num}
            </div>
            {target&&<div style={{fontSize:14,color:'#777',marginBottom:6}}>Target: {fmt?fmt(target):target} {num>=target?'✓':''}</div>}
            {sub&&<div style={{fontSize:14,color:'#777'}}>{sub}</div>}
            {trend.length>1&&(
              <div style={{marginTop:8}}>
                <Sparkline values={trend.map(d=>d.val)} color={c} width={100} height={24}/>
                <div style={{fontSize:13,color:'#999',marginTop:3}}>{trend.length} snapshots</div>
              </div>
            )}
          </>
        ):(
          <div style={{fontSize:14,color:'#999',fontStyle:'italic'}}>Not set</div>
        )}
      </div>
    );
  };

  const hasAnyData=latestRow||gva||retention;

  return(
    <div>
      {/* Header */}
      <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'11px 16px',marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:3}}>Performance Numbers</div>
          <div style={{fontSize:14,color:'#777'}}>
            {latestSnap?`Latest data from ${new Date(latestSnap.date.slice(0,7)+'-15').toLocaleDateString('en-CA',{month:'long',year:'numeric'})} · ${perfData.snapshots.length} snapshot${perfData.snapshots.length!==1?'s':''} total`:'No Jane data imported yet'}
          </div>
        </div>
        {perfData.snapshots.length>1&&<div style={{fontSize:14,color:'#44CCAA'}}>↗ Trends available</div>}
      </div>

      {!hasAnyData?(
        <div className="empty" style={{padding:40}}>
          <div className="empty-ico">📊</div>
          <p>No performance data for {staff.name.split(' ')[0]} yet.<br/>
          <span style={{fontSize:14,color:'#777'}}>Import Jane CSV files in the Performance & Revenue section, then enter GVA and Retention values.</span></p>
        </div>
      ):(
        <>
          {/* Jane import stats */}
          {latestRow&&(
            <div style={{marginBottom:16}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#CAE8C1',marginBottom:10}}>From Jane — Latest Period</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                <StatCard label="Revenue" value={latestRow.revenue} fmt={fmtRev} color="#CAE8C1" metric="revenue"/>
                <StatCard label="Utilization" value={latestRow.utilization} fmt={v=>v+'%'} color={latestRow.utilization>=85?'#CAE8C1':latestRow.utilization>=70?'#44ccaa':latestRow.utilization>50?'#F4DB71':'#E05252'} target={75} metric="utilization"/>
                <StatCard label="Completed Visits" value={latestRow.completed} color="#6B9FD4" metric="completed"/>
                <StatCard label="No-Shows" value={latestRow.noShows} color={latestRow.noShows>8?'#E05252':'#888'} metric="noShows"/>
                <StatCard label="Cancellations" value={latestRow.cancellations} color={latestRow.cancellations>15?'#F4DB71':'#888'} metric="cancellations"/>
                <StatCard label="Cancel Rate" value={(()=>{
                  const t=(latestRow.completed||0)+(latestRow.noShows||0)+(latestRow.cancellations||0)+(latestRow.rescheduled||0);
                  return t>0?Math.round(((latestRow.cancellations||0)/t)*100):null;
                })()} fmt={v=>v+'%'} color="#aaa"/>
              </div>
            </div>
          )}

          {/* Manual entries */}
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#F4DB71',marginBottom:10}}>Manual Entries</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              <StatCard label="GVA (365-day avg)" value={gva} sub={`Target ≥${gvaTarget}`} target={gvaTarget} fmt={v=>v}/>
              <StatCard label="Retention %" value={retention} fmt={v=>v+'%'} target={75} color={retention>=85?'#CAE8C1':retention>=75?'#44ccaa':retention>=65?'#F4DB71':retention?'#E05252':null}/>
            </div>
          </div>

          {/* No Jane data but has manual */}
          {!latestRow&&(gva||retention)&&(
            <div style={{marginTop:12,padding:'9px 14px',background:'rgba(107,159,212,.06)',border:'1px solid rgba(107,159,212,.15)',borderRadius:5,fontSize:14,color:'#6B9FD4'}}>
              Jane import data not available for {staff.name.split(' ')[0]}. Import Appointments, Shift, and Sales CSVs in the Performance & Revenue section to populate revenue, utilization, and visit counts.
            </div>
          )}
        </>
      )}
    </div>
  );
}

                                      borderColor:grade.status===opt?(opt==='Met'?'#44CCAA':opt==='Partial'?'#F4DB71':'#E05252'):'var(--border2)',
                                      color:grade.status===opt?(opt==='Met'?'#44CCAA':opt==='Partial'?'#F4DB71':'#E05252'):'#666'}}>

            </div>

          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ ADD SESSION ══ */
function AddSessModal({onClose,onSave,staff,mentors}){
  const MODULES=['Communication & Connection Lab','Diagnostic Reasoning Intensive','Global Assessment & Gait','Palpation Layering & Tension Mapping','Hands-On Adaptation & Safety','Exercise Progression & Coaching','Integrated Care & Co-Treatment'];
  const[f,setF]=useState({mentorId:mentors[0]?.id||'',mentorName:mentors[0]?.name||'',date:new Date().toISOString().slice(0,10),period:'Weekly',type:'1-on-1',attendees:[],module:MODULES[0],objectives:'',strengths:'',development:'',actions:'',rating:4,notes:''});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggle=id=>setF(p=>({...p,attendees:p.attendees.includes(id)?p.attendees.filter(x=>x!==id):[...p.attendees,id]}));
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe"/><button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-body">
          <div className="bc fw6" style={{fontSize:22,letterSpacing:2,marginBottom:16}}>LOG EDUCATION SESSION</div>
          <div className="fgrid">
            <div className="fg"><label>Mentor / Lead</label>
              <select value={f.mentorId} onChange={e=>{const m=mentors.find(x=>x.id===e.target.value);set('mentorId',e.target.value);set('mentorName',m?.name||'');}}>
                {mentors.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
            </div>
            <div className="fg"><label>Date</label><input type="date" value={f.date} onChange={e=>set('date',e.target.value)}/></div>
            <div className="fg"><label>Period</label><select value={f.period} onChange={e=>set('period',e.target.value)}>{PERIODS.slice(0,3).map(p=><option key={p}>{p}</option>)}</select></div>
            <div className="fg"><label>Type</label><select value={f.type} onChange={e=>set('type',e.target.value)}><option>1-on-1</option><option>Group</option></select></div>
            <div className="fg full"><label>Module</label><select value={f.module} onChange={e=>set('module',e.target.value)}>{MODULES.map(m=><option key={m}>{m}</option>)}</select></div>
            <div className="fg full"><label>Attendees</label>
              <div className="pill-wrap">{staff.filter(s=>s.tracks&&s.tracks.length>0).map(s=><div key={s.id} className={`pill${f.attendees.includes(s.id)?' on':''}`} onClick={()=>toggle(s.id)}>{s.name.split(' ')[0]} <span style={{opacity:.5,fontSize:14}}>({DISC.find(d=>d.id===s.discipline)?.abbr})</span></div>)}</div>
            </div>
            <div className="fg full"><label>Objectives</label><textarea value={f.objectives} onChange={e=>set('objectives',e.target.value)}/></div>
            <div className="fg"><label>Observed Strengths</label><textarea value={f.strengths} onChange={e=>set('strengths',e.target.value)}/></div>
            <div className="fg"><label>Development Areas</label><textarea value={f.development} onChange={e=>set('development',e.target.value)}/></div>
            <div className="fg full"><label>Follow-Up Actions</label><textarea value={f.actions} onChange={e=>set('actions',e.target.value)}/></div>
            <div className="fg"><label>Rating (1–5)</label><select value={f.rating} onChange={e=>set('rating',parseInt(e.target.value))}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n} — {['','Below Exp.','Fair','Good','Strong','Excellent'][n]}</option>)}</select></div>
            <div className="fg"><label>Notes</label><textarea value={f.notes} onChange={e=>set('notes',e.target.value)} style={{minHeight:48}}/></div>
          </div>
          <div className="flex aic g8 mt12" style={{marginTop:16,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-lime" onClick={()=>{if(f.attendees.length===0)return alert('Select attendees');onSave(f);onClose();}}>Save Session</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function FormsPage({staff, evals}){
  const[view, setView] = useState('list'); // 'list' | 'fill' | 'submissions'
  const[formType, setFormType] = useState('monthly');
  const[submissions, setSubmissions] = useState(()=>{
    try{return JSON.parse(localStorage.getItem('rvgd3_formSubs')||'[]');}catch{return[];}
  });
  const[filterType, setFilterType] = useState('all');
  const[expandedSub, setExpandedSub] = useState(null);

  const saveSubmissions = subs => {
    setSubmissions(subs);
    try{localStorage.setItem('rvgd3_formSubs', JSON.stringify(subs));}catch(e){}
  };

  const handleSubmit = data => {
    const sub = {...data, id:'sub'+Date.now(), submittedAt: new Date().toISOString()};
    saveSubmissions([sub, ...submissions]);
    setView('submissions');
  };

  const filteredSubs = filterType==='all' ? submissions : submissions.filter(s=>s.formType===filterType);

  if(view==='fill'){
    return <FormFiller formDef={FORM_DEFS[formType]} staff={staff} onSubmit={handleSubmit} onBack={()=>setView('list')}/>;
  }

  return(
    <div>
      {/* Header row */}
      <div className="flex aic jsb mb18">
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:4}}>G&D Check-In System</div>
          <div style={{fontSize:15,color:'#aaa'}}>Three-part review cycle: Monthly momentum · Quarterly scoring · Annual alignment</div>
        </div>
        <div className="flex aic g8">
          <button className={`btn btn-sm ${view==='submissions'?'btn-go':'btn-ghost'}`} onClick={()=>setView('submissions')}>
            Submissions {submissions.length>0&&<span style={{marginLeft:4,background:'var(--lime)',color:'var(--wellness)',borderRadius:8,padding:'1px 6px',fontSize:14,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{submissions.length}</span>}
          </button>
          <button className={`btn btn-sm ${view==='list'?'btn-go':'btn-ghost'}`} onClick={()=>setView('list')}>New Form</button>
        </div>
      </div>

      {view==='list' && (
        <div>
          {/* Three form type cards */}
          {['monthly','quarterly','annual'].map(type=>{
            const fd = FORM_DEFS[type];
            const count = submissions.filter(s=>s.formType===type).length;
            const colors = {monthly:'#6B9FD4', quarterly:'#F4DB71', annual:'#CAE8C1'};
            const c = colors[type];
            return(
              <div key={type} className="form-card" style={{marginBottom:14,cursor:'pointer'}} onClick={()=>{setFormType(type);setView('fill');}}>
                <div className={`form-stripe ${type}`}/>
                <div style={{padding:'20px 24px'}}>
                  <div className="flex aic jsb">
                    <div style={{flex:1}}>
                      <div className="flex aic g8 mb12" style={{marginBottom:10}}>
                        <span className={`form-header-tag tag-${type}`}>{fd.short}</span>
                        <span style={{fontSize:14,color:'#999'}}>{fd.duration}</span>
                        {count>0&&<span style={{fontSize:14,color:c}}>{count} submission{count!==1?'s':''}</span>}
                      </div>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,letterSpacing:'1px',color:c,marginBottom:6}}>{fd.label.toUpperCase()}</div>
                      <div style={{fontSize:15,color:'#888',lineHeight:1.5,maxWidth:500}}>{fd.purpose}</div>

                  </div>
                </div>
              </div>
            );
          })}
        </div>

                        </div>
                        <div style={{fontSize:14,color:'#888'}}>{new Date(sub.submittedAt).toLocaleDateString('en-CA',{month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>

                    </div>
                  </div>

                  {isExpanded && (
                    <div className="sub-expand" onClick={e=>e.stopPropagation()}>
                      {fd?.sections.map(section=>{
                        const sectionData = sub.data?.[section.id]||{};
                        const hasData = section.fields.some(f=>sectionData[f.id]&&(Array.isArray(sectionData[f.id])?sectionData[f.id].length>0:sectionData[f.id].toString().trim()!==''));
                        if(!hasData)return null;
                        return(
                          <div key={section.id} style={{marginBottom:18}}>
                            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:c,fontWeight:700,marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
                              <span>{section.icon}</span>{section.title}
                            </div>
                            <div className="sub-grid">
                              {section.fields.map(field=>{
                                const val = sectionData[field.id];
                                if(!val||(Array.isArray(val)&&val.length===0)||val.toString().trim()==='')return null;
                                return(
                                  <div key={field.id} className="sub-field" style={field.type==='textarea'&&field.tall?{gridColumn:'1/-1'}:{}}>
                                    <div className="sub-field-label">{field.label}</div>
                                    <div className="sub-field-val">
                                      {Array.isArray(val)?val.join(' · '):val}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                      <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end',gap:8}}>
                        <button className="btn btn-red btn-xs" onClick={()=>saveSubmissions(submissions.filter(s=>s.id!==sub.id))}>Delete</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })
          )}
        </div>
      )}
    </div>
  );
}

/* ── FORM FILLER ── */
function FormFiller({formDef, staff, onSubmit, onBack}){
  const[data, setData] = useState(()=>{
    const init={};
    formDef.sections.forEach(s=>{
      init[s.id]={};
      s.fields.forEach(f=>{
        init[s.id][f.id] = f.type==='checkboxes'?[]:''
      });
    });
    return init;
  });
  const[currentSection, setCurrentSection] = useState(0);
  const[submitted, setSubmitted] = useState(false);

  const setField=(sectionId,fieldId,val)=>{
    setData(prev=>({...prev,[sectionId]:{...prev[sectionId],[fieldId]:val}}));
  };

  const toggleCheck=(sectionId,fieldId,option)=>{
    setData(prev=>{
      const current=prev[sectionId][fieldId]||[];
      const next=current.includes(option)?current.filter(x=>x!==option):[...current,option];
      return{...prev,[sectionId]:{...prev[sectionId],[fieldId]:next}};
    });
  };

  const totalSections = formDef.sections.length;
  const progress = Math.round(((currentSection+1)/totalSections)*100);
  const section = formDef.sections[currentSection];
  const isLast = currentSection===totalSections-1;
  const colors = {monthly:'#6B9FD4',quarterly:'#F4DB71',annual:'#CAE8C1'};
  const c = colors[formDef.id];

  const handleFinalSubmit = () => {
    onSubmit({formType:formDef.id, data});
    setSubmitted(true);
  };

  if(submitted){
    return(
      <div style={{maxWidth:580,margin:'60px auto',textAlign:'center'}}>
        <div style={{fontSize:52,marginBottom:16}}>✓</div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:800,letterSpacing:'2px',color:c,marginBottom:8}}>{formDef.short.toUpperCase()} SUBMITTED</div>
        <div style={{fontSize:14,color:'#aaa',marginBottom:28}}>This check-in has been recorded and is visible to your clinical lead.</div>
        <div className="flex aic g8" style={{justifyContent:'center'}}>
          <button className="btn btn-ghost" onClick={onBack}>← Back to Forms</button>
          <button className="btn btn-lime" onClick={()=>{onBack();}}>View Submissions</button>
        </div>
      </div>
    );
  }

  return(
    <div className="form-shell">
      {/* Back */}
      <button className="btn btn-ghost btn-sm mb18" style={{marginBottom:16}} onClick={onBack}>← Back</button>

      {/* Form header */}
      <div className="form-card" style={{marginBottom:16}}>
        <div className={`form-stripe ${formDef.id}`}/>
        <div style={{padding:'18px 22px'}}>
          <div className="flex aic jsb">
            <div>
              <span className={`form-header-tag tag-${formDef.id}`} style={{marginBottom:8,display:'inline-flex'}}>{formDef.short}</span>
              <div className="form-title" style={{color:c}}>{formDef.label.toUpperCase()}</div>
              <div className="form-subtitle">{formDef.purpose}</div>
              {formDef.note&&<div style={{marginTop:6,fontSize:14,color:'#999',fontStyle:'italic'}}>{formDef.note}</div>}
            </div>
            <div style={{textAlign:'right',flexShrink:0,marginLeft:20}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:800,color:c,lineHeight:1}}>{currentSection+1}<span style={{fontSize:16,color:'#888'}}>/{totalSections}</span></div>
              <div style={{fontSize:14,color:'#999'}}>sections</div>
            </div>
          </div>
          {/* Section nav dots */}
          <div style={{display:'flex',gap:4,marginTop:14}}>
            {formDef.sections.map((s,i)=>(
              <div key={s.id} onClick={()=>setCurrentSection(i)} style={{height:3,flex:1,borderRadius:2,background:i<=currentSection?c:'var(--border)',cursor:'pointer',transition:'background .2s'}}/>
            ))}
          </div>
        </div>
      </div>

      {/* Current section */}
      <div className="form-card">
        <div className="form-card-body">
          <div className="form-section-title">
            <span className="form-section-icon">{section.icon}</span>
            {section.title}
          </div>
          {section.subtitle&&<div style={{fontSize:14,color:'#999',marginBottom:16,fontStyle:'italic',lineHeight:1.5}}>{section.subtitle}</div>}

          {/* Fields */}
          {section.fields.map(field=>(
            <div key={field.id} className="form-question">
              <label>{field.label}</label>
              {field.hint&&<div className="hint">{field.hint}</div>}
              {field.type==='text'&&(
                <input className="form-input" value={data[section.id][field.id]||''} onChange={e=>setField(section.id,field.id,e.target.value)} placeholder={field.placeholder||''}/>
              )}
              {field.type==='date'&&(
                <input type="date" className="form-input" value={data[section.id][field.id]||''} onChange={e=>setField(section.id,field.id,e.target.value)}/>
              )}
              {field.type==='textarea'&&(
                <textarea className={`form-textarea${field.tall?' tall':''}`} value={data[section.id][field.id]||''} onChange={e=>setField(section.id,field.id,e.target.value)} placeholder={field.placeholder||''}/>
              )}
              {field.type==='checkboxes'&&(
                <div className="form-check-group">
                  {field.options.map(opt=>(
                    <label key={opt} className="form-check">
                      <input type="checkbox" checked={(data[section.id][field.id]||[]).includes(opt)} onChange={()=>toggleCheck(section.id,field.id,opt)}/>
                      <span className="form-check-label">{opt}</span>
                    </label>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Footer nav */}
        <div className="form-submit-row">
          <div className="form-progress">
            <div className="progress-bar"><div className="progress-fill" style={{width:progress+'%',background:c}}/></div>
            <span>{progress}% complete</span>
          </div>
          <div className="flex aic g8">
            {currentSection>0&&<button className="btn btn-ghost btn-sm" onClick={()=>setCurrentSection(s=>s-1)}>← Previous</button>}
            {!isLast&&<button className="btn btn-sm" style={{background:c,color:'var(--black)',fontWeight:700}} onClick={()=>setCurrentSection(s=>s+1)}>Next →</button>}
            {isLast&&<button className="btn btn-lime" onClick={handleFinalSubmit}>Submit Check-In ✓</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

function BirdTestTab({staff, setStaff}){
  const existing = staff.birdResult;
  const[mode, setMode] = useState(existing ? 'result' : 'intro'); // intro | quiz | result
  const[answers, setAnswers] = useState({});
  const[qIdx, setQIdx] = useState(0);

  const handleAnswer = (t) => {
    const next = {...answers, [qIdx]: t};
    setAnswers(next);
    if(qIdx < BIRD_QUESTIONS.length - 1){
      setQIdx(q=>q+1);
    } else {
      // tally
      const counts = {D:0,I:0,S:0,C:0};
      Object.values(next).forEach(v=>counts[v]++);
      const winner = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
      const result = {...BIRD_RESULTS[winner], counts, answeredAt: new Date().toISOString()};
      setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,birdResult:result}:s));
      setMode('result');
    }
  };

  const retake = () => {setAnswers({});setQIdx(0);setMode('quiz');setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,birdResult:null}:s));};

  const result = staff.birdResult || BIRD_RESULTS[Object.entries(answers).length>0?Object.entries({D:0,I:0,S:0,C:0,...Object.fromEntries(Object.entries({D:0,I:0,S:0,C:0}).map(([k])=>[k,(Object.values(answers).filter(v=>v===k).length)]))}).sort((a,b)=>b[1]-a[1])[0][0]:'D'];

  if(mode==='intro'){
    return(
      <div className="bird-shell">
        <div className="bird-intro">
          <div style={{fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'var(--lime)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:6}}>DISC / Bird Personality Test</div>
          <div style={{fontSize:15,color:'#aaa',lineHeight:1.7}}>The Bird Test maps clinical personality across four types — Eagle, Parrot, Dove, and Owl — based on the DISC framework adapted for a clinical setting. Understanding your type helps you lean into your natural strengths, identify growth edges, and understand who you work best alongside.</div>
        </div>
        <div className="bird-types">
          {Object.values(BIRD_RESULTS).map(b=>(
            <div key={b.name} className={`bird-type-card bird-${b.cls}`}>
              <div style={{fontSize:24,marginBottom:5}}>{b.emoji}</div>
              <div className="bird-name" style={{color:b.color}}>{b.name}</div>
              <div className="bird-tagline">{b.tagline}</div>
              <div className="bird-traits">
                {b.strengths.slice(0,2).map(s=><span key={s} className="bird-trait">{s.split(' ').slice(0,3).join(' ')}</span>)}
              </div>
            </div>
          ))}
        </div>
        <div className="flex aic g8">
          <button className="btn btn-lime" onClick={()=>setMode('quiz')}>Take the Test ({BIRD_QUESTIONS.length} questions) →</button>
          <span style={{fontSize:14,color:'#888'}}>Takes about 3 minutes</span>
        </div>
      </div>
    );
  }

  if(mode==='quiz'){
    const q = BIRD_QUESTIONS[qIdx];
    const progress = Math.round((qIdx/BIRD_QUESTIONS.length)*100);
    const shuffled = q.opts; // keep order consistent
    return(
      <div className="bird-shell">
        <div style={{marginBottom:16}}>
          <div style={{display:'flex',gap:4,marginBottom:10}}>
            {BIRD_QUESTIONS.map((_,i)=><div key={i} style={{flex:1,height:2,borderRadius:1,background:i<qIdx?'var(--go)':i===qIdx?'var(--lime)':'var(--border)',transition:'background .2s'}}/>)}
          </div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,letterSpacing:'2px',color:'#888',textTransform:'uppercase'}}>Question {qIdx+1} of {BIRD_QUESTIONS.length}</div>
        </div>
        <div className="bird-quiz-q">
          <div className="bird-quiz-q-text">{q.q}</div>
          {shuffled.map((opt,i)=>{
            const letters = ['A','B','C','D'];
            const isSelected = answers[qIdx]===opt.t;
            return(
              <div key={i} className={`bird-option${isSelected?' selected':''}`} onClick={()=>handleAnswer(opt.t)}>
                <span className="bird-option-letter">{letters[i]}</span>
                <span className="bird-option-text">{opt.text}</span>
              </div>
            );
          })}
        </div>
        {qIdx>0&&<button className="btn btn-ghost btn-sm" onClick={()=>setQIdx(q=>q-1)}>← Back</button>}
      </div>
    );
  }

  if(mode==='result'&&staff.birdResult){
    const r = staff.birdResult;
    return(
      <div className="bird-shell">
        <div className={`bird-result bird-result-${r.cls}`}>
          <div className="flex aic jsb mb12" style={{marginBottom:12}}>
            <div>
              <div style={{fontSize:36,marginBottom:4}}>{r.emoji}</div>
              <div className="bird-name" style={{color:r.color,fontSize:26}}>{r.name}</div>
              <div style={{fontSize:15,color:'#888',marginTop:2}}>{r.tagline}</div>
            </div>
            <div style={{textAlign:'right'}}>
              {r.counts&&Object.entries(r.counts).map(([k,v])=>(
                <div key={k} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,justifyContent:'flex-end'}}>
                  <span style={{fontSize:14,color:'#888',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px'}}>{['D','I','S','C'].find(x=>x===k)?{D:'Eagle 🦅',I:'Parrot 🦜',S:'Dove 🕊️',C:'Owl 🦉'}[k]:k}</span>
                  <div style={{width:60,height:4,background:'var(--surface3)',borderRadius:2}}><div style={{height:'100%',borderRadius:2,background:r.color,width:(v/10*100)+'%'}}/></div>
                  <span style={{fontSize:14,color:r.color,fontWeight:700,minWidth:14}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{fontSize:15,color:'#aaa',lineHeight:1.7}}>{r.description}</div>
        </div>

        <div className="grid2 mb14" style={{marginBottom:14}}>
          <div style={{background:'var(--surface2)',borderRadius:5,padding:'13px 15px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'var(--lime)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:10}}>Core Strengths</div>
            {r.strengths.map(s=><div key={s} style={{display:'flex',gap:8,marginBottom:7}}><span style={{color:'var(--lime)',flexShrink:0}}>↑</span><span style={{fontSize:14,color:'#aaa',lineHeight:1.5}}>{s}</span></div>)}
          </div>
          <div style={{background:'var(--surface2)',borderRadius:5,padding:'13px 15px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'var(--yellow)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:10}}>Growth Edges</div>
            {r.growthEdges.map(s=><div key={s} style={{display:'flex',gap:8,marginBottom:7}}><span style={{color:'var(--yellow)',flexShrink:0}}>→</span><span style={{fontSize:14,color:'#aaa',lineHeight:1.5}}>{s}</span></div>)}
          </div>
        </div>

        <div style={{background:'var(--surface2)',borderRadius:5,padding:'13px 15px',border:'1px solid var(--border)',marginBottom:14}}>
          <div style={{fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:7}}>Clinical Style</div>
          <div style={{fontSize:15,color:'#aaa',lineHeight:1.6}}>{r.clinicalStyle}</div>
        </div>

        <div className="grid2 mb14" style={{marginBottom:14}}>
          <div style={{background:'var(--surface2)',borderRadius:5,padding:'13px 15px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'#44ccaa',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:8}}>Works Best With</div>
            {r.bestWith.map(s=><div key={s} style={{fontSize:14,color:'#aaa',marginBottom:5,paddingLeft:12,borderLeft:'2px solid #44ccaa'}}>{s}</div>)}
          </div>
          <div style={{background:'var(--surface2)',borderRadius:5,padding:'13px 15px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:14,letterSpacing:'2px',textTransform:'uppercase',color:'var(--red)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:8}}>Watch Out For</div>
            {r.challengeWith.map(s=><div key={s} style={{fontSize:14,color:'#aaa',marginBottom:5,paddingLeft:12,borderLeft:'2px solid var(--red)'}}>{s}</div>)}
          </div>
        </div>

        <button className="btn btn-ghost btn-sm" onClick={retake}>↺ Retake Test</button>
      </div>
    );
  }

  return null;
}

function getBandLabel(v){
  if(v===null||v===undefined||v==='')return null;
  const n=parseFloat(v);
  if(n>=8)return{label:'Predictive',cls:'band-predict'};
  if(n>=7)return{label:'Competent',cls:'band-competent'};
  if(n>=5)return{label:'Transactional',cls:'band-transact'};
  return{label:'Surface',cls:'band-surface'};

  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const setMP=(k,v)=>setF(p=>({...p,match_profile:{...(p.match_profile||{}),[k]:v}}));
  const toggleTrack=t=>setF(p=>({...p,tracks:p.tracks.includes(t)?p.tracks.filter(x=>x!==t):[...p.tracks,t]}));
  const save=()=>{
    const updated={...staff,...f};
    setStaff(prev=>prev.map(s=>s.id===staff.id?updated:s));
    saveMP(staff.id,f.match_profile);
    setEditing(false);
    // Sync to Supabase staff table
    const sb=window.__SB;
    if(sb){
      const{files,...staffData}=updated; // exclude base64 files from DB
      // Only send columns that actually exist on the staff table — sending an unknown
      // column makes Postgres reject the whole update, which silently loses the edit.
      const cols=window.__staffCols;
      const payload=cols?Object.fromEntries(Object.entries(staffData).filter(([k])=>cols.includes(k))):staffData;
      sb.from('staff').update(payload).eq('id',staff.id).then(({error})=>{

      {(()=>{const mpData=mpFor(staff);if(!mpData||!Object.keys(mpData).some(k=>mpData[k]))return null;const seeded=!_hasMP(staff.match_profile);return(

            <div key={k} style={{marginBottom:6,fontSize:13.5,lineHeight:1.5}}><span style={{color:'#888'}}>{lbl}:</span> <span style={{color:'#ccc'}}>{Array.isArray(mpData[k])?mpData[k].join(', '):mpData[k]}</span></div>

        {(()=>{const specs=SPECIALIZATIONS.filter(s=>s.disc.includes(f.discipline||staff.discipline));if(!specs.length)return null;const cur=f.specializations||staff.specializations||[];return(<div className="fg full"><label>Specializations</label><div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:6}}>{specs.map(s=>{const on=cur.includes(s.id);return(<button key={s.id} type="button" onClick={()=>{const next=on?cur.filter(x=>x!==s.id):[...cur,s.id];set('specializations',next);}} style={{fontSize:14,padding:'4px 10px',borderRadius:4,border:'1px solid '+(on?'rgba(187,153,255,.4)':'var(--border2)'),background:on?'rgba(187,153,255,.12)':'var(--surface3)',color:on?'#BB99FF':'#555',cursor:'pointer',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.5px'}}>{s.label}</button>);})}</div></div>);})()}
        <div className="fg"><label>Role / Title</label><select value={f.role} onChange={e=>set('role',e.target.value)}>
                <optgroup label="Physiotherapy">
                  <option>Physiotherapist</option>
                  <option>Senior Physiotherapist</option>
                  <option>Senior PT / Clinical Lead</option>
                  <option>PT / Clinical Lead</option>

                </optgroup>

                  <option>Operations Lead</option>
                  <option>Clinic Manager</option>
                  <option>Education Lead</option>
                  <option>HR &amp; Payroll</option>
                  <option>Marketing Coordinator</option>
                </optgroup>
                <optgroup label="Strength &amp; Conditioning">
                  <option>Strength &amp; Conditioning Coach</option>
                  <option>Personal Trainer</option>
                  <option>Senior Performance Coach</option>
                </optgroup>
              </select></div>
        <div className="fg"><label>Site(s)</label><SiteMultiSelect value={f.site} onChange={v=>set('site',v)}/></div>
        <div className="fg"><label>Roadmap Phase</label><select value={f.roadmap} onChange={e=>set('roadmap',e.target.value)}><option value="">—</option><option>L1→L2</option><option>L2→L3</option><option>L3→L4</option></select></div>
        <div className="fg"><label>Archetype</label><input value={f.archetype} onChange={e=>set('archetype',e.target.value)} placeholder="Anchor / Builder / Mentor…"/></div>

/* ══════════════════════════════════════════════
   SCORES EDIT TAB — editable sliders
══════════════════════════════════════════════ */
function ScoresEditTab({staff,setStaff,activeTrack,setActiveTrack,tracks,rs,trackScore,trackTotal}){
  const initScores=()=>{const ex=staff.scores?.[activeTrack]||{};const out={};if(rs)rs.cats.forEach(c=>{out[c.id]=ex[c.id]!==undefined?ex[c.id]:'';});return out;};
  const[localScores,setLocalScores]=useState(initScores);
  const[saved,setSaved]=useState(false);
  const prevTrack=React.useRef(activeTrack);
  useEffect(()=>{if(prevTrack.current!==activeTrack){prevTrack.current=activeTrack;setLocalScores(initScores());}},[activeTrack]);
  const setScore=(id,val)=>{const n=val===''?'':Math.min(10,Math.max(0,parseFloat(val)||0));setLocalScores(p=>({...p,[id]:n}));};
  const liveTotal=rs?Math.round(rs.cats.reduce((t,c)=>{const v=parseFloat(localScores[c.id]);return isNaN(v)?t:t+v*(c.weight/100);},0)*100)/100:null;
  const saveScores=()=>{setStaff(prev=>prev.map(s=>s.id===staff.id?{...s,scores:{...s.scores,[activeTrack]:{...localScores,total:liveTotal}}}:s));setSaved(true);setTimeout(()=>setSaved(false),1800);};
  if(!rs)return<div className="empty"><div className="empty-ico">📊</div><p>No track selected.</p></div>;
  const tc=TRACK_META[activeTrack]?.color||'var(--go)';
  return(
    <div>
      {tracks.length>1&&<div className="flex aic g6" style={{marginBottom:12}}><span style={{fontSize:14,color:'var(--text3)'}}>Track:</span>{tracks.map(t=><button key={t} className={`track-pill tp-${t}${activeTrack===t?' active':''}`} onClick={()=>setActiveTrack(t)}>{TRACK_META[t]?.label}</button>)}</div>}
      <div style={{background:'rgba(0,88,77,.12)',border:'1px solid rgba(0,88,77,.3)',borderRadius:5,padding:'8px 14px',marginBottom:12,fontSize:14,color:'var(--lime)'}}>Adjust sliders or type scores (0–10). Click Save Scores when done.</div>
      {rs.cats.map(c=>{
        const v=localScores[c.id];const num=parseFloat(v);
        const band=!isNaN(num)?getBandLabel(num):null;
        const bc=!isNaN(num)?(num>=8?'#CAE8C1':num>=7?'#44CCAA':num>=5?'#F4DB71':'#E05252'):'#555';
        return(
          <div key={c.id} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,padding:'11px 14px',marginBottom:7}}>
            <div className="flex aic jsb" style={{marginBottom:8}}>
              <div><div className="sm fw5">{c.label}</div><div style={{fontSize:14,color:'#888'}}>Weight: {c.weight}%</div></div>
              <div className="flex aic g8">
                {band&&<span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,padding:'2px 7px',borderRadius:3,background:bc+'22',color:bc}}>{band.label}</span>}
                <input type="number" min="0" max="10" step="0.5" style={{width:44,textAlign:'center',background:'var(--surface3)',border:'1px solid',borderColor:v!==''&&!isNaN(num)?bc:'var(--border2)',borderRadius:4,color:bc,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,padding:'3px 0',outline:'none'}} value={v} onChange={e=>setScore(c.id,e.target.value)}/>
              </div>
            </div>
            <input type="range" min="0" max="10" step="0.5" style={{WebkitAppearance:'none',appearance:'none',width:'100%',height:4,borderRadius:2,background:'var(--surface3)',outline:'none',cursor:'pointer'}} value={v===''?0:v} onChange={e=>setScore(c.id,e.target.value)}/>
            <div style={{height:3,background:'var(--surface3)',borderRadius:2,marginTop:5}}><div style={{height:'100%',borderRadius:2,background:tc,width:(!isNaN(num)?num/10*100:0)+'%',transition:'width .15s'}}/></div>
          </div>
        );
      })}
      {liveTotal!==null&&(
        <div style={{background:'var(--surface2)',border:`1px solid ${tc}44`,borderRadius:5,padding:'14px 18px',marginTop:4,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:14,color:'#aaa',marginBottom:3}}>Live Weighted Score</div>
            <div className="flex aic g10"><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:36,fontWeight:800,color:tc,lineHeight:1}}>{liveTotal}</span><LvBadge score={liveTotal}/></div>
          </div>
          <button className="btn btn-lime" onClick={saveScores}>{saved?'✓ Saved!':'Save Scores'}</button>
        </div>
      )}
    </div>
  );
}

function calcReadiness(p){
  const s2vals=Object.values(p.s2);
  const s2avg=s2vals.reduce((a,b)=>a+(parseFloat(b)||0),0)/s2vals.length;
  const{util,gva,retention,rebook,doc}=p.s3;
  const s3=Math.min(10,(util>=85?2:util>=75?1.5:util>=65?1:0.5)+(gva>=8?2:gva>=6?1.5:gva>=4?1:0.5)+(retention>=85?2:retention>=75?1.5:retention>=65?1:0.5)+(rebook>=80?2:rebook>=70?1.5:rebook>=60?1:0.5)+(doc>=95?2:doc>=85?1.5:doc>=75?1:0.5));
  const gvals=Object.values(p.gates);
  const gateScore=Math.round(gvals.reduce((a,v)=>a+(v==='Yes'?1:v==='Partial'?.5:0),0)*10)/10;
  const noCount=gvals.filter(v=>v==='No').length;
  const gateBlocked=noCount>=2;
  const flagCount=Object.values(p.redFlags).filter(Boolean).length;
  const flagBlocked=flagCount>=2;
  const promoBlocked=p.timeAvail==='No'||p.risk==='Low'||gateBlocked||flagBlocked;
  const s2w=(s2avg/10)*50,s3w=(s3/10)*25,s4w=(gateScore/7)*15,s5w=(p.s5.primaryScore/10)*10;
  const total=Math.round(s2w+s3w+s4w+s5w);
  const{primaryScore:ps,secondaryScore:ss}=p.s5;
  const locCat=ps>=9?(ss>=7?'🌐 Multi-Loc Operator':'🚀 Expansion Leader'):ps>=7?(ss>=5?'🔄 Regional Support':'⭐ Location Lead Ready'):ps>=5?'📍 Location Contributor':'🌱 Building';
  let status;
  if(promoBlocked||flagBlocked||gateBlocked)status='blocked';
  else if(total>=85)status='expansion';
  else if(total>=75)status='ready-now';
  else if(total>=65)status='ready-36';
  else if(total>=50)status='emerging';
  else status='not-ready';
  return{s2avg:Math.round(s2avg*10)/10,s3:Math.round(s3*10)/10,gateScore,gateBlocked,flagCount,flagBlocked,promoBlocked,total,locCat,status};
}

function LeadershipPage(){
  const[ltData,setLtData]=useState(()=>{try{const s=localStorage.getItem('rvgd3_leadership');if(s)return JSON.parse(s);}catch(e){}return SEED_LEADERSHIP;});
  const[activeTab,setActiveTab]=useState('roster');
  const[selectedPerson,setSelectedPerson]=useState(null);
  const[filterLoc,setFilterLoc]=useState('all');
  const[filterStatus,setFilterStatus]=useState('all');
  const[filterDisc,setFilterDisc]=useState('all');
  const[showAdd,setShowAdd]=useState(false);
  useEffect(()=>{
    const sb=window.__SB;if(!sb)return;
    sb.from('leadership_entries').select('*').order('created_at',{ascending:true}).then(({data,error})=>{
      if(!error&&data&&data.length>0){const d=data.map(r=>r.data);setLtData(d);localStorage.setItem('rvgd3_leadership',JSON.stringify(d));}
    });
  },[]);
  const save=(data)=>{
    setLtData(data);
    try{localStorage.setItem('rvgd3_leadership',JSON.stringify(data));}catch(e){}
    const sb=window.__SB;if(!sb)return;
    data.forEach(p=>{if(p.id)sb.from('leadership_entries').upsert({id:p.id,data:p}).then();});
  };
  const updatePerson=(id,updates)=>{const updated=ltData.map(p=>p.id===id?{...p,...updates}:p);save(updated);if(selectedPerson?.id===id)setSelectedPerson(updated.find(p=>p.id===id));};
  const addPerson=p=>save([...ltData,p]);
  const removePerson=id=>{save(ltData.filter(p=>p.id!==id));setSelectedPerson(null);};
  const computed=ltData.map(p=>({...p,r:calcReadiness(p)}));
  const counts={};computed.forEach(p=>{counts[p.r.status]=(counts[p.r.status]||0)+1;});
  const locations=[...new Set(ltData.map(p=>p.primaryLoc))].sort();
  const disciplines=[...new Set(ltData.map(p=>p.disc))].sort();
  const filtered=computed.filter(p=>{
    if(filterLoc!=='all'&&p.primaryLoc!==filterLoc)return false;
    if(filterStatus!=='all'&&p.r.status!==filterStatus)return false;
    if(filterDisc!=='all'&&p.disc!==filterDisc)return false;
    return true;
  });
  const benchByLoc=locations.reduce((acc,loc)=>{
    const people=computed.filter(p=>p.primaryLoc===loc);
    const ready=people.filter(p=>p.r.status==='ready-now'||p.r.status==='expansion').length;
    const dev=people.filter(p=>p.r.status==='ready-36'||p.r.status==='emerging').length;
    const blocked=people.filter(p=>p.r.status==='blocked'||p.r.status==='not-ready').length;
    acc[loc]={people:people.length,ready,dev,blocked,score:people.length?Math.round((ready*3+dev)/(people.length*3)*100):0};
    return acc;
  },{});

  return(
    <div>
      <div className="flex aic jsb" style={{marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:3}}>Management · Confidential</div>
          <div style={{fontSize:14,color:'#999'}}>Click any row to view and edit all scores · Leadership = Stability Under Weight</div>
        </div>
        <div className="flex aic g6">
          {['roster','heat-map','doctrine'].map(t=>(
            <button key={t} className={`btn btn-sm ${activeTab===t?'btn-go':'btn-ghost'}`} onClick={()=>setActiveTab(t)}>
              {t==='roster'?'◎ Roster':t==='heat-map'?'▣ Heat Map':'◐ Doctrine'}
            </button>
          ))}
          <button className="btn btn-lime btn-sm" onClick={()=>setShowAdd(true)}>+ Add</button>
          <button className="btn btn-ghost btn-xs" style={{fontSize:14,color:'#999'}} title="Reset sample data" onClick={()=>{if(window.confirm('Reset to sample data?'))save(SEED_LEADERSHIP);}}>↺</button>
        </div>
      </div>

      <div className="lt-grid" style={{gridTemplateColumns:'repeat(6,1fr)'}}>
        {[{label:'Total Tracked',val:ltData.length,color:'#aaa'},{label:'Expansion Ready',val:counts['expansion']||0,color:'#CAE8C1'},{label:'Ready Now',val:counts['ready-now']||0,color:'#44CCAA'},{label:'Ready 3–6 Mo',val:counts['ready-36']||0,color:'#F4DB71'},{label:'Emerging',val:counts['emerging']||0,color:'#6B9FD4'},{label:'Blocked/Not Ready',val:(counts['blocked']||0)+(counts['not-ready']||0),color:'#E05252'}].map(s=>(
          <div key={s.label} className="lt-stat"><div className="lt-stat-num" style={{color:s.color}}>{s.val}</div><div className="lt-stat-lbl">{s.label}</div></div>
        ))}
      </div>

      {activeTab==='roster'&&(
        <div>
          <div className="filter-row">
            <div className="filter-grp flex aic g6">
              <select className="form-input" style={{width:'auto',padding:'5px 10px',fontSize:14}} value={filterLoc} onChange={e=>setFilterLoc(e.target.value)}><option value="all">All Locations</option>{locations.map(l=><option key={l}>{l}</option>)}</select>
              <select className="form-input" style={{width:'auto',padding:'5px 10px',fontSize:14}} value={filterDisc} onChange={e=>setFilterDisc(e.target.value)}><option value="all">All Disciplines</option>{disciplines.map(d=><option key={d}>{d}</option>)}</select>
              <select className="form-input" style={{width:'auto',padding:'5px 10px',fontSize:14}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option value="all">All Statuses</option>{['expansion','ready-now','ready-36','emerging','not-ready','blocked'].map(s=><option key={s} value={s}>{STATUS_META[s].label}</option>)}</select>
            </div>
            <div style={{fontSize:14,color:'#888'}}>{filtered.length} of {ltData.length} · click row to edit</div>
          </div>
          <div className="lt-section">
            <table className="lt-table">
              <thead><tr><th>Name</th><th>Disc.</th><th>Location</th><th>Level</th><th>Score /100</th><th>Lead Avg</th><th>Gate</th><th>Flags</th><th>Category</th><th>Status</th><th></th></tr></thead>
              <tbody>
                {filtered.sort((a,b)=>b.r.total-a.r.total).map(p=>{
                  const sm=STATUS_META[p.r.status];
                  return(
                    <tr key={p.id} style={{cursor:'pointer'}} onClick={()=>setSelectedPerson(p)}>
                      <td><span className="lt-name">{p.name}</span></td>
                      <td><span style={{color:'#888',fontSize:14}}>{p.disc}</span></td>
                      <td><span style={{fontSize:14,color:'#888'}}>{p.primaryLoc}</span></td>
                      <td><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,color:p.level>=3?'#CAE8C1':p.level>=2?'#F4DB71':'#6B9FD4'}}>Lv {p.level}</span></td>

const MEETING_TYPES = [
  {id:'weekly-edu',      label:'Weekly Education Session', icon:'📚', color:'#CAE8C1',  recurrence:'WEEKLY'},
  {id:'monthly-workshop',label:'Monthly Workshop',         icon:'🎯', color:'#BB99FF',  recurrence:'MONTHLY'},

  {id:'team-meeting',    label:'Team Meeting',             icon:'👥', color:'#6B9FD4',  recurrence:'WEEKLY'},
  {id:'custom',          label:'Custom / Other',           icon:'◈',  color:'#aaa',     recurrence:null},
];

const STATUS_COLORS = {scheduled:'#44CCAA', completed:'#CAE8C1', cancelled:'#E05252', pending:'#F4DB71'};

function SchedulePage({staff, meetings, setMeetings}){
  const[view,setView]=useState('upcoming');
  const[showForm,setShowForm]=useState(false);
  const[editMeeting,setEditMeeting]=useState(null);

  const now = new Date();
  const sorted = [...meetings].sort((a,b)=>new Date(a.dateTime)-new Date(b.dateTime));
  const upcoming = sorted.filter(m=>new Date(m.dateTime)>=now&&m.status!=='cancelled');
  const past = sorted.filter(m=>new Date(m.dateTime)<now||m.status==='completed');
  const cancelled = sorted.filter(m=>m.status==='cancelled');

  const deleteMeeting = (id) => {
    if(window.confirm('Remove this meeting from the dashboard?')) setMeetings(p=>p.filter(m=>m.id!==id));
  };
  const updateStatus = (id, status) => setMeetings(p=>p.map(m=>m.id===id?{...m,status}:m));

  const display = view==='upcoming'?upcoming:view==='past'?past:cancelled;

  return(
    <div>

      <div className="flex aic jsb" style={{marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:3}}>Google Calendar · Google Meet Integration</div>
          <div style={{fontSize:14,color:'#999'}}>Schedule a meeting to send Google Calendar invites + Meet links directly to Revibe staff Gmail accounts</div>
        </div>
        <button className="btn btn-lime" onClick={()=>{setEditMeeting(null);setShowForm(true);}}>+ Schedule Meeting</button>
      </div>

      {/* Stats */}
      <div className="lt-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:14}}>
        {[
          {label:'Upcoming',val:upcoming.length,color:'#44CCAA'},
          {label:'This Week',val:upcoming.filter(m=>{const d=new Date(m.dateTime);const wk=new Date();wk.setDate(wk.getDate()+7);return d<=wk;}).length,color:'#CAE8C1'},
          {label:'Recurring',val:meetings.filter(m=>m.recurrence).length,color:'#BB99FF'},
          {label:'Total Scheduled',val:meetings.length,color:'#aaa'},
        ].map(s=>(
          <div key={s.label} className="lt-stat"><div className="lt-stat-num" style={{color:s.color}}>{s.val}</div><div className="lt-stat-lbl">{s.label}</div></div>
        ))}
      </div>

      {/* View tabs */}
      <div className="filter-row">
        <div className="filter-grp flex aic g6">
          {[{k:'upcoming',l:'Upcoming'},  {k:'past',l:'Past'}, {k:'cancelled',l:'Cancelled'}].map(t=>(
            <button key={t.k} className={`btn btn-sm ${view===t.k?'btn-lime':'btn-ghost'}`} onClick={()=>setView(t.k)}>{t.l} ({(t.k==='upcoming'?upcoming:t.k==='past'?past:cancelled).length})</button>

        </div>
        <div style={{fontSize:14,color:'#888'}}>Click a meeting to edit or cancel · Invites sent via Google Calendar</div>
      </div>

      {display.length===0?(
        <div className="card"><div className="empty"><div className="empty-ico">📅</div><p>{view==='upcoming'?'No upcoming meetings. Click + Schedule Meeting to create one.':view==='past'?'No past meetings yet.':'No cancelled meetings.'}</p></div></div>
      ):(
        <div>
          {display.map(m=>{
            const mt = MEETING_TYPES.find(t=>t.id===m.type)||MEETING_TYPES[5];

                <div className="flex aic jsb">
                  <div style={{flex:1}}>
                    <div className="flex aic g8" style={{marginBottom:5}}>
                      <span style={{fontSize:14}}>{mt.icon}</span>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:800,color:'var(--text)',letterSpacing:'.5px'}}>{m.title}</span>
                      <span style={{fontSize:14,padding:'2px 7px',borderRadius:3,background:mt.color+'22',color:mt.color,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>{mt.label}</span>

                      <span style={{fontSize:14,padding:'2px 7px',borderRadius:3,background:STATUS_COLORS[m.status||'scheduled']+'22',color:STATUS_COLORS[m.status||'scheduled'],fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{m.status||'Scheduled'}</span>

                    <div className="flex aic g12" style={{fontSize:14,color:'#888',gap:14}}>
                      <span>📅 {d.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}</span>
                      <span>🕐 {d.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})}</span>
                      {m.duration&&<span>⏱ {m.duration} min</span>}

                      {m.allStaff&&<span style={{fontSize:14,background:'rgba(107,159,212,.1)',color:'#6B9FD4',padding:'2px 7px',borderRadius:3,border:'1px solid rgba(107,159,212,.2)'}}>All Staff</span>}
                    </div>
                    {m.meetLink&&(
                      <div style={{marginTop:7}}>
                        <a href={m.meetLink} target="_blank" rel="noreferrer" style={{fontSize:14,color:'#4A90E2',textDecoration:'none',background:'rgba(74,144,226,.08)',padding:'3px 10px',borderRadius:4,border:'1px solid rgba(74,144,226,.2)',display:'inline-flex',alignItems:'center',gap:5}}>

                      <div style={{marginTop:5,fontSize:14,color:'#888'}}>

                    {isPast&&m.status!=='completed'&&<button className="btn btn-xs" style={{background:'rgba(202,232,193,.1)',color:'#CAE8C1',border:'1px solid rgba(202,232,193,.2)',fontSize:14}} onClick={()=>updateStatus(m.id,'completed')}>✓ Mark Done</button>}
