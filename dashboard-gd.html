   SCHEDULE PAGE — Google Calendar / Meet integration
══════════════════════════════════════════════ */

const MEETING_TYPES = [
  {id:'weekly-edu',      label:'Weekly Education Session', icon:'📚', color:'#CAE8C1',  recurrence:'WEEKLY'},
  {id:'monthly-workshop',label:'Monthly Workshop',         icon:'🎯', color:'#BB99FF',  recurrence:'MONTHLY'},
  {id:'1on1',            label:'1-on-1 Meeting',           icon:'👤', color:'#44CCAA',  recurrence:null},
  {id:'quarterly-review',label:'Quarterly Review',         icon:'📊', color:'#F4DB71',  recurrence:null},
  {id:'team-meeting',    label:'Team Meeting',             icon:'👥', color:'#6B9FD4',  recurrence:'WEEKLY'},
  {id:'custom',          label:'Custom / Other',           icon:'◈',  color:'#aaa',     recurrence:null},
];

const STATUS_COLORS = {scheduled:'#44CCAA', completed:'#CAE8C1', cancelled:'#E05252', pending:'#F4DB71'};

function SchedulePage({staff, meetings, setMeetings}){
  const[view,setView]=useState('upcoming');
  const[showForm,setShowForm]=useState(false);
  const[editMeeting,setEditMeeting]=useState(null);

  const now = new Date();
  const sorted = [...meetings].sort((a,b)=>new Date(a.dateTime)-new Date(b.dateTime));
  const upcoming = sorted.filter(m=>new Date(m.dateTime)>=now&&m.status!=='cancelled');
  const past = sorted.filter(m=>new Date(m.dateTime)<now||m.status==='completed');
  const cancelled = sorted.filter(m=>m.status==='cancelled');

  const deleteMeeting = (id) => {
    if(window.confirm('Remove this meeting from the dashboard?')) setMeetings(p=>p.filter(m=>m.id!==id));
  };
  const updateStatus = (id, status) => setMeetings(p=>p.map(m=>m.id===id?{...m,status}:m));

  const display = view==='upcoming'?upcoming:view==='past'?past:cancelled;

  return(
    <div>
      {/* Header */}
      <div className="flex aic jsb" style={{marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:3}}>Google Calendar · Google Meet Integration</div>
          <div style={{fontSize:12,color:'#999'}}>Schedule a meeting to send Google Calendar invites + Meet links directly to Revibe staff Gmail accounts</div>
        </div>
        <button className="btn btn-lime" onClick={()=>{setEditMeeting(null);setShowForm(true);}}>+ Schedule Meeting</button>
      </div>

      {/* Stats */}
      <div className="lt-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:14}}>
        {[
          {label:'Upcoming',val:upcoming.length,color:'#44CCAA'},
          {label:'This Week',val:upcoming.filter(m=>{const d=new Date(m.dateTime);const wk=new Date();wk.setDate(wk.getDate()+7);return d<=wk;}).length,color:'#CAE8C1'},
          {label:'Recurring',val:meetings.filter(m=>m.recurrence).length,color:'#BB99FF'},
          {label:'Total Scheduled',val:meetings.length,color:'#aaa'},
        ].map(s=>(
          <div key={s.label} className="lt-stat"><div className="lt-stat-num" style={{color:s.color}}>{s.val}</div><div className="lt-stat-lbl">{s.label}</div></div>
        ))}
      </div>

      {/* View tabs */}
      <div className="filter-row">
        <div className="filter-grp flex aic g6">
          {[{k:'upcoming',l:'Upcoming'},  {k:'past',l:'Past'}, {k:'cancelled',l:'Cancelled'}].map(t=>(
            <button key={t.k} className={`btn btn-sm ${view===t.k?'btn-lime':'btn-ghost'}`} onClick={()=>setView(t.k)}>{t.l} ({(t.k==='upcoming'?upcoming:t.k==='past'?past:cancelled).length})</button>
          ))}
        </div>
        <div style={{fontSize:12,color:'#888'}}>Click a meeting to edit or cancel · Invites sent via Google Calendar</div>
      </div>

      {display.length===0?(
        <div className="card"><div className="empty"><div className="empty-ico">📅</div><p>{view==='upcoming'?'No upcoming meetings. Click + Schedule Meeting to create one.':view==='past'?'No past meetings yet.':'No cancelled meetings.'}</p></div></div>
      ):(
        <div>
          {display.map(m=>{
            const mt = MEETING_TYPES.find(t=>t.id===m.type)||MEETING_TYPES[5];
            const d = new Date(m.dateTime);
            const isPast = d < now;
            const attendeeNames = (m.attendeeIds||[]).map(id=>staff.find(s=>s.id===id)?.name?.split(' ')[0]||id);
            return(
              <div key={m.id} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'14px 16px',marginBottom:10,borderLeft:`3px solid ${mt.color}`}}>
                <div className="flex aic jsb">
                  <div style={{flex:1}}>
                    <div className="flex aic g8" style={{marginBottom:5}}>
                      <span style={{fontSize:14}}>{mt.icon}</span>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:800,color:'var(--text)',letterSpacing:'.5px'}}>{m.title}</span>
                      <span style={{fontSize:12,padding:'2px 7px',borderRadius:3,background:mt.color+'22',color:mt.color,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>{mt.label}</span>
                      {m.recurrence&&<span style={{fontSize:12,padding:'2px 6px',borderRadius:3,background:'rgba(187,153,255,.15)',color:'#BB99FF',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>↻ {m.recurrence}</span>}
                      <span style={{fontSize:12,padding:'2px 7px',borderRadius:3,background:STATUS_COLORS[m.status||'scheduled']+'22',color:STATUS_COLORS[m.status||'scheduled'],fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{m.status||'Scheduled'}</span>
                    </div>
                    <div className="flex aic g12" style={{fontSize:12,color:'#888',gap:14}}>
                      <span>📅 {d.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}</span>
                      <span>🕐 {d.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})}</span>
                      {m.duration&&<span>⏱ {m.duration} min</span>}
                      {m.location&&<span>📍 {m.location}</span>}
                    </div>
                    {m.description&&<div style={{fontSize:12,color:'#999',marginTop:5,fontStyle:'italic'}}>{m.description}</div>}
                    <div className="flex aic g6" style={{marginTop:7,flexWrap:'wrap'}}>
                      {m.organizer&&<span style={{fontSize:12,background:'rgba(68,204,170,.1)',color:'#44CCAA',padding:'2px 7px',borderRadius:3,border:'1px solid rgba(68,204,170,.2)'}}>👤 {m.organizer}</span>}
                      {attendeeNames.slice(0,5).map((n,i)=>(
                        <span key={i} style={{fontSize:12,background:'var(--surface)',color:'#888',padding:'2px 7px',borderRadius:3,border:'1px solid var(--border)'}}>{n}</span>
                      ))}
                      {attendeeNames.length>5&&<span style={{fontSize:12,color:'#888'}}>+{attendeeNames.length-5} more</span>}
                      {m.allStaff&&<span style={{fontSize:12,background:'rgba(107,159,212,.1)',color:'#6B9FD4',padding:'2px 7px',borderRadius:3,border:'1px solid rgba(107,159,212,.2)'}}>All Staff</span>}
                    </div>
                    {m.meetLink&&(
                      <div style={{marginTop:7}}>
                        <a href={m.meetLink} target="_blank" rel="noreferrer" style={{fontSize:12,color:'#4A90E2',textDecoration:'none',background:'rgba(74,144,226,.08)',padding:'3px 10px',borderRadius:4,border:'1px solid rgba(74,144,226,.2)',display:'inline-flex',alignItems:'center',gap:5}}>
                          <span>🎥</span> Join Google Meet
                        </a>
                      </div>
                    )}
                    {m.calendarEventId&&(
                      <div style={{marginTop:5,fontSize:12,color:'#888'}}>
                        ✓ Google Calendar event created · Invites sent to {(m.attendeeEmails||[]).length} attendees
                      </div>
                    )}
                    {m.gcalError&&(
                      <div style={{marginTop:5,fontSize:12,color:'#F4DB71'}}>
                        ⚠ Saved locally · Google Calendar: {m.gcalError}
                      </div>
                    )}
                  </div>
                  <div className="flex aic g6" style={{flexShrink:0,marginLeft:12,flexDirection:'column',alignItems:'flex-end'}}>
                    <button className="btn btn-ghost btn-xs" onClick={()=>{setEditMeeting(m);setShowForm(true);}}>✎ Edit</button>
                    {!isPast&&m.status!=='cancelled'&&<button className="btn btn-xs" style={{background:'rgba(224,82,82,.1)',color:'#E05252',border:'1px solid rgba(224,82,82,.2)',fontSize:12}} onClick={()=>updateStatus(m.id,'cancelled')}>✕ Cancel</button>}
                    {isPast&&m.status!=='completed'&&<button className="btn btn-xs" style={{background:'rgba(202,232,193,.1)',color:'#CAE8C1',border:'1px solid rgba(202,232,193,.2)',fontSize:12}} onClick={()=>updateStatus(m.id,'completed')}>✓ Mark Done</button>}
                    <button className="btn btn-xs" style={{background:'transparent',color:'#444',border:'1px solid var(--border)',fontSize:12}} onClick={()=>deleteMeeting(m.id)}>🗑</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {showForm&&<ScheduleMeetingModal onClose={()=>{setShowForm(false);setEditMeeting(null);}} onSave={m=>{
        if(editMeeting){setMeetings(p=>p.map(x=>x.id===editMeeting.id?{...editMeeting,...m}:x));}
        else{setMeetings(p=>[...p,{...m,id:'mtg-'+Date.now(),status:'scheduled'}]);}
        setShowForm(false);setEditMeeting(null);
      }} staff={staff} existing={editMeeting}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════
   SCHEDULE MEETING MODAL — with Google Calendar API call
══════════════════════════════════════════════ */
function ScheduleMeetingModal({onClose, onSave, staff, existing}){
  const now = new Date();
  const defDate = new Date(now.getTime()+24*60*60*1000);
  const defDateStr = defDate.toISOString().slice(0,16);

  const[f,setF]=useState({
    title: existing?.title||'',
    type: existing?.type||'weekly-edu',
    dateTime: existing?.dateTime? new Date(existing.dateTime).toISOString().slice(0,16) : defDateStr,
    duration: existing?.duration||60,
    location: existing?.location||'Google Meet',
    description: existing?.description||'',
    organizer: existing?.organizer||'',
    organizerEmail: existing?.organizerEmail||'',
    attendeeIds: existing?.attendeeIds||[],
    allStaff: existing?.allStaff||false,
    recurrence: existing?.recurrence||'',
    recurrenceCount: existing?.recurrenceCount||12,
    sendInvites: existing?.sendInvites!==false,
    createMeet: existing?.createMeet!==false,
  });
  const[loading,setLoading]=useState(false);
  const[status,setStatus]=useState(null);

  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const mt = MEETING_TYPES.find(t=>t.id===f.type)||MEETING_TYPES[5];

  const toggleAttendee = (id) => setF(p=>({...p,
    attendeeIds: p.attendeeIds.includes(id)? p.attendeeIds.filter(x=>x!==id):[...p.attendeeIds,id]
  }));

  // Build attendee email list from staff
  const getAttendeeEmails = () => {
    const ids = f.allStaff ? staff.map(s=>s.id) : f.attendeeIds;
    return ids.map(id=>{
      const s = staff.find(x=>x.id===id);
      if(!s) return null;
      if(s.email) return {name:s.name, email:s.email};
      // Fallback: use firstname@revibeto.com
      const first = s.name.split(' ')[0].toLowerCase();
      return {name:s.name, email:`${first}@revibeto.com`};
    }).filter(Boolean);
  };

  const handleSave = async () => {
    if(!f.title.trim()) return setStatus({type:'error',msg:'Please enter a meeting title.'});
    if(!f.dateTime) return setStatus({type:'error',msg:'Please set a date and time.'});

    setLoading(true);
    setStatus({type:'info',msg:'Creating Google Calendar event…'});

    const startDt = new Date(f.dateTime);
    const endDt = new Date(startDt.getTime()+f.duration*60*1000);
    const attendeeEmails = getAttendeeEmails();

    // Build the event payload for Google Calendar MCP
    const eventBody = {
      summary: f.title,
      description: f.description + (f.description?'\n\n':'') + `Meeting Type: ${mt.label}\nOrganized by: ${f.organizer||'Revibe Health Management'}`,
      start: {dateTime: startDt.toISOString(), timeZone: 'America/Toronto'},
      end:   {dateTime: endDt.toISOString(),   timeZone: 'America/Toronto'},
      location: f.location,
      attendees: [
        ...(f.organizerEmail?[{email:f.organizerEmail,organizer:true}]:[]),
        ...attendeeEmails.map(a=>({email:a.email,displayName:a.name})),
      ],
      conferenceData: f.createMeet ? {
        createRequest: {requestId: 'revibe-'+Date.now(), conferenceSolutionKey:{type:'hangoutsMeet'}}
      } : undefined,
      reminders: {useDefault:false, overrides:[{method:'email',minutes:1440},{method:'popup',minutes:30}]},
    };

    // Add recurrence rule if set
    if(f.recurrence){
      const freq = f.recurrence==='WEEKLY'?'WEEKLY':'MONTHLY';
      eventBody.recurrence = [`RRULE:FREQ=${freq};COUNT=${f.recurrenceCount}`];
    }

    // Build a prompt for Claude to execute via its Google Calendar connection
    const rruleStr = f.recurrence==='WEEKLY'   ? 'RRULE:FREQ=WEEKLY;COUNT='+f.recurrenceCount
                   : f.recurrence==='BIWEEKLY' ? 'RRULE:FREQ=WEEKLY;INTERVAL=2;COUNT='+f.recurrenceCount
                   : f.recurrence==='MONTHLY'  ? 'RRULE:FREQ=MONTHLY;COUNT='+f.recurrenceCount
                   : null;
    const emailLines = attendeeEmails.map(a=>'  - '+a.name+' <'+a.email+'>').join('\n');
    const loc = f.location==='custom'?(f.customLocation||'TBD'):f.location;
    const claudePrompt = [
      'Please create a Google Calendar event using your Google Calendar connection:',
      '',
      'Title: '+f.title,
      'Start: '+startDt.toISOString()+' (America/Toronto)',
      'End:   '+endDt.toISOString()+' (America/Toronto)',
      'Duration: '+f.duration+' minutes',
      'Location: '+loc,
      f.description?'Description: '+f.description:'',
      f.organizer?'Organizer: '+f.organizer+(f.organizerEmail?' <'+f.organizerEmail+'>':''):'',
      rruleStr?'Recurrence: '+rruleStr:'One-time event',
      f.createMeet?'Video: Please add a Google Meet link (hangoutsMeet)':'',
      'Reminders: email 1440 min before, popup 30 min before',
      '',
      'Send calendar invites to all '+attendeeEmails.length+' attendees:',
      emailLines,
      '',
      'After creating, share the Google Meet link and calendar link.'
    ].filter(l=>l).join('\n');
    let copied=false;
    try{await navigator.clipboard.writeText(claudePrompt);copied=true;}catch(e){}
    onSave({...f,attendeeEmails:attendeeEmails.map(a=>a.email),gcalPending:true,gcalPrompt:claudePrompt});
    setStatus({type:'ready',prompt:claudePrompt,copied,count:attendeeEmails.length});
    setLoading(false);
  };

  const selectedCount = f.allStaff ? staff.length : f.attendeeIds.length;

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:580}} onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe" style={{background:`linear-gradient(90deg, ${mt.color}, #1a1a1a)`}}/><button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-body">
          <div className="flex aic g10" style={{marginBottom:16}}>
            <span style={{fontSize:20}}>{mt.icon}</span>
            <div className="bc fw6" style={{fontSize:20,letterSpacing:2}}>{existing?'EDIT MEETING':'SCHEDULE MEETING'}</div>
          </div>

          <div className="fgrid">
            {/* Meeting type */}
            <div className="fg full">
              <label>Meeting Type</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,paddingTop:4}}>
                {MEETING_TYPES.map(t=>(
                  <button key={t.id} onClick={()=>{set('type',t.id);if(!f.title)set('title',t.label);if(t.recurrence)set('recurrence',t.recurrence);}}
                    style={{fontSize:12,padding:'5px 10px',borderRadius:4,border:'1px solid',cursor:'pointer',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                      background:f.type===t.id?t.color+'22':'var(--surface3)',
                      borderColor:f.type===t.id?t.color:'var(--border2)',
                      color:f.type===t.id?t.color:'#888'}}>
                    {t.icon} {t.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Title */}
            <div className="fg full"><label>Meeting Title</label><input value={f.title} onChange={e=>set('title',e.target.value)} placeholder="e.g. Weekly Clinical Education — Markham"/></div>

            {/* Date/time + duration */}
            <div className="fg"><label>Date & Time</label><input type="datetime-local" value={f.dateTime} onChange={e=>set('dateTime',e.target.value)}/></div>
            <div className="fg"><label>Duration (minutes)</label>
              <select value={f.duration} onChange={e=>set('duration',parseInt(e.target.value))}>
                {[30,45,60,75,90,120].map(d=><option key={d} value={d}>{d} min</option>)}
              </select>
            </div>

            {/* Recurrence */}
            <div className="fg"><label>Recurrence</label>
              <select value={f.recurrence} onChange={e=>set('recurrence',e.target.value)}>
                <option value="">One-time only</option>
                <option value="WEEKLY">Weekly</option>
                <option value="BIWEEKLY">Every 2 weeks</option>
                <option value="MONTHLY">Monthly</option>
              </select>
            </div>
            {f.recurrence&&(
              <div className="fg"><label>Number of occurrences</label>
                <input type="number" min="2" max="52" value={f.recurrenceCount} onChange={e=>set('recurrenceCount',parseInt(e.target.value)||12)}/>
              </div>
            )}

            {/* Location */}
            <div className="fg"><label>Location</label>
              <select value={f.location} onChange={e=>set('location',e.target.value)}>
                <option value="Google Meet">Google Meet (Virtual)</option>
                <option value="Markham Clinic">Markham Clinic</option>
                <option value="Mississauga Clinic">Mississauga Clinic</option>
                <option value="Both Locations">Both Locations</option>
                <option value="custom">Custom…</option>
              </select>
            </div>
            {f.location==='custom'&&<div className="fg"><label>Custom Location</label><input value={f.customLocation||''} onChange={e=>set('customLocation',e.target.value)}/></div>}

            {/* Organizer */}
            <div className="fg"><label>Organizer Name</label><input value={f.organizer} onChange={e=>set('organizer',e.target.value)} placeholder="e.g. Mike Ross"/></div>
            <div className="fg"><label>Organizer Gmail</label><input value={f.organizerEmail} onChange={e=>set('organizerEmail',e.target.value)} placeholder="mike@revibehealth.ca"/></div>

            {/* Description */}
            <div className="fg full"><label>Agenda / Description</label><textarea value={f.description} onChange={e=>set('description',e.target.value)} placeholder="Agenda, topics, preparation needed…" style={{minHeight:60}}/></div>

            {/* Attendees */}
            <div className="fg full">
              <label>Attendees ({selectedCount} selected)</label>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <button className={`btn btn-sm ${f.allStaff?'btn-go':'btn-ghost'}`} onClick={()=>set('allStaff',!f.allStaff)}>
                  {f.allStaff?'✓ All Staff Selected':'Select All Staff'}
                </button>
                {!f.allStaff&&<span style={{fontSize:12,color:'#999'}}>or choose individuals below</span>}
              </div>
              {!f.allStaff&&(
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,maxHeight:180,overflowY:'auto',padding:'2px 0'}}>
                  {staff.map(s=>{
                    const sel = f.attendeeIds.includes(s.id);
                    return(
                      <div key={s.id} onClick={()=>toggleAttendee(s.id)} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',borderRadius:4,border:'1px solid',cursor:'pointer',borderColor:sel?'rgba(68,204,170,.4)':'var(--border)',background:sel?'rgba(68,204,170,.06)':'var(--surface2)'}}>
                        <div style={{width:16,height:16,borderRadius:3,border:'1px solid',borderColor:sel?'#44CCAA':'var(--border2)',background:sel?'rgba(68,204,170,.2)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          {sel&&<span style={{color:'#44CCAA',fontSize:12}}>✓</span>}
                        </div>
                        <div>
                          <div style={{fontSize:12,color:'var(--text)',fontWeight:500}}>{s.name}</div>
                          <div style={{fontSize:12,color:'#999'}}>{DISC.find(d=>d.id===s.discipline)?.label} · {s.site}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Options */}
            <div className="fg full">
              <div style={{display:'flex',gap:16}}>
                <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',fontSize:12,color:'#aaa'}}>
                  <input type="checkbox" checked={f.createMeet} onChange={e=>set('createMeet',e.target.checked)} style={{accentColor:'var(--go)'}}/>
                  Create Google Meet link
                </label>
                <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',fontSize:12,color:'#aaa'}}>
                  <input type="checkbox" checked={f.sendInvites} onChange={e=>set('sendInvites',e.target.checked)} style={{accentColor:'var(--go)'}}/>
                  Send email invites (Calendar)
                </label>
              </div>
            </div>
          </div>

          {/* Email preview */}
          {selectedCount>0&&(
            <div style={{background:'rgba(0,88,77,.08)',border:'1px solid rgba(0,88,77,.2)',borderRadius:5,padding:'10px 14px',marginTop:4,fontSize:12,color:'#888'}}>
              <div style={{color:'var(--lime)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:'2px',textTransform:'uppercase',marginBottom:5}}>Calendar invites will go to:</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {getAttendeeEmails().slice(0,8).map((a,i)=>(
                  <span key={i} style={{fontSize:12,background:'var(--surface2)',padding:'2px 7px',borderRadius:3,border:'1px solid var(--border)'}}>{a.email}</span>
                ))}
                {getAttendeeEmails().length>8&&<span style={{fontSize:12,color:'#888'}}>+{getAttendeeEmails().length-8} more</span>}
              </div>
            </div>
          )}

          {/* Status */}
          {status&&status.type==='ready'&&(
            <div style={{marginTop:10,border:'1px solid rgba(68,204,170,.25)',borderRadius:6,overflow:'hidden'}}>
              <div style={{padding:'10px 14px',background:'rgba(68,204,170,.06)',borderBottom:'1px solid rgba(68,204,170,.15)',display:'flex',alignItems:'flex-start',gap:12}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:'#44CCAA',marginBottom:3}}>
                    &#10003; Saved &#8212; Paste into Claude chat to send Calendar invites
                  </div>
                  <div style={{fontSize:12,color:'#888',lineHeight:1.5}}>
                    {status.copied?'Copied to clipboard! ':''}
                    Claude will create the event and send personal invites to all {status.count} @revibeto.com addresses.
                  </div>
                </div>
                <button className="btn btn-lime btn-xs" style={{flexShrink:0}}
                  onClick={async()=>{try{await navigator.clipboard.writeText(status.prompt);}catch(e){}}}>
                  {status.copied?'Copy Again':'Copy Prompt'}
                </button>
              </div>
              <pre style={{margin:0,padding:'10px 14px',fontSize:12,color:'#999',lineHeight:1.6,whiteSpace:'pre-wrap',maxHeight:150,overflowY:'auto',fontFamily:'monospace'}}>{status.prompt}</pre>
            </div>
          )}
          {status&&status.type==='error'&&(
            <div style={{marginTop:10,padding:'10px 14px',borderRadius:5,fontSize:12,background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.2)',color:'#E05252'}}>
              {status.msg}
            </div>
          )}

          <div className="flex aic g8" style={{marginTop:16,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-lime" onClick={handleSave} disabled={loading} style={{opacity:loading?.6:1}}>
              {loading?'Creating…':existing?'Update Meeting':'📅 Schedule + Send Invites'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ClinResourcesPage({staff, addNotif, currentUser}){
  const[resources,setResources]=React.useState(SEED_CLIN_RESOURCES);
  React.useEffect(()=>{(async()=>{const d=await dbGet('resources',SEED_CLIN_RESOURCES);if(d.length)setResources(d);})();},[]);
  React.useEffect(()=>{if(resources!==SEED_CLIN_RESOURCES)dbUpsert('resources',resources);},[resources]);






  const[search,setSearch]=React.useState('');
  const[filterCat,setFilterCat]=React.useState('all');
  const[filterRole,setFilterRole]=React.useState('all');
  const[filterType,setFilterType]=React.useState('all');
  const[showAdd,setShowAdd]=React.useState(false);
  const[editRes,setEditRes]=React.useState(null);
  const[viewRes,setViewRes]=React.useState(null);
  const[confirmDel,setConfirmDel]=React.useState(null);
  const[threadRes,setThreadRes]=React.useState(null);

  const filtered = resources.filter(r=>{
    const q = search.toLowerCase();
    const matchSearch = !q || r.title.toLowerCase().includes(q) || r.description.toLowerCase().includes(q) || (r.tags||[]).some(t=>t.toLowerCase().includes(q));
    const matchCat  = filterCat==='all'  || r.categories.includes(filterCat);
    const matchRole = filterRole==='all' || r.roles.includes('all') || r.roles.includes(filterRole);
    const matchType = filterType==='all' || r.type===filterType;
    return matchSearch && matchCat && matchRole && matchType;
  });

  const pinned = filtered.filter(r=>r.pinned);
  const rest   = filtered.filter(r=>!r.pinned);

  const deleteRes = (id)=>{setResources(p=>p.filter(r=>r.id!==id));setConfirmDel(null);};
  const togglePin = (id)=>setResources(p=>p.map(r=>r.id===id?{...r,pinned:!r.pinned}:r));

  const typeInfo = (t)=>RESOURCE_TYPES.find(x=>x.id===t)||RESOURCE_TYPES[1];

  return(
    <div>
      {/* Header */}
      <div className="flex aic jsb" style={{marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa',marginBottom:3}}>Clinician Resources</div>
          <div style={{fontSize:12,color:'#777'}}>Shared tools, articles, templates, and links to address skill gaps across all roles and tracks</div>
        </div>
        <button className="btn btn-lime" onClick={()=>{setEditRes(null);setShowAdd(true);}}>+ Add Resource</button>
      </div>

      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:14}}>
        {[
          {label:'Total Resources', val:resources.length,         color:'#CAE8C1'},
          {label:'Pinned',          val:resources.filter(r=>r.pinned).length, color:'#F4DB71'},
          {label:'Articles',        val:resources.filter(r=>r.type==='article').length, color:'#6B9FD4'},
          {label:'Videos',          val:resources.filter(r=>r.type==='video').length,   color:'#E05252'},
          {label:'Tools & Templates',val:resources.filter(r=>['tool','template','course'].includes(r.type)).length, color:'#BB99FF'},
        ].map(s=>(
          <div key={s.label} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,padding:'10px 12px'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:s.color}}>{s.val}</div>
            <div style={{fontSize:11,color:'#777',marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Search + filters */}
      <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:5,padding:'12px 14px',marginBottom:14}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search resources by title, keyword, or tag..."
          style={{width:'100%',background:'var(--surface3)',border:'1px solid var(--border2)',borderRadius:4,color:'var(--text)',fontSize:13,padding:'8px 12px',outline:'none',marginBottom:10}}/>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-start'}}>
          {/* Type filter */}
          <div>
            <div style={{fontSize:10,color:'#555',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:5}}>Type</div>
            <div className="flex aic g5" style={{flexWrap:'wrap'}}>
              {RESOURCE_TYPES.map(t=>(
                <button key={t.id} className={`btn btn-xs ${filterType===t.id?'btn-go':'btn-ghost'}`}
                  onClick={()=>setFilterType(t.id)} style={{fontSize:11}}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>
          </div>
          {/* Role filter */}
          <div>
            <div style={{fontSize:10,color:'#555',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:5}}>Role</div>
            <div className="flex aic g5" style={{flexWrap:'wrap'}}>
              {RESOURCE_ROLES.map(r=>(
                <button key={r.id} className={`btn btn-xs ${filterRole===r.id?'btn-lime':'btn-ghost'}`}
                  onClick={()=>setFilterRole(r.id)} style={{fontSize:11}}>{r.label}</button>
              ))}
            </div>
          </div>
          {/* Category filter */}
          <div>
            <div style={{fontSize:10,color:'#555',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:5}}>Skill Category</div>
            <div className="flex aic g5" style={{flexWrap:'wrap'}}>
              <button className={`btn btn-xs ${filterCat==='all'?'btn-go':'btn-ghost'}`}
                onClick={()=>setFilterCat('all')} style={{fontSize:11}}>All Categories</button>
              {RESOURCE_CATS.map(c=>(
                <button key={c.id} className={`btn btn-xs ${filterCat===c.id?'btn-go':'btn-ghost'}`}
                  onClick={()=>setFilterCat(c.id)} style={{fontSize:11}}>{c.label}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Results count */}
      {search||filterCat!=='all'||filterRole!=='all'||filterType!=='all'?(
        <div style={{fontSize:11,color:'#555',marginBottom:10}}>
          Showing {filtered.length} of {resources.length} resources
          {search&&<span> matching "<strong style={{color:'#aaa'}}>{search}</strong>"</span>}
        </div>
      ):null}

      {/* Pinned section */}
      {pinned.length>0&&(
        <div style={{marginBottom:18}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,letterSpacing:'2px',textTransform:'uppercase',color:'#F4DB71',marginBottom:8}}>⭐ Pinned Resources</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:10}}>
            {pinned.map(r=><ResourceCard key={r.id} r={r} onView={()=>setViewRes(r)} onEdit={()=>{setEditRes(r);setShowAdd(true);}} onDelete={()=>setConfirmDel(r.id)} onPin={()=>togglePin(r.id)} typeInfo={typeInfo} onThread={()=>setThreadRes(r)}/>)}
          </div>
        </div>
      )}

      {/* All resources */}
      {rest.length>0?(
        <div>
          {pinned.length>0&&<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,letterSpacing:'2px',textTransform:'uppercase',color:'#666',marginBottom:8}}>All Resources</div>}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:10}}>
            {rest.map(r=><ResourceCard key={r.id} r={r} onView={()=>setViewRes(r)} onEdit={()=>{setEditRes(r);setShowAdd(true);}} onDelete={()=>setConfirmDel(r.id)} onPin={()=>togglePin(r.id)} typeInfo={typeInfo} onThread={()=>setThreadRes(r)}/>)}
          </div>
        </div>
      ):filtered.length===0?(
        <div className="card"><div className="empty"><div className="empty-ico">📚</div>
          <p>{search||filterCat!=='all'||filterRole!=='all'||filterType!=='all'?'No resources match your filters. Try adjusting the search or filters above.':'No resources yet. Click + Add Resource to get started.'}</p>
        </div></div>
      ):null}

      {/* Modals */}
      {showAdd&&<AddResourceModal onClose={()=>{setShowAdd(false);setEditRes(null);}} existing={editRes}
        onSave={r=>{
          if(editRes) setResources(p=>p.map(x=>x.id===editRes.id?{...editRes,...r}:x));
          else setResources(p=>[...p,{...r,id:'cr'+Date.now(),dateAdded:new Date().toISOString().slice(0,10)}]);
          setShowAdd(false);setEditRes(null);
        }} staff={staff}/>}
      {viewRes&&<ResourceDetailModal r={viewRes} onClose={()=>setViewRes(null)} onEdit={()=>{setEditRes(viewRes);setViewRes(null);setShowAdd(true);}} typeInfo={typeInfo}/>}
      {threadRes&&<ResourceThreadModal resource={threadRes} onClose={()=>setThreadRes(null)} staff={staff||[]} currentUser={currentUser||'Dave'} addNotif={addNotif||function(){}}/>}
      {confirmDel&&(
        <div className="overlay" onClick={()=>setConfirmDel(null)}>
          <div style={{background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:8,padding:24,maxWidth:360,margin:'auto',marginTop:'20vh'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:14,color:'var(--text)',marginBottom:8,fontWeight:600}}>Delete this resource?</div>
            <div style={{fontSize:12,color:'#777',marginBottom:16}}>This cannot be undone.</div>
            <div className="flex aic g8">
              <button className="btn btn-ghost" onClick={()=>setConfirmDel(null)}>Cancel</button>
              <button className="btn" style={{background:'rgba(224,82,82,.15)',color:'#E05252',border:'1px solid rgba(224,82,82,.3)'}} onClick={()=>deleteRes(confirmDel)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ResourceCard({r, onView, onEdit, onDelete, onPin, typeInfo, onThread}){
  const ti = typeInfo(r.type);
  return(
    <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'13px 14px',display:'flex',flexDirection:'column',gap:8,borderLeft:`3px solid ${ti.color||'#44CCAA'}`}}
      onClick={onView} className="hover-card" style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'13px 14px',display:'flex',flexDirection:'column',gap:8,borderLeft:`3px solid ${ti.color||'#44CCAA'}`,cursor:'pointer',transition:'border-color .15s'}}>
      {/* Top row */}
      <div className="flex aic jsb">
        <div className="flex aic g7">
          <span style={{fontSize:12,background:(ti.color||'#44CCAA')+'1a',color:ti.color||'#44CCAA',padding:'2px 8px',borderRadius:3,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'1px',fontSize:10,textTransform:'uppercase'}}>
            {ti.icon} {ti.label}
          </span>
          {r.pinned&&<span style={{fontSize:9,color:'#F4DB71'}}>⭐</span>}
        </div>
        <div className="flex aic g5" onClick={e=>e.stopPropagation()}>
          <button className="btn btn-xs btn-ghost" style={{fontSize:10,padding:'2px 6px'}} onClick={onPin} title={r.pinned?'Unpin':'Pin'}>
            {r.pinned?'📌':'Pin'}
          </button>
          <button className="btn btn-xs btn-ghost" style={{fontSize:10,padding:'2px 6px'}} onClick={onEdit}>✎</button>
          <button className="btn btn-xs" style={{fontSize:10,padding:'2px 6px',background:'transparent',color:'#555',border:'1px solid var(--border)'}} onClick={onDelete}>✕</button>
        </div>
      </div>
      {/* Title */}
      <div style={{fontSize:13,fontWeight:600,color:'var(--text)',lineHeight:1.3}}>{r.title}</div>
      {/* Description */}
      <div style={{fontSize:11,color:'#888',lineHeight:1.5,flex:1}}>{r.description}</div>
      {/* Categories */}
      {r.categories?.length>0&&(
        <div className="flex aic g4" style={{flexWrap:'wrap'}}>
          {r.categories.map(cid=>{
            const cat=RESOURCE_CATS.find(x=>x.id===cid);
            return cat?<span key={cid} style={{fontSize:9,background:'rgba(68,204,170,.1)',color:'#44CCAA',padding:'2px 6px',borderRadius:3,border:'1px solid rgba(68,204,170,.2)'}}>{cat.label}</span>:null;
          })}
        </div>
      )}
      {/* Roles */}
      {r.roles?.length>0&&r.roles[0]!=='all'&&(
        <div className="flex aic g4" style={{flexWrap:'wrap'}}>
          {r.roles.map(rid=>{
            const role=RESOURCE_ROLES.find(x=>x.id===rid);
            return role?<span key={rid} style={{fontSize:9,background:'rgba(107,159,212,.08)',color:'#6B9FD4',padding:'2px 6px',borderRadius:3,border:'1px solid rgba(107,159,212,.2)'}}>{role.label}</span>:null;
          })}
        </div>
      )}
      {/* Footer */}
      <div className="flex aic jsb" style={{marginTop:2}}>
        <span style={{fontSize:10,color:'#555'}}>{r.addedBy||'Revibe'} · {r.dateAdded||''}</span>
        <div className="flex aic g6" onClick={e=>e.stopPropagation()}>
          {r.url&&<span style={{fontSize:10,color:'#44CCAA'}}>↗ Link</span>}
          {r.fileData&&<span style={{fontSize:10,color:'#BB99FF'}}>📎 File</span>}
          <button className="btn btn-xs btn-ghost" style={{fontSize:10,color:'#44CCAA',padding:'2px 7px'}}
            onClick={e=>{e.stopPropagation();onThread&&onThread(r);}}>
            💬 Discuss
          </button>
        </div>
      </div>
    </div>
  );
}

function AddResourceModal({onClose, onSave, existing, staff}){
  const[f,setF]=React.useState({
    type:     existing?.type||'article',
    title:    existing?.title||'',
    url:      existing?.url||'',
    description: existing?.description||'',
    categories:  existing?.categories||[],
    roles:    existing?.roles||[],
    tags:     existing?.tags?.join(', ')||'',
    pinned:   existing?.pinned||false,
    addedBy:  existing?.addedBy||'',
    fileName: existing?.fileName||'',
    fileData: existing?.fileData||'',
  });
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const[fileLoading,setFileLoading]=React.useState(false);

  const toggleArr=(key,val)=>setF(p=>({...p,[key]:p[key].includes(val)?p[key].filter(x=>x!==val):[...p[key],val]}));

  const handleFile=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    setFileLoading(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      set('fileData',ev.target.result);
      set('fileName',file.name);
      setFileLoading(false);
    };
    reader.readAsDataURL(file);
  };

  const handleSave=()=>{
    if(!f.title.trim()) return alert('Please enter a title.');
    onSave({
      ...f,
      tags: f.tags.split(',').map(t=>t.trim()).filter(Boolean),
    });
  };

  const ti = RESOURCE_TYPES.find(x=>x.id===f.type)||RESOURCE_TYPES[1];

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:600}} onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe" style={{background:`linear-gradient(90deg,${ti.color||'#44CCAA'},#111)`}}/>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-body">
          <div className="bc fw6" style={{fontSize:20,letterSpacing:2,marginBottom:16}}>{existing?'EDIT RESOURCE':'ADD RESOURCE'}</div>
          <div className="fgrid">

            {/* Type */}
            <div className="fg full">
              <label>Resource Type</label>
              <div className="flex aic g6" style={{flexWrap:'wrap',paddingTop:4}}>
                {RESOURCE_TYPES.filter(t=>t.id!=='all').map(t=>(
                  <button key={t.id} onClick={()=>set('type',t.id)}
                    style={{fontSize:11,padding:'5px 10px',borderRadius:4,border:'1px solid',cursor:'pointer',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                      background:f.type===t.id?(t.color||'#44CCAA')+'22':'var(--surface3)',
                      borderColor:f.type===t.id?(t.color||'#44CCAA'):'var(--border2)',
                      color:f.type===t.id?(t.color||'#44CCAA'):'#777'}}>
                    {t.icon} {t.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Title */}
            <div className="fg full"><label>Title</label><input value={f.title} onChange={e=>set('title',e.target.value)} placeholder="Resource name or article title"/></div>

            {/* URL */}
            <div className="fg full">
              <label>URL / Link {f.type==='file'?'(optional if uploading file)':'(paste full URL)'}</label>
              <input value={f.url} onChange={e=>set('url',e.target.value)} placeholder="https://..."/>
            </div>

            {/* File upload */}
            <div className="fg full">
              <label>Upload File (PDF, DOC, image, etc.)</label>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <label style={{display:'inline-flex',alignItems:'center',gap:7,background:'var(--surface3)',border:'1px solid var(--border2)',borderRadius:4,padding:'7px 12px',cursor:'pointer',fontSize:12,color:'#aaa'}}>
                  📎 {fileLoading?'Loading…':f.fileName||'Choose file…'}
                  <input type="file" style={{display:'none'}} onChange={handleFile}/>
                </label>
                {f.fileData&&<button className="btn btn-xs btn-ghost" onClick={()=>{set('fileData','');set('fileName','');}}>✕ Remove</button>}
              </div>
            </div>

            {/* Description */}
            <div className="fg full"><label>Description / Notes</label><textarea value={f.description} onChange={e=>set('description',e.target.value)} placeholder="What is this resource? Why is it useful? What weakness does it address?" style={{minHeight:70}}/></div>

            {/* Skill Categories */}
            <div className="fg full">
              <label>Addresses Skill Categories ({f.categories.length} selected)</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:5,paddingTop:4,maxHeight:160,overflowY:'auto'}}>
                {RESOURCE_CATS.map(c=>{
                  const sel=f.categories.includes(c.id);
                  return(
                    <button key={c.id} onClick={()=>toggleArr('categories',c.id)}
                      style={{fontSize:10,padding:'4px 9px',borderRadius:4,border:'1px solid',cursor:'pointer',
                        background:sel?'rgba(68,204,170,.12)':'var(--surface3)',
                        borderColor:sel?'rgba(68,204,170,.4)':'var(--border2)',
                        color:sel?'#44CCAA':'#666'}}>
                      {c.label}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Roles */}
            <div className="fg full">
              <label>Relevant Roles ({f.roles.length===0?'none':f.roles.includes('all')?'All roles':f.roles.length+' roles'} selected)</label>
              <div className="flex aic g5" style={{flexWrap:'wrap',paddingTop:4}}>
                {RESOURCE_ROLES.map(r=>{
                  const sel=f.roles.includes(r.id);
                  return(
                    <button key={r.id} onClick={()=>toggleArr('roles',r.id)}
                      style={{fontSize:10,padding:'4px 9px',borderRadius:4,border:'1px solid',cursor:'pointer',
                        background:sel?'rgba(107,159,212,.12)':'var(--surface3)',
                        borderColor:sel?'rgba(107,159,212,.4)':'var(--border2)',
                        color:sel?'#6B9FD4':'#666'}}>
                      {r.label}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Tags */}
            <div className="fg full"><label>Tags (comma-separated)</label><input value={f.tags} onChange={e=>set('tags',e.target.value)} placeholder="communication, assessment, SOAP, evidence-based..."/></div>

            {/* Added by + pin */}
            <div className="fg"><label>Added By</label><input value={f.addedBy} onChange={e=>set('addedBy',e.target.value)} placeholder="Your name"/></div>
            <div className="fg" style={{display:'flex',alignItems:'center',gap:8,paddingTop:20}}>
              <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:12,color:'#aaa',fontFamily:'Barlow,sans-serif',letterSpacing:'normal',textTransform:'none'}}>
                <input type="checkbox" checked={f.pinned} onChange={e=>set('pinned',e.target.checked)} style={{accentColor:'var(--go)'}}/>
                Pin to top of resources list
              </label>
            </div>

          </div>
          <div className="flex aic g8" style={{marginTop:16,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-lime" onClick={handleSave}>{existing?'Save Changes':'Add Resource'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════════════
   RESOURCE THREAD / COMMENTS SYSTEM
   - Per-resource comment threads with @mentions
   - File attachments + URL embeds in comments
   - AI summary of each post via Anthropic API
   - In-dashboard notifications for @mentions
═══════════════════════════════════════════════════════════════ */

// ── Notification store ───────────────────────────────────────────────────────
function useNotifications(){
  const[notifs,setNotifs]=useState(()=>{
    try{const s=localStorage.getItem('rvgd3_notifs');return s?JSON.parse(s):[];}catch{return[];}
  });
  useEffect(()=>{try{localStorage.setItem('rvgd3_notifs',JSON.stringify(notifs));}catch{}},[notifs]);
  const addNotif=(n)=>setNotifs(p=>[{...n,id:'n'+Date.now()+Math.random(),ts:new Date().toISOString(),read:false},...p].slice(0,100));
  const markRead=(id)=>setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n));
  const markAllRead=()=>setNotifs(p=>p.map(n=>({...n,read:true})));
  return{notifs,addNotif,markRead,markAllRead};
}

// ── Resource Thread Modal ─────────────────────────────────────────────────────
function ResourceThreadModal({resource, onClose, staff, currentUser, addNotif}){
  const storageKey = 'rvgd3_thread_'+resource.id;
  const[comments,setComments]=React.useState(()=>{
    try{const s=localStorage.getItem(storageKey);return s?JSON.parse(s):[];}catch{return[];}
  });
  React.useEffect(()=>{try{localStorage.setItem(storageKey,JSON.stringify(comments));}catch{}},[comments]);

  const[text,setText]=React.useState('');
  const[replyTo,setReplyTo]=React.useState(null);
  const[attachFile,setAttachFile]=React.useState(null);
  const[attachFileName,setAttachFileName]=React.useState('');
  const[linkUrl,setLinkUrl]=React.useState('');
  const[linkTitle,setLinkTitle]=React.useState('');
  const[showLinkForm,setShowLinkForm]=React.useState(false);
  const[posting,setPosting]=React.useState(false);
  const[mentionQuery,setMentionQuery]=React.useState('');
  const[mentionPos,setMentionPos]=React.useState(-1);
  const[showMentions,setShowMentions]=React.useState(false);
  const textRef=React.useRef();
  const bottomRef=React.useRef();

  // Extract @mentions from text
  const extractMentions=(t)=>{
    const matches=t.match(/@([\w\s]+?)(?=\s|$|[,.])/g)||[];
    return matches.map(m=>m.slice(1).trim()).filter(m=>staff.find(s=>s.name.toLowerCase()===m.toLowerCase()));
  };

  // Handle typing — detect @ for mention dropdown
  const handleTextChange=(e)=>{
    const val=e.target.value;
    setText(val);
    const cursor=e.target.selectionStart;
    const textBefore=val.slice(0,cursor);
    const atIdx=textBefore.lastIndexOf('@');
    if(atIdx>=0&&(atIdx===0||textBefore[atIdx-1]===' ')){
      const query=textBefore.slice(atIdx+1);
      if(!query.includes(' ')){
        setMentionQuery(query);
        setMentionPos(atIdx);
        setShowMentions(true);
        return;
      }
    }
    setShowMentions(false);
  };

  const insertMention=(name)=>{
    const before=text.slice(0,mentionPos);
    const after=text.slice(textRef.current.selectionStart);
    const newText=before+'@'+name+' '+after;
    setText(newText);
    setShowMentions(false);
    textRef.current.focus();
  };

  const filteredMentions=staff.filter(s=>s.name.toLowerCase().includes(mentionQuery.toLowerCase())).slice(0,6);

  // Handle file attach
  const handleFileAttach=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{setAttachFile(ev.target.result);setAttachFileName(file.name);};
    reader.readAsDataURL(file);
  };

  // AI summary via Anthropic API
  const getAISummary=async(postText,url,fileName)=>{
    const contentDesc=[
      postText&&`Comment: "${postText}"`,
      url&&`Linked URL: ${url}`,
      fileName&&`Attached file: ${fileName}`,
    ].filter(Boolean).join('\n');

    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:120,
          system:'You are a concise clinical education assistant. Given a resource post in a healthcare team dashboard, write a 1-2 sentence summary (max 30 words) of what it contains and why it is useful. Be direct and specific. No preamble.',
          messages:[{role:'user',content:`Summarize this post for the team:\n${contentDesc}`}]
        })
      });
      const data=await res.json();
      return data?.content?.[0]?.text?.trim()||null;
    }catch{return null;}
  };

  // Post comment
  const handlePost=async()=>{
    if(!text.trim()&&!attachFile&&!linkUrl) return;
    setPosting(true);

    const mentions=extractMentions(text);
    const newComment={
      id:'c'+Date.now(),
      author:currentUser||'Dave',
      text:text.trim(),
      replyTo:replyTo||null,
      fileData:attachFile||null,
      fileName:attachFileName||null,
      linkUrl:linkUrl||null,
      linkTitle:linkTitle||null,
      ts:new Date().toISOString(),
      mentions,
      aiSummary:null,
      loadingSummary:true,
    };

    setComments(p=>[...p,newComment]);
    setText('');setReplyTo(null);setAttachFile(null);setAttachFileName('');setLinkUrl('');setLinkTitle('');setShowLinkForm(false);
    setPosting(false);
    setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),100);

    // Fire notifications for @mentions
    mentions.forEach(name=>{
      const s=staff.find(x=>x.name.toLowerCase()===name.toLowerCase());
      if(s&&s.email){
        addNotif({
          type:'mention',
          from:currentUser||'Dave',
          to:s.name,
          email:s.email,
          resourceTitle:resource.title,
          resourceId:resource.id,
          preview:text.slice(0,80),
          gcalPrompt:`Please send an email via Gmail to ${s.email} with subject "You were mentioned in a Revibe resource discussion" and body: "${currentUser||'Dave'} mentioned you in a comment on the resource "${resource.title}":\n\n${text.slice(0,200)}\n\nLog into the Revibe G&D Dashboard to reply."`
        });
      }
    });

    // Get AI summary async
    const summary=await getAISummary(text.trim(),linkUrl,attachFileName);
    setComments(p=>p.map(c=>c.id===newComment.id?{...c,aiSummary:summary,loadingSummary:false}:c));
  };

  // Render single comment
  const renderComment=(c,depth=0)=>{
    const replyComment=c.replyTo?comments.find(x=>x.id===c.replyTo):null;
    const timeAgo=(ts)=>{
      const d=Math.floor((Date.now()-new Date(ts))/1000);
      if(d<60)return d+'s ago';if(d<3600)return Math.floor(d/60)+'m ago';
      if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';
    };
    // Render text with @mention highlighting
    const renderText=(t)=>{
      if(!t)return null;
      const parts=t.split(/(@[\w\s]+?)(?=\s|$|[,.])/g);
      return parts.map((p,i)=>p.startsWith('@')&&staff.find(s=>s.name.toLowerCase()===p.slice(1).toLowerCase().trim())
        ?<span key={i} style={{color:'#CAE8C1',fontWeight:600,background:'rgba(202,232,193,.1)',borderRadius:3,padding:'0 3px'}}>{p}</span>
        :<span key={i}>{p}</span>
      );
    };

    return(
      <div key={c.id} style={{marginLeft:depth*24,marginBottom:10}}>
        <div style={{background:depth>0?'rgba(255,255,255,.03)':'var(--surface3)',border:'1px solid var(--border)',borderRadius:6,padding:'10px 12px',borderLeft:depth>0?'2px solid rgba(68,204,170,.2)':'none'}}>
          {/* Reply context */}
          {replyComment&&(
            <div style={{fontSize:10,color:'#555',borderLeft:'2px solid #333',paddingLeft:8,marginBottom:7,fontStyle:'italic'}}>
              ↩ replying to <span style={{color:'#888'}}>{replyComment.author}</span>: "{replyComment.text.slice(0,60)}{replyComment.text.length>60?'…':''}"
            </div>
          )}
          {/* Author row */}
          <div className="flex aic jsb" style={{marginBottom:6}}>
            <div className="flex aic g8">
              <div style={{width:26,height:26,borderRadius:'50%',background:'var(--go)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#CAE8C1',flexShrink:0}}>
                {(c.author||'?').slice(0,1).toUpperCase()}
              </div>
              <div>
                <span style={{fontSize:12,fontWeight:600,color:'#ddd'}}>{c.author}</span>
                <span style={{fontSize:10,color:'#555',marginLeft:8}}>{timeAgo(c.ts)}</span>
                {c.mentions?.length>0&&<span style={{fontSize:9,color:'#CAE8C1',marginLeft:8}}>mentioned {c.mentions.join(', ')}</span>}
              </div>
            </div>
            <button className="btn btn-xs btn-ghost" style={{fontSize:10,color:'#555'}} onClick={()=>setReplyTo(c.id)}>↩ Reply</button>
          </div>
          {/* Text */}
          {c.text&&<div style={{fontSize:12,color:'#ccc',lineHeight:1.6,marginBottom:6}}>{renderText(c.text)}</div>}
          {/* Attached file */}
          {c.fileData&&(
            <a href={c.fileData} download={c.fileName||'file'} onClick={e=>e.stopPropagation()}
              style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(187,153,255,.08)',border:'1px solid rgba(187,153,255,.2)',color:'#BB99FF',borderRadius:4,padding:'5px 10px',fontSize:11,textDecoration:'none',marginBottom:6}}>
              📎 {c.fileName||'Download file'}
            </a>
          )}
          {/* Linked URL */}
          {c.linkUrl&&(
            <a href={c.linkUrl} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
              style={{display:'flex',alignItems:'center',gap:8,background:'rgba(107,159,212,.06)',border:'1px solid rgba(107,159,212,.18)',borderRadius:5,padding:'8px 12px',textDecoration:'none',marginBottom:6}}>
              <span style={{fontSize:18}}>🔗</span>
              <div>
                <div style={{fontSize:12,color:'#6B9FD4',fontWeight:600}}>{c.linkTitle||c.linkUrl}</div>
                <div style={{fontSize:10,color:'#555',marginTop:1}}>{c.linkUrl.slice(0,60)}{c.linkUrl.length>60?'…':''}</div>
              </div>
            </a>
          )}
          {/* AI Summary */}
          {c.loadingSummary&&(
            <div style={{marginTop:6,padding:'5px 10px',background:'rgba(202,232,193,.04)',border:'1px solid rgba(202,232,193,.1)',borderRadius:4,fontSize:10,color:'#555',display:'flex',alignItems:'center',gap:6}}>
              <span style={{animation:'spin 1s linear infinite',display:'inline-block'}}>⟳</span> Generating AI summary…
            </div>
          )}
          {c.aiSummary&&!c.loadingSummary&&(
            <div style={{marginTop:6,padding:'6px 10px',background:'rgba(202,232,193,.06)',border:'1px solid rgba(202,232,193,.15)',borderRadius:4}}>
              <div style={{fontSize:9,color:'#CAE8C1',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:3,fontFamily:"'Barlow Condensed',sans-serif"}}>✦ AI Summary</div>
              <div style={{fontSize:11,color:'#aaa',lineHeight:1.5}}>{c.aiSummary}</div>
            </div>
          )}
        </div>
        {/* Nested replies */}
        {comments.filter(r=>r.replyTo===c.id).map(r=>renderComment(r,depth+1))}
      </div>
    );
  };

  const topLevel=comments.filter(c=>!c.replyTo||!comments.find(x=>x.id===c.replyTo));

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:640,display:'flex',flexDirection:'column',maxHeight:'88vh'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-stripe" style={{background:'linear-gradient(90deg,var(--go),#111)'}}/>
        <button className="modal-close" onClick={onClose}>✕ Close</button>

        {/* Resource header */}
        <div style={{padding:'16px 20px 12px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <div style={{fontSize:10,color:'#555',letterSpacing:'2px',textTransform:'uppercase',marginBottom:4}}>Discussion Thread</div>
          <div style={{fontSize:16,fontWeight:700,color:'var(--text)',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'.5px'}}>{resource.title}</div>
          {resource.description&&<div style={{fontSize:11,color:'#666',marginTop:3,lineHeight:1.4}}>{resource.description.slice(0,120)}{resource.description.length>120?'…':''}</div>}
          <div style={{fontSize:10,color:'#555',marginTop:5}}>{comments.length} comment{comments.length!==1?'s':''}</div>
        </div>

        {/* Comments list */}
        <div style={{flex:1,overflowY:'auto',padding:'14px 16px'}}>
          {comments.length===0&&(
            <div style={{textAlign:'center',padding:'30px 0',color:'#444'}}>
              <div style={{fontSize:28,marginBottom:8}}>💬</div>
              <div style={{fontSize:12}}>No comments yet — start the discussion below</div>
            </div>
          )}
          {topLevel.map(c=>renderComment(c,0))}
          <div ref={bottomRef}/>
        </div>

        {/* Reply-to banner */}
        {replyTo&&(()=>{
          const parent=comments.find(c=>c.id===replyTo);
          return parent?(
            <div style={{padding:'6px 16px',background:'rgba(68,204,170,.05)',borderTop:'1px solid rgba(68,204,170,.1)',display:'flex',aic:'center',justifyContent:'space-between',flexShrink:0}}>
              <span style={{fontSize:11,color:'#44CCAA'}}>↩ Replying to <strong>{parent.author}</strong>: "{parent.text.slice(0,50)}{parent.text.length>50?'…':''}"</span>
              <button onClick={()=>setReplyTo(null)} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:12}}>✕</button>
            </div>
          ):null;
        })()}

        {/* Compose box */}
        <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',flexShrink:0,background:'var(--surface2)'}}>

          {/* Link form (toggleable) */}
          {showLinkForm&&(
            <div style={{background:'var(--surface3)',border:'1px solid var(--border2)',borderRadius:5,padding:'10px 12px',marginBottom:10,display:'flex',gap:8,flexWrap:'wrap'}}>
              <input value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} placeholder="https://... (YouTube, article, quiz, etc.)"
                style={{flex:2,minWidth:200,background:'var(--surface)',border:'1px solid var(--border2)',color:'var(--text)',fontSize:12,padding:'6px 10px',borderRadius:4,outline:'none'}}/>
              <input value={linkTitle} onChange={e=>setLinkTitle(e.target.value)} placeholder="Link title / label (optional)"
                style={{flex:1,minWidth:120,background:'var(--surface)',border:'1px solid var(--border2)',color:'var(--text)',fontSize:12,padding:'6px 10px',borderRadius:4,outline:'none'}}/>
              <button className="btn btn-ghost btn-xs" onClick={()=>{setLinkUrl('');setLinkTitle('');setShowLinkForm(false);}}>✕</button>
            </div>
          )}

          {/* Attached file preview */}
          {attachFile&&(
            <div style={{background:'rgba(187,153,255,.06)',border:'1px solid rgba(187,153,255,.2)',borderRadius:4,padding:'6px 10px',marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,color:'#BB99FF'}}>📎 {attachFileName}</span>
              <button onClick={()=>{setAttachFile(null);setAttachFileName('');}} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:11}}>✕</button>
            </div>
          )}

          {/* Mention dropdown */}
          {showMentions&&filteredMentions.length>0&&(
            <div style={{background:'var(--surface3)',border:'1px solid var(--border2)',borderRadius:5,marginBottom:8,overflow:'hidden',boxShadow:'0 4px 20px rgba(0,0,0,.4)'}}>
              {filteredMentions.map(s=>(
                <div key={s.id} onClick={()=>insertMention(s.name)}
                  style={{padding:'8px 12px',cursor:'pointer',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid var(--border)'}}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(68,204,170,.06)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <div style={{width:24,height:24,borderRadius:'50%',background:'var(--go)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#CAE8C1'}}>
                    {s.name.slice(0,1)}
                  </div>
                  <div>
                    <div style={{fontSize:12,color:'#ddd',fontWeight:600}}>{s.name}</div>
                    <div style={{fontSize:10,color:'#555'}}>{s.email||''}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Text area */}
          <div style={{position:'relative'}}>
            <textarea ref={textRef} value={text} onChange={handleTextChange}
              placeholder="Add a comment, question, or insight... Type @ to mention a teammate"
              style={{width:'100%',background:'var(--surface3)',border:'1px solid var(--border2)',borderRadius:6,color:'var(--text)',fontSize:12,padding:'10px 12px',outline:'none',resize:'none',minHeight:70,lineHeight:1.6,boxSizing:'border-box'}}
              onKeyDown={e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))handlePost();if(e.key==='Escape')setShowMentions(false);}}
            />
          </div>

          {/* Action bar */}
          <div className="flex aic jsb" style={{marginTop:8}}>
            <div className="flex aic g6">
              {/* File attach */}
              <label style={{display:'inline-flex',alignItems:'center',gap:5,background:'var(--surface3)',border:'1px solid var(--border)',borderRadius:4,padding:'5px 9px',cursor:'pointer',fontSize:11,color:'#777'}}>
                📎 File
                <input type="file" style={{display:'none'}} onChange={handleFileAttach}/>
              </label>
              {/* Link */}
              <button className="btn btn-ghost btn-xs" style={{fontSize:11}} onClick={()=>setShowLinkForm(v=>!v)}>
                🔗 Link
              </button>
              <span style={{fontSize:10,color:'#444'}}>⌘↵ to post</span>
            </div>
            <button className="btn btn-lime" onClick={handlePost} disabled={posting||(!text.trim()&&!attachFile&&!linkUrl)}
              style={{opacity:posting?0.6:1,fontSize:12,padding:'6px 16px'}}>
              {posting?'Posting…':'Post'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Notification Bell ─────────────────────────────────────────────────────────
function NotificationBell({notifs, markRead, markAllRead, setPage}){
  const[open,setOpen]=React.useState(false);
  const unread=notifs.filter(n=>!n.read).length;
  const ref=React.useRef();
  React.useEffect(()=>{
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);
  const timeAgo=(ts)=>{
    const d=Math.floor((Date.now()-new Date(ts))/1000);
    if(d<60)return d+'s';if(d<3600)return Math.floor(d/60)+'m';if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d';
  };
  return(
    <div ref={ref} style={{position:'relative',display:'inline-block'}}>
      <button onClick={()=>setOpen(v=>!v)}
        style={{background:'none',border:'1px solid var(--border)',borderRadius:5,padding:'5px 9px',cursor:'pointer',color:'#aaa',fontSize:13,display:'flex',alignItems:'center',gap:5,position:'relative'}}>
        🔔
        {unread>0&&<span style={{background:'#E05252',color:'#fff',borderRadius:'50%',fontSize:9,fontWeight:700,padding:'1px 5px',minWidth:16,textAlign:'center'}}>{unread}</span>}
      </button>
      {open&&(
        <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',width:320,background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:7,boxShadow:'0 8px 32px rgba(0,0,0,.5)',zIndex:300,overflow:'hidden'}}>
          <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:'2px',textTransform:'uppercase',color:'#aaa'}}>Notifications</div>
            {unread>0&&<button className="btn btn-xs btn-ghost" style={{fontSize:10}} onClick={markAllRead}>Mark all read</button>}
          </div>
          {notifs.length===0&&<div style={{padding:'20px 14px',fontSize:12,color:'#555',textAlign:'center'}}>No notifications yet</div>}
          <div style={{maxHeight:340,overflowY:'auto'}}>
            {notifs.map(n=>(
              <div key={n.id} onClick={()=>{markRead(n.id);setPage('clinresources');setOpen(false);}}
                style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',cursor:'pointer',background:n.read?'transparent':'rgba(68,204,170,.04)',display:'flex',gap:10,alignItems:'flex-start'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(68,204,170,.06)'}
                onMouseLeave={e=>e.currentTarget.style.background=n.read?'transparent':'rgba(68,204,170,.04)'}>
                <div style={{fontSize:18,flexShrink:0}}>💬</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:'#ddd',lineHeight:1.4}}>
                    <strong style={{color:'#CAE8C1'}}>{n.from}</strong> mentioned <strong style={{color:'#CAE8C1'}}>{n.to}</strong> in <em>"{n.resourceTitle}"</em>
                  </div>
                  {n.preview&&<div style={{fontSize:10,color:'#666',marginTop:3,lineHeight:1.4}}>"{n.preview.slice(0,80)}{n.preview.length>80?'…':''}"</div>}
                  {!n.read&&n.gcalPrompt&&(
                    <div style={{marginTop:5}}>
                      <button className="btn btn-xs btn-ghost" style={{fontSize:9,color:'#44CCAA'}}
                        onClick={async(e)=>{e.stopPropagation();try{await navigator.clipboard.writeText(n.gcalPrompt);}catch{}alert('Copied! Paste into Claude chat to send the email notification.');}}>
                        📋 Copy email prompt for Claude
                      </button>
                    </div>
                  )}
                  <div style={{fontSize:9,color:'#555',marginTop:3}}>{timeAgo(n.ts)} ago</div>
                </div>
                {!n.read&&<div style={{width:7,height:7,borderRadius:'50%',background:'#44CCAA',flexShrink:0,marginTop:4}}/>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));

</script>
</body>
</html>
