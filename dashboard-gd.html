<style>
:root{
  --black:#000;--surface:#111;--surface2:#181818;--surface3:#222;
  --border:#2e2e2e;--border2:#404040;
  --go:#00584D;--go-dim:rgba(0,88,77,.13);--go-b:rgba(0,88,77,.28);
  --wellness:#12492F;--lime:#CAE8C1;--lime-dim:rgba(202,232,193,.08);--lime-b:rgba(202,232,193,.18);
  --yellow:#F4DB71;--yellow-dim:rgba(244,219,113,.1);
  --purple:#BB99FF;--purple-dim:rgba(187,153,255,.1);
  --gray:#969696;--red:#E05252;
  --text:#f4f4f4;--text2:#bbb;--text3:#888;
  --lc1:#6B9FD4;--lc2:#F4DB71;--lc3:#44ccaa;--lc4:#CAE8C1;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.6;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.shell{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{width:226px;min-width:226px;height:100vh;background:var(--black);border-right:1px solid #181818;display:flex;flex-direction:column;overflow-y:auto;}
.logo-wrap{padding:17px 17px 13px;border-bottom:1px solid #181818;}
.logo-img{height:27px;object-fit:contain;object-position:left;}
.logo-sub{font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-top:7px;font-weight:600;}
.nav-group{padding:13px 0 3px;}
.nav-lbl{padding:0 15px 7px;font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:#888;font-weight:700;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 15px;cursor:pointer;font-size:14px;color:#999;border-left:2px solid transparent;transition:all .1s;}
.nav-item:hover{color:var(--text);background:#0d0d0d;}
.nav-item.active{color:var(--lime);background:var(--lime-dim);border-left-color:var(--lime);font-weight:500;}
.nav-icon{font-size:15px;width:14px;text-align:center;opacity:.5;}
.nav-item.active .nav-icon{opacity:1;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:14px;font-weight:700;border-radius:10px;padding:1px 6px;font-family:'Barlow Condensed',sans-serif;}
.sidebar-hr{height:1px;background:#141414;margin:4px 0;}
.sidebar-foot{margin-top:auto;padding:13px;border-top:1px solid #141414;}
.foot-card{background:var(--go-dim);border:1px solid var(--go-b);border-radius:5px;padding:10px 12px;}
.foot-lbl{font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:var(--lime);font-weight:700;}
.foot-val{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:700;line-height:1;margin-top:1px;}
.foot-sub{font-size:15px;color:#777;margin-top:3px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.stripe{height:2px;background:linear-gradient(90deg,var(--go) 0%,var(--lime) 100%);}
.topbar{height:54px;min-height:54px;background:var(--black);border-bottom:1px solid #181818;padding:0 22px;display:flex;align-items:center;justify-content:space-between;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.pipe{color:#888;margin:0 10px;}
.crumb{font-size:15px;color:#777;letter-spacing:.3px;}
.topbar-r{display:flex;gap:7px;}
.scroll{flex:1;overflow-y:auto;}
.pg{padding:18px 22px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:4px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:15px;font-weight:600;letter-spacing:.4px;transition:all .1s;white-space:nowrap;}
.btn-lime{background:var(--lime);color:var(--wellness);}
.btn-lime:hover{background:#d8f0cf;}
.btn-go{background:var(--go);color:var(--lime);}
.btn-go:hover{background:var(--wellness);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);}
.btn-sm{padding:5px 11px;font-size:15px;}
.btn-xs{padding:3px 8px;font-size:15px;}
.btn-red{background:rgba(224,82,82,.1);color:var(--red);border:1px solid rgba(224,82,82,.2);}
.btn-red:hover{background:rgba(224,82,82,.18);}

/* STATS */
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:17px;}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.sc{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--border);border-radius:5px;padding:13px 15px;}
.sc.lime{border-top-color:var(--lime);}
.sc.go{border-top-color:var(--go);}
.sc.yellow{border-top-color:var(--yellow);}
.sc.red{border-top-color:var(--red);}
.sc.purple{border-top-color:var(--purple);}
.sc.gray{border-top-color:var(--gray);}
.sc-lbl{font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;font-weight:600;margin-bottom:5px;}
.sc-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;line-height:1;}
.sc-sub{font-size:15px;color:#777;margin-top:4px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:5px;padding:15px 17px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card-lbl{font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;font-weight:600;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:14px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;line-height:1.8;}
.b-l1{background:rgba(107,159,212,.12);color:var(--lc1);}
.b-l2{background:rgba(244,219,113,.12);color:var(--lc2);}
.b-l3{background:rgba(0,88,77,.2);color:#44ccaa;}
.b-l4{background:var(--lime-dim);color:var(--lc4);}
.b-pt{background:rgba(202,232,193,.1);color:#CAE8C1;}
.b-chiro{background:rgba(107,159,212,.1);color:#6B9FD4;}
.b-rmt{background:rgba(244,219,113,.1);color:#F4DB71;}
.b-osteo{background:rgba(170,119,255,.1);color:#BB99FF;}
.b-naturo{background:rgba(0,88,77,.15);color:#44ccaa;}
.b-guest{background:rgba(224,82,82,.1);color:#F08080;}
.b-mgmt{background:rgba(187,153,255,.12);color:#BB99FF;border-color:rgba(187,153,255,.25);}
.b-edu{background:rgba(202,232,193,.12);color:#CAE8C1;border-color:rgba(202,232,193,.25);}
.b-ops{background:rgba(107,159,212,.12);color:#6B9FD4;border-color:rgba(107,159,212,.25);}
.b-clinical{background:rgba(202,232,193,.12);color:#CAE8C1;}
.b-spa{background:rgba(187,153,255,.12);color:#BB99FF;}
.b-sc{background:rgba(244,219,113,.12);color:#F4DB71;}

/* SCORE BAR */
.sbar{display:flex;align-items:center;gap:7px;}
.sbar-track{flex:1;height:3px;background:var(--surface3);border-radius:2px;min-width:50px;}
.sbar-fill{height:100%;border-radius:2px;}
.sbar-num{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;min-width:22px;text-align:right;}

/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:15px;}
thead tr{border-bottom:1px solid var(--border);}
th{text-align:left;padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.2px;text-transform:uppercase;color:#888;font-weight:600;}
td{padding:10px 12px;border-bottom:1px solid rgba(50,50,50,.8);vertical-align:middle;font-size:14px;color:#ddd;}
tr:last-child td{border-bottom:none;}
tbody tr{cursor:pointer;}
tbody tr:hover td{background:#0d0d0d;}

/* AVATAR */
.av{border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;flex-shrink:0;}
.av-sm{width:29px;height:29px;font-size:15px;}
.av-md{width:36px;height:36px;font-size:14px;}
.av-lg{width:52px;height:52px;font-size:19px;}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:18px;backdrop-filter:blur(6px);overflow-y:auto;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:8px;width:100%;max-width:860px;position:relative;margin:auto;}
.modal-stripe{height:3px;background:linear-gradient(90deg,var(--go),var(--lime));border-radius:8px 8px 0 0;}
.modal-body{padding:22px 26px;}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);border-radius:4px;padding:3px 9px;cursor:pointer;font-size:15px;font-family:'Barlow',sans-serif;z-index:10;}
.modal-close:hover{color:var(--text);}

/* TRACK PILL */
.track-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:15px;font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border:1px solid transparent;transition:all .12s;}
.tp-clinical{background:rgba(202,232,193,.08);color:#CAE8C1;border-color:rgba(202,232,193,.2);}
.tp-clinical.active{background:rgba(202,232,193,.18);border-color:var(--lime);}
.tp-spa{background:rgba(187,153,255,.08);color:#BB99FF;border-color:rgba(187,153,255,.2);}
.tp-spa.active{background:rgba(187,153,255,.18);border-color:var(--purple);}
.tp-sc{background:rgba(244,219,113,.08);color:#F4DB71;border-color:rgba(244,219,113,.2);}
.tp-sc.active{background:rgba(244,219,113,.18);border-color:var(--yellow);}

/* PROFILE HEADER */
.prof-head{display:flex;gap:16px;align-items:flex-start;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.prof-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;letter-spacing:1px;line-height:1;}
.prof-meta{display:flex;align-items:center;gap:7px;margin-top:6px;flex-wrap:wrap;}
.prof-score-block{margin-left:auto;text-align:right;flex-shrink:0;}
.prof-score-num{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:700;line-height:1;}
.prof-score-sub{font-size:15px;color:var(--text3);margin-top:1px;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:15px;gap:0;overflow-x:auto;}
.tab{padding:8px 14px;font-size:15px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Barlow',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s;white-space:nowrap;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--lime);border-bottom-color:var(--lime);}

/* SCORE ROWS */
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.score-row-lbl{flex:1;font-size:15px;}
.score-row-wt{font-size:15px;color:#999;min-width:52px;text-align:right;}
.score-row-bar{min-width:120px;}

/* CATDEF TABLE */
.catdef-table{width:100%;border-collapse:collapse;font-size:15px;margin-bottom:16px;}
.catdef-table th{background:var(--surface2);padding:7px 10px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.2px;text-transform:uppercase;color:#888;font-weight:600;}
.catdef-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5;}
.catdef-table tr:last-child td{border-bottom:none;}
.col-04{color:#E05252;}
.col-56{color:#F4DB71;}
.col-7{color:#44ccaa;}
.col-810{color:#CAE8C1;}
.catdef-name{font-weight:600;color:var(--text);}

/* ROADMAP */
.roadmap-section{margin-bottom:20px;}
.roadmap-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.roadmap-table{width:100%;border-collapse:collapse;font-size:15px;}
.roadmap-table th{background:var(--surface2);padding:6px 10px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.2px;text-transform:uppercase;color:#888;font-weight:600;}
.roadmap-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.55;}
.roadmap-table tr:last-child td{border-bottom:none;}
.rm-level{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;}
.rm-mandatory{color:var(--text2);}
.rm-recommended{color:var(--text3);}

/* FILE UPLOAD */
.file-zone{border:1px dashed var(--border2);border-radius:5px;padding:22px;text-align:center;cursor:pointer;transition:all .13s;background:var(--surface2);}
.file-zone:hover,.file-zone.drag{border-color:var(--lime);background:var(--lime-dim);}
.file-zone input{display:none;}
.file-item{display:flex;align-items:center;padding:7px 11px;background:var(--surface2);border-radius:4px;margin-bottom:5px;border:1px solid var(--border);}
.file-ico{font-size:15px;margin-right:8px;}
.file-name{font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-size{font-size:15px;color:var(--text3);margin:0 9px;}
.file-date{font-size:15px;color:var(--text3);}

/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
label{font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:#888;font-weight:600;}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:7px 10px;font-size:15px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .1s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--go);}
select option{background:var(--surface2);}
textarea{resize:vertical;min-height:60px;}
.fsec{grid-column:1/-1;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--lime);padding-top:3px;}
.fdiv{grid-column:1/-1;height:1px;background:var(--border);}
.score-in{width:66px!important;}
.pill-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:3px 0;}
.pill{padding:4px 10px;border-radius:3px;font-size:15px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--surface2);transition:all .1s;font-family:'Barlow',sans-serif;}
.pill.on{background:var(--go-dim);border-color:var(--go-b);color:var(--lime);}
.score-preview{grid-column:1/-1;display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:9px 12px;}

/* HIGHLIGHTS */
.hb{border-radius:4px;padding:9px 12px;font-size:15px;}
.hb-green{background:rgba(0,88,77,.1);border:1px solid rgba(0,88,77,.25);color:#44ccaa;}
.hb-yellow{background:var(--yellow-dim);border:1px solid rgba(244,219,113,.2);color:var(--yellow);}
.hb-gray{background:var(--surface2);border:1px solid var(--border);color:var(--text2);}
.hb-purple{background:var(--purple-dim);border:1px solid rgba(187,153,255,.2);color:var(--purple);}

/* NOTE */
.note-item{padding:11px 13px;background:var(--surface2);border-radius:4px;border-left:2px solid var(--go);margin-bottom:7px;}
.note-date{font-size:15px;color:#888;margin-bottom:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:600;}

/* SEARCH */
.search-wrap{position:relative;}
.search-wrap input{padding-left:28px;width:190px;}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;}

/* FILTER */
.filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:7px;}
.filter-grp{display:flex;gap:5px;flex-wrap:wrap;}

/* UTILS */
.flex{display:flex;}.aic{align-items:center;}.jsb{justify-content:space-between;}
.g4{gap:4px;}.g6{gap:6px;}.g8{gap:8px;}.g10{gap:10px;}.g12{gap:12px;}.g16{gap:16px;}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}.mb14{margin-bottom:14px;}.mb16{margin-bottom:16px;}.mb18{margin-bottom:18px;}
.mt8{margin-top:8px;}.mt10{margin-top:10px;}.mt12{margin-top:12px;}.mt14{margin-top:14px;}
.muted{color:#aaa;font-size:14px;}
.sm{font-size:14px;}.xs{font-size:14px;}
.fw5{font-weight:500;}.fw6{font-weight:600;}
.bc{font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.empty{text-align:center;padding:34px;color:var(--text3);}
.empty-ico{font-size:24px;margin-bottom:7px;}
.wrap{flex-wrap:wrap;}
@media(max-width:1100px){.sg4{grid-template-columns:repeat(2,1fr);}.sg3{grid-template-columns:1fr 1fr;}}

/* ── FORMS ─────────────────────────────── */
.form-shell{max-width:680px;margin:0 auto;}
.form-type-tabs{display:flex;gap:0;margin-bottom:24px;border-radius:6px;overflow:hidden;border:1px solid var(--border2);}
.ftt{flex:1;padding:12px 0;text-align:center;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;background:var(--surface2);color:#777;border:none;transition:all .15s;}
.ftt:hover{color:var(--text);background:#1a1a1a;}
.ftt.active.monthly{background:rgba(107,159,212,.15);color:#6B9FD4;border-bottom:2px solid #6B9FD4;}
.ftt.active.quarterly{background:rgba(244,219,113,.1);color:#F4DB71;border-bottom:2px solid #F4DB71;}
.ftt.active.annual{background:rgba(202,232,193,.1);color:#CAE8C1;border-bottom:2px solid #CAE8C1;}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.form-card-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);}
.form-card-body{padding:20px 22px;}
.form-section-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#aaa;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.form-section-icon{font-size:14px;opacity:.7;}
.form-question{margin-bottom:18px;}
.form-question label{font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:#888;font-weight:600;display:block;margin-bottom:7px;}
.form-question .hint{font-size:15px;color:#999;margin-bottom:7px;font-style:italic;line-height:1.5;}
.form-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:10px 13px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;width:100%;}
.form-input:focus{border-color:var(--go);background:#151515;}
.form-textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:10px 13px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;width:100%;resize:vertical;min-height:80px;line-height:1.6;}
.form-textarea:focus{border-color:var(--go);background:#151515;}
.form-textarea.tall{min-height:120px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-check-group{display:flex;flex-direction:column;gap:9px;}
.form-check{display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.form-check input[type=checkbox]{width:16px;height:16px;min-width:16px;accent-color:var(--go);margin-top:1px;cursor:pointer;}
.form-check-label{font-size:14px;color:var(--text2);line-height:1.5;}
.form-stripe{height:3px;}
.form-stripe.monthly{background:linear-gradient(90deg,#3a6b9f,#6B9FD4);}
.form-stripe.quarterly{background:linear-gradient(90deg,#9a8200,#F4DB71);}
.form-stripe.annual{background:linear-gradient(90deg,var(--go),var(--lime));}
.form-header-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
.tag-monthly{background:rgba(107,159,212,.12);color:#6B9FD4;}
.tag-quarterly{background:rgba(244,219,113,.1);color:#F4DB71;}
.tag-annual{background:rgba(202,232,193,.1);color:#CAE8C1;}
.form-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:1.5px;margin:8px 0 4px;}
.form-subtitle{font-size:15px;color:#777;line-height:1.6;}
.form-meta-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;font-size:15px;color:#888;margin-right:6px;font-family:'Barlow',sans-serif;}
.form-submit-row{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;background:var(--surface2);border-top:1px solid var(--border);border-radius:0 0 8px 8px;}
.form-progress{display:flex;align-items:center;gap:8px;font-size:15px;color:#777;}
.progress-bar{width:120px;height:3px;background:var(--border2);border-radius:2px;}
.progress-fill{height:100%;border-radius:2px;transition:width .3s;}

/* Submissions viewer */
.sub-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color .12s;}
.sub-card:hover{border-color:var(--border2);}
.sub-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sub-expand{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:16px 20px;margin-top:10px;}
.sub-field{margin-bottom:12px;}
.sub-field-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#777;font-weight:600;margin-bottom:4px;}
.sub-field-val{font-size:14px;color:var(--text2);line-height:1.6;}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.empty-forms{text-align:center;padding:48px 24px;}
.empty-forms-ico{font-size:36px;margin-bottom:12px;opacity:.4;}


/* ── RESOURCES / SOP ──────────────────── */
.sop-layout{display:grid;grid-template-columns:220px 1fr;gap:0;height:calc(100vh - 90px);overflow:hidden;}
.sop-nav{background:var(--surface);border:1px solid var(--border);border-radius:6px 0 0 6px;overflow-y:auto;padding:14px 0;}
.sop-nav-section{padding:6px 16px 3px;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#888;font-weight:700;margin-top:10px;}
.sop-nav-item{padding:9px 16px;font-size:15px;color:#888;cursor:pointer;border-left:2px solid transparent;transition:all .12s;display:block;}
.sop-nav-item:hover{color:var(--text);background:#0d0d0d;}
.sop-nav-item.active{color:var(--lime);border-left-color:var(--lime);background:var(--lime-dim);font-weight:500;}
.sop-nav-item .sop-step-num{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:#888;margin-right:5px;}
.sop-nav-item.active .sop-step-num{color:var(--lime);opacity:.7;}
.sop-content{background:var(--surface);border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;overflow-y:auto;padding:28px 34px;}
.sop-h1{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--lime);margin-bottom:6px;}
.sop-h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--lime);margin:28px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--go-b);}
.sop-tagline{font-size:14px;color:#777;margin-bottom:20px;line-height:1.6;}
.sop-applies{background:var(--go-dim);border:1px solid var(--go-b);border-radius:4px;padding:10px 14px;font-size:15px;color:#CAE8C1;margin-bottom:20px;line-height:1.6;}
.sop-p{font-size:14px;color:#aaa;line-height:1.75;margin-bottom:12px;}
.sop-ul{margin:8px 0 14px 0;padding-left:0;list-style:none;}
.sop-ul li{font-size:14px;color:#aaa;line-height:1.7;padding:3px 0 3px 18px;position:relative;}
.sop-ul li::before{content:'—';position:absolute;left:0;color:#888;}
.sop-ul li.check::before{content:'☐';color:var(--go);}
.sop-ul li.bullet::before{content:'·';color:var(--lime);font-size:18px;top:-1px;}
.sop-highlight{background:rgba(0,88,77,.08);border-left:3px solid var(--go);border-radius:0 4px 4px 0;padding:12px 16px;margin:14px 0;font-size:15px;color:#aaa;line-height:1.7;}
.sop-warning{background:rgba(244,219,113,.06);border-left:3px solid var(--yellow);border-radius:0 4px 4px 0;padding:12px 16px;margin:14px 0;font-size:15px;color:#aaa;line-height:1.7;}
.sop-warning strong{color:var(--yellow);}
.sop-highlight strong{color:var(--lime);}
.sop-table{width:100%;border-collapse:collapse;margin:14px 0;}
.sop-table th{background:var(--surface2);padding:9px 12px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:#777;font-weight:600;}
.sop-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:15px;color:#aaa;vertical-align:top;line-height:1.6;}
.sop-table tr:last-child td{border-bottom:none;}
.sop-phase-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.phase-1{background:rgba(107,159,212,.12);color:#6B9FD4;}
.phase-2{background:rgba(244,219,113,.1);color:#F4DB71;}
.phase-3{background:rgba(0,88,77,.15);color:#44ccaa;}
.phase-4{background:rgba(202,232,193,.12);color:#CAE8C1;}
.phase-5{background:rgba(187,153,255,.12);color:#BB99FF;}
.sop-principle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}
.sop-principle{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:13px 15px;}
.sop-principle-ico{font-size:18px;margin-bottom:7px;}
.sop-principle-text{font-size:15px;color:#aaa;line-height:1.5;font-weight:500;}
.sop-principle-num{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:4px;}
.sop-divider{height:1px;background:var(--border);margin:24px 0;}

/* ── BIRD TEST in profile ─────────────────── */
.bird-shell{padding:0;}
.bird-intro{background:var(--go-dim);border:1px solid var(--go-b);border-radius:5px;padding:14px 16px;margin-bottom:18px;}
.bird-types{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
.bird-type-card{border-radius:5px;padding:13px 15px;border:1px solid transparent;cursor:pointer;transition:all .15s;}
.bird-type-card.selected{border-width:2px;}
.bird-dove{background:rgba(107,159,212,.08);border-color:rgba(107,159,212,.2);}
.bird-dove.selected{background:rgba(107,159,212,.18);border-color:#6B9FD4;}
.bird-owl{background:rgba(202,232,193,.07);border-color:rgba(202,232,193,.15);}
.bird-owl.selected{background:rgba(202,232,193,.18);border-color:#CAE8C1;}
.bird-eagle{background:rgba(224,82,82,.07);border-color:rgba(224,82,82,.15);}
.bird-eagle.selected{background:rgba(224,82,82,.16);border-color:#E05252;}
.bird-parrot{background:rgba(244,219,113,.07);border-color:rgba(244,219,113,.15);}
.bird-parrot.selected{background:rgba(244,219,113,.16);border-color:#F4DB71;}
.bird-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:1px;margin-bottom:3px;}
.bird-tagline{font-size:15px;color:#888;margin-bottom:8px;}
.bird-traits{display:flex;flex-wrap:wrap;gap:4px;}
.bird-trait{font-size:15px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.05);color:#777;}
.bird-result{border-radius:6px;padding:16px 18px;margin-bottom:14px;}
.bird-result-dove{background:rgba(107,159,212,.1);border:1px solid rgba(107,159,212,.25);}
.bird-result-owl{background:rgba(202,232,193,.08);border:1px solid rgba(202,232,193,.2);}
.bird-result-eagle{background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.2);}
.bird-result-parrot{background:rgba(244,219,113,.08);border:1px solid rgba(244,219,113,.2);}
.bird-compat{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
.bird-compat-item{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;text-align:center;}
.bird-compat-ico{font-size:16px;margin-bottom:3px;}
.bird-compat-lbl{font-size:14px;color:#888;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}

/* quiz */
.bird-quiz-q{margin-bottom:20px;}
.bird-quiz-q-text{font-size:14px;color:var(--text);font-weight:500;margin-bottom:11px;line-height:1.55;}
.bird-quiz-q-num{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.bird-option{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;border-radius:4px;border:1px solid var(--border);margin-bottom:7px;cursor:pointer;transition:all .12s;background:var(--surface2);}
.bird-option:hover{border-color:var(--border2);background:#1a1a1a;}
.bird-option.selected{border-color:var(--go);background:var(--go-dim);}
.bird-option-letter{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#888;min-width:18px;}
.bird-option.selected .bird-option-letter{color:var(--lime);}
.bird-option-text{font-size:15px;color:#aaa;line-height:1.5;}
.bird-option.selected .bird-option-text{color:var(--text);}


/* ══ LEADERSHIP TRACKER ═════════════════════════════════════════════ */
.lt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
.lt-stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;display:flex;flex-direction:column;gap:4px;}
.lt-stat-num{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;line-height:1;}
.lt-stat-lbl{font-size:15px;color:#777;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.lt-stat-sub{font-size:15px;color:#888;}
.lt-section{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:14px;}
.lt-section-hdr{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.lt-section-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#aaa;}
.lt-table{width:100%;border-collapse:collapse;}
.lt-table th{background:var(--surface2);padding:8px 12px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:#999;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;}
.lt-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:15px;color:#aaa;vertical-align:middle;}
.lt-table tr:last-child td{border-bottom:none;}
.lt-table tr:hover td{background:rgba(255,255,255,.02);}
.lt-name{font-weight:600;color:var(--text);font-size:14px;}
.lt-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;white-space:nowrap;}
.lt-ready-expansion{background:rgba(202,232,193,.12);color:#CAE8C1;border:1px solid rgba(202,232,193,.2);}
.lt-ready-now{background:rgba(68,204,170,.1);color:#44CCAA;border:1px solid rgba(68,204,170,.2);}
.lt-ready-36{background:rgba(244,219,113,.1);color:#F4DB71;border:1px solid rgba(244,219,113,.2);}
.lt-emerging{background:rgba(107,159,212,.1);color:#6B9FD4;border:1px solid rgba(107,159,212,.2);}
.lt-not-ready{background:rgba(224,82,82,.08);color:#E05252;border:1px solid rgba(224,82,82,.15);}
.lt-blocked{background:rgba(224,82,82,.12);color:#E05252;border:1px solid rgba(224,82,82,.25);}
.lt-score-bar-wrap{display:flex;align-items:center;gap:8px;}
.lt-score-bar{height:4px;border-radius:2px;background:var(--border2);}
.lt-score-fill{height:100%;border-radius:2px;transition:width .3s;}
.lt-score-val{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;min-width:28px;text-align:right;}
.lt-flag{display:inline-flex;align-items:center;gap:4px;font-size:15px;padding:2px 6px;border-radius:3px;}
.lt-flag-active{color:#E05252;background:rgba(224,82,82,.1);}
.lt-flag-clear{color:#888;}
.lt-gate-yes{color:#CAE8C1;font-size:15px;}
.lt-gate-partial{color:#F4DB71;font-size:15px;}
.lt-gate-no{color:#E05252;font-size:15px;}
.lt-tab-pills{display:flex;gap:0;border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-bottom:16px;}
.lt-tab{flex:1;padding:9px 0;text-align:center;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;background:var(--surface2);color:#999;border:none;transition:all .12s;}
.lt-tab:hover{color:var(--text);background:#1a1a1a;}
.lt-tab.active{background:var(--go);color:var(--lime);}
.lt-heat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.lt-heat-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:16px 18px;}
.lt-heat-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--lime);letter-spacing:1px;margin-bottom:12px;}
.lt-heat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.lt-heat-row:last-child{border-bottom:none;}
.lt-profile-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:20px;}
.lt-profile-inner{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;}
.lt-profile-hdr{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:10;}
.lt-profile-body{padding:20px 24px;}
.lt-sec-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.lt-def-card{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:12px 14px;}
.lt-def-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--lime);margin-bottom:6px;}
.lt-def-text{font-size:15px;color:#aaa;line-height:1.65;}
.lt-def-text li{margin-bottom:3px;}
.lt-pathway-badge{display:inline-flex;padding:3px 9px;border-radius:3px;background:rgba(0,88,77,.2);color:var(--lime);border:1px solid var(--go-b);font-size:15px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
.lt-category-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.lt-category-row:last-child{border-bottom:none;}
.lt-category-name{font-size:15px;color:#aaa;flex:1;}
.lt-s2-bar{width:100px;height:4px;background:var(--border2);border-radius:2px;margin:0 10px;}
.lt-s2-fill{height:100%;border-radius:2px;}
.lt-s2-score{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;min-width:24px;text-align:right;}
.lt-gate-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.lt-gate-row:last-child{border-bottom:none;}
.lt-readiness-ring{display:flex;flex-direction:column;align-items:center;gap:4px;}
.lt-ring-score{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:800;line-height:1;}
.lt-ring-label{font-size:15px;color:#777;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;}

/* ── PERFORMANCE PAGE ────────────────────────── */
.perf-drop{border:2px dashed var(--border2);border-radius:7px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2);}
.perf-drop:hover,.perf-drop.drag{border-color:var(--lime);background:var(--lime-dim);}
.perf-drop input{display:none;}
.perf-slot{background:var(--surface2);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.perf-slot-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface3);}
.perf-slot-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;letter-spacing:2px;text-transform:uppercase;font-weight:700;}
.perf-slot-body{padding:14px 16px;}
.perf-bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(50,50,50,.5);}
.perf-bar-row:last-child{border-bottom:none;}
.perf-bar-name{font-size:15px;font-weight:500;min-width:150px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.perf-bar-track{flex:1;height:5px;background:var(--surface3);border-radius:3px;min-width:80px;}
.perf-bar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.perf-bar-val{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;min-width:64px;text-align:right;}
.perf-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:14px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.gva-input-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(50,50,50,.5);}
.gva-input-row:last-child{border-bottom:none;}
.gva-num{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;line-height:1;}

</style>
</head>
<body>

const calcScore=(scores,rubricId)=>{
  if(!scores||!rubricId||!RUBRIC_SYSTEMS[rubricId])return null;
  const cats=RUBRIC_SYSTEMS[rubricId].cats;
  // If none of the category scores are filled in, return null (not scored yet)
  const hasAny=cats.some(c=>scores[c.id]!=null&&scores[c.id]!==''&&parseFloat(scores[c.id])>0);
  if(!hasAny)return null;
  let t=0;cats.forEach(c=>{t+=parseFloat(scores[c.id]||0)*(c.weight/100);});
  return Math.round(t*100)/100;
};

    </div>
  );
}

      {!readOnly&&(<><div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'flex-end',marginBottom:14}}>
        <div><div style={{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:'1px',marginBottom:4}}>Month</div>

            <div style={{flex:1}}><div style={{fontSize:10,color:'#777',marginBottom:3}}>Sessions</div><input type="text" inputMode="numeric" value={f[c.id].sessions} onChange={e=>setV(c.id,'sessions',e.target.value)} placeholder="0" style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:5,padding:'6px 8px',color:'#eee',fontSize:14}}/></div>
            <div style={{flex:1.3}}><div style={{fontSize:10,color:'#777',marginBottom:3}}>$ Total</div><input type="text" inputMode="decimal" value={f[c.id].dollars} onChange={e=>setV(c.id,'dollars',e.target.value)} placeholder="0" style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:5,padding:'6px 8px',color:'#eee',fontSize:14}}/></div>

          <tbody>{months.map(mo=>{const e=log[mo];const ms=e.membership||{},tns=e.training||{};const tot=(ms.dollars||0)+(tns.dollars||0);return(<tr key={mo} style={{borderTop:'1px solid var(--border)',color:'#bbb'}}>
            <td style={{textAlign:'left',padding:'5px 8px',color:'#ddd',cursor:'pointer'}} onClick={()=>setM(mo)}>{mo}</td>
            <td style={{textAlign:'right',padding:'5px 8px'}}>{ms.sessions||0}</td>

function SessSummary({log,fromM,toM,note}){

  Object.keys(log||{}).forEach(mo=>{if((!fromM||mo>=fromM)&&(!toM||mo<=toM)){const e=log[mo]||{};const m=e.membership||{},t=e.training||{};memS+=+m.sessions||0;memD+=+m.dollars||0;trS+=+t.sessions||0;trD+=+t.dollars||0;mos++;}});
  if(!memD&&!trD&&!memS&&!trS)return null;
  const stat=(c,lbl,s,d)=>(<div style={{minWidth:150}}><div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}><span style={{width:9,height:9,borderRadius:2,background:c,display:'inline-block'}}/><span style={{fontSize:12,color:'#999',textTransform:'uppercase',letterSpacing:'.5px'}}>{lbl}</span></div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:'#eee'}}>{money(d)}</div><div style={{fontSize:12,color:'#777'}}>{s} session{s===1?'':'s'}</div></div>);
  return(<div className="perf-slot" style={{marginBottom:14}}>

      {stat('#F4DB71','Performance Training',trS,trD)}

      <div style={{minWidth:130}}><div style={{fontSize:12,color:'#999',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:4}}>Combined</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:'#CAE8C1'}}>{money(memD+trD)}</div><div style={{fontSize:12,color:'#777'}}>{memS+trS} sessions{mos>1?' · '+mos+' mo':''}</div></div>

  </div>);

function Sparkline({values,color,width=120,height=32}){
  if(!values||values.length<2)return null;
  const min=Math.min(...values),max=Math.max(...values),range=max-min||1;
  const pts=values.map((v,i)=>{
    const x=Math.round((i/(values.length-1))*width);
    const y=Math.round(height-((v-min)/range*(height-6))-3);
    return x+','+y;
  }).join(' ');
  const up=values[values.length-1]>=values[0];
  const c=up?color:'#E05252';
  const last=pts.split(' ').pop().split(',');
  return(<svg width={width} height={height} style={{overflow:'visible'}}>
    <polyline points={pts} fill="none" stroke={c} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
    <circle cx={last[0]} cy={last[1]} r="3" fill={c}/>
  </svg>);
}

function LineChart({snapshots,staffId,metric,color,label,fmt,timeframe,clinicAvg}){
  const allPts=snapshots.map(s=>{
    const r=s.rows?.find(r=>r.staffId===staffId);
    return r&&r[metric]!=null?{date:s.date,val:parseFloat(r[metric])||0}:null;
  }).filter(Boolean);

  // Apply timeframe filter
  const now=new Date();
  const pts=allPts.filter(p=>{
    if(!timeframe||timeframe==='all')return true;
    const d=new Date(p.date+'T12:00');
    if(timeframe==='3m'){const cutoff=new Date(now);cutoff.setMonth(cutoff.getMonth()-3);return d>=cutoff;}
    if(timeframe==='6m'){const cutoff=new Date(now);cutoff.setMonth(cutoff.getMonth()-6);return d>=cutoff;}
    if(timeframe==='12m'){const cutoff=new Date(now);cutoff.setMonth(cutoff.getMonth()-12);return d>=cutoff;}
    if(timeframe==='ytd'){return d.getFullYear()===now.getFullYear();}
    return true;
  });

  if(pts.length<1)return<div style={{fontSize:14,color:'#777',padding:'20px 16px',textAlign:'center'}}>No {label.toLowerCase()} data for this period.</div>;

  const vals=pts.map(p=>p.val);
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;

  if(pts.length===1)return(
    <div style={{padding:'16px 0'}}>
      <div style={{display:'flex',alignItems:'center',gap:24,flexWrap:'wrap',marginBottom:8}}>
        <div><div style={{fontSize:13,color:'#888',marginBottom:2}}>Latest</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:800,color,lineHeight:1}}>{fmt(pts[0].val)}</div></div>
        <div><div style={{fontSize:13,color:'#888',marginBottom:2}}>Your Avg</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:700,color:'#aaa',lineHeight:1}}>{fmt(Math.round(avg))}</div></div>
        {clinicAvg!=null&&<div><div style={{fontSize:13,color:'#888',marginBottom:2}}>Clinic Avg</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:700,color:'#555',lineHeight:1}}>{fmt(Math.round(clinicAvg))}</div></div>}
      </div>
      <div style={{fontSize:13,color:'#888',fontStyle:'italic'}}>Import more snapshots to see a trend line.</div>
    </div>
  );

  const min=Math.min(...vals)*0.9,max=Math.max(...vals)*1.1;
  const range=max-min||1;
  const W=500,H=140,PADX=52,PADY=16,BOTTOM=32;

  const toY=(v)=>PADY+Math.round((1-(v-min)/range)*(H-PADY*2));
  const coords=pts.map((p,i)=>({
    x:PADX+Math.round((i/(pts.length-1))*(W-PADX-14)),
    y:toY(p.val),
    val:p.val,date:p.date
  }));
  const pathD=coords.map((c,i)=>(i===0?'M':'L')+c.x+','+c.y).join(' ');
  const areaD=pathD+` L${coords[coords.length-1].x},${H} L${coords[0].x},${H} Z`;
  const latest=vals[vals.length-1];
  const prev=vals.length>1?vals[vals.length-2]:null;
  const delta=prev!=null&&prev!==0?((latest-prev)/prev*100).toFixed(1):null;
  const up=delta>=0;
  const avgY=toY(avg);
  const clinicAvgY=clinicAvg!=null?toY(Math.max(min,Math.min(max,clinicAvg))):null;

  const gridLines=4;
  const yGrid=Array.from({length:gridLines+1},(_,i)=>({
    y:PADY+Math.round((i/gridLines)*(H-PADY*2)),
    val:max-((max-min)*(i/gridLines))
  }));

  const showLabel=(i)=>{
    if(pts.length<=6)return true;
    if(pts.length<=12)return i%2===0||i===pts.length-1;
    return i===0||i===Math.floor(pts.length/2)||i===pts.length-1;
  };

  return(
    <div>
      {/* Stats row */}
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:12,color:'#888',marginBottom:2,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px',textTransform:'uppercase'}}>Latest</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:800,color,lineHeight:1}}>{fmt(latest)}</span>
              {delta!=null&&<span style={{fontSize:13,color:up?'#44CCAA':'#E05252',fontWeight:700,background:up?'rgba(68,204,170,.1)':'rgba(224,82,82,.1)',padding:'2px 8px',borderRadius:4}}>{up?'▲':'▼'}{Math.abs(delta)}%</span>}
            </div>
          </div>
          <div>
            <div style={{fontSize:12,color:'#888',marginBottom:2,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px',textTransform:'uppercase'}}>Their Avg / mo</div>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:700,color:'#aaa',lineHeight:1}}>{fmt(Math.round(avg))}</span>
          </div>
          {clinicAvg!=null&&<div>
            <div style={{fontSize:12,color:'#888',marginBottom:2,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px',textTransform:'uppercase'}}>Clinic Avg / mo</div>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:700,color:'#555',lineHeight:1}}>{fmt(Math.round(clinicAvg))}</span>
          </div>}
        </div>
        <div style={{fontSize:13,color:'#777'}}>{pts.length} months</div>
      </div>
      {/* Chart */}
      <svg width="100%" viewBox={`0 0 ${W} ${H+BOTTOM}`} style={{display:'block',overflow:'visible'}}>
        {/* Y-axis grid */}
        {yGrid.map((g,i)=>(
          <g key={i}>
            <line x1={PADX} y1={g.y} x2={W-14} y2={g.y} stroke="#1e1e1e" strokeWidth="1"/>
            <text x={PADX-6} y={g.y+4} textAnchor="end" fontSize="11" fill="#666">{fmt(Math.round(g.val))}</text>
          </g>
        ))}
        {/* Clinic avg reference line */}
        {clinicAvgY!=null&&clinicAvgY>PADY&&clinicAvgY<H&&(
          <g>
            <line x1={PADX} y1={clinicAvgY} x2={W-14} y2={clinicAvgY} stroke="#444" strokeWidth="1.5" strokeDasharray="5,4"/>
            <text x={W-12} y={clinicAvgY+4} fontSize="11" fill="#555" textAnchor="start">clinic</text>
          </g>
        )}
        {/* Personal avg reference line */}
        {avgY>PADY&&avgY<H&&(
          <g>

            <text x={W-12} y={avgY+4} fontSize="11" fill={color} opacity="0.6" textAnchor="start">avg</text>
          </g>
        )}
        {/* Area fill */}
        <path d={areaD} fill={color} opacity="0.07"/>
        {/* Line */}
        <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
        {/* Points */}
        {coords.map((c,i)=>(
          <g key={i}>
            <circle cx={c.x} cy={c.y} r="4.5" fill={color} opacity="0.9"/>
            {pts.length<=10&&<text x={c.x} y={c.y-11} textAnchor="middle" fontSize="11" fill={color} opacity="0.85" fontWeight="600">{fmt(c.val)}</text>}
            {showLabel(i)&&<text x={c.x} y={H+BOTTOM-4} textAnchor="middle" fontSize="11" fill="#777">

}

function ClinicLineChart({snapshots,staff,metric,agg,color,label,fmt,timeframe,filterDisc,filterSite,revBasis}){
  // Decide whether a snapshot row belongs in the clinic aggregate (exclude non-clinical roles; apply filters)
  const matchRow=(r)=>{
    const s=(staff||[]).find(x=>x.id===r.staffId);
    if(!s){
      // No matched staff = retail / front-desk / unmatched-name revenue bucket.
      // Include it in the unfiltered clinic total so revenue reconciles to the books
      // (these rows only carry revenue, so other metrics are unaffected).
      return (!filterDisc||filterDisc==='all')&&(!filterSite||filterSite==='all');
    }
    if(['mgmt','ops','edu'].includes(s.discipline))return false;
    if(filterDisc&&filterDisc!=='all'&&s.discipline!==filterDisc)return false;
    if(!siteMatch(s,filterSite))return false;
    return true;
  };
  // Group by month, aggregating the metric across matching staff rows.
  // Null-filtering per metric means revenue/visits/IAs come from appt snapshots and
  // utilization from shift snapshots automatically, even when both exist for a month.
  const monthMap={};
  (snapshots||[]).forEach(s=>{
    if(!s.date)return;
    const ym=s.date.slice(0,7);
    (s.rows||[]).forEach(r=>{
      if(!matchRow(r))return;
      let v=r[metric];
      if(metric==='revenue'&&filterSite&&filterSite!=='all'&&r.staffId)v=revForSite(r,filterSite);
      if(v==null||v==='')return;
      const num=parseFloat(v);if(isNaN(num))return;
      (monthMap[ym]=monthMap[ym]||[]).push(num);
    });
  });

  let allPts=Object.keys(monthMap).sort().map(ym=>{
    const arr=monthMap[ym];
    const val=agg==='avg'?arr.reduce((a,b)=>a+b,0)/arr.length:arr.reduce((a,b)=>a+b,0);
    return{date:ym+'-01',val:agg==='avg'?Math.round(val):Math.round(val*100)/100};
  });

  // Revenue, unfiltered → use the exact books billed (revBasis) so Trends reconciles to the
  // same $151,350 shown everywhere else. Filtered views fall back to clinical snapshot sums.
  if(metric==='revenue'&&revBasis&&(!filterDisc||filterDisc==='all')&&(!filterSite||filterSite==='all')){
    const months=Array.from(new Set([...Object.keys(monthMap),...Object.keys(revBasis)])).filter(ym=>(revBasis[ym]&&revBasis[ym].billed)||monthMap[ym]).sort();
    allPts=months.map(ym=>({date:ym+'-01',val:revBasis[ym]&&revBasis[ym].billed!=null?Math.round(revBasis[ym].billed*100)/100:Math.round((monthMap[ym]||[]).reduce((a,b)=>a+b,0)*100)/100}));
  }

  // Apply timeframe filter (same logic as the practitioner LineChart)
  const now=new Date();
  const pts=allPts.filter(p=>{
    if(!timeframe||timeframe==='all')return true;
    const d=new Date(p.date+'T12:00');
    if(timeframe==='3m'){const c=new Date(now);c.setMonth(c.getMonth()-3);return d>=c;}
    if(timeframe==='6m'){const c=new Date(now);c.setMonth(c.getMonth()-6);return d>=c;}
    if(timeframe==='12m'){const c=new Date(now);c.setMonth(c.getMonth()-12);return d>=c;}
    if(timeframe==='ytd'){return d.getFullYear()===now.getFullYear();}
    return true;
  });

  if(pts.length<1)return<div style={{fontSize:14,color:'#777',padding:'20px 16px',textAlign:'center'}}>No {label.toLowerCase()} data for this period.</div>;

  const vals=pts.map(p=>p.val);
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;

  if(pts.length===1)return(
    <div style={{padding:'16px 0'}}>
      <div style={{display:'flex',alignItems:'center',gap:24,flexWrap:'wrap',marginBottom:8}}>
        <div><div style={{fontSize:13,color:'#888',marginBottom:2}}>Latest</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:800,color,lineHeight:1}}>{fmt(pts[0].val)}</div></div>
      </div>
      <div style={{fontSize:13,color:'#888',fontStyle:'italic'}}>Import more snapshots to see a trend line.</div>
    </div>
  );

  const min=Math.min(...vals)*0.9,max=Math.max(...vals)*1.1;
  const range=max-min||1;
  const W=500,H=140,PADX=52,PADY=16,BOTTOM=32;
  const toY=(v)=>PADY+Math.round((1-(v-min)/range)*(H-PADY*2));
  const coords=pts.map((p,i)=>({
    x:PADX+Math.round((i/(pts.length-1))*(W-PADX-14)),
    y:toY(p.val),val:p.val,date:p.date
  }));
  const pathD=coords.map((c,i)=>(i===0?'M':'L')+c.x+','+c.y).join(' ');
  const areaD=pathD+` L${coords[coords.length-1].x},${H} L${coords[0].x},${H} Z`;
  const latest=vals[vals.length-1];
  const prev=vals.length>1?vals[vals.length-2]:null;
  const delta=prev!=null&&prev!==0?((latest-prev)/prev*100).toFixed(1):null;
  const up=delta>=0;
  const avgY=toY(avg);
  const gridLines=4;
  const yGrid=Array.from({length:gridLines+1},(_,i)=>({
    y:PADY+Math.round((i/gridLines)*(H-PADY*2)),
    val:max-((max-min)*(i/gridLines))
  }));
  const showLabel=(i)=>{
    if(pts.length<=6)return true;
    if(pts.length<=12)return i%2===0||i===pts.length-1;
    return i===0||i===Math.floor(pts.length/2)||i===pts.length-1;
  };

  return(
    <div>
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:12,color:'#888',marginBottom:2,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px',textTransform:'uppercase'}}>Latest</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:800,color,lineHeight:1}}>{fmt(latest)}</span>
              {delta!=null&&<span style={{fontSize:13,color:up?'#44CCAA':'#E05252',fontWeight:700,background:up?'rgba(68,204,170,.1)':'rgba(224,82,82,.1)',padding:'2px 8px',borderRadius:4}}>{up?'▲':'▼'}{Math.abs(delta)}%</span>}
            </div>
          </div>
          <div>
            <div style={{fontSize:12,color:'#888',marginBottom:2,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px',textTransform:'uppercase'}}>{agg==='avg'?'Avg / mo':'Total Avg / mo'}</div>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:700,color:'#aaa',lineHeight:1}}>{fmt(Math.round(avg))}</span>
          </div>
        </div>
        <div style={{fontSize:13,color:'#777'}}>{pts.length} months</div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H+BOTTOM}`} style={{display:'block',overflow:'visible'}}>
        {yGrid.map((g,i)=>(
          <g key={i}>
            <line x1={PADX} y1={g.y} x2={W-14} y2={g.y} stroke="#1e1e1e" strokeWidth="1"/>
            <text x={PADX-6} y={g.y+4} textAnchor="end" fontSize="11" fill="#666">{fmt(Math.round(g.val))}</text>
          </g>
        ))}
        {avgY>PADY&&avgY<H&&(
          <g>
            <line x1={PADX} y1={avgY} x2={W-14} y2={avgY} stroke={color} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.4"/>
            <text x={W-12} y={avgY+4} fontSize="11" fill={color} opacity="0.6" textAnchor="start">avg</text>
          </g>
        )}
        <path d={areaD} fill={color} opacity="0.07"/>
        <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
        {coords.map((c,i)=>(
          <g key={i}>
            <circle cx={c.x} cy={c.y} r="4.5" fill={color} opacity="0.9"/>
            {pts.length<=10&&<text x={c.x} y={c.y-11} textAnchor="middle" fontSize="11" fill={color} opacity="0.85" fontWeight="600">{fmt(c.val)}</text>}
            {showLabel(i)&&<text x={c.x} y={H+BOTTOM-4} textAnchor="middle" fontSize="11" fill="#777">
              {new Date(c.date+'T12:00').toLocaleDateString('en-CA',{month:'short'})+" '"+c.date.slice(2,4)}
            </text>}
          </g>
        ))}
        <line x1={PADX} y1={H} x2={W-14} y2={H} stroke="#2a2a2a" strokeWidth="1"/>
      </svg>
    </div>
  );
}

function ProjectionCard({snapshots,filterDisc,filterSite,staff,revBasis,dataMaxMonth,dailyMaxDate,staffId,title}){
  const projMonth=dataMaxMonth;
  if(!projMonth)return null;
  const parts=projMonth.split('-').map(Number);const yy=parts[0],mm=parts[1];
  const daysInMonth=new Date(yy,mm,0).getDate();
  const curM=new Date().toISOString().slice(0,7);
  let dayOfMonth=daysInMonth;
  if(dailyMaxDate&&dailyMaxDate.slice(0,7)===projMonth){dayOfMonth=parseInt(dailyMaxDate.slice(8,10))||daysInMonth;}
  const partial=projMonth===curM&&dayOfMonth<daysInMonth;
  const unfiltered=(!filterDisc||filterDisc==='all')&&(!filterSite||filterSite==='all')&&!staffId;
  const rowOK=(r)=>{if(!r.staffId)return false;if(staffId)return r.staffId===staffId;const s=(staff||[]).find(x=>x.id===r.staffId);if(!s||['mgmt','ops','edu'].includes(s.discipline))return false;if(filterDisc&&filterDisc!=='all'&&s.discipline!==filterDisc)return false;if(!siteMatch(s,filterSite))return false;return true;};
  const monthRows=(snapshots||[]).filter(s=>s.date&&s.date.startsWith(projMonth)).flatMap(s=>(s.rows||[]).filter(rowOK));
  let revAct;
  if(unfiltered&&revBasis&&revBasis[projMonth]){
    revAct=revBasis[projMonth].billed; // exact books figure
  }else{
    revAct=monthRows.reduce((a,r)=>a+(filterSite&&filterSite!=='all'?revForSite(r,filterSite):(parseFloat(r.revenue)||0)),0);
  }
  const visAct=monthRows.reduce((a,r)=>a+(parseFloat(r.completed)||0),0);

  const pct=Math.round((dayOfMonth/daysInMonth)*100);
  const mk=(label,color,actual,fmt)=>({label,color,actual,fmt,projected:partial?Math.round(actual/dayOfMonth*daysInMonth):Math.round(actual),remaining:partial?Math.round(actual/dayOfMonth*daysInMonth-actual):0,dailyRate:dayOfMonth>0?actual/dayOfMonth:0});
  const metrics=[mk('Revenue','#CAE8C1',revAct,v=>'$'+Math.round(v).toLocaleString()),mk('Completed Visits','#BB99FF',visAct,v=>Math.round(v).toLocaleString()),mk('Initial Assessments','#F4DB71',iaAct,v=>Math.round(v).toString())].filter(m=>m.actual>0);
  if(!metrics.length)return null;
  const monthLbl=new Date(projMonth+'-01T12:00').toLocaleDateString('en-CA',{month:'long',year:'numeric'});
  const projRev=(v)=>partial?Math.round(v/dayOfMonth*daysInMonth):Math.round(v);
  const allClin=(snapshots||[]).filter(s=>s.date&&s.date.startsWith(projMonth)).flatMap(s=>(s.rows||[]).filter(r=>{if(!r.staffId)return false;const s2=(staff||[]).find(x=>x.id===r.staffId);return s2&&!['mgmt','ops','edu'].includes(s2.discipline);}));
  const _discMap={};allClin.forEach(r=>{const s2=(staff||[]).find(x=>x.id===r.staffId);if(!s2)return;_discMap[s2.discipline]=(_discMap[s2.discipline]||0)+(parseFloat(r.revenue)||0);});
  const byDisc=Object.entries(_discMap).map(([d,v])=>({label:DISCL[d]||d,rev:projRev(v)})).filter(x=>x.rev>0).sort((a,b)=>b.rev-a.rev);
  const _locMap={};allClin.forEach(r=>{(SITES||[]).forEach(site=>{const rv=revForSite(r,site);if(rv)_locMap[site]=(_locMap[site]||0)+rv;});});
  const byLoc=Object.entries(_locMap).map(([l,v])=>({label:l,rev:projRev(v)})).filter(x=>x.rev>0).sort((a,b)=>b.rev-a.rev);
  return(<div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'18px 20px',marginBottom:14}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
      <div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:'2px',textTransform:'uppercase',color:'#44CCAA',fontWeight:700,marginBottom:2}}>📈 {title?title+' · ':''}{monthLbl} — {partial?'Month-End Projection':'Month Total'}</div><div style={{fontSize:13,color:'#555'}}>{partial?`${dayOfMonth} of ${daysInMonth} days complete (${pct}%)${title?' · projected at current pace':''}`:'complete month'}</div></div>
      {partial&&<div style={{flex:1,minWidth:120,maxWidth:200}}><div style={{height:6,background:'var(--surface3)',borderRadius:3}}><div style={{height:'100%',borderRadius:3,background:'#44CCAA',width:pct+'%'}}/></div></div>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12}}>
      {metrics.map(({label,color,actual,projected,remaining,dailyRate,fmt})=>(<div key={label} style={{background:'var(--surface3)',borderRadius:6,padding:'14px 16px',borderLeft:'3px solid '+color}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:'1.5px',textTransform:'uppercase',color:'#777',marginBottom:8}}>{label}</div>

        <div style={{display:'flex',flexDirection:'column',gap:3,fontSize:13}}>{partial&&<div><span style={{color:'#888'}}>So far: </span><span style={{color:'#ddd',fontWeight:600}}>{fmt(actual)}</span></div>}{partial&&<div><span style={{color:'#888'}}>Remaining: </span><span style={{color:'#44CCAA',fontWeight:600}}>{fmt(remaining)}</span></div>}<div style={{color:'#555',fontSize:12}}>{fmt(Math.round(dailyRate))}/day pace</div></div>
        {partial&&<div style={{marginTop:10,height:3,background:'var(--surface2)',borderRadius:2}}><div style={{height:'100%',borderRadius:2,background:color,width:Math.min(100,pct)+'%'}}/></div>}

          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:'1.5px',textTransform:'uppercase',color:'#777',marginBottom:8}}>{partial?'Projected':'Month'} revenue by discipline</div>
          {byDisc.map(d=>{const w=Math.round(d.rev/byDisc[0].rev*100);return(<div key={d.label} style={{marginBottom:6}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:2}}><span style={{color:'#ccc'}}>{d.label}</span><span style={{color:'#CAE8C1',fontWeight:600}}>${d.rev.toLocaleString()}</span></div>
            <div style={{height:5,background:'var(--surface3)',borderRadius:3}}><div style={{height:'100%',borderRadius:3,background:'#BB99FF',width:w+'%'}}/></div>

        </div>}
        {byLoc.length>1&&<div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:'1.5px',textTransform:'uppercase',color:'#777',marginBottom:8}}>{partial?'Projected':'Month'} revenue by location</div>
          {byLoc.map(d=>{const w=Math.round(d.rev/byLoc[0].rev*100);return(<div key={d.label} style={{marginBottom:6}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:2}}><span style={{color:'#ccc'}}>{d.label}</span><span style={{color:'#CAE8C1',fontWeight:600}}>${d.rev.toLocaleString()}</span></div>
            <div style={{height:5,background:'var(--surface3)',borderRadius:3}}><div style={{height:'100%',borderRadius:3,background:'#7FC8E8',width:w+'%'}}/></div>
          </div>);})}
        </div>}
      </div>
      <div style={{fontSize:11,color:'#555',marginTop:8}}>{partial?'Projected to month-end at current daily pace. ':'Month totals. '}Spans all clinical staff &amp; locations, regardless of the filters above.</div>
    </div>)}
  </div>);
}
function WeekCompareChart({dailyAppts,dailyRevenue,staff,staffId,filterDisc,filterSite,dateFrom,dateTo,timeframe,snapshots}){
  const[activeMetric,setActiveMetric]=React.useState('revenue');
  const[hoveredWeek,setHoveredWeek]=React.useState(null);
  const[weekWindow,setWeekWindow]=React.useState(13);

  const getWeekStart=(dateStr)=>{
    const d=new Date(dateStr+'T12:00');
    const day=d.getDay();
    const diff=d.getDate()-(day===0?6:day-1);
    return new Date(d.getFullYear(),d.getMonth(),diff).toISOString().slice(0,10);
  };

  const inRange=(d)=>(!dateFrom||d>=dateFrom)&&(!dateTo||d<=dateTo);
  const _ranged=!!(dateFrom||dateTo);

  const filterRow=(r)=>{
    if(staffId)return r.staff_id===staffId;
    const s=(staff||[]).find(x=>x.id===r.staff_id);
    if(!s||['mgmt','ops','edu'].includes(s.discipline))return false;
    if(filterDisc&&filterDisc!=='all'&&s.discipline!==filterDisc)return false;
    if(!siteMatch(s,filterSite))return false;
    return true;
  };

  const weekMap={};
  (dailyAppts||[]).forEach(r=>{
    if(!inRange(r.date)||!filterRow(r))return;
    const wk=getWeekStart(r.date);
    if(!weekMap[wk])weekMap[wk]={wk,revenue:0,visits:0,ias:0,noShows:0,cancellations:0};
    weekMap[wk].visits+=(r.completed||0);
    weekMap[wk].ias+=(r.initial_assessments||0);
    weekMap[wk].noShows+=(r.no_shows||0);
    weekMap[wk].cancellations+=(r.cancellations||0);
  });
  (dailyRevenue||[]).forEach(r=>{
    if(!inRange(r.date)||!filterRow(r))return;
    const wk=getWeekStart(r.date);
    if(!weekMap[wk])weekMap[wk]={wk,revenue:0,visits:0,ias:0,noShows:0,cancellations:0};
    weekMap[wk].revenue+=(filterSite&&filterSite!=='all'&&!staffId?revForSite(r,filterSite):(r.revenue||0));
  });

  // Snapshot fallback if no daily data
  if(Object.keys(weekMap).length===0&&snapshots&&snapshots.length>0){
    const today=new Date().toISOString().slice(0,10);
    snapshots.filter(s=>s.type!=='shift').forEach(snap=>{
      const m=snap.date.slice(0,7);const[yr,mo]=m.split('-').map(Number);
      const daysInMonth=new Date(yr,mo,0).getDate();
      const monthWeeks=[];
      for(let d=1;d<=daysInMonth;d++){
        const date=`${m}-${String(d).padStart(2,'0')}`;
        // Only include Mondays that START within this month AND are not in the future
        if(new Date(date+'T12:00').getDay()===1&&date<=today&&date.startsWith(m))monthWeeks.push(date);
      }
      if(!monthWeeks.length){
        let d=new Date(yr,mo-1,1);while(d.getDay()!==1)d.setDate(d.getDate()+1);
        const wk=d.toISOString().slice(0,10);
        if(wk<=today&&wk.startsWith(m))monthWeeks.push(wk);
        else if(!monthWeeks.length)monthWeeks.push(`${m}-01`); // fallback: use 1st of month
      }
      const nw=monthWeeks.length||1;
      (snap.rows||[]).forEach(r=>{
        if(!r.staffId)return;
        const s=staff.find(x=>x.id===r.staffId);if(!s)return;
        if(staffId&&r.staffId!==staffId)return;
        if(filterDisc!=='all'&&s.discipline!==filterDisc)return;
        if(!siteMatch(s,filterSite))return;
        monthWeeks.forEach(wk=>{
          if(!weekMap[wk])weekMap[wk]={wk,revenue:0,visits:0,ias:0,noShows:0,cancellations:0};
          weekMap[wk].revenue+=Math.round((parseFloat(r.revenue)||0)/nw*100)/100;
          weekMap[wk].visits+=Math.round((parseFloat(r.completed)||0)/nw*10)/10;
          weekMap[wk].ias+=Math.round((parseFloat(r.initialAssessments)||0)/nw*10)/10;
          weekMap[wk].noShows+=Math.round((parseFloat(r.noShows)||0)/nw*10)/10;
          weekMap[wk].cancellations+=Math.round((parseFloat(r.cancellations)||0)/nw*10)/10;
        });
      });
    });
  }
  // Cap weeks at the last date present in ACTUAL daily data — never the snapshot lastSaleDate
  // (which can lag or lead the daily tables) and never past today.
  const _today=new Date().toISOString().slice(0,10);
  const _dailyDates=[...(dailyAppts||[]).map(r=>r.date),...(dailyRevenue||[]).map(r=>r.date)].filter(Boolean).sort();
  const _maxDaily=_dailyDates.length?_dailyDates[_dailyDates.length-1]:null;
  const _snapLastDate=(snapshots||[]).map(s=>s.lastSaleDate).filter(Boolean).sort().pop();
  // Daily data is authoritative when present; snapshot lastSaleDate is only a no-daily-data fallback.
  let _lastDataDate=_maxDaily||_snapLastDate||_today;
  if(_lastDataDate>_today)_lastDataDate=_today; // hard guard against future weeks
  const _allWeeks=Object.values(weekMap).filter(w=>w.wk<=_lastDataDate).sort((a,b)=>a.wk.localeCompare(b.wk));
  const weeks=(weekWindow==='all'||_ranged)?_allWeeks:_allWeeks.slice(-weekWindow);
  if(!weeks.length)return<div style={{fontSize:14,color:'#777',padding:'40px',textAlign:'center'}}>No weekly data for this period.<br/><span style={{fontSize:12,color:'#555'}}>Import Appointments CSV to enable weekly trends.</span></div>;

  const metrics=[
    {key:'revenue',label:'Revenue',color:'#CAE8C1',fmt:v=>'$'+Math.round(v).toLocaleString()},
    {key:'visits',label:'Visits',color:'#BB99FF',fmt:v=>String(v)},
    {key:'ias',label:'IAs',color:'#F4DB71',fmt:v=>String(v)},
    {key:'noShows',label:'No-Shows',color:'#E05252',fmt:v=>String(v)},
    {key:'cancellations',label:'Cancels',color:'#888',fmt:v=>String(v)},
  ];
  const m=metrics.find(x=>x.key===activeMetric);
  const vals=weeks.map(w=>w[activeMetric]);
  const maxVal=Math.max(...vals,1);
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const fmtWk=(d,short)=>{
    const a=new Date(d+'T12:00');
    const b=new Date(d+'T12:00');b.setDate(b.getDate()+6);
    const mA=a.toLocaleDateString('en-CA',{month:'short'});
    const mB=b.toLocaleDateString('en-CA',{month:'short'});
    const yr=a.getFullYear();
    if(short){
      return mA===mB?`${mA} ${a.getDate()}–${b.getDate()}`:`${mA} ${a.getDate()}–${mB} ${b.getDate()}`;
    }
    return mA===mB?`${mA} ${a.getDate()}–${b.getDate()}, ${yr}`:`${mA} ${a.getDate()} – ${mB} ${b.getDate()}, ${yr}`;
  };

  // Bar chart dimensions
  const BAR_W=Math.max(24,Math.min(54,Math.floor(540/weeks.length)-10));
  const GAP=Math.max(8,Math.floor(540/weeks.length)-BAR_W);
  const CHART_H=176;
  const totalW=weeks.length*(BAR_W+GAP)+40;

  return(
    <div>
      {/* Metric selector tabs */}
      <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
        {metrics.map(({key,label,color})=>(

              padding:'5px 14px',borderRadius:4,border:'1px solid '+(activeMetric===key?color:'var(--border2)'),
              background:activeMetric===key?color+'18':'transparent',color:activeMetric===key?color:'#555',
              cursor:'pointer',transition:'all .15s'}}>
            {label}
          </button>
        ))}
      </div>

      {/* Week window selector */}
      <div style={{display:'flex',gap:6,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:11,color:'#555',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'1px',textTransform:'uppercase',marginRight:2}}>Window</span>
        {[[13,'13 wk'],[26,'26 wk'],[52,'52 wk'],['all','All']].map(([v,l])=>(
          <button key={l} onClick={()=>setWeekWindow(v)}
            style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:'.5px',
              padding:'4px 12px',borderRadius:4,border:'1px solid '+(weekWindow===v?'var(--go)':'var(--border2)'),
              background:weekWindow===v?'var(--go)':'transparent',color:weekWindow===v?'var(--lime)':'#666',
              cursor:'pointer',fontWeight:weekWindow===v?700:400,transition:'all .15s'}}>{l}</button>
        ))}
        <span style={{fontSize:11,color:'#555',marginLeft:'auto'}}>showing {weeks.length} of {_allWeeks.length} weeks</span>
      </div>

      {/* Bar chart */}
      <div style={{background:'linear-gradient(180deg,var(--surface2),rgba(0,0,0,.12))',border:'1px solid var(--border)',borderRadius:12,padding:'18px 18px 12px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:14,flexWrap:'wrap',gap:8}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:m.color}}>
            {m.label}
            <span style={{fontSize:13,color:'#666',fontWeight:400,marginLeft:8}}>week over week</span>
          </div>
          <div style={{fontSize:12,color:'#9a9a9a',background:'var(--surface3)',border:'1px solid var(--border2)',borderRadius:20,padding:'3px 12px'}}>avg {m.fmt(Math.round(avg))}/wk</div>
        </div>
        <div style={{overflowX:'auto',paddingBottom:4}}>
          <svg width={Math.max(totalW,500)} height={CHART_H+60} style={{display:'block',overflow:'visible'}}>
            <defs>
              <linearGradient id="wkBar" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={m.color} stopOpacity="0.95"/>
                <stop offset="100%" stopColor={m.color} stopOpacity="0.5"/>
              </linearGradient>
              <linearGradient id="wkBarMuted" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={m.color} stopOpacity="0.42"/>
                <stop offset="100%" stopColor={m.color} stopOpacity="0.16"/>
              </linearGradient>
            </defs>
            {/* gridlines + y-axis scale */}
            {[0,0.25,0.5,0.75,1].map((f,gi)=>{const gy=CHART_H-f*CHART_H;return(
              <g key={gi}>
                <line x1={20} y1={gy} x2={totalW} y2={gy} stroke="#ffffff" strokeWidth="1" opacity={f===0?0.13:0.045}/>
                <text x={15} y={gy+3} textAnchor="end" fontSize="9" fill="#5a5a5a">{m.fmt(Math.round(maxVal*f))}</text>
              </g>
            );})}
            {/* Avg reference line */}
            {(()=>{const avgY=CHART_H-(avg/maxVal)*CHART_H;return(
              <g>
                <line x1={20} y1={avgY} x2={totalW} y2={avgY} stroke={m.color} strokeWidth="1.25" strokeDasharray="5,4" opacity="0.5"/>
                <text x={totalW+10} y={avgY+3} textAnchor="middle" fontSize="9" fill={m.color} opacity="0.85" fontWeight="700">avg</text>
              </g>
            );})()}
            {weeks.map((w,i)=>{
              const val=w[activeMetric];
              const barH=Math.max(3,Math.round((val/maxVal)*CHART_H));
              const x=20+i*(BAR_W+GAP);
              const y=CHART_H-barH;
              const prev=i>0?weeks[i-1][activeMetric]:null;
              const delta=prev&&prev!==0?((val-prev)/prev*100).toFixed(1):null;
              const up=parseFloat(delta)>=0;
              const isHov=hoveredWeek===w.wk;
              const isLast=i===weeks.length-1;
              const aboveAvg=val>=avg;
              return(
                <g key={w.wk} onMouseEnter={()=>setHoveredWeek(w.wk)} onMouseLeave={()=>setHoveredWeek(null)} style={{cursor:'pointer'}}>
                  {/* Hover column highlight */}
                  <rect x={x-3} y={0} width={BAR_W+6} height={CHART_H} fill={isHov?'rgba(255,255,255,.045)':'transparent'} rx="5"/>
                  {/* Bar */}
                  <rect x={x} y={y} width={BAR_W} height={barH}
                    fill={(aboveAvg||isHov)?'url(#wkBar)':'url(#wkBarMuted)'} rx="4"
                    stroke={isLast?m.color:'none'} strokeWidth={isLast?1.5:0}/>
                  {/* Value label when not too crowded */}
                  {weeks.length<=14&&!isHov&&<text x={x+BAR_W/2} y={Math.max(y-6,11)} textAnchor="middle" fontSize="10" fill={m.color} fontWeight="700" opacity="0.75">{m.fmt(val)}</text>}
                  {/* Hover tooltip */}
                  {isHov&&(()=>{
                    const tw=120,th=delta!=null?54:40;
                    let tx=x+BAR_W/2-tw/2;tx=Math.max(2,Math.min(tx,Math.max(totalW,500)-tw-2));
                    const ty=Math.max(2,y-th-8);
                    return(
                      <g style={{pointerEvents:'none'}}>
                        <rect x={tx} y={ty} width={tw} height={th} rx="8" fill="#0c0c0c" stroke={m.color} strokeWidth="1.25" opacity="0.98"/>
                        <text x={tx+tw/2} y={ty+16} textAnchor="middle" fontSize="10" fill="#bbb" fontFamily="'Barlow Condensed',sans-serif" letterSpacing="0.5">{fmtWk(w.wk,true)}</text>
                        <text x={tx+tw/2} y={ty+34} textAnchor="middle" fontSize="15" fill="#fff" fontWeight="800">{m.fmt(val)}</text>
                        {delta!=null&&<text x={tx+tw/2} y={ty+48} textAnchor="middle" fontSize="11" fill={up?'#44CCAA':'#E05252'} fontWeight="700">{up?'▲':'▼'} {Math.abs(delta)}% vs prev</text>}
                      </g>
                    );
                  })()}
                  {/* Week label */}
                  <text x={x+BAR_W/2} y={CHART_H+17} textAnchor="middle" fontSize="9.5" fill={isHov?'#ddd':isLast?'#9a9a9a':'#5a5a5a'} fontWeight={isLast?700:400}
                    transform={weeks.length>10?`rotate(-38,${x+BAR_W/2},${CHART_H+17})`:''}>{fmtWk(w.wk,true)}</text>
                </g>
              );
            })}
          </svg>
        </div>
      </div>

      {/* Comparison table */}
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead>
            <tr style={{borderBottom:'1px solid var(--border)'}}>
              <th style={{textAlign:'left',padding:'8px 10px',color:'#555',fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,letterSpacing:'1.5px',textTransform:'uppercase'}}>Week</th>
              {metrics.map(({key,label,color})=>(
                <th key={key} style={{textAlign:'right',padding:'8px 10px',color:activeMetric===key?color:'#555',fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,letterSpacing:'1.5px',textTransform:'uppercase',cursor:'pointer'}} onClick={()=>setActiveMetric(key)}>{label}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {weeks.map((w,i)=>{
              const prev=i>0?weeks[i-1]:null;
              return(
                <tr key={w.wk}
                  onMouseEnter={()=>setHoveredWeek(w.wk)}
                  onMouseLeave={()=>setHoveredWeek(null)}
                  style={{borderBottom:'1px solid rgba(255,255,255,.03)',background:hoveredWeek===w.wk?'rgba(255,255,255,.04)':'transparent',cursor:'default'}}>
                  <td style={{padding:'8px 10px',color:'#aaa',fontWeight:600,whiteSpace:'nowrap'}}>{fmtWk(w.wk,false)}</td>
                  {metrics.map(({key,color,fmt})=>{
                    const val=w[key];
                    const pv=prev?prev[key]:null;
                    const delta=pv&&pv!==0?((val-pv)/pv*100).toFixed(1):null;
                    const up=parseFloat(delta)>=0;
                    return(
                      <td key={key} style={{padding:'8px 10px',textAlign:'right'}}>
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,color:activeMetric===key?color:'#888'}}>{fmt(val)}</span>
                        {delta!=null&&<span style={{fontSize:10,marginLeft:5,color:up?'#44CCAA':'#E05252'}}>{up?'▲':'▼'}{Math.abs(delta)}%</span>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
          {weeks.length>1&&(
            <tfoot>
              <tr style={{borderTop:'1px solid var(--border)'}}>
                <td style={{padding:'8px 10px',color:'#444',fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,textTransform:'uppercase',letterSpacing:'1px'}}>Avg / week</td>
                {metrics.map(({key,fmt,color})=>(
                  <td key={key} style={{padding:'8px 10px',textAlign:'right',fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,color:activeMetric===key?color:'#555'}}>
                    {fmt(Math.round(weeks.reduce((a,w)=>a+w[key],0)/weeks.length))}
                  </td>
                ))}
              </tr>
            </tfoot>
          )}
        </table>
      </div>
    </div>
  );
}



function PerformancePage({staff,perfData,setPerfData,page}){

  // ── Clinic/location retention summary (from Jane Member Retention report upload) ──

        if(inQ&&text[i+1]==='"'){cur+='"';i+=2;continue;}
