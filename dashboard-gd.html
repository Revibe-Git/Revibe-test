<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revibe — Growth & Development Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--surface:#111;--surface2:#181818;--surface3:#222;
  --border:#2e2e2e;--border2:#404040;
  --go:#00584D;--go-dim:rgba(0,88,77,.13);--go-b:rgba(0,88,77,.28);
  --wellness:#12492F;--lime:#CAE8C1;--lime-dim:rgba(202,232,193,.08);--lime-b:rgba(202,232,193,.18);
  --yellow:#F4DB71;--yellow-dim:rgba(244,219,113,.1);
  --purple:#BB99FF;--purple-dim:rgba(187,153,255,.1);
  --gray:#969696;--red:#E05252;
  --text:#f4f4f4;--text2:#aaa;--text3:#777;
@keyframes spin{to{transform:rotate(360deg);}}
  --lc1:#6B9FD4;--lc2:#F4DB71;--lc3:#44ccaa;--lc4:#CAE8C1;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.shell{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{width:226px;min-width:226px;height:100vh;background:var(--black);border-right:1px solid #181818;display:flex;flex-direction:column;overflow-y:auto;}
.logo-wrap{padding:17px 17px 13px;border-bottom:1px solid #181818;}
.logo-img{height:27px;object-fit:contain;object-position:left;}
.logo-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-top:7px;font-weight:600;}
.nav-group{padding:13px 0 3px;}
.nav-lbl{padding:0 15px 7px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#555;font-weight:700;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 15px;cursor:pointer;font-size:13px;color:#999;border-left:2px solid transparent;transition:all .1s;}
.nav-item:hover{color:var(--text);background:#0d0d0d;}
.nav-item.active{color:var(--lime);background:var(--lime-dim);border-left-color:var(--lime);font-weight:500;}
.nav-icon{font-size:11px;width:14px;text-align:center;opacity:.5;}
.nav-item.active .nav-icon{opacity:1;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px;font-family:'Barlow Condensed',sans-serif;}
.sidebar-hr{height:1px;background:#141414;margin:4px 0;}
.sidebar-foot{margin-top:auto;padding:13px;border-top:1px solid #141414;}
.foot-card{background:var(--go-dim);border:1px solid var(--go-b);border-radius:5px;padding:10px 12px;}
.foot-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--lime);font-weight:700;}
.foot-val{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:700;line-height:1;margin-top:1px;}
.foot-sub{font-size:11px;color:#777;margin-top:3px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.stripe{height:2px;background:linear-gradient(90deg,var(--go) 0%,var(--lime) 100%);}
.topbar{height:54px;min-height:54px;background:var(--black);border-bottom:1px solid #181818;padding:0 22px;display:flex;align-items:center;justify-content:space-between;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.pipe{color:#444;margin:0 10px;}
.crumb{font-size:12px;color:#777;letter-spacing:.3px;}
.topbar-r{display:flex;gap:7px;}
.scroll{flex:1;overflow-y:auto;}
.pg{padding:18px 22px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:4px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;letter-spacing:.4px;transition:all .1s;white-space:nowrap;}
.btn-lime{background:var(--lime);color:var(--wellness);}
.btn-lime:hover{background:#d8f0cf;}
.btn-go{background:var(--go);color:var(--lime);}
.btn-go:hover{background:var(--wellness);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);}
.btn-sm{padding:5px 11px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}
.btn-red{background:rgba(224,82,82,.1);color:var(--red);border:1px solid rgba(224,82,82,.2);}
.btn-red:hover{background:rgba(224,82,82,.18);}

/* STATS */
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:17px;}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.sc{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--border);border-radius:5px;padding:13px 15px;}
.sc.lime{border-top-color:var(--lime);}
.sc.go{border-top-color:var(--go);}
.sc.yellow{border-top-color:var(--yellow);}
.sc.red{border-top-color:var(--red);}
.sc.purple{border-top-color:var(--purple);}
.sc.gray{border-top-color:var(--gray);}
.sc-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;font-weight:600;margin-bottom:5px;}
.sc-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;line-height:1;}
.sc-sub{font-size:12px;color:#777;margin-top:4px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:5px;padding:15px 17px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;font-weight:600;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;line-height:1.8;}
.b-l1{background:rgba(107,159,212,.12);color:var(--lc1);}
.b-l2{background:rgba(244,219,113,.12);color:var(--lc2);}
.b-l3{background:rgba(0,88,77,.2);color:#44ccaa;}
.b-l4{background:var(--lime-dim);color:var(--lc4);}
.b-pt{background:rgba(202,232,193,.1);color:#CAE8C1;}
.b-chiro{background:rgba(107,159,212,.1);color:#6B9FD4;}
.b-rmt{background:rgba(244,219,113,.1);color:#F4DB71;}
.b-osteo{background:rgba(170,119,255,.1);color:#BB99FF;}
.b-naturo{background:rgba(0,88,77,.15);color:#44ccaa;}
.b-guest{background:rgba(224,82,82,.1);color:#F08080;}
.b-mgmt{background:rgba(187,153,255,.12);color:#BB99FF;border-color:rgba(187,153,255,.25);}
.b-edu{background:rgba(202,232,193,.12);color:#CAE8C1;border-color:rgba(202,232,193,.25);}
.b-ops{background:rgba(107,159,212,.12);color:#6B9FD4;border-color:rgba(107,159,212,.25);}
.b-clinical{background:rgba(202,232,193,.12);color:#CAE8C1;}
.b-spa{background:rgba(187,153,255,.12);color:#BB99FF;}
.b-sc{background:rgba(244,219,113,.12);color:#F4DB71;}

/* SCORE BAR */
.sbar{display:flex;align-items:center;gap:7px;}
.sbar-track{flex:1;height:3px;background:var(--surface3);border-radius:2px;min-width:50px;}
.sbar-fill{height:100%;border-radius:2px;}
.sbar-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;min-width:22px;text-align:right;}

/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{border-bottom:1px solid var(--border);}
th{text-align:left;padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:#888;font-weight:600;}
td{padding:10px 12px;border-bottom:1px solid rgba(50,50,50,.8);vertical-align:middle;font-size:13px;color:#ddd;}
tr:last-child td{border-bottom:none;}
tbody tr{cursor:pointer;}
tbody tr:hover td{background:#0d0d0d;}

/* AVATAR */
.av{border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;flex-shrink:0;}
.av-sm{width:29px;height:29px;font-size:11px;}
.av-md{width:36px;height:36px;font-size:13px;}
.av-lg{width:52px;height:52px;font-size:19px;}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:18px;backdrop-filter:blur(6px);overflow-y:auto;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:8px;width:100%;max-width:860px;position:relative;margin:auto;}
.modal-stripe{height:3px;background:linear-gradient(90deg,var(--go),var(--lime));border-radius:8px 8px 0 0;}
.modal-body{padding:22px 26px;}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);border-radius:4px;padding:3px 9px;cursor:pointer;font-size:11px;font-family:'Barlow',sans-serif;z-index:10;}
.modal-close:hover{color:var(--text);}

/* TRACK PILL */
.track-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border:1px solid transparent;transition:all .12s;}
.tp-clinical{background:rgba(202,232,193,.08);color:#CAE8C1;border-color:rgba(202,232,193,.2);}
.tp-clinical.active{background:rgba(202,232,193,.18);border-color:var(--lime);}
.tp-spa{background:rgba(187,153,255,.08);color:#BB99FF;border-color:rgba(187,153,255,.2);}
.tp-spa.active{background:rgba(187,153,255,.18);border-color:var(--purple);}
.tp-sc{background:rgba(244,219,113,.08);color:#F4DB71;border-color:rgba(244,219,113,.2);}
.tp-sc.active{background:rgba(244,219,113,.18);border-color:var(--yellow);}

/* PROFILE HEADER */
.prof-head{display:flex;gap:16px;align-items:flex-start;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.prof-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;letter-spacing:1px;line-height:1;}
.prof-meta{display:flex;align-items:center;gap:7px;margin-top:6px;flex-wrap:wrap;}
.prof-score-block{margin-left:auto;text-align:right;flex-shrink:0;}
.prof-score-num{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:700;line-height:1;}
.prof-score-sub{font-size:10px;color:var(--text3);margin-top:1px;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:15px;gap:0;overflow-x:auto;}
.tab{padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Barlow',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s;white-space:nowrap;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--lime);border-bottom-color:var(--lime);}

/* SCORE ROWS */
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.score-row-lbl{flex:1;font-size:12px;}
.score-row-wt{font-size:10px;color:#666;min-width:52px;text-align:right;}
.score-row-bar{min-width:120px;}

/* CATDEF TABLE */
.catdef-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:16px;}
.catdef-table th{background:var(--surface2);padding:7px 10px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#888;font-weight:600;}
.catdef-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5;}
.catdef-table tr:last-child td{border-bottom:none;}
.col-04{color:#E05252;}
.col-56{color:#F4DB71;}
.col-7{color:#44ccaa;}
.col-810{color:#CAE8C1;}
.catdef-name{font-weight:600;color:var(--text);}

/* ROADMAP */
.roadmap-section{margin-bottom:20px;}
.roadmap-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.roadmap-table{width:100%;border-collapse:collapse;font-size:11px;}
.roadmap-table th{background:var(--surface2);padding:6px 10px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#888;font-weight:600;}
.roadmap-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.55;}
.roadmap-table tr:last-child td{border-bottom:none;}
.rm-level{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;white-space:nowrap;}
.rm-mandatory{color:var(--text2);}
.rm-recommended{color:var(--text3);}

/* FILE UPLOAD */
.file-zone{border:1px dashed var(--border2);border-radius:5px;padding:22px;text-align:center;cursor:pointer;transition:all .13s;background:var(--surface2);}
.file-zone:hover,.file-zone.drag{border-color:var(--lime);background:var(--lime-dim);}
.file-zone input{display:none;}
.file-item{display:flex;align-items:center;padding:7px 11px;background:var(--surface2);border-radius:4px;margin-bottom:5px;border:1px solid var(--border);}
.file-ico{font-size:15px;margin-right:8px;}
.file-name{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-size{font-size:10px;color:var(--text3);margin:0 9px;}
.file-date{font-size:10px;color:var(--text3);}

/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
label{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#888;font-weight:600;}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:7px 10px;font-size:12px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .1s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--go);}
select option{background:var(--surface2);}
textarea{resize:vertical;min-height:60px;}
.fsec{grid-column:1/-1;font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--lime);padding-top:3px;}
.fdiv{grid-column:1/-1;height:1px;background:var(--border);}
.score-in{width:66px!important;}
.pill-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:3px 0;}
.pill{padding:4px 10px;border-radius:3px;font-size:11px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--surface2);transition:all .1s;font-family:'Barlow',sans-serif;}
.pill.on{background:var(--go-dim);border-color:var(--go-b);color:var(--lime);}
.score-preview{grid-column:1/-1;display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:9px 12px;}

/* HIGHLIGHTS */
.hb{border-radius:4px;padding:9px 12px;font-size:12px;}
.hb-green{background:rgba(0,88,77,.1);border:1px solid rgba(0,88,77,.25);color:#44ccaa;}
.hb-yellow{background:var(--yellow-dim);border:1px solid rgba(244,219,113,.2);color:var(--yellow);}
.hb-gray{background:var(--surface2);border:1px solid var(--border);color:var(--text2);}
.hb-purple{background:var(--purple-dim);border:1px solid rgba(187,153,255,.2);color:var(--purple);}

/* NOTE */
.note-item{padding:11px 13px;background:var(--surface2);border-radius:4px;border-left:2px solid var(--go);margin-bottom:7px;}
.note-date{font-size:10px;color:#888;margin-bottom:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:600;}

/* SEARCH */
.search-wrap{position:relative;}
.search-wrap input{padding-left:28px;width:190px;}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:11px;}

/* FILTER */
.filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:7px;}
.filter-grp{display:flex;gap:5px;flex-wrap:wrap;}

/* UTILS */
.flex{display:flex;}.aic{align-items:center;}.jsb{justify-content:space-between;}
.g4{gap:4px;}.g6{gap:6px;}.g8{gap:8px;}.g10{gap:10px;}.g12{gap:12px;}.g16{gap:16px;}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}.mb14{margin-bottom:14px;}.mb16{margin-bottom:16px;}.mb18{margin-bottom:18px;}
.mt8{margin-top:8px;}.mt10{margin-top:10px;}.mt12{margin-top:12px;}.mt14{margin-top:14px;}
.muted{color:#999;font-size:12px;}
.sm{font-size:13px;}.xs{font-size:12px;}
.fw5{font-weight:500;}.fw6{font-weight:600;}
.bc{font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.empty{text-align:center;padding:34px;color:var(--text3);}
.empty-ico{font-size:24px;margin-bottom:7px;}
.wrap{flex-wrap:wrap;}
@media(max-width:1100px){.sg4{grid-template-columns:repeat(2,1fr);}.sg3{grid-template-columns:1fr 1fr;}}

/* ── FORMS ─────────────────────────────── */
.form-shell{max-width:680px;margin:0 auto;}
.form-type-tabs{display:flex;gap:0;margin-bottom:24px;border-radius:6px;overflow:hidden;border:1px solid var(--border2);}
.ftt{flex:1;padding:12px 0;text-align:center;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;background:var(--surface2);color:#777;border:none;transition:all .15s;}
.ftt:hover{color:var(--text);background:#1a1a1a;}
.ftt.active.monthly{background:rgba(107,159,212,.15);color:#6B9FD4;border-bottom:2px solid #6B9FD4;}
.ftt.active.quarterly{background:rgba(244,219,113,.1);color:#F4DB71;border-bottom:2px solid #F4DB71;}
.ftt.active.annual{background:rgba(202,232,193,.1);color:#CAE8C1;border-bottom:2px solid #CAE8C1;}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.form-card-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);}
.form-card-body{padding:20px 22px;}
.form-section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#aaa;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.form-section-icon{font-size:14px;opacity:.7;}
.form-question{margin-bottom:18px;}
.form-question label{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#888;font-weight:600;display:block;margin-bottom:7px;}
.form-question .hint{font-size:11px;color:#666;margin-bottom:7px;font-style:italic;line-height:1.5;}
.form-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:10px 13px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;width:100%;}
.form-input:focus{border-color:var(--go);background:#151515;}
.form-textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:10px 13px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;width:100%;resize:vertical;min-height:80px;line-height:1.6;}
.form-textarea:focus{border-color:var(--go);background:#151515;}
.form-textarea.tall{min-height:120px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-check-group{display:flex;flex-direction:column;gap:9px;}
.form-check{display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.form-check input[type=checkbox]{width:16px;height:16px;min-width:16px;accent-color:var(--go);margin-top:1px;cursor:pointer;}
.form-check-label{font-size:13px;color:var(--text2);line-height:1.5;}
.form-stripe{height:3px;}
.form-stripe.monthly{background:linear-gradient(90deg,#3a6b9f,#6B9FD4);}
.form-stripe.quarterly{background:linear-gradient(90deg,#9a8200,#F4DB71);}
.form-stripe.annual{background:linear-gradient(90deg,var(--go),var(--lime));}
.form-header-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
.tag-monthly{background:rgba(107,159,212,.12);color:#6B9FD4;}
.tag-quarterly{background:rgba(244,219,113,.1);color:#F4DB71;}
.tag-annual{background:rgba(202,232,193,.1);color:#CAE8C1;}
.form-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:1.5px;margin:8px 0 4px;}
.form-subtitle{font-size:12px;color:#777;line-height:1.6;}
.form-meta-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;font-size:11px;color:#888;margin-right:6px;font-family:'Barlow',sans-serif;}
.form-submit-row{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;background:var(--surface2);border-top:1px solid var(--border);border-radius:0 0 8px 8px;}
.form-progress{display:flex;align-items:center;gap:8px;font-size:12px;color:#777;}
.progress-bar{width:120px;height:3px;background:var(--border2);border-radius:2px;}
.progress-fill{height:100%;border-radius:2px;transition:width .3s;}

/* Submissions viewer */
.sub-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color .12s;}
.sub-card:hover{border-color:var(--border2);}
.sub-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sub-expand{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:16px 20px;margin-top:10px;}
.sub-field{margin-bottom:12px;}
.sub-field-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#777;font-weight:600;margin-bottom:4px;}
.sub-field-val{font-size:13px;color:var(--text2);line-height:1.6;}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.empty-forms{text-align:center;padding:48px 24px;}
.empty-forms-ico{font-size:36px;margin-bottom:12px;opacity:.4;}


/* ── RESOURCES / SOP ──────────────────── */
.sop-layout{display:grid;grid-template-columns:220px 1fr;gap:0;height:calc(100vh - 90px);overflow:hidden;}
.sop-nav{background:var(--surface);border:1px solid var(--border);border-radius:6px 0 0 6px;overflow-y:auto;padding:14px 0;}
.sop-nav-section{padding:6px 16px 3px;font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#555;font-weight:700;margin-top:10px;}
.sop-nav-item{padding:9px 16px;font-size:12px;color:#888;cursor:pointer;border-left:2px solid transparent;transition:all .12s;display:block;}
.sop-nav-item:hover{color:var(--text);background:#0d0d0d;}
.sop-nav-item.active{color:var(--lime);border-left-color:var(--lime);background:var(--lime-dim);font-weight:500;}
.sop-nav-item .sop-step-num{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#444;margin-right:5px;}
.sop-nav-item.active .sop-step-num{color:var(--lime);opacity:.7;}
.sop-content{background:var(--surface);border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;overflow-y:auto;padding:28px 34px;}
.sop-h1{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--lime);margin-bottom:6px;}
.sop-h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--lime);margin:28px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--go-b);}
.sop-tagline{font-size:13px;color:#777;margin-bottom:20px;line-height:1.6;}
.sop-applies{background:var(--go-dim);border:1px solid var(--go-b);border-radius:4px;padding:10px 14px;font-size:12px;color:#CAE8C1;margin-bottom:20px;line-height:1.6;}
.sop-p{font-size:13px;color:#aaa;line-height:1.75;margin-bottom:12px;}
.sop-ul{margin:8px 0 14px 0;padding-left:0;list-style:none;}
.sop-ul li{font-size:13px;color:#aaa;line-height:1.7;padding:3px 0 3px 18px;position:relative;}
.sop-ul li::before{content:'—';position:absolute;left:0;color:#444;}
.sop-ul li.check::before{content:'☐';color:var(--go);}
.sop-ul li.bullet::before{content:'·';color:var(--lime);font-size:18px;top:-1px;}
.sop-highlight{background:rgba(0,88,77,.08);border-left:3px solid var(--go);border-radius:0 4px 4px 0;padding:12px 16px;margin:14px 0;font-size:12px;color:#aaa;line-height:1.7;}
.sop-warning{background:rgba(244,219,113,.06);border-left:3px solid var(--yellow);border-radius:0 4px 4px 0;padding:12px 16px;margin:14px 0;font-size:12px;color:#aaa;line-height:1.7;}
.sop-warning strong{color:var(--yellow);}
.sop-highlight strong{color:var(--lime);}
.sop-table{width:100%;border-collapse:collapse;margin:14px 0;}
.sop-table th{background:var(--surface2);padding:9px 12px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#777;font-weight:600;}
.sop-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;color:#aaa;vertical-align:top;line-height:1.6;}
.sop-table tr:last-child td{border-bottom:none;}
.sop-phase-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.phase-1{background:rgba(107,159,212,.12);color:#6B9FD4;}
.phase-2{background:rgba(244,219,113,.1);color:#F4DB71;}
.phase-3{background:rgba(0,88,77,.15);color:#44ccaa;}
.phase-4{background:rgba(202,232,193,.12);color:#CAE8C1;}
.phase-5{background:rgba(187,153,255,.12);color:#BB99FF;}
.sop-principle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}
.sop-principle{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:13px 15px;}
.sop-principle-ico{font-size:18px;margin-bottom:7px;}
.sop-principle-text{font-size:12px;color:#aaa;line-height:1.5;font-weight:500;}
.sop-principle-num{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:4px;}
.sop-divider{height:1px;background:var(--border);margin:24px 0;}

/* ── BIRD TEST in profile ─────────────────── */
.bird-shell{padding:0;}
.bird-intro{background:var(--go-dim);border:1px solid var(--go-b);border-radius:5px;padding:14px 16px;margin-bottom:18px;}
.bird-types{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
.bird-type-card{border-radius:5px;padding:13px 15px;border:1px solid transparent;cursor:pointer;transition:all .15s;}
.bird-type-card.selected{border-width:2px;}
.bird-dove{background:rgba(107,159,212,.08);border-color:rgba(107,159,212,.2);}
.bird-dove.selected{background:rgba(107,159,212,.18);border-color:#6B9FD4;}
.bird-owl{background:rgba(202,232,193,.07);border-color:rgba(202,232,193,.15);}
.bird-owl.selected{background:rgba(202,232,193,.18);border-color:#CAE8C1;}
.bird-eagle{background:rgba(224,82,82,.07);border-color:rgba(224,82,82,.15);}
.bird-eagle.selected{background:rgba(224,82,82,.16);border-color:#E05252;}
.bird-parrot{background:rgba(244,219,113,.07);border-color:rgba(244,219,113,.15);}
.bird-parrot.selected{background:rgba(244,219,113,.16);border-color:#F4DB71;}
.bird-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:1px;margin-bottom:3px;}
.bird-tagline{font-size:11px;color:#888;margin-bottom:8px;}
.bird-traits{display:flex;flex-wrap:wrap;gap:4px;}
.bird-trait{font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.05);color:#777;}
.bird-result{border-radius:6px;padding:16px 18px;margin-bottom:14px;}
.bird-result-dove{background:rgba(107,159,212,.1);border:1px solid rgba(107,159,212,.25);}
.bird-result-owl{background:rgba(202,232,193,.08);border:1px solid rgba(202,232,193,.2);}
.bird-result-eagle{background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.2);}
.bird-result-parrot{background:rgba(244,219,113,.08);border:1px solid rgba(244,219,113,.2);}
.bird-compat{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
.bird-compat-item{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;text-align:center;}
.bird-compat-ico{font-size:16px;margin-bottom:3px;}
.bird-compat-lbl{font-size:9px;color:#888;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}

/* quiz */
.bird-quiz-q{margin-bottom:20px;}
.bird-quiz-q-text{font-size:13px;color:var(--text);font-weight:500;margin-bottom:11px;line-height:1.55;}
.bird-quiz-q-num{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.bird-option{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;border-radius:4px;border:1px solid var(--border);margin-bottom:7px;cursor:pointer;transition:all .12s;background:var(--surface2);}
.bird-option:hover{border-color:var(--border2);background:#1a1a1a;}
.bird-option.selected{border-color:var(--go);background:var(--go-dim);}
.bird-option-letter{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#555;min-width:18px;}
.bird-option.selected .bird-option-letter{color:var(--lime);}
.bird-option-text{font-size:12px;color:#aaa;line-height:1.5;}
.bird-option.selected .bird-option-text{color:var(--text);}


/* ══ LEADERSHIP TRACKER ═════════════════════════════════════════════ */
.lt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
.lt-stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;display:flex;flex-direction:column;gap:4px;}
.lt-stat-num{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;line-height:1;}
.lt-stat-lbl{font-size:10px;color:#777;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.lt-stat-sub{font-size:11px;color:#555;}
.lt-section{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:14px;}
.lt-section-hdr{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.lt-section-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#aaa;}
.lt-table{width:100%;border-collapse:collapse;}
.lt-table th{background:var(--surface2);padding:8px 12px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#666;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;}
.lt-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;color:#aaa;vertical-align:middle;}
.lt-table tr:last-child td{border-bottom:none;}
.lt-table tr:hover td{background:rgba(255,255,255,.02);}
.lt-name{font-weight:600;color:var(--text);font-size:13px;}
.lt-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;white-space:nowrap;}
.lt-ready-expansion{background:rgba(202,232,193,.12);color:#CAE8C1;border:1px solid rgba(202,232,193,.2);}
.lt-ready-now{background:rgba(68,204,170,.1);color:#44CCAA;border:1px solid rgba(68,204,170,.2);}
.lt-ready-36{background:rgba(244,219,113,.1);color:#F4DB71;border:1px solid rgba(244,219,113,.2);}
.lt-emerging{background:rgba(107,159,212,.1);color:#6B9FD4;border:1px solid rgba(107,159,212,.2);}
.lt-not-ready{background:rgba(224,82,82,.08);color:#E05252;border:1px solid rgba(224,82,82,.15);}
.lt-blocked{background:rgba(224,82,82,.12);color:#E05252;border:1px solid rgba(224,82,82,.25);}
.lt-score-bar-wrap{display:flex;align-items:center;gap:8px;}
.lt-score-bar{height:4px;border-radius:2px;background:var(--border2);}
.lt-score-fill{height:100%;border-radius:2px;transition:width .3s;}
.lt-score-val{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;min-width:28px;text-align:right;}
.lt-flag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 6px;border-radius:3px;}
.lt-flag-active{color:#E05252;background:rgba(224,82,82,.1);}
.lt-flag-clear{color:#555;}
.lt-gate-yes{color:#CAE8C1;font-size:12px;}
.lt-gate-partial{color:#F4DB71;font-size:12px;}
.lt-gate-no{color:#E05252;font-size:12px;}
.lt-tab-pills{display:flex;gap:0;border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-bottom:16px;}
.lt-tab{flex:1;padding:9px 0;text-align:center;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;background:var(--surface2);color:#666;border:none;transition:all .12s;}
.lt-tab:hover{color:var(--text);background:#1a1a1a;}
.lt-tab.active{background:var(--go);color:var(--lime);}
.lt-heat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.lt-heat-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:16px 18px;}
.lt-heat-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--lime);letter-spacing:1px;margin-bottom:12px;}
.lt-heat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.lt-heat-row:last-child{border-bottom:none;}
.lt-profile-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:20px;}
.lt-profile-inner{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;}
.lt-profile-hdr{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:10;}
.lt-profile-body{padding:20px 24px;}
.lt-sec-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.lt-def-card{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:12px 14px;}
.lt-def-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--lime);margin-bottom:6px;}
.lt-def-text{font-size:12px;color:#aaa;line-height:1.65;}
.lt-def-text li{margin-bottom:3px;}
.lt-pathway-badge{display:inline-flex;padding:3px 9px;border-radius:3px;background:rgba(0,88,77,.2);color:var(--lime);border:1px solid var(--go-b);font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
.lt-category-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.lt-category-row:last-child{border-bottom:none;}
.lt-category-name{font-size:12px;color:#aaa;flex:1;}
.lt-s2-bar{width:100px;height:4px;background:var(--border2);border-radius:2px;margin:0 10px;}
.lt-s2-fill{height:100%;border-radius:2px;}
.lt-s2-score{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;min-width:24px;text-align:right;}
.lt-gate-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.lt-gate-row:last-child{border-bottom:none;}
.lt-readiness-ring{display:flex;flex-direction:column;align-items:center;gap:4px;}
.lt-ring-score{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:800;line-height:1;}
.lt-ring-label{font-size:10px;color:#777;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;}

</style>
</head>

/* ── Supabase data helpers ── */
const dbGet=async(table,fallback=[])=>{if(!sb)return fallback;try{const{data,error}=await sb.from(table).select('*');if(error||!data||data.length===0)return fallback;return data;}catch{return fallback;}};
const dbUpsert=async(table,rows)=>{if(!sb)return;try{await sb.from(table).upsert(Array.isArray(rows)?rows:[rows],{onConflict:'id'});}catch(e){console.warn('upsert error',table,e);}};
const dbInsert=async(table,row)=>{if(!sb)return null;try{const{data,error}=await sb.from(table).insert(row).select();if(error)throw error;return data?.[0];}catch(e){console.warn('insert error',table,e);}};
const dbUpdate=async(table,id,updates)=>{try{await sb.from(table).update(updates).eq('id',id);}catch(e){console.warn('update error',table,e);}};
const dbDelete=async(table,id)=>{try{await sb.from(table).delete().eq('id',id);}catch(e){console.warn('delete error',table,e);}};

/* ── Legacy localStorage shims (kept for non-critical state) ── */
const ld=(k,fb)=>{try{const v=localStorage.getItem('rvgd3_'+k);return v?JSON.parse(v):fb;}catch{return fb;}};
const sv=(k,v)=>{try{localStorage.setItem('rvgd3_'+k,JSON.stringify(v));}catch{}};
const calcScore=(scores,rubricId)=>{
  if(!scores||!rubricId||!RUBRIC_SYSTEMS[rubricId])return null;
  const cats=RUBRIC_SYSTEMS[rubricId].cats;
  let t=0;cats.forEach(c=>{t+=parseFloat(scores[c.id]||0)*(c.weight/100);});
  return Math.round(t*100)/100;
};
const getBestScore=(staff)=>{
  if(!staff.scores)return null;
  let best=null;
  ['clinical','sc','spa'].forEach(t=>{
    const sc=staff.scores[t];
    if(sc&&sc.total!==null&&sc.total!==undefined){
      if(best===null||sc.total>best)best=sc.total;
    }
  });
  return best;
};
const getPrimaryTrack=(staff)=>staff.tracks&&staff.tracks.length>0?staff.tracks[0]:null;

function DBadge({d}){const x=DISC.find(i=>i.id===d);return x?<span className={`badge ${x.cls}`}>{x.abbr}</span>:null;}
function TrackBadge({t}){const m=TRACK_META[t];return m?<span className={`badge ${m.cls}`}>{m.label}</span>:null;}
function LvBadge({score}){if(score===null||score===undefined)return null;const lv=getLevel(score);return<span className={`badge ${lv?.cls}`}>{lv?.label}</span>;}
function ScoreBar({score}){
  if(score===null||score===undefined)return<span className="muted">—</span>;

}
function Stars({n}){return<div style={{display:'flex',gap:3}}>{[1,2,3,4,5].map(i=><div key={i} style={{width:5,height:5,borderRadius:1,background:i<=n?'#CAE8C1':'var(--border)'}}/>)}</div>;}

/* ══ OVERVIEW ══ */
function Overview({staff,evals,sessions,setPage,openProfile}){
  const scored=staff.filter(s=>getBestScore(s)!==null);
  const avg=scored.length?Math.round(scored.reduce((a,b)=>a+(getBestScore(b)||0),0)/scored.length*10)/10:0;
  const multiTrack=staff.filter(s=>s.tracks&&s.tracks.length>1);
  const lvC=useMemo(()=>{const c={1:0,2:0,3:0,4:0,u:0};staff.forEach(s=>{const sc=getBestScore(s);if(sc===null){c.u++;return;}const n=parseInt(getLevel(sc)?.label[6]||'0');if(n>=1&&n<=4)c[n]++;else c.u++;});return c;},[staff]);
  const top5=useMemo(()=>[...staff].filter(s=>getBestScore(s)!==null).sort((a,b)=>(getBestScore(b)||0)-(getBestScore(a)||0)).slice(0,5),[staff]);
  const attention=useMemo(()=>[...staff].filter(s=>{const sc=getBestScore(s);return sc!==null&&sc<6;}).sort((a,b)=>(getBestScore(a)||0)-(getBestScore(b)||0)).slice(0,5),[staff]);

  return(
    <div>
      <div className="sg4 mb18">
        <div className="sc lime"><div className="sc-lbl">Total Staff</div><div className="sc-val">{staff.length}</div><div className="sc-sub">All disciplines</div></div>
        <div className="sc go"><div className="sc-lbl">Team Avg Score</div><div className="sc-val">{avg||'—'}</div><div className="sc-sub">Best track per person</div></div>
        <div className="sc purple"><div className="sc-lbl">Multi-Track Staff</div><div className="sc-val">{multiTrack.length}</div><div className="sc-sub">Assessed on 2+ rubrics</div></div>
        <div className="sc gray"><div className="sc-lbl">Evaluations</div><div className="sc-val">{evals.length}</div><div className="sc-sub">{scored.length} staff scored</div></div>
      </div>

      <div className="grid2 mb18">
        <div className="card">
          <div className="card-head"><span className="card-lbl">Level Distribution</span></div>
          {[{n:4,label:'Level 4 – Advanced',c:'#CAE8C1'},{n:3,label:'Level 3 – Proficient',c:'#44ccaa'},{n:2,label:'Level 2 – Developing',c:'#F4DB71'},{n:1,label:'Level 1 – Foundational',c:'#6B9FD4'}].map(l=>(
            <div key={l.n} className="flex aic g12 mb12">
              <div style={{width:6,height:6,borderRadius:2,background:l.c,flexShrink:0}}/>
              <div className="sm" style={{flex:1}}>{l.label}</div>
              <div style={{fontSize:24,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,color:l.c,lineHeight:1}}>{lvC[l.n]}</div>
            </div>
          ))}
          {lvC.u>0&&<div className="flex aic g12" style={{opacity:.3}}><div style={{width:6,height:6,borderRadius:2,background:'#333',flexShrink:0}}/><div className="sm" style={{flex:1}}>GX / Not yet scored</div><div style={{fontSize:24,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,lineHeight:1}}>{lvC.u}</div></div>}
        </div>
        <div className="card">
          <div className="card-head"><span className="card-lbl">Rubric Tracks Active</span></div>
          {['clinical','spa','sc'].map(t=>{
            const m=TRACK_META[t];
            const cnt=staff.filter(s=>s.tracks&&s.tracks.includes(t)).length;
            const rs=RUBRIC_SYSTEMS[t];
            return(
              <div key={t} className="flex aic g10 mb14">
                <div style={{width:6,height:24,borderRadius:2,background:m.color,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div className="sm fw6">{rs.label}</div>
                  <div className="muted" style={{lineHeight:1.4}}>{rs.tagline}</div>
                </div>
                <div style={{fontSize:22,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,color:m.color}}>{cnt}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="grid2">
        <div className="card">
          <div className="card-head"><span className="card-lbl">Top Performers</span><button className="btn btn-ghost btn-xs" onClick={()=>setPage('staff')}>All Staff</button></div>
          {top5.map((s,i)=>(
            <div key={s.id} className="flex aic g10 mb12" style={{cursor:'pointer'}} onClick={()=>openProfile(s.id)}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,color:'var(--text3)',width:18,textAlign:'center'}}>{i+1}</div>
              <Av name={s.name} sz="sm"/>
              <div style={{flex:1}}><div className="sm fw5">{s.name}</div><div className="flex aic g4 mt8" style={{marginTop:3}}><DBadge d={s.discipline}/>{s.tracks&&s.tracks.map(t=><TrackBadge key={t} t={t}/>)}</div></div>
              <ScoreBar score={getBestScore(s)}/>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-head"><span className="card-lbl">Priority Development</span><button className="btn btn-ghost btn-xs" onClick={()=>setPage('gaps')}>Gap Analysis</button></div>
          {attention.map(s=>{const sc=getBestScore(s);return(
            <div key={s.id} className="flex aic g10 mb12" style={{cursor:'pointer'}} onClick={()=>openProfile(s.id)}>
              <Av name={s.name} sz="sm"/>
              <div style={{flex:1}}><div className="sm fw5">{s.name}</div><DBadge d={s.discipline}/></div>
              <div style={{textAlign:'right'}}><div style={{fontSize:22,fontWeight:700,color:sc<4?'var(--red)':'var(--yellow)',fontFamily:"'Barlow Condensed',sans-serif"}}>{sc}</div><LvBadge score={sc}/></div>
            </div>
          );})}
        </div>
      </div>
    </div>
  );
}

/* ══ STAFF PAGE ══ */
function StaffPage({staff,openProfile,setModal}){

            <option value="spa">Spa</option>

          </select>
        </div>
        <div className="flex aic g6"><span className="muted">{filtered.length} staff</span><button className="btn btn-lime btn-sm" onClick={()=>setModal('addStaff')}>+ Add Staff</button></div>

              {filtered.length===0?<tr><td colSpan="8" style={{textAlign:'center',color:'var(--text3)',padding:24}}>No staff found</td></tr>:
              filtered.map(s=>{const sc=getBestScore(s);return(

                  <td style={{minWidth:120}}>{sc!==null?<ScoreBar score={sc}/>:<span className="muted xs">Not scored</span>}</td>
                  <td>{sc!==null?<LvBadge score={sc}/>:<span className="muted xs">—</span>}</td>

/* ══ GAPS ══ */
function GapsPage({staff,evals,openProfile}){
  const trackAvgs=useMemo(()=>{
    const result={};
    ['clinical','spa','sc'].forEach(track=>{
      const rs=RUBRIC_SYSTEMS[track];
      const avgs=rs.cats.map(c=>{
        const vals=staff.filter(s=>s.scores?.[track]&&s.scores[track][c.id]!==null&&s.scores[track][c.id]!==undefined).map(s=>parseFloat(s.scores[track][c.id]||0));
        return{...c,avg:vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10:null};
      });
      result[track]=avgs.sort((a,b)=>(a.avg||10)-(b.avg||10));
    });
    return result;
  },[staff,evals]);

  return(
    <div>
      <div className="sg3 mb18">
        <div className="sc yellow"><div className="sc-lbl">Staff Below L2</div><div className="sc-val">{staff.filter(s=>{const sc=getBestScore(s);return sc!==null&&sc<6;}).length}</div><div className="sc-sub">Score under 6.0</div></div>
        <div className="sc purple"><div className="sc-lbl">Multi-Track</div><div className="sc-val">{staff.filter(s=>s.tracks&&s.tracks.length>1).length}</div><div className="sc-sub">Assessed on 2+ rubrics</div></div>
        <div className="sc go"><div className="sc-lbl">Pending Scores</div><div className="sc-val">{staff.filter(s=>s.tracks&&s.tracks.length>0&&getBestScore(s)===null).length}</div><div className="sc-sub">No audit data yet</div></div>
      </div>

      {['clinical','spa','sc'].map(track=>{
        const rs=RUBRIC_SYSTEMS[track];
        const m=TRACK_META[track];
        const avgs=trackAvgs[track];
        const count=staff.filter(s=>s.tracks&&s.tracks.includes(track)).length;
        if(count===0)return null;
        return(
          <div key={track} className="card mb18" style={{marginBottom:14}}>
            <div className="card-head">
              <div className="flex aic g8"><div style={{width:3,height:20,borderRadius:2,background:m.color}}/><span className="card-lbl">{rs.label} Track — Category Averages</span><TrackBadge t={track}/></div>
              <span className="muted xs">{count} staff on this track</span>
            </div>
            {avgs.map(c=>(
              <div key={c.id} className="score-row">
                <div className="score-row-lbl" style={{color:c.avg!==null&&c.avg<6.5?'var(--yellow)':'var(--text)'}}>{c.label}{c.avg!==null&&c.avg<6.5&&<span style={{marginLeft:6,fontSize:12,color:'var(--yellow)'}}>⚑ Gap</span>}</div>
                <div className="score-row-wt">({c.weight}%)</div>
                <div className="score-row-bar">{c.avg!==null?<ScoreBar score={c.avg}/>:<span className="muted xs">No data</span>}</div>
              </div>
            ))}
          </div>
        );
      })}

      <div className="card">
        <div className="card-head"><span className="card-lbl">Full Staff Score Matrix</span></div>
        <div className="tbl-wrap"><table>
          <thead><tr><th>Staff</th><th>Tracks</th><th>Clinical</th><th>Spa</th><th>S&C</th><th>Best</th><th>Level</th></tr></thead>
          <tbody>
            {staff.filter(s=>s.tracks&&s.tracks.length>0).sort((a,b)=>(getBestScore(b)||0)-(getBestScore(a)||0)).map(s=>{
              const cSc=s.scores?.clinical?.total??null;
              const spSc=s.scores?.spa?.total??null;
              const scSc=s.scores?.sc?.total??null;
              return(<tr key={s.id} onClick={()=>openProfile(s.id)}>
                <td><div className="flex aic g8"><Av name={s.name} sz="sm"/><div><div className="sm fw5">{s.name}</div><DBadge d={s.discipline}/></div></div></td>
                <td><div className="flex aic g4">{s.tracks.map(t=><TrackBadge key={t} t={t}/>)}</div></td>
                <td>{cSc!==null?<ScoreBar score={cSc}/>:<span className="muted xs">—</span>}</td>
                <td>{spSc!==null?<ScoreBar score={spSc}/>:<span className="muted xs">—</span>}</td>
                <td>{scSc!==null?<ScoreBar score={scSc}/>:<span className="muted xs">—</span>}</td>
                <td><ScoreBar score={getBestScore(s)}/></td>
                <td><LvBadge score={getBestScore(s)}/></td>
              </tr>);
            })}
          </tbody>
        </table></div>
      </div>
    </div>
  );
}
